      // Strategy 2: Labeled time — "Check-in time: 3:00 PM" or "Check-in: ... 3:00 PM"
      if (!result.checkInTime) {
        const ciTimeMatch = full.match(/check[\s-]?in\s*(?:time)?[:\s]+.*?(\d{1,2}\s*:\s*\d{2}\s*(?:AM|PM))/i);
        if (ciTimeMatch) result.checkInTime = ciTimeMatch[1].replace(/\s+/g, ' ').trim();
      }
      if (!result.checkOutTime) {
        const coTimeMatch = full.match(/check[\s-]?out\s*(?:time)?[:\s]+.*?(\d{1,2}\s*:\s*\d{2}\s*(?:AM|PM))/i);
        if (coTimeMatch) result.checkOutTime = coTimeMatch[1].replace(/\s+/g, ' ').trim();
      }
      // Normalize: collapse any spaces around colons ("3 : 00 PM" → "3:00 PM")
      if (result.checkInTime) result.checkInTime = result.checkInTime.replace(/\s*:\s*/, ':');
      if (result.checkOutTime) result.checkOutTime = result.checkOutTime.replace(/\s*:\s*/, ':');

      // Breakfast detection
      if (/breakfast\s*included|includes?\s*breakfast|complimentary\s*breakfast|free\s*breakfast|with\s*breakfast/i.test(full)) {
        result.includesBreakfast = 'yes';
      } else if (/no\s*breakfast|without\s*breakfast|breakfast\s*not\s*included|room\s*only|no\s*meal\s*is\s*included|no\s*meal\s*option/i.test(full)) {
        result.includesBreakfast = 'no';
      }

      // Property name — look for specific patterns first
      const namePatterns = [
        /(?:confirmed at|booked at)\s+([^\n,;]{3,60})/i,
        /(?:your (?:stay|booking|reservation) at)\s+([^\n,;]{3,60})/i,
        /(?:hotel|property|accommodation)[:\s]+([^\n,;]{3,60})/i,
        /(?:you(?:'re| are)\s+(?:staying|booked)\s+at)\s+([^\n,;]{3,60})/i,
        /(?:reservation\s+(?:at|for))\s+([^\n,;]{3,60})/i,
      ];
      for (const pat of namePatterns) {
        const m = full.match(pat);
        if (m) {
          let name = m[1].trim().replace(/[.!]+$/, '');
          // Strip trailing junk: dates, common words, "Date:", "Your", etc.
          name = name.replace(/\s+(?:date|your|on|for|from|in|the|a)\s*[:].*/i, '');
          name = name.replace(/\s+(?:date|your|on|for|from|in|the|a)\s*$/i, '');
          // Strip trailing date patterns like "Date : March 23" or "March 23, 2026"
          name = name.replace(/\s+Date\s*:.*/i, '');
          name = name.replace(/\s+\w{3,9}\s+\d{1,2}(?:,?\s+\d{4})?\s*$/, '');
          result.propertyName = name.trim();
          break;
        }
      }
      // Fallback: look for lines with hotel-like keywords
      if (!result.propertyName) {
        for (const line of lines.slice(0, 15)) {
          if (/(?:hotel|suites?|inn|resort|hostel|lodge|villa|apartment|ryokan|pension|bnb)/i.test(line) && line.length >= 5 && line.length <= 80) {
            let name = line.replace(/[.!:]+$/, '').trim();
            name = name.replace(/^(?:your\s+(?:stay|booking)\s+(?:at|in)\s*)/i, '');
            // Strip trailing date/price junk
            name = name.replace(/\s+Date\s*:.*/i, '');
            name = name.replace(/\s+\d{1,2}[\s\/\-]\w{3,9}.*$/, '');
            if (name.length >= 4) { result.propertyName = name.trim(); break; }
          }
        }
      }
      // Last fallback: first capitalized line that looks like a name
      if (!result.propertyName) {
        for (const line of lines.slice(0, 10)) {
          if (line.length >= 4 && line.length <= 80 && /[A-Z]/.test(line[0]) && !/^\d/.test(line) && !/check|confirm|book|date|reservation|itinerary|guest|price|cancel|total|payment|email/i.test(line)) {
            result.propertyName = line.replace(/[.!:]+$/, '');
            break;
          }
        }
      }

      // Room type — look for room/suite/bed patterns, but stop before currency symbols
      const roomPatterns = [
        /(?:room\s*type|accommodation)[:\s]+([^$€£¥₹\n]{3,60})/i,
        // Booking.com: "Your reservation 1 night, Two-Bedroom Suite with Living Room"
        /(?:your\s+reservation|reserved)\s+\d+\s+nights?,\s*([^$€£¥₹\n]{3,80}?)(?=\s+(?:You\b|\d+\s+(?:adult|guest)))/i,
        // X-Bedroom patterns: "Two-Bedroom Suite", "1-Bedroom Apartment"
        /((?:\w+-)?Bedroom\s+(?:Suite|Room|Studio|Apartment|Villa)(?:\s+(?:with|and)\s+[\w\s]+)?)/i,
        /(\d+\s+(?:superior|deluxe|standard|premium|executive|classic|economy|luxury)\s+(?:[\w-]+\s+){0,4}(?:room|suite|studio|apartment|bed))/i,
        /((?:superior|deluxe|standard|premium|executive|classic|economy|luxury)\s+(?:[\w-]+\s+){0,3}(?:room|suite|studio|apartment))/i,
        /((?:double|single|twin|king|queen|family)\s+(?:room|suite|studio|bed)(?:\s+[\w-]+){0,2})/i,
      ];
      for (const pat of roomPatterns) {
        const m = full.match(pat);
        if (m) {
          let rt = (m[1] || m[0]).trim();
          // Strip trailing currency/price that leaked in
          rt = rt.replace(/\s*[$€£¥₹]\s*[\d,]+.*$/, '').trim();
          rt = rt.replace(/\s*\d{2,}[,.]?\d*\s*$/, '').trim(); // trailing numbers
          result.roomType = rt.replace(/[.!:]+$/, '');
          break;
        }
      }

      // Price — look for total price with currency. Be specific to avoid matching random text.
      // First try "total" context, then standalone large currency amounts
      const pricePatterns = [
        /(?:total\s*(?:price|cost|amount|charge|due))[:\s]*([$€£¥₹]\s*[\d,]+\.?\d*)/i,
        /(?:total\s*(?:price|cost|amount|charge|due))[:\s]*([\d,]+\.?\d*\s*(?:USD|EUR|GBP|JPY))/i,
        /(?:price|cost|total)[:\s]*([$€£¥₹]\s*[\d,]+\.?\d*)/i,
        // Standalone large currency amounts (at least 3 digits to avoid matching "¥ 160" room count)
        /([$€£¥₹]\s*[\d,]{3,}\.?\d*)/,
        /([\d,]{4,}\.?\d*\s*(?:USD|EUR|GBP|JPY|INR))/i,
      ];
      for (const pat of pricePatterns) {
        const m = full.match(pat);
        if (m) {
          const val = (m[1] || m[0]).trim();
          // Validate: must contain at least 3 digit characters to be a real price
          const digits = val.replace(/[^0-9]/g, '');
          if (digits.length >= 3) {
            result.price = val;
            break;
          }
        }
      }

      // Dates — prefer explicit check-in/check-out labels
      const dateRe = /(\d{1,2}[\s\/\-\.]\w{3,9}[\s\/\-\.]\d{2,4}|\w{3,9}\s+\d{1,2},?\s+\d{4}|\d{4}[\-\/]\d{2}[\-\/]\d{2}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/g;

      // Strategy 1: Look for labeled check-in/check-out with dates nearby
      const checkInPatterns = [
        /check[\s-]?in\s*(?:date)?[:\s]*([^\n]{6,40})/i,
        /(?:arrival|arriving|from)\s*(?:date)?[:\s]*([^\n]{6,40})/i,
      ];
      const checkOutPatterns = [
        /check[\s-]?out\s*(?:date)?[:\s]*([^\n]{6,40})/i,
        /(?:departure|departing|(?:check[\s-]?out)|until|to)\s*(?:date)?[:\s]*([^\n]{6,40})/i,
      ];

      for (const pat of checkInPatterns) {
        const m = full.match(pat);
        if (m) {
          const d = m[1].match(dateRe);
          if (d) { result.checkIn = d[0]; break; }
        }
      }
      for (const pat of checkOutPatterns) {
        const m = full.match(pat);
        if (m) {
          const d = m[1].match(dateRe);
          if (d) { result.checkOut = d[0]; break; }
        }
      }

      // Strategy 2: Look for date ranges like "Mar 23 - Apr 28, 2026" or "23 Mar – 28 Apr"
      if (!result.checkIn) {
        const rangeMatch = full.match(/(\w{3,9}\s+\d{1,2})\s*[-–—]\s*(\w{3,9}\s+\d{1,2},?\s+\d{4})/);
        if (rangeMatch) {
          result.checkIn = rangeMatch[1];
          result.checkOut = rangeMatch[2];
        }
      }

      // Strategy 3: Find dates near "stay" or "nights" context (skip email-date, cancel-by, etc.)
      if (!result.checkIn) {
        // Find all dates, then pick the ones most likely to be stay dates
        const allDates = [];
        let m;
        const dateReGlobal = /(\d{1,2}[\s\/\-\.]\w{3,9}[\s\/\-\.]\d{2,4}|\w{3,9}\s+\d{1,2},?\s+\d{4}|\d{4}[\-\/]\d{2}[\-\/]\d{2}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/g;
        while ((m = dateReGlobal.exec(full)) !== null) {
          const idx = m.index;
          // Check context around this date — skip if near "cancel", "sent", "email", "created", "payment due"
          const contextBefore = full.substring(Math.max(0, idx - 50), idx).toLowerCase();
          const isBookingDate = /cancel|sent|email|created|payment\s*due|free\s*cancel|modified|updated/.test(contextBefore);
          allDates.push({ date: m[1], idx, isBookingDate });
        }
        // Filter out booking/email dates, keep stay dates
        const stayDates = allDates.filter(d => !d.isBookingDate);
        if (stayDates.length >= 2) {
          result.checkIn = stayDates[0].date;
          result.checkOut = stayDates[1].date;
        } else if (stayDates.length === 1) {
          result.checkIn = stayDates[0].date;
        } else if (allDates.length >= 2) {
          result.checkIn = allDates[0].date;
          result.checkOut = allDates[1].date;
        }
      }

      // Address — look for address patterns, but truncate at phone/contact/fax
      const addrPatterns = [
        /(?:address|location|located\s+at|property\s+address)[:\s]+([^\n]{10,200})/i,
        /(?:directions?|find\s+us)[:\s]+([^\n]{10,200})/i,
      ];
      for (const pat of addrPatterns) {
        const m = full.match(pat);
        if (m) {
          let addr = m[1].trim();
          // Truncate at phone, contact, fax, email patterns
          addr = addr.replace(/\s*(?:phone|tel|fax|contact|email|website|www\.|http)[:\s].*/i, '').trim();
          addr = addr.replace(/\s*\+\d{1,3}\s*\d[\d\s-]+$/, '').trim(); // strip trailing phone numbers
          result.address = addr;
          break;
        }
      }

      return result;
    };

    // Parse activity/tour booking text
    const parseActivityText = (text) => {
      const result = {
        tourName: '', tourOperator: '', bookingSite: '', confirmationNumber: '',
        date: '', time: '', duration: '', contactInfo: '', description: '',
        address: '', price: '',
      };
      if (!text) return result;
      const full = text.replace(/\n/g, ' ');
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

      // Booking site detection
      const sitePatterns = [
        [/klook/i, 'Klook'], [/viator/i, 'Viator'], [/getyourguide/i, 'GetYourGuide'],
        [/airbnb\s*experiences/i, 'Airbnb Experiences'], [/tripadvisor/i, 'TripAdvisor'],
        [/musement/i, 'Musement'], [/tiqets/i, 'Tiqets'], [/civitatis/i, 'Civitatis'],
        [/veltra/i, 'Veltra'], [/booking\.com/i, 'Booking.com'],
      ];
      for (const [pat, name] of sitePatterns) {
        if (pat.test(full)) { result.bookingSite = name; break; }
      }

      // Confirmation / booking number
      const confPatterns = [
        /booking\s*(?:no|number|#|ref|reference)\.?\s*:?\s*([A-Z0-9][-A-Z0-9]{4,20})/i,
        /(?:confirmation|reservation|order|reference)\s*(?:#|no|number|code)?\.?\s*:?\s*([A-Z0-9][-A-Z0-9]{4,20})/i,
      ];
      for (const pat of confPatterns) {
        const m = full.match(pat);
        if (m) { result.confirmationNumber = m[1].trim(); break; }
      }

      // Date and time — look for ISO-like dates first: "2026-05-08 11:00:00"
      const isoMatch = full.match(/(\d{4}-\d{2}-\d{2})\s+(\d{1,2}:\d{2}(?::\d{2})?)\s*(?:\((?:local|[A-Z]{2,4})\s*time)?/i);
      if (isoMatch) {
        result.date = isoMatch[1];
        result.time = isoMatch[2].replace(/:\d{2}$/, ''); // strip seconds
      } else {
        // Try other date formats
        const dateMatch = full.match(/(?:date|when|scheduled)[:\s]+([^\n]{6,40})/i);
        if (dateMatch) {
          const d = dateMatch[1].match(/(\d{4}[\-\/]\d{2}[\-\/]\d{2}|\w{3,9}\s+\d{1,2},?\s+\d{4}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/);
          if (d) result.date = d[1];
          const t = dateMatch[1].match(/(\d{1,2}:\d{2}\s*(?:AM|PM)?)/i);
          if (t) result.time = t[1];
        }
      }

      // Duration — look for "X-minute", "X hour", "X.5 hours" etc.
      const durMatch = full.match(/(\d+(?:\.\d+)?)\s*[-–]?\s*(?:minute|min|hour|hr)s?\s*(?:tour|ride|experience|activity|trip)?/i);
      if (durMatch) {
        const num = parseFloat(durMatch[0]);
        result.duration = durMatch[0].replace(/\s*(tour|ride|experience|activity|trip)/i, '').trim();
      }

      // Price
      const priceMatch = full.match(/(?:US)?\s*\$\s*[\d,]+\.?\d*|€\s*[\d,]+\.?\d*|£\s*[\d,]+\.?\d*|¥\s*[\d,]+|[\d,]+\.?\d*\s*(?:USD|EUR|GBP|JPY)/i);
      if (priceMatch) result.price = priceMatch[0].trim();

      // Contact info — collect phone numbers and emails
      const phones = full.match(/(?:\+?\(?\d{1,4}\)?[-.\s]?\d{1,5}[-.\s]?\d{1,5}[-.\s]?\d{1,5})/g) || [];
      const emails = full.match(/[\w.-]+@[\w.-]+\.\w{2,}/g) || [];
      const contacts = [];
      // Filter out generic/unrelated phone patterns (too short, or just dates)
      phones.forEach(p => {
        const digits = p.replace(/\D/g, '');
        if (digits.length >= 7 && digits.length <= 15) contacts.push(p.trim());
      });
      emails.forEach(e => { if (!/noreply|no-reply|mailer/i.test(e)) contacts.push(e); });
      result.contactInfo = contacts.slice(0, 3).join(' | ');

      // Tour operator — look for "Contact operator", email domain, or operator patterns
      const opMatch = full.match(/(?:operator|provider|company|organized?\s*by)[:\s]+([^\n,]{3,60})/i);
      if (opMatch) {
        result.tourOperator = opMatch[1].trim();
      } else if (emails.length > 0) {
        // Extract operator name from email domain
        const opEmail = emails.find(e => !/klook|viator|getyourguide|airbnb|tripadvisor/i.test(e));
        if (opEmail) {
          const domain = opEmail.split('@')[1]?.split('.')[0];
          if (domain && domain.length > 2) result.tourOperator = domain.charAt(0).toUpperCase() + domain.slice(1);
        }
      }

      // Tour name — try activity-specific patterns
      const namePatterns = [
        // Klook: activity name is usually a prominent line with capitalized words
        /(?:booking\s+confirmed|your\s+booking)[:\s]*.*?([A-Z][\w\s]+(?:Tour|Experience|Ride|Walk|Cruise|Class|Workshop|Adventure|Excursion|Tasting|Show|Visit|Trip|Pass|Ticket))/i,
        // Direct match of activity keywords
        /([\w\s-]{5,80}(?:Tour|Experience|Ride|Walk|Cruise|Class|Workshop|Adventure|Excursion|Tasting|Show|Visit|Trip))/,
      ];
      for (const pat of namePatterns) {
        const m = full.match(pat);
        if (m) {
          let name = m[1].trim();
          // Clean up leading junk
          name = name.replace(/^(?:the|a|an|your)\s+/i, '');
          if (name.length >= 5 && name.length <= 100) {
            result.tourName = name;
            break;
          }
        }
      }

      // Description — what's included
      const inclMatch = full.match(/what'?s\s+included[:\s]*([\s\S]{10,300}?)(?=what'?s\s+not|not\s+included|how\s+to|before\s+you|itinerary|$)/i);
      if (inclMatch) {
        result.description = inclMatch[1].replace(/\s+/g, ' ').trim();
      }

      // Address / meeting point
      const meetPatterns = [
        /(?:meet(?:ing)?\s*(?:point|up|at|location)|pick[\s-]?up|starting\s+point|getting\s+there)[:\s]+([^\n]{5,150})/i,
        /(?:meet\s+up\s+at)\s+([^\n]{5,150})/i,
      ];
      for (const pat of meetPatterns) {
        const m = full.match(pat);
        if (m) {
          let addr = m[1].trim();
          addr = addr.replace(/\s*(?:path|how|what|before|itinerary)\s.*/i, '').trim();
          if (addr.length >= 5) { result.address = addr; break; }
        }
      }

      return result;
    };

    const DocumentCenter = ({ pins, onClose, isDarkMode, onSelectPin }) => {
      const docs = useMemo(() => {
        return pins
          .filter(p => p.attachment || p.reservation_details)
          .map(p => {
            const rd = p.reservation_details || {};
            const isActivity = rd.type === 'activity' || p.category === 'activity';
            const dateStr = rd.check_in || rd.date || '';
            let sortDate = null;
            if (dateStr) {
              const d = new Date(dateStr);
              if (!isNaN(d.getTime())) sortDate = d;
            }
            return { pin: p, rd, isActivity, dateStr, sortDate };
          })
          .sort((a, b) => {
            if (a.sortDate && b.sortDate) return a.sortDate - b.sortDate;
            if (a.sortDate) return -1;
            if (b.sortDate) return 1;
            return a.pin.name.localeCompare(b.pin.name);
          });
      }, [pins]);

      const formatDate = (str) => {
        if (!str) return '';
        const d = new Date(str);
        if (isNaN(d.getTime())) return str;
        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      };

      return (
        <div className="fixed inset-0 md:inset-auto md:top-0 md:right-0 md:bottom-0 md:w-96 bg-black bg-opacity-50 md:bg-opacity-0 flex items-end md:items-stretch justify-center md:justify-end" style={{ zIndex: 9999 }} onClick={onClose}>
          <div className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-t-xl md:rounded-none w-full md:w-96 shadow-2xl md:shadow-xl md:border-l dark:md:border-slate-700`} onClick={e => e.stopPropagation()} style={{ position: 'relative', zIndex: 10000 }}>
            <div className="max-h-[85vh] md:max-h-full md:h-full overflow-y-auto p-6 space-y-4">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-bold dark:text-white">Documents</h2>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-gray-500"><CloseIcon /></button>
              </div>
              <p className="text-sm text-gray-500 dark:text-gray-400">All uploaded booking confirmations and reservations, sorted by date.</p>

              {docs.length === 0 ? (
                <div className="text-center py-8 text-gray-400 dark:text-gray-500">
                  <p className="text-3xl mb-2">📄</p>
                  <p className="text-sm">No booking documents yet.</p>
                  <p className="text-xs mt-1">Upload hotel or activity confirmations to see them here.</p>
                </div>
              ) : (
                <div className="space-y-2">
                  {docs.map(({ pin: p, rd, isActivity, dateStr }) => (
                    <div
                      key={p.id}
                      className="flex items-start gap-3 p-3 rounded-lg border dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800 cursor-pointer transition"
                      onClick={() => { onSelectPin(p); onClose(); }}
                    >
                      <span className="text-2xl flex-shrink-0">{p.emoji || (isActivity ? '🎫' : '🏨')}</span>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-semibold dark:text-white truncate">{p.name}</p>
                        <div className="flex items-center gap-2 mt-0.5">
                          {dateStr && <span className="text-xs text-blue-600 dark:text-blue-400 font-medium">{formatDate(dateStr)}</span>}
                          {rd.booking_source && <span className="text-xs text-gray-400">via {rd.booking_source}</span>}
                        </div>
                        <div className="flex flex-wrap gap-1 mt-1">
                          {rd.confirmation_number && (
                            <span className="text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded">#{rd.confirmation_number}</span>
                          )}
                          {rd.price && (
                            <span className="text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded">{rd.price}</span>
                          )}
                          {isActivity && rd.time && (
                            <span className="text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded">{rd.time}</span>
                          )}
                          {!isActivity && rd.check_out && (
                            <span className="text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded">→ {formatDate(rd.check_out)}</span>
                          )}
                        </div>
                      </div>
                      {p.attachment && (
                        <button
                          onClick={(e) => { e.stopPropagation(); openDataFile(p.attachment.data, p.attachment.name); }}
                          className="flex-shrink-0 text-xs text-blue-600 dark:text-blue-400 hover:underline"
                          title="View file"
                        >
                          📎
                        </button>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const UploadConfirmationModal = ({ onSelect, onClose, isDarkMode, onMapCenter, onPreviewPin }) => {
      const [step, setStep] = useState('upload'); // 'upload' | 'review'
      const [bookingType, setBookingTypeRaw] = useState('hotel'); // 'hotel' | 'activity'
      const [dragging, setDragging] = useState(false);
      const [extractedText, setExtractedText] = useState('');
      const [processing, setProcessing] = useState(false);
      const [fileName, setFileName] = useState('');
      const [fileDataUrl, setFileDataUrl] = useState(''); // base64 of uploaded file for storage
      const [fileThumbnail, setFileThumbnail] = useState(''); // thumbnail preview
      // Activity/tour fields
      const [tourName, setTourName] = useState('');
      const [tourOperator, setTourOperator] = useState('');
      const [activityDate, setActivityDate] = useState('');
      const [activityTime, setActivityTime] = useState('');
      const [duration, setDuration] = useState('');
      const [contactInfo, setContactInfo] = useState('');
      const [activityDescription, setActivityDescription] = useState('');
      // Shared + hotel fields
      const [propertyName, setPropertyName] = useState('');
      const [address, setAddress] = useState('');
      const [checkIn, setCheckIn] = useState('');
      const [checkOut, setCheckOut] = useState('');
      const [confirmationNumber, setConfirmationNumber] = useState('');
      const [pin, setPin] = useState('');
      const [bookingSource, setBookingSource] = useState('');
      const [roomType, setRoomType] = useState('');
      const [price, setPrice] = useState('');
      const [checkInTime, setCheckInTime] = useState('');
      const [checkOutTime, setCheckOutTime] = useState('');
      const [includesBreakfast, setIncludesBreakfast] = useState('unknown');
      const [addressSuggestions, setAddressSuggestions] = useState([]);
      const [geocodingName, setGeocodingName] = useState(false);
      const [resolvedLat, setResolvedLat] = useState(0);
      const [resolvedLng, setResolvedLng] = useState(0);
      const [usdPrice, setUsdPrice] = useState('');
      const [exchangeRate, setExchangeRate] = useState(null);
      const [exchangeRateDate, setExchangeRateDate] = useState('');
      const [priceCurrency, setPriceCurrency] = useState('');
      const geocodeTimerRef = useRef(null);
      const fileInputRef = useRef(null);

      // When user switches booking type, re-parse the extracted text into the right fields
      const setBookingType = useCallback((newType) => {
        setBookingTypeRaw(newType);
        if (!extractedText) return;
        if (newType === 'activity') {
          const parsed = parseActivityText(extractedText);
          setTourName(parsed.tourName || propertyName); // fallback: use hotel name as tour name
          setTourOperator(parsed.tourOperator);
          setBookingSource(prev => parsed.bookingSite || prev);
          setConfirmationNumber(prev => parsed.confirmationNumber || prev);
          setActivityDate(parsed.date || checkIn); // fallback: use check-in as activity date
          setActivityTime(parsed.time || checkInTime);
          setDuration(parsed.duration);
          setContactInfo(parsed.contactInfo);
          setActivityDescription(parsed.description);
          setAddress(prev => parsed.address || prev);
          setPrice(prev => parsed.price || prev);
          if (parsed.address || parsed.tourName || propertyName) {
            geocodeHotelName(parsed.address || parsed.tourName || propertyName, parsed.address || address);
          }
        } else {
          const parsed = parseConfirmationText(extractedText);
          setPropertyName(prev => parsed.propertyName || tourName || prev);
          setAddress(prev => parsed.address || prev);
          setCheckIn(parsed.checkIn || activityDate);
          setCheckOut(parsed.checkOut);
          setCheckInTime(parsed.checkInTime || activityTime);
          setCheckOutTime(parsed.checkOutTime);
          setConfirmationNumber(prev => parsed.confirmationNumber || prev);
          setPin(parsed.pin);
          setBookingSource(prev => parsed.bookingSource || prev);
          setRoomType(parsed.roomType);
          setPrice(prev => parsed.price || prev);
          setIncludesBreakfast(parsed.includesBreakfast);
          if (parsed.propertyName || tourName) {
            geocodeHotelName(parsed.propertyName || tourName, parsed.address || address);
          }
        }
      }, [extractedText, propertyName, tourName, checkIn, checkInTime, activityDate, activityTime, address]);

      // Detect currency from price string and fetch USD conversion
      const CURRENCY_SYMBOLS = { '$': 'USD', '€': 'EUR', '£': 'GBP', '¥': 'JPY', '₹': 'INR', '₩': 'KRW', '฿': 'THB', '₫': 'VND', '₱': 'PHP', 'R$': 'BRL', 'kr': 'SEK' };
      const CURRENCY_CODES = { USD: 1, EUR: 1, GBP: 1, JPY: 1, INR: 1, KRW: 1, THB: 1, VND: 1, PHP: 1, BRL: 1, SEK: 1, AUD: 1, CAD: 1, CHF: 1, CNY: 1, NZD: 1, MXN: 1, SGD: 1, HKD: 1, TWD: 1, CZK: 1, PLN: 1, DKK: 1, NOK: 1, HUF: 1, ILS: 1, ZAR: 1, MYR: 1, IDR: 1, ARS: 1, CLP: 1, COP: 1, PEN: 1 };

      const detectCurrency = (priceStr) => {
        if (!priceStr) return null;
        for (const [sym, code] of Object.entries(CURRENCY_SYMBOLS)) {
          if (priceStr.includes(sym)) return code;
        }
        const codeMatch = priceStr.match(/([A-Z]{3})/);
        if (codeMatch && CURRENCY_CODES[codeMatch[1]]) return codeMatch[1];
        return null;
      };

      const extractNumericPrice = (priceStr) => {
        if (!priceStr) return 0;
        const cleaned = priceStr.replace(/[^0-9.,]/g, '');
        // Handle comma as thousands separator (e.g., ¥561,600)
        const num = parseFloat(cleaned.replace(/,/g, ''));
        return isNaN(num) ? 0 : num;
      };

      const fetchExchangeRate = useCallback(async (currency, dateStr, priceVal) => {
        console.log('[BoWander FX] fetchExchangeRate called:', currency, dateStr, priceVal);
        if (!currency || currency === 'USD') {
          setUsdPrice(''); setExchangeRate(null); setPriceCurrency('');
          return;
        }
        setPriceCurrency(currency);
        try {
          // Try check-in date first, fallback to latest
          let apiDate = 'latest';
          if (dateStr) {
            const d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
              const today = new Date();
              if (d <= today) {
                apiDate = d.toISOString().split('T')[0];
              }
            }
          }
          const url = `https://api.frankfurter.app/${apiDate}?from=${currency}&to=USD`;
          console.log('[BoWander FX] fetching:', url);
          const resp = await fetch(url);
          const data = await resp.json();
          console.log('[BoWander FX] response:', data);
          if (data.rates?.USD) {
            setExchangeRate(data.rates.USD);
            setExchangeRateDate(data.date || apiDate);
            const numPrice = extractNumericPrice(priceVal);
            if (numPrice > 0) {
              const usd = '$' + (numPrice * data.rates.USD).toFixed(2);
              console.log('[BoWander FX] converted:', priceVal, '->', usd);
              setUsdPrice(usd);
            }
          }
        } catch (err) {
          console.error('[BoWander FX] error:', err);
        }
      }, []);

      // Geocode hotel name to get address (like add places)
      const geocodeHotelName = useCallback(async (name, currentAddress) => {
        console.log('[BoWander Geocode] called with:', name, 'currentAddress:', currentAddress);
        if (!name || name.length < 3) { setAddressSuggestions([]); return; }
        setGeocodingName(true);
        try {
          const resp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(name)}&limit=5`);
          const data = await resp.json();
          console.log('[BoWander Geocode] raw response:', data.features?.length, 'features');
          const suggestions = (data.features || []).map(f => {
            const p = f.properties || {};
            const parts = [p.housenumber, p.street, p.city, p.state, p.country].filter(Boolean);
            return {
              address: parts.join(', '),
              lat: f.geometry?.coordinates?.[1] || 0,
              lng: f.geometry?.coordinates?.[0] || 0,
              name: p.name || '',
            };
          }).filter(s => s.address);
          console.log('[BoWander Geocode] suggestions:', suggestions.length, suggestions);
          setAddressSuggestions(suggestions);
          // Auto-select top result coordinates (user can override by picking a different suggestion)
          if (suggestions.length > 0 && suggestions[0].lat && suggestions[0].lng) {
            setResolvedLat(suggestions[0].lat);
            setResolvedLng(suggestions[0].lng);
            if (!currentAddress && suggestions[0].address) setAddress(suggestions[0].address);
            onPreviewPin?.({ lat: suggestions[0].lat, lng: suggestions[0].lng, name: name });
            onMapCenter?.([suggestions[0].lat, suggestions[0].lng], 15);
          }
        } catch (err) { console.error('[BoWander Geocode] error:', err); setAddressSuggestions([]); }
        setGeocodingName(false);
      }, [onPreviewPin, onMapCenter]);

      // Auto-geocode when hotel name changes (debounced)
      const handlePropertyNameChange = (name) => {
        setPropertyName(name);
        if (geocodeTimerRef.current) clearTimeout(geocodeTimerRef.current);
        geocodeTimerRef.current = setTimeout(() => geocodeHotelName(name, address), 500);
      };

      const selectAddressSuggestion = (suggestion) => {
        setAddress(suggestion.address);
        setResolvedLat(suggestion.lat);
        setResolvedLng(suggestion.lng);
        setAddressSuggestions([]);
        // Show preview pin and center map
        if (suggestion.lat && suggestion.lng) {
          onPreviewPin?.({ lat: suggestion.lat, lng: suggestion.lng, name: propertyName || suggestion.name });
          onMapCenter?.([suggestion.lat, suggestion.lng], 15);
        }
      };

      // Store the file as a data URL for later retrieval
      const storeFile = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          setFileDataUrl(e.target.result);
          // Generate thumbnail for images
          if (file.type.startsWith('image/')) {
            setFileThumbnail(e.target.result);
          } else if (file.type === 'application/pdf') {
            setFileThumbnail('📄'); // emoji placeholder for PDFs
          } else {
            setFileThumbnail('📎');
          }
        };
        reader.readAsDataURL(file);
      };

      const processFile = async (file) => {
        setProcessing(true);
        setFileName(file.name);
        storeFile(file);
        let text = '';

        try {
          if (file.type.startsWith('text/') || file.name.endsWith('.txt') || file.name.endsWith('.csv') || file.name.endsWith('.html') || file.name.endsWith('.htm')) {
            text = await file.text();
            if (file.name.endsWith('.html') || file.name.endsWith('.htm') || file.type === 'text/html') {
              const tmp = document.createElement('div');
              tmp.innerHTML = text;
              text = tmp.textContent || tmp.innerText || text;
            }
          } else if (file.type === 'message/rfc822' || file.name.endsWith('.eml')) {
            text = await file.text();
            text = text.replace(/^[\s\S]*?\n\n/, '');
          } else if (file.type.startsWith('image/')) {
            try {
              const { data: { text: ocrText } } = await Tesseract.recognize(file, 'eng');
              text = ocrText || '[No text found in image]';
            } catch (e) {
              text = '[OCR failed: ' + e.message + ']';
            }
          } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
            try {
              const arrayBuffer = await file.arrayBuffer();
              const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              let allText = '';
              for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                allText += content.items.map(item => item.str).join(' ') + '\n';
              }
              text = allText.trim() || '[No text found in PDF]';
            } catch (e) {
              text = '[PDF parsing failed: ' + e.message + ']';
            }
          } else {
            try {
              text = await file.text();
              if (text.length > 0 && /[\x00-\x08\x0E-\x1F]/.test(text.substring(0, 100))) {
                text = `[Binary file: ${file.name}]\nPlease review and fill in the details manually.`;
              }
            } catch {
              text = `[Could not read file: ${file.name}]`;
            }
          }
        } catch (err) {
          text = `[Error processing file: ${err.message}]`;
        }

        setExtractedText(text);

        // Auto-detect booking type based on content
        // Activity signals: booking sites known for activities, or activity keywords without strong hotel signals
        const activityKeywords = /(?:tour|experience|ride|class|workshop|excursion|tasting|cruise|walk(?:ing)|adventure|activity|ticket|admission|voucher|rickshaw|safari|kayak|snorkel|diving|hik(?:e|ing)|cooking|zip\s*line|bungee|paraglid|surf(?:ing)?|cycling|sightseeing|day\s*trip|transfer|shuttle|airport\s*pickup)/i;
        const activitySites = /(?:klook|viator|getyourguide|musement|tiqets|civitatis|veltra|airbnb\s*experiences)/i;
        const strongHotelSignals = /(?:check[\s-]?in[\s:]+|check[\s-]?out[\s:]+|room\s*type|suite\s+with|breakfast\s+included|housekeeping|(?:nights?\s*,\s*\d)|hotel\s+(?:reservation|booking|confirmation))/i;
        const hasActivitySignal = activityKeywords.test(text) || activitySites.test(text);
        const hasStrongHotelSignal = strongHotelSignals.test(text);
        // If we have activity signals and no strong hotel signals → activity
        // If we have an activity booking site → strongly prefer activity even with some hotel-ish words
        const isActivitySite = activitySites.test(text);
        const isActivity = isActivitySite ? !hasStrongHotelSignal : (hasActivitySignal && !hasStrongHotelSignal);
        const detectedType = isActivity ? 'activity' : 'hotel';
        setBookingTypeRaw(detectedType);

        if (detectedType === 'activity') {
          const parsed = parseActivityText(text);
          setTourName(parsed.tourName);
          setTourOperator(parsed.tourOperator);
          setBookingSource(parsed.bookingSite);
          setConfirmationNumber(parsed.confirmationNumber);
          setActivityDate(parsed.date);
          setActivityTime(parsed.time);
          setDuration(parsed.duration);
          setContactInfo(parsed.contactInfo);
          setActivityDescription(parsed.description);
          setAddress(parsed.address);
          setPrice(parsed.price);
          // Geocode the meeting point or tour name for map placement
          const geoQuery = parsed.address || parsed.tourName;
          if (geoQuery) geocodeHotelName(geoQuery, parsed.address);
        } else {
          const parsed = parseConfirmationText(text);
          setPropertyName(parsed.propertyName);
          setAddress(parsed.address);
          setCheckIn(parsed.checkIn);
          setCheckOut(parsed.checkOut);
          setCheckInTime(parsed.checkInTime);
          setCheckOutTime(parsed.checkOutTime);
          setConfirmationNumber(parsed.confirmationNumber);
          setPin(parsed.pin);
          setBookingSource(parsed.bookingSource);
          setRoomType(parsed.roomType);
          setPrice(parsed.price);
          setIncludesBreakfast(parsed.includesBreakfast);
          if (parsed.propertyName) geocodeHotelName(parsed.propertyName, parsed.address);
        }

        setProcessing(false);
        setStep('review');
      };

      const handleFiles = (files) => {
        if (files && files.length > 0) processFile(files[0]);
      };

      const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(true); };
      const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(false); };
      const handleDrop = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(false); handleFiles(e.dataTransfer.files); };

      const handleSubmit = () => {
        if (bookingType === 'activity') {
          if (!tourName.trim()) { alert('Please enter a tour/activity name'); return; }
          onSelect({
            name: tourName,
            address: address,
            lat: resolvedLat,
            lng: resolvedLng,
            description: [
              activityDescription,
              duration && `Duration: ${duration}`,
              contactInfo && `Contact: ${contactInfo}`,
            ].filter(Boolean).join('\n'),
            emoji: '🎫',
            category: 'activity',
            source_name: bookingSource || 'Booking',
            reservation_details: {
              type: 'activity',
              tour_name: tourName,
              tour_operator: tourOperator,
              booking_source: bookingSource,
              confirmation_number: confirmationNumber,
              date: activityDate,
              time: activityTime,
              duration: duration,
              contact_info: contactInfo,
              price: price,
              price_usd: usdPrice || '',
              exchange_rate: exchangeRate || null,
              exchange_rate_date: exchangeRateDate || '',
              price_currency: priceCurrency || '',
              description: activityDescription,
              address: address,
            },
            attachment: fileDataUrl ? { name: fileName, data: fileDataUrl, thumbnail: fileThumbnail } : null,
          });
        } else {
          if (!propertyName.trim()) { alert('Please enter a hotel/property name'); return; }
          onSelect({
            name: propertyName,
            address: address,
            lat: resolvedLat,
            lng: resolvedLng,
            description: [
              roomType && `Room: ${roomType}`,
              price && `Price: ${price}`,
              checkIn && `Check-in: ${checkIn}${checkInTime ? ' at ' + checkInTime : ''}`,
              checkOut && `Check-out: ${checkOut}${checkOutTime ? ' at ' + checkOutTime : ''}`,
              confirmationNumber && `Confirmation #: ${confirmationNumber}`,
              pin && `PIN: ${pin}`,
              includesBreakfast !== 'unknown' && `Breakfast: ${includesBreakfast === 'yes' ? 'Included' : 'Not included'}`,
              bookingSource && `Booked via: ${bookingSource}`,
            ].filter(Boolean).join('\n'),
            emoji: '🏨',
            category: 'hotel',
            source_name: bookingSource || 'Booking Confirmation',
            reservation_details: {
              type: 'hotel',
              check_in: checkIn,
              check_out: checkOut,
              check_in_time: checkInTime || '16:00',
              check_out_time: checkOutTime || '12:00',
              confirmation_number: confirmationNumber,
              pin: pin,
              booking_source: bookingSource,
              room_type: roomType,
              price: price,
              price_usd: usdPrice || '',
              exchange_rate: exchangeRate || null,
              exchange_rate_date: exchangeRateDate || '',
              price_currency: priceCurrency || '',
              includes_breakfast: includesBreakfast,
            },
            attachment: fileDataUrl ? { name: fileName, data: fileDataUrl, thumbnail: fileThumbnail } : null,
          });
        }
      };

      // Auto-fetch exchange rate when price or check-in changes
      useEffect(() => {
        const currency = detectCurrency(price);
        console.log('[BoWander FX] useEffect - price:', price, 'currency:', currency);
        if (currency && currency !== 'USD') {
          fetchExchangeRate(currency, checkIn, price);
        } else {
          setUsdPrice(''); setExchangeRate(null); setPriceCurrency('');
        }
      }, [price, checkIn, fetchExchangeRate]);

      // Update USD price when exchange rate changes
      useEffect(() => {
        if (exchangeRate && price) {
          const numPrice = extractNumericPrice(price);
          if (numPrice > 0) {
            setUsdPrice('$' + (numPrice * exchangeRate).toFixed(2));
          }
        }
      }, [exchangeRate, price]);

      const inputClass = "w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm";

      return (
        <div className="fixed inset-0 md:inset-auto md:top-0 md:right-0 md:bottom-0 md:w-96 bg-black bg-opacity-50 md:bg-opacity-0 flex items-end md:items-stretch justify-center md:justify-end" style={{ zIndex: 9999 }} onClick={onClose}>
          <div
            className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-t-xl md:rounded-none w-full md:w-96 shadow-2xl md:shadow-xl md:border-l dark:md:border-slate-700`}
            onClick={e => e.stopPropagation()}
            style={{ position: 'relative', zIndex: 10000 }}
          >
            <div className="max-h-[85vh] md:max-h-full md:h-full overflow-y-auto p-6 space-y-4">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-bold dark:text-white">
                  {step === 'upload' ? 'Upload Booking' : 'Review Booking'}
                </h2>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded">
                  <CloseIcon />
                </button>
              </div>

              {step === 'upload' && (
                <div className="space-y-3">
                  <p className="text-sm text-gray-500 dark:text-gray-400">
                    Upload a hotel confirmation, booking email, or reservation screenshot.
                  </p>

                  <div
                    className={`border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all ${
                      dragging
                        ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20'
                        : 'border-gray-300 dark:border-slate-600 hover:border-blue-400 hover:bg-gray-50 dark:hover:bg-slate-800'
                    }`}
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                    onClick={() => fileInputRef.current?.click()}
                  >
                    <input
                      ref={fileInputRef}
                      type="file"
                      className="hidden"
                      accept="image/*,.pdf,.txt,.html,.htm,.eml,text/*"
                      onChange={e => handleFiles(e.target.files)}
                    />
                    {processing ? (
                      <div className="space-y-2">
                        <div className="text-3xl animate-pulse">📄</div>
                        <p className="text-sm font-medium dark:text-white">Processing {fileName}...</p>
                        <p className="text-xs text-gray-400">Extracting text and details</p>
                      </div>
                    ) : (
                      <div className="space-y-2">
                        <div className="text-4xl">{dragging ? '📥' : '📎'}</div>
                        <p className="text-sm font-medium dark:text-white">
                          {dragging ? 'Drop file here' : 'Drag & drop a file here'}
                        </p>
                        <p className="text-xs text-gray-400">or click to browse</p>
                        <p className="text-xs text-gray-400 mt-2">
                          Supports: PDF, images, text, HTML emails
                        </p>
                      </div>
                    )}
                  </div>

                  <button
                    onClick={() => setStep('review')}
                    className="w-full text-sm text-blue-600 dark:text-blue-400 hover:underline py-1"
                  >
                    Or enter details manually
                  </button>
                </div>
              )}

              {step === 'review' && (
                <div className="space-y-3">
                  {/* File info + thumbnail */}
                  {(extractedText || fileDataUrl) && (
                    <div className="bg-gray-50 dark:bg-slate-800 rounded-lg p-3 mb-2">
                      <div className="flex items-start gap-3">
                        {fileThumbnail && fileThumbnail.startsWith('data:') ? (
                          <img src={fileThumbnail} alt="" className="w-12 h-12 rounded object-cover flex-shrink-0 cursor-pointer border" onClick={() => openDataFile(fileDataUrl, fileName)} />
                        ) : fileThumbnail ? (
                          <span className="text-3xl flex-shrink-0">{fileThumbnail}</span>
                        ) : null}
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center justify-between">
                            <span className="text-xs font-medium text-gray-500 dark:text-gray-400 truncate">{fileName}</span>
                            <button
                              onClick={() => { setStep('upload'); setExtractedText(''); setFileName(''); setFileDataUrl(''); setFileThumbnail(''); }}
                              className="text-xs text-blue-600 dark:text-blue-400 hover:underline flex-shrink-0 ml-2"
                            >
                              Change file
                            </button>
                          </div>
                          {extractedText && (
                            <details className="text-xs text-gray-500 dark:text-gray-400 mt-1">
                              <summary className="cursor-pointer hover:text-gray-700 dark:hover:text-gray-300">Show extracted text</summary>
                              <pre className="mt-1 max-h-24 overflow-y-auto whitespace-pre-wrap text-xs">{extractedText.slice(0, 2000)}</pre>
                            </details>
                          )}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Booking type toggle */}
                  <div className="flex rounded-lg overflow-hidden border dark:border-slate-700">
                    {[['hotel', '🏨 Hotel'], ['activity', '🎟️ Activity / Tour']].map(([val, label]) => (
                      <button
                        key={val}
                        onClick={() => setBookingType(val)}
                        className={`flex-1 px-3 py-2 text-sm font-medium transition ${
                          bookingType === val
                            ? 'bg-blue-600 text-white'
                            : 'bg-gray-50 dark:bg-slate-800 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700'
                        }`}
                      >
                        {label}
                      </button>
                    ))}
                  </div>

                  {/* --- HOTEL FORM --- */}
                  {bookingType === 'hotel' && <>
                  {/* Hotel Name with auto-geocode */}
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Hotel / Property *</label>
                    <div className="relative">
                      <input type="text" value={propertyName} onChange={e => handlePropertyNameChange(e.target.value)} placeholder="e.g. MIMARU SUITES Kyoto Shijo" className={inputClass} autoFocus autoComplete="off" data-1p-ignore data-lpignore="true" data-form-type="other" />
                      {geocodingName && <span className="absolute right-3 top-2.5 text-xs text-gray-400 animate-pulse">Looking up...</span>}
                    </div>
                    {addressSuggestions.length > 0 && (
                      <div className="mt-1 border rounded-lg overflow-hidden dark:border-slate-700 bg-white dark:bg-slate-800">
                        {addressSuggestions.map((s, i) => (
                          <button
                            key={i}
                            onClick={() => selectAddressSuggestion(s)}
                            className="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 dark:hover:bg-slate-700 border-b last:border-b-0 dark:border-slate-700"
                          >
                            <span className="font-medium dark:text-white">{s.name || propertyName}</span>
                            <span className="text-gray-500 dark:text-gray-400 text-xs block">{s.address}</span>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* Address */}
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Address</label>
                    <input type="text" value={address} onChange={e => { setAddress(e.target.value); setAddressSuggestions([]); }} placeholder="Hotel address (auto-filled from name)" className={inputClass} autoComplete="off" data-1p-ignore data-lpignore="true" data-form-type="other" />
                  </div>

                  {/* Room Type */}
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Room Type</label>
                    <input type="text" value={roomType} onChange={e => setRoomType(e.target.value)} placeholder="e.g. Superior Two-Bedroom Suite" className={inputClass} autoComplete="off" data-1p-ignore />
                  </div>

                  {/* Price */}
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Price</label>
                    <input type="text" value={price} onChange={e => setPrice(e.target.value)} placeholder="e.g. ¥176,951" className={inputClass} autoComplete="off" data-1p-ignore />
                    {usdPrice && (
                      <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">
                        ≈ {usdPrice} USD {exchangeRateDate && <span className="text-gray-400 dark:text-gray-500">(rate as of {exchangeRateDate})</span>}
                      </p>
                    )}
                  </div>

                  {/* Check-in date + time */}
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Check-in Date</label>
                      <input type="text" value={checkIn} onChange={e => setCheckIn(e.target.value)} placeholder="e.g. Mar 23, 2026" className={inputClass} autoComplete="off" data-1p-ignore />
                    </div>
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Check-in Time</label>
                      <input type="text" value={checkInTime} onChange={e => setCheckInTime(e.target.value)} placeholder="e.g. 4:00 PM" className={inputClass} autoComplete="off" data-1p-ignore />
                    </div>
                  </div>

                  {/* Check-out date + time */}
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Check-out Date</label>
                      <input type="text" value={checkOut} onChange={e => setCheckOut(e.target.value)} placeholder="e.g. Apr 28, 2026" className={inputClass} autoComplete="off" data-1p-ignore />
                    </div>
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Check-out Time</label>
                      <input type="text" value={checkOutTime} onChange={e => setCheckOutTime(e.target.value)} placeholder="e.g. 12:00 PM" className={inputClass} autoComplete="off" data-1p-ignore />
                    </div>
                  </div>

                  {/* Confirmation # + PIN */}

    const AddressAutocomplete = ({ value, onChange, onSelectAddress, isDarkMode }) => {
      const [suggestions, setSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [dropdownPos, setDropdownPos] = useState({ top: 0, left: 0, width: 0 });
      const inputRef = useRef(null);
      const timerRef = useRef(null);

      const fetchSuggestions = (q) => {
        if (q.length < 3) { setSuggestions([]); return; }
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => {
          fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5`)
            .then(r => r.json())
            .then(data => {
              const results = (data.features || []).map(f => {
                const p = f.properties || {};
                const geo = f.geometry?.coordinates || [];
                const parts = [p.housenumber, p.street].filter(Boolean).join(' ');
                const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
                return {
                  address: [p.name, parts, locality].filter(Boolean).join(', '),
                  lat: geo[1],
                  lng: geo[0],
                };
              }).filter(r => r.lat && r.lng);
              setSuggestions(results);
              if (results.length > 0 && inputRef.current) {
                const rect = inputRef.current.getBoundingClientRect();
                setDropdownPos({ top: rect.bottom + 2, left: rect.left, width: rect.width });
              }
              setShowSuggestions(results.length > 0);
            })
            .catch(() => {});
        }, 300);
      };

      return (
        <div className="relative">
          <input
            ref={inputRef}
            type="text"
            value={value}
            onChange={e => {
              onChange(e.target.value);
              fetchSuggestions(e.target.value);
            }}
            onFocus={() => {
              if (suggestions.length > 0 && inputRef.current) {
                const rect = inputRef.current.getBoundingClientRect();
                setDropdownPos({ top: rect.bottom + 2, left: rect.left, width: rect.width });
                setShowSuggestions(true);
              }
            }}
            onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
            className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white"
            placeholder="Start typing an address..."
          />
          {showSuggestions && ReactDOM.createPortal(
            <div
              className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-lg shadow-2xl overflow-hidden"
              style={{ position: 'fixed', top: dropdownPos.top, left: dropdownPos.left, width: dropdownPos.width, zIndex: 10002 }}
            >
              {suggestions.map((s, i) => (
                <button
                  key={i}
                  className="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 dark:hover:bg-slate-700 dark:text-white border-b dark:border-slate-700 last:border-0"
                  onMouseDown={(e) => {
                    e.preventDefault();
                    onSelectAddress(s);
                    setSuggestions([]);
                    setShowSuggestions(false);
                  }}
                >
                  <p className="truncate">{s.address}</p>
                </button>
              ))}
            </div>,
            document.body
          )}
        </div>
      );
    };

      const [showManage, setShowManage] = useState(false);
      const [customValue, setCustomValue] = useState('');

      const uniqueSources = [...new Set(allPins.map(p => p.source_name).filter(s => s && !defaultSources.includes(s)))];

      const handleHideSource = (src) => {
        const updated = [...hiddenSources, src];
        setHiddenSources(updated);
        localStorage.setItem('boWanderHiddenSources', JSON.stringify(updated));
        if (value === src) onChange('');
      };
      const handleRestoreSource = (src) => {
        const updated = hiddenSources.filter(s => s !== src);

        localStorage.setItem('boWanderHiddenSources', JSON.stringify(updated));

              {(!showPlaceSearch || pin.id) && (

                  >

                  <button
                    onClick={() => {
                      if (!formData.name) { alert('Please enter a name'); return; }
                      if (!formData.lat && formData.address) {
                        // Geocode the address if no lat/lng
                        fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(formData.address)}&limit=1`)
                          .then(r => r.json())

                            const f = data.features?.[0];
                            if (f && f.geometry?.coordinates) {
                              onSave({ ...formData, lat: f.geometry.coordinates[1], lng: f.geometry.coordinates[0] });

                              onSave(formData);

                          .catch(() => onSave(formData));
                      } else {
                        onSave(formData);

              {pin.id && !confirmingDelete && (

                handleChange('emoji', icon);
                // If it's an emoji (not an image), try to auto-set category
                if (!icon.startsWith('data:')) {
                  const result = guessEmojiAndCategory(formData.name || '', '');
                  if (result.emoji === icon) {

    const MapView = ({ pins, selectedPin, onSelectPin, isDarkMode, onNavigate, sidebarWidth = 0, collectionName, onMapCenterChange, panTo, previewPin }) => {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const tileLayerRef = useRef(null);
      const markersRef = useRef(new Map());
      const prevCollectionKey = useRef(null);
      const userLocationRef = useRef(null);
      const userAccuracyRef = useRef(null);
      const previewMarkerRef = useRef(null);

      // Initialize map once
      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;
        const map = L.map(mapRef.current, {
          zoomControl: true,
          attributionControl: true,
          zoomAnimation: true,
          markerZoomAnimation: true
        }).setView([35.68, 139.69], 12);
        mapInstanceRef.current = map;

        // Report map center for search biasing
        const reportCenter = () => {
          if (onMapCenterChange) {
            const c = map.getCenter();
            onMapCenterChange({ lat: c.lat, lng: c.lng });
          }
        };
        map.on('moveend', reportCenter);
        // Report initial center after a short delay
        setTimeout(reportCenter, 600);

        // Force Leaflet to recalculate container size after render
        setTimeout(() => map.invalidateSize(), 100);
        setTimeout(() => map.invalidateSize(), 200);
        setTimeout(() => map.invalidateSize(), 500);

        // Request user location and show blue dot
        if ('geolocation' in navigator) {
          navigator.geolocation.watchPosition(
            (pos) => {
              const { latitude, longitude, accuracy } = pos.coords;
              if (userLocationRef.current) {
                userLocationRef.current.setLatLng([latitude, longitude]);
                userAccuracyRef.current.setLatLng([latitude, longitude]);
                userAccuracyRef.current.setRadius(accuracy);
              } else {
                userAccuracyRef.current = L.circle([latitude, longitude], {
                  radius: accuracy,
                  fillColor: '#4285F4',
                  fillOpacity: 0.1,
                  color: '#4285F4',
                  weight: 1,
                  opacity: 0.3
                }).addTo(map);
                userLocationRef.current = L.circleMarker([latitude, longitude], {
                  radius: 7,
                  fillColor: '#4285F4',
                  color: '#fff',
                  weight: 2.5,
                  fillOpacity: 1
                }).addTo(map);
                userLocationRef.current.setZIndex(1000);
              }
            },
            () => {},
            { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
          );
        }

        // Handle window resize
        const handleResize = () => {
          map.invalidateSize();
        };
        window.addEventListener('resize', handleResize);

        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        tileLayerRef.current = L.tileLayer(tileUrl, {
          attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);

        return () => {
          window.removeEventListener('resize', handleResize);
          map.remove();
          mapInstanceRef.current = null;
        };
      }, []);

      // Pan/fly to a location when requested externally (e.g. from place search)
      useEffect(() => {
        const map = mapInstanceRef.current;
        console.log('[BoWander Map] panTo effect:', panTo, 'map exists:', !!map);
        if (!map || !panTo || !panTo.lat || !panTo.lng) return;
        console.log('[BoWander Map] Flying to:', panTo.lat, panTo.lng);
        map.flyTo([panTo.lat, panTo.lng], 15, { duration: 0.8 });
      }, [panTo]);

      // Show/hide preview pin (temporary marker while adding a place)
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        // Remove existing preview marker
        if (previewMarkerRef.current) {
          map.removeLayer(previewMarkerRef.current);
          previewMarkerRef.current = null;
        }
        // Add new preview marker if we have one
        if (previewPin && previewPin.lat && previewPin.lng) {
          const icon = L.divIcon({
            className: 'preview-pin',
            html: `<div style="
              width: 36px; height: 36px;
              background: #3b82f6;
              border: 3px solid white;
              border-radius: 50%;
              box-shadow: 0 2px 8px rgba(59,130,246,0.5), 0 0 0 4px rgba(59,130,246,0.2);
              display: flex; align-items: center; justify-content: center;
              font-size: 18px;
              animation: pulse-preview 1.5s ease-in-out infinite;
            ">${previewPin.emoji || '📍'}</div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 18],
          });
          previewMarkerRef.current = L.marker([previewPin.lat, previewPin.lng], { icon, zIndexOffset: 2000 }).addTo(map);
          previewMarkerRef.current.bindTooltip(previewPin.name || 'New pin', { permanent: true, direction: 'top', offset: [0, -20], className: 'preview-tooltip' });
        }
      }, [previewPin]);

      // Update tiles when dark mode changes
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        if (tileLayerRef.current) map.removeLayer(tileLayerRef.current);
        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        tileLayerRef.current = L.tileLayer(tileUrl, {
          attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);
      }, [isDarkMode]);

      // Update markers and fit bounds when pins change
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;

        // Clear old markers
        markersRef.current.forEach(marker => map.removeLayer(marker));
        markersRef.current.clear();

        // Add new markers
        const validPins = pins.filter(p => p.lat && p.lng);
        validPins.forEach(pin => {
          const isSelected = selectedPin?.id === pin.id;
          const categoryData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
          const colorClass = isSelected ? 'category-pin-selected' : '';
          const icon = L.divIcon({
            html: renderPinHtml(pin, categoryData, colorClass),
            iconSize: [isSelected ? 44 : 36, isSelected ? 44 : 36],
            iconAnchor: [isSelected ? 22 : 18, isSelected ? 22 : 18],
            className: 'category-marker'
          });
          const marker = L.marker([pin.lat, pin.lng], { icon })
            .on('click', () => onSelectPin(pin))
            .addTo(map);
          markersRef.current.set(pin.id, marker);
        });

        // Fit bounds when the set of pins changes (e.g. switching collection)
        const collectionKey = validPins.map(p => p.id).sort().join(',');
        if (validPins.length > 0 && collectionKey !== prevCollectionKey.current) {
          prevCollectionKey.current = collectionKey;
          const bounds = L.latLngBounds(validPins.map(p => [p.lat, p.lng]));
          map.invalidateSize();
          setTimeout(() => {
            map.fitBounds(bounds, { padding: [60, 60], maxZoom: 15, animate: true });
          }, 50);
        } else if (validPins.length === 0 && collectionKey !== prevCollectionKey.current) {
          prevCollectionKey.current = collectionKey;
          // No pins — geocode the collection name to center the map there
          if (collectionName) {
            fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(collectionName)}&limit=1`)
              .then(r => r.json())
              .then(data => {
                const f = data.features?.[0];
                if (f && f.geometry?.coordinates) {
                  const [lng, lat] = f.geometry.coordinates;
                  map.flyTo([lat, lng], 12, { duration: 0.5 });
                }
              })
              .catch(() => {});
          }
        }
      }, [pins, collectionName]);

      // Update marker styles when selection changes (without rebuilding all markers)
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        markersRef.current.forEach((marker, id) => {
          const pin = pins.find(p => p.id === id);
          if (!pin) return;
          const isSelected = selectedPin?.id === id;
          const categoryData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
          const colorClass = isSelected ? 'category-pin-selected' : '';
          const icon = L.divIcon({
            html: renderPinHtml(pin, categoryData, colorClass),
            iconSize: [isSelected ? 44 : 36, isSelected ? 44 : 36],
            iconAnchor: [isSelected ? 22 : 18, isSelected ? 22 : 18],
            className: 'category-marker'
          });
          marker.setIcon(icon);
        });
        if (selectedPin && selectedPin.lat) {
          // Offset the center so the pin appears in the visible map area (left of sidebar)
          const targetZoom = Math.max(map.getZoom(), 14);
          if (sidebarWidth > 0) {
            const targetPoint = map.project([selectedPin.lat, selectedPin.lng], targetZoom);
            // Shift center to the right by half the sidebar width so pin lands in visible area
            const offsetPoint = L.point(targetPoint.x + sidebarWidth / 2, targetPoint.y);
            const offsetLatLng = map.unproject(offsetPoint, targetZoom);
            map.flyTo(offsetLatLng, targetZoom, { duration: 0.4 });
          } else {
            map.flyTo([selectedPin.lat, selectedPin.lng], targetZoom, { duration: 0.4 });
          }
        }
      }, [selectedPin, sidebarWidth]);

      return <div ref={mapRef} style={{ width: '100%', height: '100%' }} />;
    };

    const ListView = ({ pins, collections, onSelectPin, isDarkMode, onEdit, onDelete }) => {
      const [sortBy, setSortBy] = useState('name');
      const [expandedCategories, setExpandedCategories] = useState({});
      const [filters, setFilters] = useState({
        openNow: false,
        openAt: null, // { day: 'mon', time: '12:00' }
        category: null,
        source: null,
        myRating: null,
        googleRating: null
      });
      const [showOpenAtPicker, setShowOpenAtPicker] = useState(false);
      const [openAtDay, setOpenAtDay] = useState('mon');
      const [openAtTime, setOpenAtTime] = useState('12:00');

      // Group pins by category
      const grouped = useMemo(() => {
        let result = [...pins];

        // Apply filters
        if (filters.openNow) {
          result = result.filter(p => {
            const status = getOpenStatus(p.opening_hours || {});
            return status.status === 'open';
          });
        }
        if (filters.openAt) {
          result = result.filter(p => {
            const dayIndex = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'].indexOf(filters.openAt.day);
            const [h, m] = filters.openAt.time.split(':').map(Number);
            // Create a date object for the target day/time
            const targetDate = new Date();
            const currentDay = targetDate.getDay();
            const diff = dayIndex - currentDay;
            targetDate.setDate(targetDate.getDate() + diff);
            targetDate.setHours(h, m, 0, 0);
            const status = getOpenStatus(p.opening_hours || {}, targetDate);
            return status.status === 'open';
          });
        }
        if (filters.category) {
          result = result.filter(p => p.category === filters.category);
        }
        if (filters.source) {
          result = result.filter(p => p.source_name === filters.source);
        }
        if (filters.myRating) {
          result = result.filter(p => (p.personal_rating || 0) >= filters.myRating);
        }
        if (filters.googleRating) {
          result = result.filter(p => (p.google_rating || 0) >= filters.googleRating);
        }

        // Sort
        switch (sortBy) {
          case 'name':
            result.sort((a, b) => a.name.localeCompare(b.name));
            break;
          case 'date':
            result.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            break;
          case 'rating':
            result.sort((a, b) => (b.google_rating || 0) - (a.google_rating || 0));
            break;
          case 'my-rating':
            result.sort((a, b) => (b.personal_rating || 0) - (a.personal_rating || 0));
            break;
          default:
            break;
        }

        // Group by category
        const groups = {};
        result.forEach(pin => {
          const catId = pin.category || 'other';
          if (!groups[catId]) {
            groups[catId] = [];
          }
          groups[catId].push(pin);
        });

        return groups;
      }, [pins, sortBy, filters]);

      // Get unique categories that have pins
      const categories = useMemo(() => {
        return Object.keys(grouped).map(catId => ({
          id: catId,
          ...PIN_CATEGORIES[catId]
        })).sort((a, b) => a.label.localeCompare(b.label));
      }, [grouped]);

      const toggleCategory = (catId) => {
        setExpandedCategories(prev => ({
          ...prev,
          [catId]: !prev[catId]
        }));
      };

      const sources = [...new Set(pins.map(p => p.source_name).filter(Boolean))];

      return (
        <div className="h-full overflow-y-auto pb-20">
          {/* Controls */}
          <div className={`sticky top-0 ${isDarkMode ? 'bg-slate-900' : 'bg-white'} border-b dark:border-slate-700 p-4 space-y-3 z-10`}>
            <select
              value={sortBy}
              onChange={e => setSortBy(e.target.value)}
              className="w-full px-3 py-2 border rounded dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm"
            >
              <option value="name">Sort by Name</option>
              <option value="date">Sort by Date Added</option>
              <option value="rating">Sort by Rating</option>
              <option value="my-rating">Sort by My Rating</option>
            </select>

            <div className="space-y-2">
              <label className="text-xs font-semibold text-gray-600 dark:text-gray-400 block">Filters</label>
              <div className="flex flex-wrap gap-2">
                <button
                  onClick={() => setFilters(f => ({ ...f, openNow: !f.openNow, openAt: f.openNow ? f.openAt : null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium transition ${
                    filters.openNow
                      ? 'bg-green-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                >
                  Open Now
                </button>
                <button
                  onClick={() => {
                    if (filters.openAt) {
                      setFilters(f => ({ ...f, openAt: null }));
                      setShowOpenAtPicker(false);
                    } else {
                      setShowOpenAtPicker(!showOpenAtPicker);
                    }
                  }}
                  className={`px-3 py-1 rounded-full text-xs font-medium transition ${
                    filters.openAt
                      ? 'bg-blue-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                >
                  {filters.openAt ? `Open ${filters.openAt.day.toUpperCase()} ${filters.openAt.time}` : 'Open at...'}
                </button>
                {sources.length > 0 && (
                  <select
                    value={filters.source || ''}
                    onChange={e => setFilters(f => ({ ...f, source: e.target.value || null }))}
                    className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                      filters.source
                        ? 'bg-purple-600 text-white'
                        : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                    }`}
                    style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                  >
                    <option value="">Source</option>
                    {sources.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                )}
                <select
                  value={filters.category || ''}
                  onChange={e => setFilters(f => ({ ...f, category: e.target.value || null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                    filters.category
                      ? 'bg-orange-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                  style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                >
                  <option value="">Category</option>
                  {Object.entries(PIN_CATEGORIES).map(([id, cat]) => (
                    <option key={id} value={id}>{cat.icon} {cat.label}</option>
                  ))}
                </select>
                <select
                  value={filters.myRating || ''}
                  onChange={e => setFilters(f => ({ ...f, myRating: e.target.value ? parseInt(e.target.value) : null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                    filters.myRating
                      ? 'bg-yellow-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                  style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                >
                  <option value="">My Rating</option>
                  <option value="1">★ 1+</option>
                  <option value="2">★ 2+</option>

    const NavigationView = ({ pin, onClose, isDarkMode }) => {
