    const parseKMLData = (xmlString) => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlString, 'text/xml');
      const mapName = doc.querySelector('Document > name')?.textContent?.trim() || 'Google My Maps';
      const places = [];
      const folders = doc.querySelectorAll('Folder');
      const processPlacemarks = (placemarks, folderName) => {
        const folderKey = (folderName || '').toLowerCase().trim();
        const mappedCategory = KML_FOLDER_CATEGORY_MAP[folderKey] || null;
        placemarks.forEach(pm => {
          const nameEl = pm.querySelector('name');
          const descEl = pm.querySelector('description');
          const coordsEl = pm.querySelector('Point > coordinates');
          if (!nameEl || !coordsEl) return;
          const name = nameEl.textContent.trim();
          if (!name) return;
          let description = '';
          if (descEl) {
            let raw = descEl.textContent.trim();
            const tmp = document.createElement('div');
            tmp.innerHTML = raw;
            description = (tmp.textContent || tmp.innerText || '').trim().replace(/\s+/g, ' ').trim();
          }
          // Google My Maps also stores descriptions in ExtendedData
          if (!description) {
            const extData = pm.querySelectorAll('ExtendedData Data');
            extData.forEach(d => {
              const dName = (d.getAttribute('name') || '').toLowerCase();
              if (dName === 'description' || dName === 'notes' || dName === 'gx_media_links') {
                const val = d.querySelector('value')?.textContent?.trim();
                if (val && dName !== 'gx_media_links') description = val;
              }
            });
          }
          const coordsText = coordsEl.textContent.trim();
          const parts = coordsText.split(',');
          const lng = parseFloat(parts[0]);
          const lat = parseFloat(parts[1]);
          if (isNaN(lat) || isNaN(lng)) return;
          const guessed = guessEmojiAndCategory(name, '');
          const category = mappedCategory || guessed.category;
          const emoji = (PIN_CATEGORIES[category] || PIN_CATEGORIES[mappedCategory] || {}).icon || guessed.emoji;
          places.push({
            name, description, lat, lng, checked: true, loading: false,
            _kmlFolder: folderName || '', _category: category, _emoji: emoji,
            placeData: { lat, lng, address: '', rating: null, types: [], displayName: name, opening_hours: {} },
          });
        });
      };
      if (folders.length > 0) {
        folders.forEach(folder => {
          const folderName = folder.querySelector(':scope > name')?.textContent?.trim() || '';
          processPlacemarks(folder.querySelectorAll(':scope > Placemark'), folderName);
        });
      }
      const topLevelPlacemarks = doc.querySelectorAll('Document > Placemark');
      if (topLevelPlacemarks.length > 0) processPlacemarks(topLevelPlacemarks, '');
      return { mapName, places };
    };

    const AddFromLinkModal = ({ onSelect, onBulkSelect, onClose, isDarkMode, startInPasteMode = false, initialBulkData = null }) => {
      const [url, setUrl] = useState('');
      const [fetching, setFetching] = useState(false);
      const [preview, setPreview] = useState(null); // { name, description, source_name, source_url }
      const [bulkPlaces, setBulkPlaces] = useState(initialBulkData?.places || null); // [{ name, description, checked, loading, placeData }]
      const [bulkSource, setBulkSource] = useState(initialBulkData?.source || null); // { source_name, source_url }
      const [bulkExpandedSet, setBulkExpandedSet] = useState(new Set());
      const [error, setError] = useState('');
      const [pasteMode, setPasteMode] = useState(startInPasteMode);
      const [pasteText, setPasteText] = useState('');
      const [pasteSourceUrl, setPasteSourceUrl] = useState('');
      // Per-row Name-as-search state (only tracks the currently expanded row)
      const [nameSearchResults, setNameSearchResults] = useState([]);
      const [searchingName, setSearchingName] = useState(false);
      const nameSearchTimerRef = useRef(null);

      // Location hint derived from source URL or bulkSource вҖ” used to bias searches
      const bulkLocationHint = React.useMemo(() => {
        const src = (bulkSource?.source_url || '') + ' ' + (bulkSource?.source_name || '');
        const m = src.toLowerCase().match(/\b(tokyo|kyoto|osaka|paris|london|rome|new york|los angeles|chicago|seattle|boston|miami|berlin|barcelona|madrid|amsterdam|sydney|melbourne|hong kong|singapore|bangkok|seoul|taipei|japan|france|italy|spain|germany|thailand|vietnam|korea)\b/);
        return m ? m[1] : '';
      }, [bulkSource]);

      // Debounced Google Places search for Name-as-search
      const doNameSearch = async (q, rowIdx) => {
        if (!q || q.trim().length < 2) { setNameSearchResults([]); return; }
        const apiKey = getGoogleApiKey();
        if (!apiKey) return;
        setSearchingName(true);
        try {
          const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Goog-Api-Key': apiKey,
              'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.location,places.types,places.rating,places.regularOpeningHours,places.businessStatus'
            },
            body: JSON.stringify({ textQuery: q.trim() + (bulkLocationHint ? ' ' + bulkLocationHint : ''), maxResultCount: 5 })
          });
          const data = await resp.json();
          const results = (data.places || []).map(gp => {
            const hours = {};
            if (gp.regularOpeningHours?.weekdayDescriptions) {
              const dayAbbrev = { monday: 'mon', tuesday: 'tue', wednesday: 'wed', thursday: 'thu', friday: 'fri', saturday: 'sat', sunday: 'sun' };
              gp.regularOpeningHours.weekdayDescriptions.forEach(desc => {
                const m = desc.match(/^(\w+):\s*(.+)/);
                if (m) hours[dayAbbrev[m[1].toLowerCase()] || m[1].toLowerCase().substring(0, 3)] = m[2].trim();
              });
            }
            return {
              displayName: gp.displayName?.text || '',
              address: gp.formattedAddress || '',
              lat: gp.location?.latitude || 0,
              lng: gp.location?.longitude || 0,
              rating: gp.rating || null,
              types: gp.types || [],
              opening_hours: hours,
            };
          }).filter(r => r.displayName);
          setNameSearchResults(results);
        } catch { setNameSearchResults([]); }
        setSearchingName(false);
      };

      const applyNameSearchResult = (idx, result) => {
        setBulkPlaces(prev => prev.map((p, i) => i === idx ? {
          ...p,
          name: result.displayName,
          placeData: {
            lat: result.lat, lng: result.lng,
            address: result.address, rating: result.rating,
            types: result.types, displayName: result.displayName,
            opening_hours: result.opening_hours || {},
          },
        } : p));
        setNameSearchResults([]);
      };

      // Clear search results when expanded set changes
      React.useEffect(() => {
        setNameSearchResults([]);
        setSearchingName(false);
        if (nameSearchTimerRef.current) clearTimeout(nameSearchTimerRef.current);
      }, [bulkExpandedSet]);

      // Infer a location hint (city/region) from URL + article text, used to bias Google Places lookups.
      // Handles patterns like exploreasheville.com/article/best-coffee-shops-asheville (вҶ’ "asheville"),
      // domains like "exploreXXX.com", URL slug terminal segments, and international city lists.
      const inferLocationHint = (url, text) => {
        const knownCities = /\b(tokyo|kyoto|osaka|paris|london|rome|milan|florence|venice|nyc|new[- ]york|brooklyn|manhattan|queens|bronx|los[- ]angeles|la|san[- ]francisco|sf|chicago|seattle|portland|boston|philadelphia|philly|miami|austin|dallas|houston|atlanta|nashville|asheville|charlotte|raleigh|savannah|new[- ]orleans|nola|denver|phoenix|san[- ]diego|washington|dc|berlin|munich|hamburg|barcelona|madrid|seville|lisbon|porto|amsterdam|rotterdam|copenhagen|stockholm|oslo|helsinki|reykjavik|dublin|edinburgh|glasgow|sydney|melbourne|brisbane|perth|auckland|wellington|hong[- ]kong|singapore|bangkok|chiang[- ]mai|phuket|bali|ubud|seoul|busan|taipei|kyoto|sapporo|okinawa|mexico[- ]city|oaxaca|cancun|tulum|buenos[- ]aires|rio|sao[- ]paulo|lima|cusco|cartagena|medellin|istanbul|dubai|abu[- ]dhabi|marrakech|fez|cape[- ]town|johannesburg|nairobi|japan|france|italy|spain|portugal|germany|netherlands|thailand|vietnam|indonesia|philippines|korea|morocco|greece|turkey|peru|colombia|brazil|argentina|iceland|ireland|scotland|norway|sweden|denmark|finland)\b/i;
        let hint = '';
        if (url) {
          // Replace underscores with dashes so word boundaries work for URL slugs like nishiki_market_kyoto
          const u = url.toLowerCase().replace(/_/g, '-');
          // Known city anywhere in URL
          const m = u.match(knownCities);
          if (m) hint = m[1];
          // Domain pattern "exploreCITY.com" / "visitCITY.com" / "CITYtourism.com"
          if (!hint) {
            const dm = u.match(/\/\/(?:www\.)?(?:explore|visit|go|discover|love)([a-z]{4,})\./);
            if (dm) hint = dm[1];
          }
          // Last dash-word of final slug if it's a proper noun-ish token (4+ letters, all alpha)
          if (!hint) {
            try {
              const path = new URL(url).pathname.toLowerCase();
              const last = path.split('/').filter(Boolean).pop() || '';
              const parts = last.replace(/\.[a-z]+$/, '').split(/[-_]/).filter(Boolean);
              const tail = parts[parts.length - 1] || '';
              if (tail.length >= 4 && /^[a-z]+$/.test(tail) && !/^(guide|best|tips|list|shops|bars|food|cafes|coffee|restaurants|things|tour|tours|place|places|spots|review|reviews|2024|2025|2026)$/.test(tail)) {
                hint = tail;
              }
            } catch {}
          }
        }
        if (!hint && text) {
          const m = text.substring(0, 2000).toLowerCase().match(knownCities);
          if (m) hint = m[1];
        }
        return hint.replace(/[- ]+/g, ' ').trim();
      };

      // Strip photo-credit suffixes that sometimes get appended to headings ("Luminosa / Photo: X")
      const stripPhotoCredit = (name) => {
        if (!name) return name;
        return name.replace(/\s*[\/|,]\s*(photo(graph)?s?|credit|image|courtesy|pictured|В©)\s*[:вҖ”вҖ“\-].*$/i, '')
                   .replace(/\s*\|\s*photo\s+by\s+.*$/i, '')
                   .trim();
      };

      // Kick off Google Places background lookups for a set of bulk places
      const kickOffBulkLookups = (places, locationHint = '') => {
        const apiKey = getGoogleApiKey();
        if (!apiKey) return;
        setBulkPlaces(prev => prev.map(p => ({ ...p, loading: true })));
        places.forEach((place, idx) => {
          setTimeout(async () => {
            try {
              const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'X-Goog-Api-Key': apiKey,
                  'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.location,places.types,places.rating,places.regularOpeningHours,places.businessStatus'
                },
                body: JSON.stringify({
                  textQuery: place.name + (locationHint ? ' ' + locationHint : ''),
                  maxResultCount: 1,
                  ...(place.lat && place.lng ? { locationBias: { circle: { center: { latitude: place.lat, longitude: place.lng }, radius: 5000.0 } } } : {})
                })
              });
              const pData = await resp.json();
              const gp = pData.places?.[0];
              if (gp) {
                const hours = {};
                if (gp.regularOpeningHours?.weekdayDescriptions) {
                  const dayAbbrev = { monday: 'mon', tuesday: 'tue', wednesday: 'wed', thursday: 'thu', friday: 'fri', saturday: 'sat', sunday: 'sun' };
                  gp.regularOpeningHours.weekdayDescriptions.forEach(desc => {
                    const m = desc.match(/^(\w+):\s*(.+)/);
                    if (m) {
                      const key = dayAbbrev[m[1].toLowerCase()] || m[1].toLowerCase().substring(0, 3);
                      hours[key] = m[2].trim();
                    }
                  });
                }
                setBulkPlaces(prev => {
                  const next = prev.map((p, i) => i === idx ? {
                    ...p,
                    loading: false,
                    placeData: {
                      lat: gp.location?.latitude || 0,
                      lng: gp.location?.longitude || 0,
                      address: gp.formattedAddress || '',
                      rating: gp.rating || null,
                      types: gp.types || [],
                      displayName: gp.displayName?.text || '',
                      opening_hours: hours,
                      businessStatus: gp.businessStatus || 'OPERATIONAL',
                    },
                    // Auto-uncheck closed businesses so user doesn't accidentally import them
                    checked: i === idx && gp.businessStatus && gp.businessStatus !== 'OPERATIONAL' ? false : p.checked,
                  } : p);
                  // Dedup: if an earlier entry resolved to the same Google address, mark this one duplicate and uncheck it.
                  const seenAddr = new Set();
                  return next.map((p) => {
                    const addr = p.placeData?.address;
                    if (!addr) return { ...p, duplicate: false };
                    if (seenAddr.has(addr)) return { ...p, duplicate: true, checked: false };
                    seenAddr.add(addr);
                    return { ...p, duplicate: false };
                  });
                });
              } else {
                setBulkPlaces(prev => prev.map((p, i) => i === idx ? { ...p, loading: false } : p));
              }
            } catch {
              setBulkPlaces(prev => prev.map((p, i) => i === idx ? { ...p, loading: false } : p));
            }
          }, idx * 200);
        });
      };

      // Auto-enrich KML-imported places with Google Places data when modal opens with initialBulkData
      const kmlEnrichedRef = useRef(false);
      useEffect(() => {
        if (initialBulkData?.places?.length > 0 && !kmlEnrichedRef.current) {
          kmlEnrichedRef.current = true;
          // Use the source name (e.g. "2025.02 - Maui") as a location hint
          const hint = inferLocationHint('', initialBulkData.source?.source_name || '');
          kickOffBulkLookups(initialBulkData.places, hint);
        }
      }, [initialBulkData]);

      const handleKMLFile = async (file) => {
        const isKMZ = file.name.toLowerCase().endsWith('.kmz');
        let kmlString = '';

        if (isKMZ) {
          // KMZ is a ZIP file containing doc.kml
          if (typeof JSZip === 'undefined') {
            setError('KMZ support is loading вҖ” please try again in a moment.');
            return;
          }
          const zip = await JSZip.loadAsync(file);
          // Find the KML file inside the archive
          const kmlFile = zip.file('doc.kml') || zip.file(/\.kml$/i)[0];
          if (!kmlFile) {
            setError('No KML file found inside this KMZ archive.');
            return;
          }
          kmlString = await kmlFile.async('string');
        } else {
          kmlString = await file.text();
        }

        const { mapName, places } = parseKMLData(kmlString);
        if (places.length === 0) {
          setError('No places found in this file. Make sure it contains placemarks with coordinates.');
          return;
        }

        // Derive a source label from the map name / file name
        const srcName = mapName || file.name.replace(/\.(kmz|kml)$/i, '');
        setBulkPlaces(places);
        setBulkSource({ source_name: `Google My Maps: ${srcName}`, source_url: '' });
        setError('');
      };

      // Parse plain pasted text into candidate places
      const parsePastedText = (text) => {
        const skipPatterns = /^(introduction|getting there|getting around|how to get|tips|map|related|about|author|comment|share|conclusion|summary|faq|where to stay|where to eat|when to visit|final thoughts|more|other|the bottom line|pin this|you may also|read more|subscribe|newsletter|what to|why|the best|a guide|welcome|table of contents|contents|overview|highlights|navigation|menu|sidebar|footer|header|contact|resources|disclosure|disclaimer|affiliate|write a comment|cancel reply|leave a reply|save my name|planning a trip|are you booking|book your|use my|ps\s*[вҖ”вҖ“\-]|related posts|popular posts|recent posts|you might also|join our|sign up|follow us|connect with|advertisement|skip to|jump to|go to|search|home|log in|sign in|register|my account|wishlist|cart|categories?|tags?|filed under|posted in|share this|print this|email this|save this|bookmark|more from|read next|up next|trending|recommended|sponsored|advertisement|made in \w+|top stories|latest|popular|features?|sections?|site map|terms|privacy|cookie|В©|copyright|all rights reserved|explore cities|time out markets|facebook|twitter|pinterest|instagram|speciality stores|one-stop shops|more great|popular on|back to top|digital edition|magazine subscription|time out (group|products|worldwide|tokyo|london|new york))/i;
        const junkContent = /\b(comment|reply|subscribe|booking|itinerary|newsletter|save my name|browser|affiliate|disclosure|cancel|write a|advertisement|sponsored|click here|learn more|view all|all rights)\b/i;
        const articleTitleLike = /\b(guide to|itinerary|ultimate|top \d+|best of|things to do|where to|how to|planning|tips for)\b/i;
        // Bylines / metadata lines that shouldn't be treated as place names
        const bylinePattern = /^(by\s+[A-Z]|published|written by|updated|posted|story by|photograph(y|s) by|reporting by|edited by|words by)\b/i;
        // Common single-word geography / tags that appear alone
        const geographyOnly = /^(japan|usa|uk|europe|asia|africa|americas?|china|india|france|italy|spain|germany|mexico|brazil|canada|australia|tokyo|kyoto|osaka|paris|london|rome|nyc|new york|los angeles|chicago|miami|seattle|boston|dc|washington|tokyo|paris|coffee|food|travel|hotels?|restaurants?|bars?|cafes?|shops?|tours?|news|lifestyle|culture|features?|reviews?|drinks?|wine|spirits?)$/i;
        const isDateLike = /^(january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sep|sept|oct|nov|dec)\s+\d/i;
        // Image caption / alt-text detector вҖ” short phrases about visual content, no verbs, no periods
        const altTextLike = (s) => {
          if (!s) return false;
          const t = s.trim();
          if (/^(image|photo|picture|caption|credit|source|illustration|photograph|getty|courtesy|В©|shutterstock|via)\s*[:вҖ”вҖ“\-]/i.test(t)) return true;
          // Starts with camera/visual language
          if (/^(view of|interior view|exterior view|a view|aerial view|close[- ]up|photo of|picture of|image of|a look at|close up of|overhead shot|inside|exterior of|interior of|(the )?facade)/i.test(t)) return true;
          // Short descriptive fragments with no period and no sentence structure
          if (t.length < 160 && !/[.!?]/.test(t)) {
            // count linking words / verbs вҖ” alt text tends to lack these
            const verbsAndLinks = /\b(is|are|was|were|has|have|had|says|said|offers|features|serves|includes|recommends|opened|closed|located|made|built|known|considered|called|found|opened|closed|brews|pours|specializes|boasts)\b/i;
            if (!verbsAndLinks.test(t)) return true;
          }
          return false;
        };
        // Must contain at least one letter, can't be numbers/symbols only
        const hasRealLetters = (s) => /[A-Za-z\u00C0-\u024F\u3000-\u9FFF]{2,}/.test(s);
        const isLikelyPlaceName = (name) => {
          if (!name) return false;
          if (!hasRealLetters(name)) return false;
          if (bylinePattern.test(name)) return false;
          if (geographyOnly.test(name.trim())) return false;
          if (isDateLike.test(name)) return false;
          // Contains year in middle = likely byline ("Published on March 2, 2026")
          if (/\b(19|20)\d{2}\b/.test(name)) return false;
          // Contains "by" followed by capitalized name pattern
          if (/\bby\s+[A-Z][a-z]+/.test(name)) return false;
          return true;
        };

        const clean = text.replace(/\r/g, '').trim();
        const lines = clean.split('\n').map(l => l.trim());

        // Build a set of caption line indices: a short descriptive line followed (within 3 lines)
        // by a "Credit:", "Photo by", "Courtesy", "В©", "Source:" line вҖ” that preceding line is a caption.
        const creditLine = /^(credit|photo(graph)?(s)?\s+by|courtesy|image by|В©|source|via|getty|shutterstock)\b/i;
        const captionIdx = new Set();
        for (let i = 0; i < lines.length; i++) {
          if (creditLine.test(lines[i])) {
            // Walk backwards up to 3 non-empty lines; mark ones that look caption-y
            let marked = 0;
            for (let j = i - 1; j >= Math.max(0, i - 4) && marked < 2; j--) {
              if (!lines[j]) continue;
              if (lines[j].length < 200) { captionIdx.add(j); marked++; }
            }
            captionIdx.add(i); // the credit line itself
          }
        }
        // Visual-language keywords common in photo captions
        const visualLang = /\b(entryway|storefront|facade|interior|exterior|signage|sign outside|pour over|pouring|barista|shelves?|counter|seating|view of|pictured|shown above|shown below|sitting at|holding|posing|wearing|standing at|leaning|pictured here|in the photo)\b/i;

        // Strategy 1: numbered list ("1. Name", "1) Name", "1 - Name")
        const numbered = [];
        const usedIdx = new Set();
        for (let i = 0; i < lines.length; i++) {
          const m = lines[i].match(/^\d{1,2}[\.\)\-вҖ“вҖ”:]\s+(.{3,80}?)\s*$/);
          if (!m) continue;
          let name = m[1].trim().replace(/[.,:;]$/, '').trim();
          if (name.length < 3 || name.length > 60) continue;
          if (skipPatterns.test(name)) continue;
          if (junkContent.test(name)) continue;
          if (articleTitleLike.test(name)) continue;
          if (name.includes('?')) continue;
          if (!isLikelyPlaceName(name)) continue;
          // Description: next non-empty line(s) until next numbered item or blank gap
          // Prefer sentence-like paragraphs; skip image alt text.
          let desc = '';
          for (let j = i + 1; j < lines.length && j < i + 40; j++) {
            if (lines[j].match(/^\d{1,2}[\.\)\-вҖ“вҖ”:]\s+/)) break;
            if (captionIdx.has(j)) continue;
            if (lines[j].length > 30 && !junkContent.test(lines[j]) && !altTextLike(lines[j]) && !visualLang.test(lines[j])) {
              desc = lines[j].substring(0, 300);
              break;
            }
          }
          numbered.push({ name, description: desc, checked: true, loading: false, placeData: null });
          usedIdx.add(i);
        }
        if (numbered.length >= 3) {
          // Dedupe by name
          const seen = new Set();
          return numbered.filter(p => {
            const key = p.name.toLowerCase();
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });
        }

        const blocks = clean.split(/\n\s*\n+/).map(b => b.trim()).filter(Boolean);

        // Strategy 1.5: "Heading + metadata bullets / Photo credit + description" (Time Out / city guide style)
        // A place heading is a single-line block. The NEXT block starts with bullet tags (* Shopping) or Photo:
        // followed by the actual description paragraphs. We walk lines in the next block, skipping metadata
        // (bullets, Photo:, Credit:), then collect the first substantial paragraph as the description.
        {
          const guideStyle = [];
          // A "heading line" is the last non-junk line of a block вҖ” this handles both:
          //   single-line blocks ("Dashi Okume Azabudai Hills\n")
          //   multi-line blocks where preceding lines are section headers / "Read more" / "Share"
          //   ("Read more\nYagenbori" or "Speciality stores\nDashi Okume Azabudai Hills")
          const headingJunk = /^(read more|share|written by|digital editor|time out|speciality stores|one-stop shops|more great|popular on|back to top|advertisement|sponsored)\b/i;
          for (let b = 0; b < blocks.length - 1; b++) {
            const blockLines = blocks[b].split('\n').map(l => l.trim()).filter(Boolean);
            if (!blockLines.length) continue;
            // Walk from end backwards to find first non-junk line as heading candidate
            let headingLine = '';
            for (let i = blockLines.length - 1; i >= 0; i--) {
              const ln = blockLines[i];
              if (!ln) continue;
              if (headingJunk.test(ln)) continue;
              // Skip trailing bullet lines (* Shopping) and Photo: lines that sometimes appear at block tails
              if (/^[\*вҖўВ·\-]\s+/.test(ln)) continue;
              if (/^photo\s*:/i.test(ln)) continue;
              headingLine = ln;
              break;
            }
            if (!headingLine) continue;
            let candidate = headingLine.replace(/^\d{1,2}[\.\)\-вҖ“вҖ”:]\s*/, '').trim();
            candidate = candidate.replace(/^[вҖўВ·\-\*]\s+/, '').trim();
            candidate = candidate.replace(/^_+|_+$/g, '').trim(); // strip markdown underscores
            if (candidate.length < 3 || candidate.length > 80) continue;
            if (candidate.includes('?')) continue;
            if (/[.!;]$/.test(candidate)) continue;
            if (skipPatterns.test(candidate)) continue;
            if (junkContent.test(candidate)) continue;
            if (articleTitleLike.test(candidate)) continue;
            if (!isLikelyPlaceName(candidate)) continue;
            const wc = candidate.split(/\s+/).length;
            if (wc > 10 || wc < 1) continue;

            // Next block's FIRST line must look like metadata (bullet or Photo:) вҖ” strong signal
            // that the preceding heading is a place name, not a section header.
            const nextLines = blocks[b + 1].split('\n').map(l => l.trim()).filter(Boolean);
            if (!nextLines.length) continue;
            const firstIsBullet = /^[\*вҖўВ·\-]\s+/.test(nextLines[0]);
            const firstIsPhoto = /^photo\s*:/i.test(nextLines[0]);
            if (!firstIsBullet && !firstIsPhoto) continue;

            // Find description: ALL substantial paragraphs in the next block, skipping metadata lines
            // and stopping at the next place heading (typically "Read more" or a short proper-noun line).
            const isMetaLine = (line) => (
              /^[\*вҖўВ·\-]\s+/.test(line) ||
              /^photo\s*:/i.test(line) ||
              creditLine.test(line) ||
              /^read more$/i.test(line) ||
              /^share\s*$/i.test(line) ||
              /^written by/i.test(line)
            );
            const descParts = [];
            // Look in the immediately-following block (its description paragraphs precede the next heading)
            const followBlockLines = blocks[b + 1].split('\n').map(l => l.trim()).filter(Boolean);
            for (const line of followBlockLines) {
              if (isMetaLine(line)) continue;
              if (line.length < 40) continue; // short proper-noun line is the next place heading вҖ” stop
              if (junkContent.test(line)) continue;
              if (altTextLike(line)) continue;
              if (visualLang.test(line)) continue;
              descParts.push(line);
            }
            const desc = descParts.join('\n\n').slice(0, 1500);
            if (!desc) continue; // skip headings without real descriptions
            guideStyle.push({ name: candidate, description: desc, checked: true, loading: false, placeData: null });
          }
          if (guideStyle.length >= 3) {
            const seen = new Set();
            return guideStyle.filter(p => {
              const key = p.name.toLowerCase();
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });
          }
        }

        // Strategy 1.6: line-by-line "Heading вҶ’ Photo: credit вҶ’ description" pattern
        // (handles articles with no blank lines between entries вҖ” entire body is one block)
        {
          const allLines = lines.filter(Boolean); // already trimmed at top
          const photoLine = /^(photo(graph)?(s)?|image|credit|illustration|design)\s*[:вҖ”вҖ“\-]/i;
          const photoBy   = /^(photo(graph)?s?\s+by|courtesy|via|В©)\b/i;
          const isPhoto = (s) => photoLine.test(s) || photoBy.test(s);
          const photoStyle = [];
          for (let i = 0; i < allLines.length - 2; i++) {
            // Need: heading line at i, photo line at i+1, substantial paragraph at i+2 (or +3)
            if (!isPhoto(allLines[i + 1])) continue;
            let candidate = allLines[i].replace(/^\d{1,2}[\.\)\-вҖ“вҖ”:]\s*/, '').trim();
            candidate = candidate.replace(/^[вҖўВ·\-\*]\s+/, '').trim();
            candidate = candidate.replace(/^_+|_+$/g, '').trim();
            candidate = stripPhotoCredit(candidate);
            if (candidate.length < 2 || candidate.length > 80) continue;
            if (candidate.includes('?')) continue;
            if (/[.!;]$/.test(candidate)) continue; // sentence-like
            if (skipPatterns.test(candidate)) continue;
            if (junkContent.test(candidate)) continue;
            if (articleTitleLike.test(candidate)) continue;
            if (isPhoto(candidate)) continue; // skip stacked Photo: Photo: pairs
            if (!isLikelyPlaceName(candidate)) continue;
            const wc = candidate.split(/\s+/).length;
            if (wc > 10 || wc < 1) continue;
            // Collect ALL substantial description lines after the photo line until the next heading
            // (next heading = a short line followed by another photo line within 1-2 lines)
            const descParts = [];
            for (let j = i + 2; j < Math.min(allLines.length, i + 30); j++) {
              const ln = allLines[j];
              if (isPhoto(ln)) break; // hit next photo line вҖ” next entry is starting
              // If this line looks like a next heading (short, no period, followed by photo within next 2 lines)
              if (ln.length < 40 && !/[.!?]$/.test(ln) && j + 1 < allLines.length && isPhoto(allLines[j + 1])) break;
              if (ln.length < 30) continue;
              if (junkContent.test(ln)) continue;
              if (altTextLike(ln)) continue;
              if (visualLang.test(ln)) continue;
              descParts.push(ln);
            }
            const desc = descParts.join('\n\n').slice(0, 1500);
            if (!desc) continue;
            photoStyle.push({ name: candidate, description: desc, checked: true, loading: false, placeData: null });
          }
          if (photoStyle.length >= 3) {
            const seen = new Set();
            return photoStyle.filter(p => {
              const key = p.name.toLowerCase();
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });
          }
        }

        // Strategy 1.65: "Read more" chunk splitter (Time Out style without blank lines/bullets)
        // Splits the text on "Read more" and treats each chunk as: first real line = place name,
        // 0-3 short meta lines (category / neighborhood), then the description paragraph.
        {
          const readMoreSplit = clean.split(/^\s*read\s*more\s*$/im);
          if (readMoreSplit.length >= 3) {
            const chunkStyle = [];
            for (const chunk of readMoreSplit) {
              const chunkLines = chunk.split('\n').map(l => l.trim()).filter(Boolean);
              if (chunkLines.length < 2) continue;
              // Find the first line that looks like a place-name heading
              let nameIdx = -1;
              for (let i = 0; i < Math.min(chunkLines.length, 4); i++) {
                let c = chunkLines[i].replace(/^[вҖўВ·\-\*]\s+/, '').trim();
                c = c.replace(/^_+|_+$|\*\*/g, '').trim();
                c = stripPhotoCredit(c);
                if (c.length < 3 || c.length > 80) continue;
                if (c.includes('?')) continue;
                if (/[.!;]$/.test(c)) continue;
                if (skipPatterns.test(c)) continue;
                if (junkContent.test(c)) continue;
                if (articleTitleLike.test(c)) continue;
                if (!isLikelyPlaceName(c)) continue;
                const wc = c.split(/\s+/).length;
                if (wc > 10) continue;
                nameIdx = i;
                break;
              }
              if (nameIdx === -1) continue;
              let name = chunkLines[nameIdx].replace(/^[вҖўВ·\-\*]\s+|_+|\*\*/g, '').trim();
              name = stripPhotoCredit(name);
              // Skip immediate duplicate heading lines (some sites repeat the name as a caption)
              let descStart = nameIdx + 1;
              while (descStart < chunkLines.length && chunkLines[descStart].replace(/^[вҖўВ·\-\*]\s+|_+|\*\*/g, '').trim().toLowerCase() === name.toLowerCase()) {
                descStart++;
              }
              // Collect description вҖ” first substantial paragraph + subsequent substantial lines.
              // Note: skip visualLang filter here вҖ” real descriptions often use words like "counter", "seating".
              const descParts = [];
              for (let i = descStart; i < chunkLines.length; i++) {
                const ln = chunkLines[i];
                if (ln.length < 40) continue; // short meta line (category/neighborhood)
                if (junkContent.test(ln)) continue;
                if (altTextLike(ln)) continue;
                descParts.push(ln);
              }
              const desc = descParts.join('\n\n').slice(0, 1500);
              if (!desc) continue;
              chunkStyle.push({ name, description: desc, checked: true, loading: false, placeData: null });
            }
            if (chunkStyle.length >= 3) {
              const seen = new Set();
              return chunkStyle.filter(p => {
                const key = p.name.toLowerCase();
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
              });
            }
          }
        }

        // Strategy 1.7: inline "**Name**" or "__Name__" or "Name вҖ”" list entries
        // (Medium / Substack / markdown-bold style: `__Jikasei Mensho__ вҖ” description...`)
        {
          const inlineStyle = [];
          // Match lines like:  __Name__ вҖ” description   OR   **Name** вҖ” description   OR   Name: description
          // Dash variations: вҖ” вҖ“ - :  with optional whitespace
          const boldDashRegex = /^\s*(?:__|\*\*)\s*([^_*\n]{2,80}?)\s*(?:__|\*\*)\s*[вҖ”вҖ“\-:]\s*(.+)$/;
          // Also handle plain "Name вҖ” description" or "Name (Japanese) вҖ“ Subtitle"
          // Accepts Title Case names, names with parenthesized foreign text, accented chars
          const plainDashRegex = /^\s*([A-Z\u00C0-\u024F][\w\u00C0-\u024F\u3000-\u9fff'&.\- ]*(?:\([^)]*\)\s*)?)\s*[вҖ”вҖ“]\s+(.+)$/;
          for (let li = 0; li < lines.length; li++) {
            const line = lines[li];
            if (!line) continue;
            let name = '', desc = '';
            const mb = line.match(boldDashRegex);
            if (mb) {
              name = mb[1].trim();
              desc = mb[2].trim();
            } else {
              const mp = line.match(plainDashRegex);
              if (mp) { name = mp[1].trim(); desc = mp[2].trim(); }
            }
            if (!name) continue;
            name = stripPhotoCredit(name);
            if (name.length < 2 || name.length > 100) continue;
            if (skipPatterns.test(name)) continue;
            if (junkContent.test(name)) continue;
            if (articleTitleLike.test(name)) continue;
            if (!isLikelyPlaceName(name)) continue;
            // If inline desc is short (subtitle only), look ahead for real description
            if (desc.length < 20) {
              for (let j = li + 1; j < lines.length && j < li + 20; j++) {
                if (!lines[j]) continue;
                // Stop at next heading-like line
                if (lines[j].match(boldDashRegex) || lines[j].match(plainDashRegex) || lines[j].match(/^\d{1,2}[\.\)\-вҖ“вҖ”:]\s+/)) break;
                if (lines[j].length > 30 && !junkContent.test(lines[j]) && !altTextLike(lines[j]) && !visualLang.test(lines[j])) {
                  desc = lines[j].substring(0, 300);
                  break;
                }
              }
            }
            if (desc.length < 20) continue;
            if (junkContent.test(desc)) continue;
            inlineStyle.push({ name, description: desc.slice(0, 1500), checked: true, loading: false, placeData: null });
          }
          if (inlineStyle.length >= 2) {
            const seen = new Set();
            return inlineStyle.filter(p => {
              const key = p.name.toLowerCase();
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });
          }
        }

        // Strategy 2: short-line-followed-by-paragraph heading detection (simpler blogs)
        const places = [];
        const seenNames = new Set();
        for (let b = 0; b < blocks.length; b++) {
          const blockLines = blocks[b].split('\n').map(l => l.trim()).filter(Boolean);
          if (!blockLines.length) continue;
          let candidate = blockLines[0].replace(/^\d{1,2}[\.\)\-вҖ“вҖ”:]\s*/, '').trim();
          // Strip common list bullets
          candidate = candidate.replace(/^[вҖўВ·\-\*]\s+/, '').trim();
          if (candidate.length < 3 || candidate.length > 100) continue;
          if (candidate.includes('?')) continue;
          if (/[.;]$/.test(candidate)) continue; // sentence-like (allow ! for emphasis like "Yuba!")
          if (skipPatterns.test(candidate)) continue;
          if (junkContent.test(candidate)) continue;
          if (articleTitleLike.test(candidate)) continue;
          if (!isLikelyPlaceName(candidate)) continue;
          const wc = candidate.split(/\s+/).length;
          if (wc > 10 || wc < 1) continue;
          // Require description in same block OR NEXT FEW blocks вҖ” skip photo captions / alt text.
          // Look ahead up to 3 blocks in case the first one is a caption+credit pair.
          const candidateLines = [...blockLines.slice(1)];
          for (let nb = 1; nb <= 3 && b + nb < blocks.length; nb++) {
            candidateLines.push(...blocks[b + nb].split('\n').map(l => l.trim()).filter(Boolean));
          }
          const isCaption = (line, allLines, idx) => {
            // A caption is a short line followed (within 2 lines) by a credit attribution
            if (line.length > 200) return false;
            for (let k = idx + 1; k < Math.min(allLines.length, idx + 3); k++) {
              if (creditLine.test(allLines[k])) return true;
            }
            return false;
          };
          let desc = '';
          for (let li = 0; li < candidateLines.length; li++) {
            const line = candidateLines[li];
            if (line.length < 30) continue;
            if (junkContent.test(line)) continue;
            if (creditLine.test(line)) continue;
            if (altTextLike(line)) continue;
            if (visualLang.test(line)) continue;
            if (isCaption(line, candidateLines, li)) continue;
            desc = line.substring(0, 300);
            break;
          }
          if (desc.length < 30) continue; // require real description to avoid nav/junk
          const key = candidate.toLowerCase();
          if (seenNames.has(key)) continue;
          seenNames.add(key);
          places.push({ name: candidate, description: desc, checked: true, loading: false, placeData: null });
        }
        return places;
      };

      const handlePasteSubmit = () => {
        const text = pasteText.trim();
        if (text.length < 50) { setError('Please paste more text вҖ” need at least a few paragraphs.'); return; }
        const parsed = parsePastedText(text);
        if (parsed.length < 2) {
          setError("Couldn't find distinct places in the pasted text. Try including the full article with clear place names.");
          return;
        }
        setError('');
        // Determine source name: use pasted URL or original URL if valid
        let srcUrl = pasteSourceUrl.trim() || url.trim();
        let srcName = 'Pasted article';
        try {
          const u = new URL(srcUrl);
          const d = u.hostname.replace('www.', '');
          const MAP = {
            'lonelyplanet.com': 'Lonely Planet', 'tripadvisor.com': 'TripAdvisor',
            'yelp.com': 'Yelp', 'timeout.com': 'Time Out', 'atlasobscura.com': 'Atlas Obscura',
            'eater.com': 'Eater', 'theinfatuation.com': 'The Infatuation', 'michelin.com': 'Michelin',
            'japantravel.com': 'Japan Travel', 'japan-guide.com': 'Japan Guide',
            'foodandwine.com': 'Food & Wine', 'cntraveler.com': 'CondГ© Nast Traveler',
            'travelandleisure.com': 'Travel + Leisure', 'nytimes.com': 'The New York Times',
          };
          srcName = MAP[d] || d;
        } catch {
          srcUrl = '';
        }
        // Strip photo-credit suffixes from names ("Luminosa / Photo: Andrew Cebulka" -> "Luminosa")
        // Also auto-flag vegetarian if the URL/text screams vegetarian/vegan
        const looksVeg = /\b(vegetarian|vegan|plant[-\s]?based|meatless)\b/i.test((srcUrl || '') + ' ' + (text || '').substring(0, 500));
        const cleanedParsed = parsed.map(p => ({
          ...p,
          name: p.name.replace(/\s*[\/|]\s*(photo(graph)?s?|credit|image|courtesy)\s*[:вҖ”вҖ“\-].*$/i, '').trim(),
          is_vegetarian: looksVeg,
        })).filter(p => p.name.length >= 2);
        setBulkPlaces(cleanedParsed);
        setBulkSource({ source_name: srcName, source_url: srcUrl });
        setPasteMode(false);
        // Infer a location hint: URL slug city, domain, known city list, then text
        const locationHint = inferLocationHint(srcUrl, text);
        kickOffBulkLookups(cleanedParsed, locationHint);
      };

      const handleFetch = async () => {
        if (!url.trim()) { setError('Please enter a URL'); return; }
        setError('');
        setFetching(true);

        let urlObj;
        try {
          urlObj = new URL(url.trim());
          if (!/^https?:$/.test(urlObj.protocol)) throw new Error('bad protocol');
        } catch (e) {
          setError('Invalid URL вҖ” make sure it starts with https://');
          setFetching(false);
          return;
        }

        try {
          const domainName = urlObj.hostname.replace('www.', '');

          // Try to extract info from the URL structure
          const pathParts = urlObj.pathname.split('/').filter(Boolean);
          let guessedName = '';

          // Find the best slug from URL path вҖ” skip numeric-only segments, pick the most name-like one
          const slugToName = (slug) => slug
            .replace(/[-_]/g, ' ')
            .replace(/\.(html|php|aspx)$/i, '')
            .replace(/^\d{4}\s+\d{2}\s+\d{2}\s+/, '')
            .replace(/\s+(restaurant|bar|cafe|hotel|nyc|opening|review|first look|new|best|top|guide|where to eat|where to stay)\b.*/i, '')
            .replace(/\b(nyc|la|sf|london|paris|tokyo)\b\s*/ig, '')
            .trim()
            .replace(/\b\w/g, c => c.toUpperCase());

          // Pick best path segment: skip purely numeric, skip common prefixes like 'biz', 'place', etc
          const skipParts = new Set(['biz', 'www', 'place', 'places', 'points-of-interest', 'poi', 'attraction', 'attractions', 'hotel', 'hotels', 'restaurant', 'restaurants', 'things-to-do', 'review', 'reviews', 'en', 'ja', 'fr', 'de', 'es']);
          let bestSlug = '';
          for (let i = pathParts.length - 1; i >= 0; i--) {
            const part = pathParts[i];
            if (/^\d+$/.test(part)) continue; // skip pure numbers like "396249"
            if (skipParts.has(part.toLowerCase())) continue;
            if (part.length < 2) continue;
            bestSlug = part;
            break;
          }
          guessedName = slugToName(bestSlug || pathParts[pathParts.length - 1] || '');

          // Source-specific name extraction
          if (domainName.includes('yelp.com')) {
            guessedName = slugToName(pathParts.find(p => !['biz', 'www'].includes(p)) || '') || guessedName;
          } else if (domainName.includes('tripadvisor')) {
            const lastPart = pathParts[pathParts.length - 1] || '';
            guessedName = slugToName(lastPart.replace(/-.*Reviews-/, '')) || guessedName;
          } else if (domainName.includes('google.com/maps')) {
            const placeMatch = url.match(/place\/([^/]+)/);
            if (placeMatch) guessedName = decodeURIComponent(placeMatch[1]).replace(/\+/g, ' ');
          } else if (domainName.includes('lonelyplanet.com')) {
            // LP pattern: /points-of-interest/ghibli-museum/396249 or /japan/tokyo/attractions/ghibli-museum
            const namePart = pathParts.find(p => !skipParts.has(p.toLowerCase()) && !/^\d+$/.test(p) && p.length > 2);
            if (namePart) guessedName = slugToName(namePart);
          } else if (domainName.includes('klook.com') || domainName.includes('viator.com') || domainName.includes('getyourguide.com')) {
            // Activity sites: usually last non-numeric part is the slug
            const namePart = pathParts.filter(p => !/^\d+$/.test(p) && p.length > 3).pop();
            if (namePart) guessedName = slugToName(namePart);
          }

          // Fetch page contents via CORS proxy (try multiple proxies)
          let fetchedTitle = '';
          let fetchedDescription = '';
          const htmlDecode = (s) => s.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/&#x27;/g, "'").replace(/&#(\d+);/g, (_, n) => String.fromCharCode(n));
          let html = '';
          const proxies = [
            (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
            (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
          ];
          for (const makeUrl of proxies) {
            if (html) break;
            try {
              const resp = await fetch(makeUrl(url), { signal: AbortSignal.timeout(6000) });
              const ct = resp.headers.get('content-type') || '';
              if (ct.includes('json')) {
                const data = await resp.json();
                html = data.contents || '';
              } else {
                html = await resp.text();
              }
            } catch {}
          }
          if (!html) {
            setError("Couldn't load the page вҖ” the site may be blocking access, or the URL may be unreachable.");
            setFetching(false);
            return;
          }
          try {
            const data = { contents: html };
            if (data.contents) {
              const html = data.contents;

              // Extract page title early for article location hints
              const earlyTitle = (() => {
                const og = html.match(/<meta[^>]*property=["']og:title["'][^>]*content=["']([^"']+)["']/i);
                if (og) return htmlDecode(og[1]);
                const t = html.match(/<title[^>]*>([^<]+)<\/title>/i);
                return t ? htmlDecode(t[1]) : '';
              })();
              // Location hint вҖ” check URL (domain, slug) + title + body for city
              const locationHint = (() => {
                // Prefer title "in X" pattern if present (most specific)
                const titleMatch = earlyTitle.match(/\b(?:in|of|to|around|near)\s+([A-Z][^|вҖ“вҖ”\-\n]{2,40})/i);
                if (titleMatch) return titleMatch[1].trim();
                // Fall back to URL/body helper
                return inferLocationHint(url, earlyTitle + '\n' + html.replace(/<[^>]+>/g, ' ').substring(0, 3000));
              })();

              // Map known domains to proper source names (moved here so article detection can use it)
              const DOMAIN_SOURCE_MAP = {
                'lonelyplanet.com': 'Lonely Planet', 'tripadvisor.com': 'TripAdvisor',
                'yelp.com': 'Yelp', 'timeout.com': 'Time Out', 'atlasobscura.com': 'Atlas Obscura',
                'eater.com': 'Eater', 'theinfatuation.com': 'The Infatuation', 'michelin.com': 'Michelin',
                'japantravel.com': 'Japan Travel', 'japan-guide.com': 'Japan Guide',
                'klook.com': 'Klook', 'viator.com': 'Viator', 'getyourguide.com': 'GetYourGuide',
                'booking.com': 'Booking.com', 'airbnb.com': 'Airbnb',
              };
              const sourceName = DOMAIN_SOURCE_MAP[domainName] || DOMAIN_SOURCE_MAP[domainName.replace(/^www\./, '')] || domainName;

              // === ARTICLE DETECTION: check for multi-place articles ===
              const isArticleDomain = !/yelp\.com|tripadvisor\.|google\.com\/maps|booking\.com|airbnb\.com|klook\.com|viator\.com|getyourguide\.com/.test(domainName);
              if (isArticleDomain) {
                // Try to narrow to article content area first
                let articleHtml = html;
                // Use greedy match for <article> to get full content (non-greedy can truncate)
                const articleMatch = html.match(/<article[^>]*>([\s\S]*)<\/article>/i)
                  || html.match(/<div[^>]*class="[^"]*(?:entry-content|post-content|article-body|article-content|main-content|blog-content|single-content)[^"]*"[^>]*>([\s\S]*?)<\/div>\s*(?:<\/div>|<div[^>]*class="[^"]*(?:comment|related|sidebar|footer|widget|share|social))/i);
                if (articleMatch) {
                  articleHtml = articleMatch[1] || articleMatch[0];
                }

                // Extract headings (h2, h3, h4) from article content
                const headingRegex = /<h[234][^>]*>([\s\S]*?)<\/h[234]>/gi;
                const rawHeadings = [];
                let hMatch;
                while ((hMatch = headingRegex.exec(articleHtml)) !== null) {
                  let text = htmlDecode(hMatch[1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ')).trim();
                  text = text.replace(/^[\s#]*\d{1,2}[\.\)\-вҖ“вҖ”:\s]+\s*/, '').trim();
                  text = stripPhotoCredit(text);
                  if (text) rawHeadings.push(text);
                }

                // Fallback: detect <strong>/<b> pseudo-headings common in food/travel blogs
                // Pattern: <p><strong>Name (Japanese) вҖ“ Subtitle</strong></p> or similar
                if (rawHeadings.length < 3) {
                  const boldHeadingRegex = /<p[^>]*>\s*<(?:strong|b)[^>]*>([\s\S]*?)<\/(?:strong|b)>\s*<\/p>/gi;
                  let bMatch;
                  while ((bMatch = boldHeadingRegex.exec(articleHtml)) !== null) {
                    let text = htmlDecode(bMatch[1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ')).trim();
                    text = text.replace(/^[\s#]*\d{1,2}[\.\)\-вҖ“вҖ”:\s]+\s*/, '').trim();
                    text = stripPhotoCredit(text);
                    // Only accept if it looks like a place name (not a full sentence)
                    if (text && text.length >= 3 && text.length <= 100 && text.split(/\s+/).length <= 12 && !/[.!]\s+\w/.test(text)) {
                      rawHeadings.push(text);
                    }
                  }
                }

                // Fallback 2: detect "Name (Japanese) вҖ“ Subtitle" pattern in standalone bold/strong inline
                // Some blogs put <strong> inside <p> with trailing text as description
                if (rawHeadings.length < 3) {
                  const inlineBoldRegex = /<(?:strong|b)[^>]*>([^<]{3,80}?(?:\([^)]*\))?[^<]{0,40}?)<\/(?:strong|b)>/gi;
                  const seenBold = new Set(rawHeadings.map(h => h.toLowerCase()));
                  let ibMatch;
                  while ((ibMatch = inlineBoldRegex.exec(articleHtml)) !== null) {
                    let text = htmlDecode(ibMatch[1].replace(/\s+/g, ' ')).trim();
                    text = text.replace(/^[\s#]*\d{1,2}[\.\)\-вҖ“вҖ”:\s]+\s*/, '').trim();
                    text = stripPhotoCredit(text);
                    // Accept if it has a "Name вҖ“ Subtitle" or "Name (foreign)" pattern
                    const looksLikePlace = /[вҖ”вҖ“\-]\s*\w/.test(text) || /\([^\)]*[\u3000-\u9fff]/.test(text) || /^[A-Z]/.test(text);
                    if (text && text.length >= 3 && text.length <= 100 && !seenBold.has(text.toLowerCase()) && looksLikePlace && text.split(/\s+/).length <= 12 && !/[.]\s+[A-Z]/.test(text)) {
                      rawHeadings.push(text);
                      seenBold.add(text.toLowerCase());
                    }
                  }
                }

                // Aggressive filtering for junk headings
                const skipPatterns = /^(introduction|getting there|getting around|how to get|tips|map|related|about|author|comment|share|conclusion|summary|faq|where to stay|where to eat|when to visit|final thoughts|more|other|the bottom line|pin this|you may also|read more|subscribe|newsletter|what to|why|the best|a guide|welcome|table of contents|contents|overview|highlights|navigation|menu|sidebar|footer|header|contact|resources|disclosure|disclaimer|affiliate|write a comment|cancel reply|leave a reply|save my name|planning a trip|are you booking|book your|use my|ps\s*[вҖ”вҖ“\-]|related posts|popular posts|recent posts|you might also|join our|sign up|follow us|connect with)/i;
                const junkContent = /\b(comment|reply|subscribe|booking|itinerary|newsletter|save my name|browser|affiliate|disclosure|cancel|write a)\b/i;
                const articleTitleLike = /\b(guide to|itinerary|ultimate|top \d+|best of|things to do|where to|how to|planning|tips for)\b/i;

                // CTAs / nav / related-article titles commonly pulled from sidebars
                const ctaLike = /^(plan your trip|things to do|places to (eat|stay|see|go|visit)|where to (eat|stay|go|shop)|our story|sign up|get the newsletter|learn more|view (all|map)|see more|explore more|latest articles|you might (also|like)|related articles?|popular articles?|featured|trending|from our partners|sponsored|more stories|browse|discover|book now|reserve|get tickets|download|get the guide|read more|about us|contact us)$/i;
                // Obvious cross-article contamination (other city refs, ad/corp names)
                const looksLikeOtherArticle = /\b(nyc tour|tour guide|book exchange|locks?\s*&\s*alarm|mobile audio|upper east side|farewell|summit one)\b/i;
                const placeHeadings = rawHeadings.filter(h => {
                  if (h.length < 3 || h.length > 100) return false;
                  if (skipPatterns.test(h)) return false;
                  if (junkContent.test(h)) return false;
                  if (articleTitleLike.test(h)) return false;
                  if (ctaLike.test(h)) return false;
                  if (looksLikeOtherArticle.test(h)) return false;
                  if (/^\d+$/.test(h)) return false;
                  if (h.includes('В©')) return false;
                  // Reject headings that are mostly ALL-CAPS nav items
                  if (h === h.toUpperCase() && h.split(/\s+/).length <= 3 && /^[A-Z\s&]+$/.test(h)) return false;
                  // Skip if it looks like a full sentence (too many words) вҖ” but allow more for non-Latin
                  const wordCount = h.split(/\s+/).length;
                  if (wordCount > 10) return false;
                  // Skip if it exactly matches or closely matches the page title
                  if (earlyTitle && h.length > 10 && earlyTitle.toLowerCase().includes(h.toLowerCase())) return false;
                  return true;
                });

                // Deduplicate (some blogs repeat headings)
                const uniqueHeadings = [...new Set(placeHeadings)];

                if (uniqueHeadings.length >= 3) {
                  // Junk patterns in descriptions (Instagram embeds, social sharing, etc.)
                  const junkDescPattern = /view this post on instagram|a post shared by|click to share|pin it|tweet this|follow us|subscribe|read more|affiliate|disclosure/i;

                  // This looks like a list article! Extract descriptions for each place
                  const places = uniqueHeadings.map(name => {
                    const escapedName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    // Find the section after this heading вҖ” grab all <p> tags until the next heading
                    const sectionRegex = new RegExp(escapedName + '[\\s\\S]*?<\\/h[234]>([\\s\\S]*?)(?=<h[234]|$)', 'i');
                    let sectionMatch = html.match(sectionRegex);
                    // Fallback for bold pseudo-headings: find content after the bold text until next bold block
                    if (!sectionMatch) {
                      const boldSectionRegex = new RegExp(escapedName + '<\\/(?:strong|b)>[\\s\\S]*?<\\/p>([\\s\\S]*?)(?=<p[^>]*>\\s*<(?:strong|b)|<h[234]|$)', 'i');
                      sectionMatch = html.match(boldSectionRegex);
                    }
                    let desc = '';
                    if (sectionMatch) {
                      // Extract ALL substantial paragraphs from the section, not just the first
                      const pRegex = /<p[^>]*>([\s\S]*?)<\/p>/gi;
                      let pMatch;
                      const parts = [];
                      while ((pMatch = pRegex.exec(sectionMatch[1])) !== null) {
                        const pText = htmlDecode(pMatch[1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ')).trim();
                        if (pText.length > 20 && !junkDescPattern.test(pText)) {
                          parts.push(pText);
                        }
                      }
                      desc = parts.join('\n\n').slice(0, 1500);
                    }
                    return { name, description: desc, checked: true, loading: false, placeData: null };
                  });

                  // Auto-flag vegetarian if URL or title suggests it
                  const looksVeg = /\b(vegetarian|vegan|plant[-\s]?based|meatless)\b/i.test(url + ' ' + (earlyTitle || ''));
                  const vegPlaces = looksVeg ? places.map(p => ({ ...p, is_vegetarian: true })) : places;
                  setBulkPlaces(vegPlaces);
                  setBulkSource({ source_name: sourceName, source_url: url });
                  setFetching(false);

                  // Kick off Google Places lookups in background (skip hours вҖ” fetch later per-pin)
                  const apiKey = getGoogleApiKey();
                  if (apiKey) {
                    places.forEach((place, idx) => {
                      setTimeout(async () => {
                        try {
                          const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
                            method: 'POST',
                            headers: {
                              'Content-Type': 'application/json',
                              'X-Goog-Api-Key': apiKey,
                              'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.location,places.types,places.rating,places.regularOpeningHours,places.businessStatus'
                            },
                            body: JSON.stringify({ textQuery: place.name.replace(/\s*[вҖ”вҖ“]\s*[^()]*$/, '').trim() + (locationHint ? ' ' + locationHint : ''), maxResultCount: 1 })
                          });
                          const pData = await resp.json();
                          const gp = pData.places?.[0];
                          if (gp) {
                            const hours = {};
                            if (gp.regularOpeningHours?.weekdayDescriptions) {
                              const dayAbbrev = { monday: 'mon', tuesday: 'tue', wednesday: 'wed', thursday: 'thu', friday: 'fri', saturday: 'sat', sunday: 'sun' };
                              gp.regularOpeningHours.weekdayDescriptions.forEach(desc => {
                                const m = desc.match(/^(\w+):\s*(.+)/);
                                if (m) {
                                  const key = dayAbbrev[m[1].toLowerCase()] || m[1].toLowerCase().substring(0, 3);
                                  hours[key] = m[2].trim();
                                }
                              });
                            }
                            setBulkPlaces(prev => {
                              const next = prev.map((p, i) => i === idx ? {
                                ...p,
                                loading: false,
                                placeData: {
                                  lat: gp.location?.latitude || 0,
                                  lng: gp.location?.longitude || 0,
                                  address: gp.formattedAddress || '',
                                  rating: gp.rating || null,
                                  types: gp.types || [],
                                  displayName: gp.displayName?.text || '',
                                  opening_hours: hours,
                                  businessStatus: gp.businessStatus || 'OPERATIONAL',
                                },
                                checked: i === idx && gp.businessStatus && gp.businessStatus !== 'OPERATIONAL' ? false : p.checked,
                              } : p);
                              const seenAddr = new Set();
                              return next.map((p) => {
                                const addr = p.placeData?.address;
                                if (!addr) return { ...p, duplicate: false };
                                if (seenAddr.has(addr)) return { ...p, duplicate: true, checked: false };
                                seenAddr.add(addr);
                                return { ...p, duplicate: false };
                              });
                            });
                          } else {
                            setBulkPlaces(prev => prev.map((p, i) => i === idx ? { ...p, loading: false } : p));
                          }
                        } catch {
                          setBulkPlaces(prev => prev.map((p, i) => i === idx ? { ...p, loading: false } : p));
                        }
                      }, idx * 200);
                    });
                    setBulkPlaces(prev => prev.map(p => ({ ...p, loading: true })));
                  }
                  return;
                }
              }

              // Strategy 1: JSON-LD structured data (most reliable)
              const jsonLdMatches = html.match(/<script[^>]*type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi) || [];
              for (const block of jsonLdMatches) {
                try {
                  const jsonStr = block.replace(/<\/?script[^>]*>/gi, '');
                  const ld = JSON.parse(jsonStr);
                  const items = Array.isArray(ld) ? ld : ld['@graph'] ? ld['@graph'] : [ld];
                  for (const item of items) {
                    if (item['@type'] && /Place|TouristAttraction|Museum|Restaurant|Hotel|LocalBusiness|LandmarksOrHistoricalBuildings|FoodEstablishment|LodgingBusiness|CivicStructure/i.test(item['@type'])) {
                      if (item.name && !fetchedTitle) fetchedTitle = htmlDecode(item.name);
                      if (item.description && !fetchedDescription) fetchedDescription = htmlDecode(item.description).substring(0, 2000);
                      break;
                    }
                  }
                } catch {}
              }

              // Strategy 2: og:title (usually the clean place name)
              if (!fetchedTitle) {
                const ogTitle = html.match(/<meta[^>]*property=["']og:title["'][^>]*content=["']([^"']+)["']/i)
                  || html.match(/<meta[^>]*content=["']([^"']+)["'][^>]*property=["']og:title["']/i);
                if (ogTitle) {
                  fetchedTitle = htmlDecode(ogTitle[1])
                    .replace(/\s*[|\-вҖ“вҖ”]\s*(Yelp|TripAdvisor|Google Maps|Lonely Planet|Eater|Booking\.com|Airbnb|Hotels\.com|Klook|Viator|GetYourGuide|Atlas Obscura|Time Out|Culture Trip|Japan Guide).*$/i, '')
                    .trim();
                }
              }

              // Strategy 3: <h1> tag (usually the main heading)
              if (!fetchedTitle) {
                const h1Match = html.match(/<h1[^>]*>([^<]{3,120})<\/h1>/i)
                  || html.match(/<h1[^>]*>\s*<[^>]+>([^<]{3,120})<\/[^>]+>\s*<\/h1>/i);
                if (h1Match) {
                  fetchedTitle = htmlDecode(h1Match[1]).trim();
                }
              }

              // Strategy 4: <title> tag (fallback, often includes site name)
              if (!fetchedTitle) {
                const titleMatch = html.match(/<title[^>]*>([^<]+)<\/title>/i);
                if (titleMatch) {
                  fetchedTitle = htmlDecode(titleMatch[1])
                    .replace(/\s*[|\-вҖ“вҖ”]\s*(Yelp|TripAdvisor|Google Maps|Lonely Planet|Eater|Booking\.com|Airbnb|Hotels\.com|Klook|Viator|GetYourGuide|Atlas Obscura|Time Out|Culture Trip|Japan Guide).*$/i, '')
                    .trim();
                }
              }

              // Clean up the title
              if (fetchedTitle) {
                fetchedTitle = fetchedTitle
                  .replace(/^(review|first look|just opened|now open|new opening)[:\s-]*/i, '')
                  .trim();
                // If title is way too long, it's probably an article вҖ” take first segment
                if (fetchedTitle.length > 80) {
                  const sep = fetchedTitle.match(/^([^:вҖ“вҖ”|]{3,60}?)\s*[:вҖ“вҖ”|]\s*/);
                  if (sep) fetchedTitle = sep[1].trim();
                }
              }

              // Get description from meta tags if we don't have one from JSON-LD
              if (!fetchedDescription) {
                const descMatch = html.match(/<meta[^>]*property=["']og:description["'][^>]*content=["']([^"']+)["']/i)
                  || html.match(/<meta[^>]*name=["']description["'][^>]*content=["']([^"']+)["']/i);
                if (descMatch) {
                  fetchedDescription = htmlDecode(descMatch[1]).trim().substring(0, 2000);
                }
              }

              // Lonely Planet: extract body text if no description found
              if (domainName.includes('lonelyplanet.com') && !fetchedDescription) {
                const lpDesc = html.match(/<div[^>]*class="[^"]*(?:article-body|readMore|poi-description)[^"]*"[^>]*>([\s\S]{20,1000}?)<\/div>/i);
                if (lpDesc) {
                  fetchedDescription = lpDesc[1].replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().substring(0, 2000);
                }
              }
            }
          } catch {}

          // Filter out error page titles
          const errorTitles = /^(403|404|500|502|503)\s*(error|forbidden|not found|page not found|access denied|server error)?$/i;
          const junkTitles = /^(error|access denied|forbidden|page not found|not found|just a moment|attention required|please wait|cloudflare|captcha|robot|bot check)/i;
          if (fetchedTitle && (errorTitles.test(fetchedTitle.trim()) || junkTitles.test(fetchedTitle.trim()))) {
            fetchedTitle = ''; // discard, fall back to URL slug
          }

          // sourceName + DOMAIN_SOURCE_MAP already defined above (before article detection)

          const finalName = fetchedTitle || guessedName || '';

          // Auto-search Google Places to get coordinates, address, rating
          let placeData = null;
          if (finalName) {
            const apiKey = getGoogleApiKey();
            if (apiKey) {
              try {
                const placesResp = await fetch('https://places.googleapis.com/v1/places:searchText', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'X-Goog-Api-Key': apiKey,
                    'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.location,places.types,places.rating,places.regularOpeningHours,places.businessStatus,places.websiteUri'
                  },
                  body: JSON.stringify({ textQuery: finalName, maxResultCount: 1 })
                });
                const placesData = await placesResp.json();
                const place = placesData.places?.[0];
                if (place) {
                  placeData = {
                    lat: place.location?.latitude || 0,
                    lng: place.location?.longitude || 0,
                    address: place.formattedAddress || '',
                    rating: place.rating || null,
                    types: place.types || [],
                    website: place.websiteUri || '',
                    opening_hours: {},
                  };
                  if (place.regularOpeningHours?.weekdayDescriptions) {
                    const dayAbbrev = { monday: 'mon', tuesday: 'tue', wednesday: 'wed', thursday: 'thu', friday: 'fri', saturday: 'sat', sunday: 'sun' };
                    place.regularOpeningHours.weekdayDescriptions.forEach(desc => {
                      const match = desc.match(/^(\w+):\s*(.+)/);
                      if (match) {
                        const key = dayAbbrev[match[1].toLowerCase()] || match[1].toLowerCase().substring(0, 3);
                        placeData.opening_hours[key] = match[2].trim();
                      }
                    });
                  }
                }
              } catch {}
            }
          }

          const result = {
            name: finalName,
            description: fetchedDescription,
            source_name: sourceName,
            source_url: url,
            emoji: guessEmojiAndCategory(finalName, '').emoji,
            ...(placeData || {}),
          };

          // If we got Google Places data (has coordinates), go straight to edit form
          if (placeData?.lat) {
            setFetching(false);
            onSelect(result);
            return;
          }

          // Otherwise show the preview for manual editing
          setPreview(result);
        } catch (e) {
          console.error('Fetch link error:', e);
          setError("Couldn't read this page вҖ” the site may be blocking access. Try copy/pasting a different link.");
        }
        setFetching(false);
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 9999 }}>
          <div
            className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full ${bulkPlaces ? 'max-w-2xl md:max-w-3xl' : 'max-w-md'} shadow-2xl`}
            onClick={e => e.stopPropagation()}
          >
            <div className="p-6 space-y-4 max-h-[90vh] overflow-y-auto">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-bold dark:text-white">Add from Link</h2>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded">
                  <CloseIcon />
                </button>
              </div>

              {bulkPlaces ? (
                <div className="space-y-3">
                  <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-3">
                    {bulkSource?.source_url && <p className="text-xs text-blue-600 dark:text-blue-400 truncate">рҹ”— {bulkSource.source_url}</p>}
                    <p className="text-xs text-blue-500 mt-0.5">{bulkSource?.source_url ? 'Source: ' : 'рҹ—әпёҸ '}{bulkSource?.source_name} В· {bulkPlaces.filter(p => !p.duplicate).length} places found</p>
                  </div>
                  <div className="flex items-center justify-between">
                    <button
                      onClick={() => setBulkPlaces(prev => prev.map(p => ({ ...p, checked: !prev.every(pp => pp.checked) })))}
                      className="text-xs text-blue-600 dark:text-blue-400 hover:underline"
                    >
                      {bulkPlaces.every(p => p.checked) ? 'Deselect all' : 'Select all'}
                    </button>
                    <span className="text-xs text-gray-500">{bulkPlaces.filter(p => p.checked).length} selected</span>
                  </div>
                  <div className="max-h-[65vh] overflow-y-auto space-y-1 -mx-1 px-1">
                    {bulkPlaces.map((place, idx) => {
                      if (place.duplicate) return null; // hide duplicates entirely
                      const cat = guessEmojiAndCategory(place.placeData?.displayName || place.name, place.placeData?.types?.join(',') || '');
                      const isExpanded = bulkExpandedSet.has(idx);
                      return (
                        <div
                          key={idx}
                          className={`rounded-lg transition border ${
                            place.checked
                              ? 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800'
                              : 'bg-gray-50 dark:bg-slate-800 border-transparent opacity-60'
                          }`}
                        >
                          <div className="flex items-start gap-2 p-2 cursor-pointer"
                            onClick={() => setBulkPlaces(prev => prev.map((p, i) => i === idx ? { ...p, checked: !p.checked } : p))}
                          >
                            <div className="mt-0.5">
                              <div className={`w-5 h-5 rounded border-2 flex items-center justify-center text-xs ${
                                place.checked ? 'bg-blue-600 border-blue-600 text-white' : 'border-gray-300 dark:border-slate-600'
                              }`}>
                                {place.checked && 'вң“'}
                              </div>
                            </div>
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center gap-1.5 flex-wrap">
                                <span className="text-sm">{place._emoji || cat.emoji}</span>
                                <span className="font-medium text-sm dark:text-white truncate">{place.placeData?.displayName || place.name}</span>
                                {place._kmlFolder && (
                                  <span className="text-[10px] font-medium bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-gray-400 px-1.5 py-0.5 rounded-full flex-shrink-0">
                                    {place._kmlFolder}
                                  </span>
                                )}
                                {place.placeData?.businessStatus === 'CLOSED_PERMANENTLY' && (
                                  <span className="text-[10px] font-semibold bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300 px-1.5 py-0.5 rounded-full flex-shrink-0" title="Google reports this place as permanently closed вҖ” auto-unchecked">
                                    Permanently closed
                                  </span>
                                )}
                                {place.placeData?.businessStatus === 'CLOSED_TEMPORARILY' && (
                                  <span className="text-[10px] font-semibold bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300 px-1.5 py-0.5 rounded-full flex-shrink-0" title="Google reports this place as temporarily closed вҖ” auto-unchecked">
                                    Temporarily closed
                                  </span>
                                )}
                              </div>
                              {place.loading && <p className="text-xs text-gray-400 mt-0.5">Looking up...</p>}
                              {!place.loading && place.placeData?.address && (
