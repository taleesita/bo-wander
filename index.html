              onBulkSelect={(places) => {
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                let addedCount = 0;
                let mergedCount = 0;
                // Build a working copy of pins so we can detect duplicates against
                // pins added earlier in this same bulk (not just existing state).
                let workingPins = [...pins];
                const findDuplicate = (data) => {
                  const nameKey = (data.name || '').trim().toLowerCase();
                  const lat = parseFloat(data.lat);
                  const lng = parseFloat(data.lng);
                  const hasCoords = !isNaN(lat) && !isNaN(lng) && (lat !== 0 || lng !== 0);
                  const latKey = hasCoords ? lat.toFixed(4) : null;
                  const lngKey = hasCoords ? lng.toFixed(4) : null;
                  return workingPins.find(p => {
                    if (nameKey && p.name && p.name.trim().toLowerCase() === nameKey) return true;
                    if (hasCoords && p.lat != null && p.lng != null) {
                      if (parseFloat(p.lat).toFixed(4) === latKey && parseFloat(p.lng).toFixed(4) === lngKey) return true;
                    }
                    return false;
                  });
                };
                const updates = []; // pins to update (merged)
                const additions = []; // new pins
                places.forEach((data, idx) => {
                  const lat = data.lat || 0;
                  const lng = data.lng || 0;
                  let desc = data.description || '';
                  if (data.source_url && data.source_name) {
                    const sourceLink = `[${data.source_name}](${data.source_url})`;
                    desc = desc ? `${desc}\n\nSource: ${sourceLink}` : `Source: ${sourceLink}`;
                  }
                  const dup = findDuplicate(data);
                  if (dup) {
                    // Merge: avoid adding same source_url twice
                    const existingDesc = dup.description || '';
                    const alreadyHasSource = data.source_url && existingDesc.includes(data.source_url);
                    const mergedDesc = alreadyHasSource
                      ? existingDesc
                      : (existingDesc && desc ? `${existingDesc}\n\n---\n\n${desc}` : (existingDesc || desc));
                    const merged = {
                      ...dup,
                      description: mergedDesc,
                      // Keep original address/coords; fill in if missing
                      address: dup.address || data.address || '',
                      lat: dup.lat || lat,
                      lng: dup.lng || lng,
                      opening_hours: (dup.opening_hours && Object.keys(dup.opening_hours).length) ? dup.opening_hours : (data.opening_hours || {}),
                      google_rating: dup.google_rating || data.rating || null,
                      // If either side flagged veg, keep it flagged
                      is_vegetarian: !!(dup.is_vegetarian || data.is_vegetarian),
                    };
                    MockFirebase.savePin(merged);
                    updates.push(merged);
                    workingPins = workingPins.map(p => p.id === merged.id ? merged : p);
                    mergedCount++;
                  } else {
                    const cat = guessEmojiAndCategory(data.name, '');
                    const newPin = {
                      id: (Date.now() + idx).toString(),
                      name: data.name,
                      address: data.address || '',
                      description: desc,
                      emoji: data.emoji || cat.emoji,
                      category: data.category || cat.category,
                      source_name: data.source_name,
                      source_url: data.source_url,
                      collection_id: defaultCollection,
                      photos: [],
                      opening_hours: data.opening_hours || {},
                      lat, lng,
                      google_rating: data.rating || null,
                      is_vegetarian: !!data.is_vegetarian,
                      created_at: new Date().toISOString(),
                    };
                    MockFirebase.savePin(newPin);
                    additions.push(newPin);
                    workingPins.push(newPin);
                    addedCount++;
                    // Fetch ratings in background
                    setTimeout(() => fetchRatingsForPin(newPin), 500 + idx * 300);
                  }
                });
                // Apply all state changes at once
                setPins(prev => {
                  const updMap = {};
                  updates.forEach(u => { updMap[u.id] = u; });
                  const next = prev.map(p => updMap[p.id] || p);
                  return [...next, ...additions];
                });
                setShowAddFromLink(false);
                if (addedCount > 0 || mergedCount > 0) {
                  setSelectedPin(null);
                  const parts = [];
                  if (addedCount > 0) parts.push(`Added ${addedCount} place${addedCount === 1 ? '' : 's'}`);
                  if (mergedCount > 0) parts.push(`merged ${mergedCount} duplicate${mergedCount === 1 ? '' : 's'}`);
                  showToast(parts.join(', '));
                }
              }}
              onClose={() => { setShowAddFromLink(false); setKmlBulkData(null); }}
              isDarkMode={darkMode}
              initialBulkData={kmlBulkData}
            />
          )}

          {/* Paste Text Modal вҖ” same as Add from Link but starts in paste mode */}
          {showPasteText && (
            <AddFromLinkModal
              startInPasteMode={true}
              onSelect={(data) => {
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                const newPin = {
                  name: data.name, address: data.address || '', description: data.description || '',
                  emoji: data.emoji, category: guessEmojiAndCategory(data.name, '').category,
                  source_name: data.source_name, source_url: data.source_url,
                  sources: data.source_url || data.source_name ? [{ label: data.source_name || '', url: data.source_url || '' }] : [],
                  collection_id: defaultCollection, photos: [], opening_hours: data.opening_hours || {},
                  lat: data.lat || 0, lng: data.lng || 0, rating: data.rating || null,
                };
                if (data.lat && data.lng) {
                  setMapPanTarget({ lat: data.lat, lng: data.lng, _t: Date.now() });
                  setPreviewPin({ lat: data.lat, lng: data.lng, name: data.name, emoji: data.emoji });
                }
                setEditingPin(newPin);
                setShowPasteText(false);
              }}
              onBulkSelect={(places) => {
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                let addedCount = 0, mergedCount = 0;
                let workingPins = [...pins];
                const findDuplicate = (data) => {
                  const nameKey = (data.name || '').trim().toLowerCase();
                  const lat = parseFloat(data.lat); const lng = parseFloat(data.lng);
                  const hasCoords = !isNaN(lat) && !isNaN(lng) && (lat !== 0 || lng !== 0);
                  const latKey = hasCoords ? lat.toFixed(4) : null;
                  const lngKey = hasCoords ? lng.toFixed(4) : null;
                  return workingPins.find(p => {
                    if (nameKey && p.name && p.name.trim().toLowerCase() === nameKey) return true;
                    if (hasCoords && p.lat != null && p.lng != null) {
                      if (parseFloat(p.lat).toFixed(4) === latKey && parseFloat(p.lng).toFixed(4) === lngKey) return true;
                    }
                    return false;
                  });
                };
                const updates = [], additions = [];
                places.forEach((data, idx) => {
                  const lat = data.lat || 0, lng = data.lng || 0;
                  let desc = data.description || '';
                  const dup = findDuplicate(data);
                  if (dup) {
                    const merged = { ...dup, description: dup.description || desc, address: dup.address || data.address || '',
                      lat: dup.lat || lat, lng: dup.lng || lng,
                      opening_hours: (dup.opening_hours && Object.keys(dup.opening_hours).length) ? dup.opening_hours : (data.opening_hours || {}),
                      google_rating: dup.google_rating || data.rating || null,
                      is_vegetarian: !!(dup.is_vegetarian || data.is_vegetarian),
                    };
                    MockFirebase.savePin(merged);
                    updates.push(merged);
                    workingPins = workingPins.map(p => p.id === merged.id ? merged : p);
                    mergedCount++;
                  } else {
                    const cat = guessEmojiAndCategory(data.name, '');
                    const newPin = {
                      id: (Date.now() + idx).toString(), name: data.name, address: data.address || '', description: desc,
                      emoji: data.emoji || cat.emoji, category: data.category || cat.category,
                      source_name: data.source_name, source_url: data.source_url,
                      sources: data.source_url ? [{ label: data.source_name || '', url: data.source_url }] : [],
                      collection_id: defaultCollection, photos: [], opening_hours: data.opening_hours || {},
                      lat, lng, google_rating: data.rating || null, is_vegetarian: !!data.is_vegetarian,
                      created_at: new Date().toISOString(),
                    };
                    MockFirebase.savePin(newPin);
                    additions.push(newPin);
                    workingPins.push(newPin);
                    addedCount++;
                    setTimeout(() => fetchRatingsForPin(newPin), 500 + idx * 300);
                  }
                });
                setPins(prev => {
                  const updMap = {}; updates.forEach(u => { updMap[u.id] = u; });
                  return [...prev.map(p => updMap[p.id] || p), ...additions];
                });
                setShowPasteText(false);
                if (addedCount > 0 || mergedCount > 0) {
                  setSelectedPin(null);
                  const parts = [];
                  if (addedCount > 0) parts.push(`Added ${addedCount} place${addedCount === 1 ? '' : 's'}`);
                  if (mergedCount > 0) parts.push(`merged ${mergedCount} duplicate${mergedCount === 1 ? '' : 's'}`);
                  showToast(parts.join(', '));
                }
              }}
              onClose={() => setShowPasteText(false)}
              isDarkMode={darkMode}
            />
          )}

          {/* Toast Notification */}
          {toast && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[10000] animate-bounce-in">
              <div className={`px-4 py-2.5 rounded-xl shadow-lg font-medium text-sm flex items-center gap-2 ${
                toast.type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'
              }`}>
                <span>{toast.type === 'success' ? 'вң“' : 'вң—'}</span>
                {toast.message}
              </div>
            </div>
          )}

          {/* Upload Confirmation Modal */}
          {showUploadConfirmation && (
            <UploadConfirmationModal
              onSelect={async (data) => {
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                // Use coordinates from the modal if available, otherwise fallback geocode
                let lat = data.lat || 0, lng = data.lng || 0;
                if (!lat && data.name) {
                  try {
                    const geoResp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(data.name)}&limit=1`);
                    const geoData = await geoResp.json();
                    const f = geoData.features?.[0];
                    if (f?.geometry?.coordinates) {
                      lng = f.geometry.coordinates[0];
                      lat = f.geometry.coordinates[1];
                      if (!data.address) data.address = [f.properties?.street, f.properties?.city, f.properties?.country].filter(Boolean).join(', ');
                    }
                  } catch {}
                }
                const newPin = {
                  name: data.name,
                  address: data.address,
                  description: data.description,
                  emoji: data.emoji || 'рҹҸЁ',
                  category: data.category || 'hotel',
                  source_name: data.source_name,
                  collection_id: defaultCollection,
                  photos: [],
                  opening_hours: {},
                  lat, lng,
                  reservation_details: data.reservation_details,
                  attachment: data.attachment,
                };
                // Save directly вҖ” no need to open edit form
                handleSavePin(newPin);
                setPreviewPin(null);
                setShowUploadConfirmation(false);
              }}
              onClose={() => { setPreviewPin(null); setShowUploadConfirmation(false); }}
              isDarkMode={darkMode}
              onMapCenter={(coords, zoom) => setMapPanTarget({ lat: coords[0], lng: coords[1], _t: Date.now() })}
              onPreviewPin={(pin) => setPreviewPin({ lat: pin.lat, lng: pin.lng, name: pin.name, emoji: 'рҹҸЁ' })}
              onKMLImport={({ places, source }) => {
                setShowUploadConfirmation(false);
                setKmlBulkData({ places, source });
                setShowAddFromLink(true);
              }}
              collectionId={activeCollection}
              onTransportSaved={() => showToast('Travel doc saved!')}
            />
          )}

          {/* Documents (unified: standalone travel docs + pin-attached docs) */}
          {showTravelDocs && (
            <TravelDocsPanel
              collectionId={activeCollection}
              pins={pins}
              isDarkMode={darkMode}
              isMobile={isMobile}
              onClose={() => setShowTravelDocs(false)}
              onSelectPin={(pin) => { setSelectedPin(pin); setShowTravelDocs(false); }}
              showToast={showToast}
            />
          )}

          {/* Itinerary Planner */}
          {showItinerary && (
            <ItineraryPlanner
              pins={pins}
              collections={collections}
              activeCollection={activeCollection}
              isDarkMode={darkMode}
              isMobile={isMobile}
              onFlyTo={(lat, lng) => setMapPanTarget({ lat, lng, _t: Date.now() })}
              onClose={() => setShowItinerary(false)}
              pendingAddPin={pendingItineraryPin}
              onClearPendingAdd={() => setPendingItineraryPin(null)}
            />
          )}

          {/* Floating bottom buttons (Mobile) */}
          {isMobile && view === 'collection' && !selectedPin && !editingPin && (
            <div className="fixed bottom-4 flex justify-center gap-2" style={{ zIndex: 500, left: '50%', transform: 'translateX(-50%)' }}>
              <button
                onClick={() => setShowList(!showList)}
                className={`flex items-center gap-1.5 px-3.5 py-2.5 rounded-full shadow-lg text-sm font-medium transition ${
                  showList
                    ? 'bg-blue-600 text-white'
                    : 'bg-white dark:bg-slate-800 text-gray-700 dark:text-gray-200 border dark:border-slate-600'
                }`}
              >
                {showList ? <><span className="text-base">рҹ—әпёҸ</span> Map</> : <><span className="text-base">рҹ“Ӣ</span> List</>}
              </button>
              <button
                onClick={() => setShowTravelDocs(!showTravelDocs)}
                className={`flex items-center gap-1.5 px-3.5 py-2.5 rounded-full shadow-lg text-sm font-medium transition ${
                  showTravelDocs
                    ? 'bg-blue-600 text-white'
                    : 'bg-white dark:bg-slate-800 text-gray-700 dark:text-gray-200 border dark:border-slate-600'
                }`}
              >
                <span className="text-base">рҹ“„</span> Docs
              </button>
              <button
                onClick={() => setShowItinerary(!showItinerary)}
                className={`flex items-center gap-1.5 px-3.5 py-2.5 rounded-full shadow-lg text-sm font-medium transition ${
                  showItinerary
                    ? 'bg-blue-600 text-white'
                    : 'bg-white dark:bg-slate-800 text-gray-700 dark:text-gray-200 border dark:border-slate-600'
                }`}
              >
                <span className="text-base">рҹ—“пёҸ</span> Plan
              </button>
            </div>
          )}

          {/* Add Menu (Floating) */}
          {showAddMenu && isMobile && (
            <div className="floating-action-menu">
              <div
                className="fam-item"
                onClick={() => {
                  const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                  setEditingPin({ name: '', address: '', description: '', emoji: 'рҹ“Ң', category: 'other', source_name: '', collection_id: defaultCollection, photos: [], opening_hours: {} });
                  setShowAddMenu(false);
                }}
              >
                <span>вңҸпёҸ</span>
                <span>Manual</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowAddFromLink(true);
                  setShowAddMenu(false);
                }}
              >
                <span>рҹ”—</span>
                <span>From URL</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowAddMenu(false);
                  if (photoToPinInputRef.current) photoToPinInputRef.current.click();
                }}
              >
                <span>рҹ“ё</span>
                <span>From Photo</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowUploadConfirmation(true);
                  setShowAddMenu(false);
                }}
              >
                <span>рҹ“„</span>
                <span>Upload Booking</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowTravelDocs(true);
                  setShowAddMenu(false);
                }}
              >
                <span>рҹ“„</span>
                <span>Documents</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowItinerary(true);
                  setShowAddMenu(false);
                }}
              >
                <span>рҹ—“пёҸ</span>
                <span>Itinerary</span>
              </div>
              <div
                className="fam-item"
                onClick={async () => {
                  setShowAddMenu(false);
                  const col = collections.find(c => c.id === activeCollection);
                  if (!col) return;
                  const colPins = pins.filter(p => p.collection_id === activeCollection);
                  try {
                    await MockFirebase.shareCollection(activeCollection, col, colPins);
                    const url = `${window.location.origin}${window.location.pathname}#shared/${activeCollection}`;
                    if (navigator.share) {
                      await navigator.share({ title: `Bo Wander - ${col.name}`, text: `Check out my ${col.name} map on Bo Wander`, url });
                    } else {
                      await navigator.clipboard.writeText(url);
                      showToast('Share link copied!');
                    }
                  } catch (e) {
                    if (e.name !== 'AbortError') showToast('Failed to share', 'error');
                  }
                }}
              >
                <span>рҹ”—</span>
                <span>Share Map</span>
              </div>
            </div>
          )}


          {/* Hidden file input for Photo-to-Pin */}
          <input
            ref={photoToPinInputRef}
            type="file"
            accept="image/*"
            capture="environment"
            style={{ display: 'none' }}
            onChange={handlePhotoToPinCapture}
          />

          {/* Photo-to-Pin crop modal */}
          {photoToPinCrop && ReactDOM.createPortal(
            <PhotoCropModal
              imageSrc={photoToPinCrop.imageSrc}
              onCancel={() => setPhotoToPinCrop(null)}
              onApply={handlePhotoToPinCropped}
              isDarkMode={darkMode}
            />,
            document.body
          )}

          {/* Photo-to-Pin processing overlay */}
          {photoToPinProcessing && ReactDOM.createPortal(
            <div style={{ position: 'fixed', inset: 0, zIndex: 10010, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 text-center shadow-2xl max-w-xs mx-4">
                <div className="text-3xl mb-3 animate-pulse">рҹ“ё</div>
                <div className="font-semibold dark:text-white mb-1">Reading photo...</div>
                <div className="text-sm text-gray-500 dark:text-gray-400">Extracting text and searching for the place</div>
              </div>
            </div>,
            document.body
          )}

          {/* Service Worker Registration */}
          {typeof navigator !== 'undefined' && 'serviceWorker' in navigator && (
            <script dangerouslySetInnerHTML={{
              __html: `
                if ('serviceWorker' in navigator) {
                  const swCode = \`
const CACHE_NAME = 'bo-wander-v26';
const TILE_CACHE = 'bo-wander-tiles-v1';
const MAX_TILE_CACHE = 2000;

const CDN_URLS = [
  'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css',
  'https://cdn.tailwindcss.com',
  'https://unpkg.com/react@18/umd/react.production.min.js',
  'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
  'https://unpkg.com/@babel/standalone/babel.min.js',
  'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',
  'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js',
  'https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js',
  'https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css',
  'https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js',
  'https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js',
  'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js',
  'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js',
];

self.addEventListener('install', event => {
  event.waitUntil(
    caches.open(CACHE_NAME).then(cache => {
      // Cache app shell
      cache.addAll(['/', '/index.html']).catch(() => {});
      // Cache CDN resources individually (don't fail install if one CDN is slow)
      return Promise.allSettled(
        CDN_URLS.map(url => cache.add(url).catch(() => console.log('[SW] Failed to cache:', url)))
      );
    })
  );
  self.skipWaiting();
});

self.addEventListener('activate', event => {
  event.waitUntil(
    caches.keys().then(names =>
      Promise.all(names.map(n => {
        if (n !== CACHE_NAME && n !== TILE_CACHE) return caches.delete(n);
      }))
    )
  );
  self.clients.claim();
});

// Detect map tile requests
function isTileRequest(url) {
  return url.includes('tile.openstreetmap.org') || url.includes('tile.') || url.match(/\\/\\d+\\/\\d+\\/\\d+\\.png/);
}

// Detect API calls that should never be cached
function isApiCall(url) {
  return url.includes('googleapis.com') || url.includes('firestore.googleapis.com')
      || url.includes('firebase') || url.includes('photon.komoot.io')
      || url.includes('allorigins') || url.includes('corsproxy');
}

self.addEventListener('fetch', event => {
  if (event.request.method !== 'GET') return;
  const url = event.request.url;

  // API calls: network only, no caching
  if (isApiCall(url)) return;

  // Map tiles: cache-first with LRU eviction
  if (isTileRequest(url)) {
    event.respondWith(
      caches.open(TILE_CACHE).then(cache =>
        cache.match(event.request).then(cached => {
          if (cached) return cached;
          return fetch(event.request).then(resp => {
            if (resp.ok) {
              cache.put(event.request, resp.clone());
              // Evict old tiles if cache is too large
              cache.keys().then(keys => {
                if (keys.length > MAX_TILE_CACHE) {
                  const toDelete = keys.slice(0, keys.length - MAX_TILE_CACHE);
                  toDelete.forEach(k => cache.delete(k));
                }
              });
            }
            return resp;
          }).catch(() => cached || new Response('', { status: 408 }));
        })
      )
    );
    return;
  }

  // CDN + app shell: stale-while-revalidate
  // Serve from cache immediately, update in background
  event.respondWith(
    caches.match(event.request).then(cached => {
      const fetchPromise = fetch(event.request).then(resp => {
        if (resp.ok) {
          caches.open(CACHE_NAME).then(cache => cache.put(event.request, resp.clone()));
        }
        return resp;
      }).catch(() => cached);
      return cached || fetchPromise;
    })
  );
});
  \`;
                  const blob = new Blob([swCode], { type: 'application/javascript' });
                  const swUrl = URL.createObjectURL(blob);
                  navigator.serviceWorker.register(swUrl).catch(() => {});
                }
              `
            }} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><BoWanderApp /></ErrorBoundary>);
  </script>
</body>
