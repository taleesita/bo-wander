    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, errorInfo) {
        this.setState({ errorInfo });
        console.error('[BoWander] Render Error:', error, errorInfo);

        if (this.state.hasError) {

            style: { padding: '2rem', fontFamily: 'system-ui', maxWidth: '600px', margin: '2rem auto' }

            React.createElement('h2', { style: { color: '#dc2626', marginBottom: '1rem' } }, 'Something went wrong'),

              style: { background: '#fef2f2', padding: '1rem', borderRadius: '8px', overflow: 'auto', fontSize: '13px', whiteSpace: 'pre-wrap' }
            }, String(this.state.error)),

    const openDataFile = (dataUrl, fileName) => {

      try {
        // Convert data URL to blob
        const [header, b64] = dataUrl.split(',');
        const mime = header.match(/:(.*?);/)?.[1] || 'application/octet-stream';
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const blob = new Blob([bytes], { type: mime });
        const blobUrl = URL.createObjectURL(blob);
        window.open(blobUrl, '_blank');
        // Revoke after a delay to allow the new tab to load

      if (!collectionPins || collectionPins.length === 0) return null;
      const lats = collectionPins.map(p => p.lat).filter(Boolean);
      const lngs = collectionPins.map(p => p.lng).filter(Boolean);
      if (lats.length === 0) return null;
      const centerLat = (Math.min(...lats) + Math.max(...lats)) / 2;
      const centerLng = (Math.min(...lngs) + Math.max(...lngs)) / 2;
      // Use CartoDB Voyager static tile at zoom 11
      const zoom = 11;
      const n = Math.pow(2, zoom);
      const xtile = Math.floor((centerLng + 180) / 360 * n);
      const ytile = Math.floor((1 - Math.log(Math.tan(centerLat * Math.PI / 180) + 1 / Math.cos(centerLat * Math.PI / 180)) / Math.PI) / 2 * n);

      // Save a pin to Firestore
      async savePin(pin) {
        const pinData = { ...pin, updated_at: new Date().toISOString() };
        if (!pinData.created_at) pinData.created_at = new Date().toISOString();
        // Use pin.id as the document ID
        await db.collection('pins').doc(pin.id).set(pinData, { merge: true });
        // Also keep localStorage in sync for fast loads
        try {
          const cached = JSON.parse(localStorage.getItem('boWanderPins') || '[]');
          const idx = cached.findIndex(p => p.id === pin.id);
          if (idx > -1) cached[idx] = pinData;
          else cached.push(pinData);
          localStorage.setItem('boWanderPins', JSON.stringify(cached));
        } catch {}
        return Promise.resolve();
      },

      // Delete a pin from Firestore
      async deletePin(pinId, collectionId) {
        await db.collection('pins').doc(pinId).delete();
        try {
          const cached = JSON.parse(localStorage.getItem('boWanderPins') || '[]');
          localStorage.setItem('boWanderPins', JSON.stringify(cached.filter(p => p.id !== pinId)));
        } catch {}
        return Promise.resolve();
      },

      // Save a collection to Firestore
      async saveCollection(col) {
        await db.collection('collections').doc(col.id).set(col, { merge: true });
        return Promise.resolve();
      },

      // Delete a collection from Firestore
      async deleteCollection(collectionId) {
        await db.collection('collections').doc(collectionId).delete();
        // Also delete all pins in this collection
        const snap = await db.collection('pins').where('collection_id', '==', collectionId).get();
        const batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        return Promise.resolve();
      },

      // Load all pins from Firestore (with localStorage fallback for offline)
      async loadPins() {
        try {
          const snap = await db.collection('pins').get();
          const pins = [];
          snap.forEach(doc => pins.push({ id: doc.id, ...doc.data() }));
          localStorage.setItem('boWanderPins', JSON.stringify(pins));
          return pins;
        } catch (e) {
          console.warn('Firestore load failed, using localStorage:', e);
          try {
            return JSON.parse(localStorage.getItem('boWanderPins') || '[]');
          } catch { return []; }
        }
      },

      // Load all collections from Firestore
      async loadCollections() {
        try {
          const snap = await db.collection('collections').get();
          const cols = [];
          snap.forEach(doc => cols.push({ id: doc.id, ...doc.data() }));
          if (cols.length > 0) {
            localStorage.setItem('boWanderCollections', JSON.stringify(cols));
            return cols;
          }
        } catch (e) {
          console.warn('Firestore collections load failed:', e);
        }
        // Fallback: localStorage or sample data
        try {
          const saved = JSON.parse(localStorage.getItem('boWanderCollections'));
          if (saved && saved.length > 0) return saved;
        } catch {}
        return SAMPLE_COLLECTIONS;

        }, err => {

    const getOpenStatus = (openingHours, customDate) => {
      const now = customDate || new Date();
      const dayOfWeek = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][now.getDay()];
      const currentHours = openingHours[dayOfWeek];

      if (!currentHours || currentHours === 'Closed') {
        return { status: 'closed', label: 'Closed', hoursText: currentHours || 'Closed' };
      }

      // If we have a custom time, try to parse hours and check if within range
      if (customDate && currentHours && currentHours !== 'Closed') {
        const timeMatch = currentHours.match(/(\d{1,2}):?(\d{2})?\s*(am|pm)?\s*[-–]\s*(\d{1,2}):?(\d{2})?\s*(am|pm)?/i);
        if (timeMatch) {
          let openH = parseInt(timeMatch[1]);
          const openM = parseInt(timeMatch[2] || '0');
          const openAmPm = (timeMatch[3] || '').toLowerCase();
          let closeH = parseInt(timeMatch[4]);
          const closeM = parseInt(timeMatch[5] || '0');
          const closeAmPm = (timeMatch[6] || '').toLowerCase();

          if (openAmPm === 'pm' && openH < 12) openH += 12;
          if (openAmPm === 'am' && openH === 12) openH = 0;
          if (closeAmPm === 'pm' && closeH < 12) closeH += 12;
          if (closeAmPm === 'am' && closeH === 12) closeH = 0;

          const checkTime = customDate.getHours() * 60 + customDate.getMinutes();
          const openTime = openH * 60 + openM;
          const closeTime = closeH * 60 + closeM;

          if (closeTime > openTime) {
            if (checkTime >= openTime && checkTime <= closeTime) {
              return { status: 'open', label: 'Open', hoursText: currentHours };
            } else {
              return { status: 'closed', label: 'Closed', hoursText: currentHours };
            }
          } else {
            // Wraps past midnight
            if (checkTime >= openTime || checkTime <= closeTime) {
              return { status: 'open', label: 'Open', hoursText: currentHours };
            } else {
              return { status: 'closed', label: 'Closed', hoursText: currentHours };
            }
          }
        }
      }

      if (currentHours && currentHours !== 'Closed') {
        return { status: 'open', label: 'Open', hoursText: currentHours };
      }

      return { status: 'unknown', label: 'Hours not available', hoursText: '' };
    };

        Object.values(EMOJI_DATA).forEach(items => {
          items.forEach(item => { map[item.e] = item.k; });
        });
        return map;
      }, []);

      const filteredAll = useMemo(() => {
        if (tab !== 'all') return null;
        if (!search) return ALL_EMOJIS;
        const s = search.toLowerCase();
        const result = {};
        Object.entries(ALL_EMOJIS).forEach(([cat, emojis]) => {
          const matched = emojis.filter(emoji => {
            // Check curated keywords first
            const kw = emojiKeywords[emoji];
            if (kw && kw.includes(s)) return true;
            // Fallback: category name match
            if (cat.toLowerCase().includes(s)) return true;
            return false;
          });
          if (matched.length > 0) result[cat] = matched;
        });
        return Object.keys(result).length > 0 ? result : {};
      }, [search, tab, emojiKeywords]);

      const hasResults = tab === 'curated' ? Object.keys(filtered || {}).length > 0 : Object.keys(filteredAll || {}).length > 0;
      const hasCustomIcons = customIcons.length > 0;

      // Check if a string contains an emoji
      const isEmoji = (str) => {
        const emojiRegex = /\p{Emoji_Presentation}|\p{Emoji}\uFE0F/u;
        return emojiRegex.test(str);
      };

      const handleCustomEmojiSubmit = () => {
        const trimmed = customEmoji.trim();
        if (trimmed && isEmoji(trimmed)) {
          // Extract first emoji from the string
          const match = trimmed.match(/(\p{Emoji_Presentation}|\p{Emoji}\uFE0F[\u200d\p{Emoji_Presentation}\p{Emoji}\uFE0F]*)/u);
          if (match) onSelect(match[0]);
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const dataUrl = ev.target.result;
          if (onUploadIcon) onUploadIcon(dataUrl);
          onSelect(dataUrl);
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 10001 }} onClick={onClose}>

            <div className="p-4 pb-0 space-y-3 flex-shrink-0">
              <div className="flex justify-between items-center">
                <h3 className="font-bold text-lg dark:text-white">Choose icon</h3>
                <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                  <CloseIcon />
                </button>
              </div>
              {/* Search / paste emoji input */}
              <div className="relative">
                <input
                  type="text"
                  placeholder="Search or paste any emoji..."
                  value={customEmoji || search}
                  onChange={e => {
                    const v = e.target.value;
                    if (isEmoji(v)) {
                      setCustomEmoji(v);
                      setSearch('');
                    } else {
                      setCustomEmoji('');
                      setSearch(v);
                    }
                  }}
                  className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm pr-20"
                  autoFocus
                  onKeyDown={e => { if (e.key === 'Enter' && customEmoji && isEmoji(customEmoji)) handleCustomEmojiSubmit(); }}
                />
                {customEmoji && isEmoji(customEmoji) && (
                  <button
                    onClick={handleCustomEmojiSubmit}
                    className="absolute right-1 top-1 bottom-1 px-3 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 transition flex items-center gap-1"
                  >
                    Use {customEmoji.match(/(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)/u)?.[0] || ''}
                  </button>
                )}
              </div>
              {/* Tabs */}
              <div className="flex gap-1 border-b dark:border-slate-700">
                <button
                  onClick={() => setTab('curated')}
                  className={`px-3 py-1.5 text-sm font-medium border-b-2 transition ${tab === 'curated' ? 'border-blue-600 text-blue-600 dark:text-blue-400 dark:border-blue-400' : 'border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400'}`}
                >
                  Travel
                </button>
                <button
                  onClick={() => setTab('all')}
                  className={`px-3 py-1.5 text-sm font-medium border-b-2 transition ${tab === 'all' ? 'border-blue-600 text-blue-600 dark:text-blue-400 dark:border-blue-400' : 'border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400'}`}
                >
                  All Emojis
                </button>
              </div>
            </div>
            <div className="overflow-y-auto flex-1 p-4 pt-2 space-y-3">
              {/* Custom uploaded icons */}
              {hasCustomIcons && !search && tab === 'curated' && (
                <div>
                  <h4 className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">My Icons</h4>
                  <div className="flex flex-wrap gap-2">
                    {customIcons.map((iconUrl, i) => (
                      <div key={i} className="relative group">
                        <button
                          onClick={() => { onSelect(iconUrl); }}
                          className={`w-10 h-10 rounded-lg overflow-hidden hover:ring-2 hover:ring-blue-400 transition ${
                            selectedEmoji === iconUrl ? 'ring-2 ring-blue-600' : ''
                          }`}
                        >
                          <img src={iconUrl} alt="" className="w-full h-full object-cover" />
                        </button>
                        {onDeleteIcon && (
                          confirmingDeleteIcon === iconUrl ? (
                            <div className="absolute -top-2 -right-2 flex gap-0.5 z-10">
                              <button
                                onClick={(e) => { e.stopPropagation(); setConfirmingDeleteIcon(null); }}
                                className="w-5 h-5 bg-gray-400 text-white rounded-full text-xs flex items-center justify-center hover:bg-gray-500"
                                title="Cancel"
                              >✕</button>
                              <button
                                onClick={(e) => { e.stopPropagation(); onDeleteIcon(iconUrl); setConfirmingDeleteIcon(null); }}
                                className="w-5 h-5 bg-red-600 text-white rounded-full text-xs flex items-center justify-center hover:bg-red-700"
                                title="Confirm delete"
                              >✓</button>
                            </div>
                          ) : (
                            <button
                              onClick={(e) => { e.stopPropagation(); setConfirmingDeleteIcon(iconUrl); }}
                              className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition hover:bg-red-600"
                              title="Remove icon"
                            >
                              ×
                            </button>
                          )
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {tab === 'curated' ? (
                hasResults ? Object.entries(filtered).map(([category, items]) => (
                  <div key={category}>
                    <h4 className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">{category}</h4>
                    <div className="flex flex-wrap gap-1">
                      {items.map(item => (
                        <button
                          key={item.e}
                          onClick={() => { onSelect(item.e); }}
                          className={`text-2xl w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 transition ${
                            selectedEmoji === item.e ? 'bg-blue-100 dark:bg-blue-900' : ''
                          }`}
                          title={item.k}
                        >
                          {item.e}
                        </button>
                      ))}
                    </div>
                  </div>
                )) : (
                  <div className="text-center py-8 text-gray-500 dark:text-gray-400">
                    <p className="text-lg mb-1">No emojis match "{search}"</p>
                    <p className="text-sm">Try a different keyword, switch to "All Emojis", or upload a custom icon</p>
                  </div>
                )
              ) : (
                hasResults ? Object.entries(filteredAll || ALL_EMOJIS).map(([category, emojis]) => (
                  <div key={category}>
                    <h4 className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">{category}</h4>
                    <div className="flex flex-wrap gap-1">
                      {emojis.map((emoji, i) => (
                        <button
                          key={emoji + i}
                          onClick={() => { onSelect(emoji); }}
                          className={`text-2xl w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 transition ${
                            selectedEmoji === emoji ? 'bg-blue-100 dark:bg-blue-900' : ''
                          }`}
                        >
                          {emoji}
                        </button>
                      ))}
                    </div>
                  </div>
                )) : (
                  <div className="text-center py-8 text-gray-500 dark:text-gray-400">
                    <p className="text-lg mb-1">No emojis match "{search}"</p>
                    <p className="text-sm">Try a different keyword or switch to "Travel" for tagged emojis</p>
                  </div>
                )

            </div>
            <div className="p-4 pt-2 border-t dark:border-slate-700 flex-shrink-0">
              <input type="file" ref={fileInputRef} accept="image/*" onChange={handleImageUpload} className="hidden" />
              <button
                onClick={() => fileInputRef.current?.click()}
                className="w-full px-4 py-2 text-sm font-medium text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-slate-800 rounded-lg transition flex items-center justify-center gap-2"
              >
                <span>📷</span> Upload custom image
              </button>
            </div>
          </div>
        </div>
      );
    };

    const InlineEditableText = ({ label, value, onSave, placeholder, emptyText, showBorder = true }) => {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(value);
      const textareaRef = useRef(null);

      useEffect(() => { setDraft(value); }, [value]);
      useEffect(() => {
        if (editing && textareaRef.current) {
          textareaRef.current.focus();
          textareaRef.current.selectionStart = textareaRef.current.value.length;
        }
      }, [editing]);

      const handleSave = () => {
        onSave(draft);
        setEditing(false);
      };

      if (!editing) {
        return (
          <div className={`space-y-1 ${showBorder ? 'border-t dark:border-slate-700 pt-2' : ''}`}>
            <div className="flex items-center justify-between">
              <label className="text-xs font-semibold text-gray-600 dark:text-gray-400">{label}</label>
              <button
                onClick={() => setEditing(true)}
                className="text-xs text-blue-600 dark:text-blue-400 hover:underline"
              >
                {value ? 'Edit' : 'Add'}
              </button>
            </div>
            {value ? (
              <p className="text-sm text-gray-700 dark:text-gray-300 whitespace-pre-wrap cursor-pointer hover:bg-gray-50 dark:hover:bg-slate-800 rounded p-1 -m-1" onClick={() => setEditing(true)}>{value}</p>
            ) : (
              <p className="text-sm text-gray-400 italic cursor-pointer" onClick={() => setEditing(true)}>{emptyText || `No ${label.toLowerCase()} yet — tap to add`}</p>
            )}
          </div>
        );
      }

      return (
        <div className={`space-y-2 ${showBorder ? 'border-t dark:border-slate-700 pt-2' : ''}`}>
          <label className="text-xs font-semibold text-gray-600 dark:text-gray-400">{label}</label>
          <textarea
            ref={textareaRef}
            value={draft}
            onChange={e => setDraft(e.target.value)}
            className="w-full px-3 py-2 border rounded dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm focus:ring-2 focus:ring-blue-500"
            placeholder={placeholder || `Add ${label.toLowerCase()}...`}
            rows={3}
          />
          <div className="flex gap-2">
            <button
              onClick={() => { setDraft(value); setEditing(false); }}
              className="px-3 py-1 text-xs border rounded dark:border-slate-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700"
            >
              Cancel
            </button>
            <button
              onClick={handleSave}
              className="px-3 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700 font-medium"
            >
              Save
            </button>
          </div>
        </div>
      );
    };

    const PinDetailSheet = ({ pin, onClose, onEdit, onInlineUpdate, isDarkMode, isDesktop, onDelete, onNavigate, collections, allPins, fetchingRatings, onRetryRatings, ratingFetchStatus, customIcons, onUploadIcon, onDeleteIcon }) => {
      const [translated, setTranslated] = useState(null);
      const [translating, setTranslating] = useState(false);
      const [editing, setEditing] = useState(false);
      const [editData, setEditData] = useState({});
      const [showEmojiPicker, setShowEmojiPicker] = useState(false);
      const [confirmingDelete, setConfirmingDelete] = useState(false);

      // Reset editing state when pin changes
      useEffect(() => { setEditing(false); setConfirmingDelete(false); }, [pin?.id]);

      const startEditing = () => {
        setEditData({
          name: pin.name || '',
          address: pin.address || '',
          description: pin.description || '',
          source_name: pin.source_name || '',
          category: pin.category || 'other',
          personal_notes: pin.personal_notes || '',
          emoji: pin.emoji || '📍',
        });
        setEditing(true);
      };

      const saveEditing = () => {
        const updated = { ...pin, ...editData };
        if (onInlineUpdate) onInlineUpdate(updated);
        setEditing(false);
      };

      const cancelEditing = () => {
        setEditing(false);
      };

      const openStatus = getOpenStatus(pin.opening_hours || {});
      const showTranslate = !isAscii(pin.name + (pin.description || ''));

      const handleTranslate = async () => {
        setTranslating(true);
        try {
          const text = `${pin.name}. ${pin.description || ''}`;
          const response = await fetch(
            `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=auto|en`
          );
          const data = await response.json();
          if (data.responseData) {
            setTranslated(data.responseData.translatedText);
          }
        } catch (err) {
          console.error('Translation error:', err);
        }
        setTranslating(false);
      };

      const Container = isDesktop ? 'div' : 'div';
      const containerClass = isDesktop
        ? 'side-panel dark:bg-slate-900'
        : 'bottom-sheet dark:bg-slate-900';

      const inputClass = "w-full px-3 py-1.5 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none";

      return (
        <Container className={containerClass}>
          {!isDesktop && <div className="bottom-sheet-handle" />}

          <div className="p-6 space-y-4">
            {/* Header: Emoji + Name */}
            <div className="flex items-start justify-between">
              <div className="flex items-center gap-3 flex-1 min-w-0">
                {editing ? (
                  <button
                    onClick={() => setShowEmojiPicker(true)}
                    className="flex-shrink-0 hover:opacity-75 transition active:scale-90"
                    title="Change icon"
                  >
                    {isCustomIcon(editData.emoji) ? (
                      <img src={editData.emoji} alt="" className="w-10 h-10 rounded-full object-cover" />
                    ) : (
                      <span className="text-4xl">{editData.emoji}</span>
                    )}
                  </button>
                ) : (
                  isCustomIcon(pin.emoji) ? (
                    <img src={pin.emoji} alt="" className="w-10 h-10 rounded-full object-cover flex-shrink-0" />
                  ) : (
                    <span className="text-4xl flex-shrink-0">{pin.emoji}</span>
                  )
                )}
                <div className="flex-1 min-w-0">
                  {editing ? (
                    <input
                      type="text"
                      value={editData.name}
                      onChange={e => setEditData(d => ({ ...d, name: e.target.value }))}
                      className={inputClass + " font-bold text-lg"}
                      placeholder="Place name"
                    />
                  ) : (
                    <h2 className="text-xl font-bold dark:text-white truncate">{pin.name}</h2>
                  )}
                  {!editing && pin.source_name && (
                    <span className="inline-block bg-gray-600 text-white text-xs px-2 py-1 rounded mt-1">
                      {pin.source_name}
                    </span>
                  )}
                </div>
              </div>
              <button
                onClick={onClose}
                className="p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded flex-shrink-0"
              >
                <CloseIcon />
              </button>
            </div>

            {/* Address — second field to match Add form order */}
            <div className="space-y-2">
              {editing ? (
                <div>
                  <label className="text-xs font-semibold text-gray-600 dark:text-gray-400 block mb-1">Address</label>
                  <AddressAutocomplete
                    value={editData.address}
                    onChange={val => setEditData(d => ({ ...d, address: val }))}
                    onSelectAddress={s => {
                      setEditData(d => ({
                        ...d,
                        address: s.address,
                        ...(s.lat && s.lng ? { lat: s.lat, lng: s.lng } : {})
                      }));
                    }}
                    isDarkMode={isDarkMode}
                  />
                </div>
              ) : (
                <>
                  <p className="text-sm text-gray-600 dark:text-gray-400">{pin.address}</p>
                  <div className="flex gap-2">
                    <button
                      onClick={() => onNavigate(pin)}
                      className="flex-1 flex items-center justify-center gap-2 bg-blue-600 text-white px-3 py-2 rounded-lg text-sm hover:bg-blue-700"
                    >
                      <DirectionsIcon /> Get Directions
                    </button>
                    <button
                      onClick={() => {
                        navigator.clipboard.writeText(pin.address);
                        alert('Address copied!');
                      }}
                      className="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm hover:bg-gray-100 dark:hover:bg-slate-700"
                    >
                      <CopyIcon />
                    </button>
                  </div>
                </>
              )}
            </div>

            {/* Source — third field to match Add form order */}
            {editing && (
              <div>
                <label className="text-xs font-semibold text-gray-600 dark:text-gray-400 block mb-1">Source</label>
                <SourceField value={editData.source_name} onChange={v => setEditData(d => ({ ...d, source_name: v }))} allPins={allPins || []} />
              </div>
            )}

            {/* Category — fourth field to match Add form order */}
            {editing && (
              <div>
                <label className="text-xs font-semibold text-gray-600 dark:text-gray-400 block mb-1">Category</label>
                <CategoryField value={editData.category} onChange={cat => setEditData(d => ({ ...d, category: cat }))} />
              </div>
            )}

            {/* Description — fifth field to match Add form order */}
            {editing ? (
              <div>
                <label className="text-xs font-semibold text-gray-600 dark:text-gray-400 block mb-1">Description</label>
                <textarea
                  value={editData.description}
                  onChange={e => setEditData(d => ({ ...d, description: e.target.value }))}
                  className={inputClass}
                  rows={2}
                  placeholder="What's special about this place?"
                />
              </div>
            ) : (
              <InlineEditableText
                label="Description"
                value={pin.description || ''}
                onSave={(desc) => {
                  if (onInlineUpdate) onInlineUpdate({ ...pin, description: desc });
                }}
                placeholder="What's special about this place?"
                emptyText="No description — tap to add"
                showBorder={false}
              />
            )}
            {translated && (
              <p className="text-sm text-gray-600 dark:text-gray-400 italic border-l-2 border-blue-400 pl-3">
                {translated}
              </p>
            )}

            {/* Attachment / Booking file */}
            {!editing && pin.attachment && (
              <div className="flex items-center gap-3 bg-gray-50 dark:bg-slate-800 rounded-lg p-3">
                {pin.attachment.thumbnail?.startsWith('data:') ? (
                  <img
                    src={pin.attachment.thumbnail}
                    alt={pin.attachment.name}
                    className="w-12 h-12 rounded object-cover cursor-pointer border hover:opacity-80 transition"
                    onClick={() => openDataFile(pin.attachment.data, pin.attachment.name)}
                  />
                ) : (
                  <span className="text-2xl cursor-pointer" onClick={() => openDataFile(pin.attachment.data, pin.attachment.name)}>
                    {pin.attachment.thumbnail || '📎'}
                  </span>
                )}
                <div className="flex-1 min-w-0">
                  <p className="text-xs font-medium text-gray-700 dark:text-gray-300 truncate">{pin.attachment.name}</p>
                  <button
                    onClick={() => openDataFile(pin.attachment.data, pin.attachment.name)}
                    className="text-xs text-blue-600 dark:text-blue-400 hover:underline"
                  >
                    View full file
                  </button>
                </div>
              </div>
            )}

            {/* Reservation Details Card — for hotel and activity pins */}
            {!editing && pin.reservation_details && (pin.category === 'hotel' || pin.category === 'activity') && (() => {
              const rd = pin.reservation_details;
              const isActivity = rd.type === 'activity' || pin.category === 'activity';
              const details = isActivity ? [
                rd.tour_operator && { label: 'Operator', value: rd.tour_operator },
                rd.date && { label: 'Date', value: `${rd.date}${rd.time ? ' at ' + rd.time : ''}` },
                rd.duration && { label: 'Duration', value: rd.duration },
                rd.confirmation_number && { label: 'Confirmation #', value: rd.confirmation_number },
                rd.price && { label: 'Price', value: rd.price + (rd.price_usd ? ` (${rd.price_usd} USD)` : '') },
                rd.contact_info && { label: 'Contact', value: rd.contact_info },
                rd.address && { label: 'Meeting Point', value: rd.address },
                rd.booking_source && { label: 'Booked via', value: rd.booking_source },
              ].filter(Boolean) : [
                rd.room_type && { label: 'Room', value: rd.room_type },
                rd.check_in && { label: 'Check-in', value: `${rd.check_in}${rd.check_in_time ? ' at ' + rd.check_in_time : ''}` },
                rd.check_out && { label: 'Check-out', value: `${rd.check_out}${rd.check_out_time ? ' at ' + rd.check_out_time : ''}` },
                rd.confirmation_number && { label: 'Confirmation #', value: rd.confirmation_number },
                rd.pin && { label: 'PIN', value: rd.pin },
                rd.price && { label: 'Price', value: rd.price + (rd.price_usd ? ` (${rd.price_usd} USD)` : '') },
                rd.includes_breakfast && rd.includes_breakfast !== 'unknown' && { label: 'Breakfast', value: rd.includes_breakfast === 'yes' ? 'Included' : 'Not included' },
                rd.booking_source && { label: 'Source', value: rd.booking_source },
              ].filter(Boolean);
              if (details.length === 0) return null;
              return (
                <div className="bg-blue-50 dark:bg-slate-800 rounded-lg p-3 space-y-1.5">
                  <p className="text-xs font-semibold text-blue-700 dark:text-blue-400 uppercase tracking-wide">{isActivity ? 'Activity Details' : 'Reservation Details'}</p>
                  {details.map((d, i) => (
                    <div key={i} className="flex justify-between text-sm">
                      <span className="text-gray-500 dark:text-gray-400">{d.label}</span>
                      <span className="font-medium text-gray-800 dark:text-gray-200 text-right max-w-[65%]">{d.value}</span>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* Add to Calendar — for hotel pins with reservation details */}
            {!editing && pin.reservation_details?.check_in && pin.category === 'hotel' && (() => {
              // Helper to parse a date string into a Date object
              const parseDate = (str) => {
                if (!str) return null;
                const d = new Date(str);
                if (!isNaN(d.getTime())) return d;
                const m = str.match(/(\d{1,2})\s*(\w{3,9})\s*(\d{4})/);
                if (m) return new Date(`${m[2]} ${m[1]}, ${m[3]}`);
                return null;
              };
              // Helper to parse time string like "4:00 PM" or "16:00" into [hours, minutes]
              const parseTime = (str, defaultHour = 12) => {
                if (!str) return [defaultHour, 0];
                const m12 = str.match(/(\d{1,2}):?(\d{2})?\s*(AM|PM)/i);
                if (m12) {
                  let h = parseInt(m12[1]);
                  const min = parseInt(m12[2] || '0');
                  if (m12[3].toUpperCase() === 'PM' && h !== 12) h += 12;
                  if (m12[3].toUpperCase() === 'AM' && h === 12) h = 0;
                  return [h, min];
                }
                const m24 = str.match(/(\d{1,2}):(\d{2})/);
                if (m24) return [parseInt(m24[1]), parseInt(m24[2])];
                return [defaultHour, 0];
              };
              const rd = pin.reservation_details;
              const checkInDate = parseDate(rd.check_in);
              const checkOutDate = parseDate(rd.check_out);
              if (!checkInDate) return null;
              const hotelName = pin.name;
              const confNum = rd.confirmation_number || '';
              const pinCode = rd.pin || '';

              // Format date as YYYYMMDD for .ics
              const fmtDate = (d) => {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${y}${m}${dd}`;
              };
              // Format datetime as YYYYMMDDTHHMMSS (no Z — timezone handled via TZID)
              const fmtDateTime = (d, h, mn) => {
                const y = d.getFullYear();
                const mo = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(h).padStart(2, '0');
                const mm = String(mn).padStart(2, '0');
                return `${y}${mo}${dd}T${hh}${mm}00`;
              };

              const [ciH, ciM] = parseTime(rd.check_in_time, 16);
              const [coH, coM] = parseTime(rd.check_out_time, 12);

              // Timezone support
              const TZ_OPTIONS = [
                { id: 'America/New_York', label: 'Eastern (ET)' },
                { id: '_local', label: 'Local time (no TZ)' },
                { id: 'America/Chicago', label: 'Central (CT)' },
                { id: 'America/Los_Angeles', label: 'Pacific (PT)' },
                { id: 'Europe/London', label: 'London (GMT/BST)' },
                { id: 'Asia/Tokyo', label: 'Tokyo (JST)' },
              ];

              // VTIMEZONE block for common timezones (needed for strict ICS clients)
              const vtimezone = (tzid) => {
                if (tzid === '_local') return '';
                // Simplified — most calendar apps recognize TZID without full VTIMEZONE
                return '';
              };

              // Generate .ics content with timezone
              const makeICS = (events, tzid) => {
                let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//BoWander//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n';
                ics += vtimezone(tzid);
                for (const ev of events) {
                  ics += 'BEGIN:VEVENT\r\n';
                  if (ev.allDay) {
                    ics += `DTSTART;VALUE=DATE:${ev.start}\r\n`;
                    ics += `DTEND;VALUE=DATE:${ev.end}\r\n`;
                  } else if (tzid && tzid !== '_local') {
                    ics += `DTSTART;TZID=${tzid}:${ev.start}\r\n`;
                    ics += `DTEND;TZID=${tzid}:${ev.end}\r\n`;
                  } else {
                    // Floating time — no timezone, calendar interprets as user's local
                    ics += `DTSTART:${ev.start}\r\n`;
                    ics += `DTEND:${ev.end}\r\n`;
                  }
                  ics += `SUMMARY:${ev.title}\r\n`;
                  if (ev.description) ics += `DESCRIPTION:${ev.description}\r\n`;
                  if (ev.location) ics += `LOCATION:${ev.location}\r\n`;
                  ics += `UID:${Date.now()}-${Math.random().toString(36).slice(2)}@bowander\r\n`;
                  ics += 'END:VEVENT\r\n';
                }
                ics += 'END:VCALENDAR';
                return ics;
              };

              const downloadICS = (icsContent, filename) => {
                const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
              };

              // Build description strings with ICS line-break escaping
              const stayDesc = [
                confNum ? `Confirmation number: ${confNum}` : null,
                pinCode ? `PIN: ${pinCode}` : null,
              ].filter(Boolean).join('\\n');

              const checkInDesc = [
                confNum ? `Confirmation number: ${confNum}` : null,
              ].filter(Boolean).join('\\n');

              const checkOutDesc = [
                confNum ? `Confirmation number: ${confNum}` : null,
                pinCode ? `PIN: ${pinCode}` : null,
              ].filter(Boolean).join('\\n');

              // Event 1: All-day span
              const allDayEnd = checkOutDate ? new Date(checkOutDate) : new Date(checkInDate);
              if (checkOutDate) allDayEnd.setDate(allDayEnd.getDate() + 1); // ICS all-day DTEND is exclusive
              else allDayEnd.setDate(allDayEnd.getDate() + 2);
              const stayEvent = {
                allDay: true,
                start: fmtDate(checkInDate),
                end: fmtDate(allDayEnd),
                title: `Hotel: ${hotelName}`,
                description: stayDesc,
                location: pin.address || '',
              };

              // Event 2: Check-in
              const checkInEvent = {
                allDay: false,
                start: fmtDateTime(checkInDate, ciH, ciM),
                end: fmtDateTime(checkInDate, ciH, ciM),
                title: `Check In: ${hotelName}`,
                description: checkInDesc,
                location: pin.address || '',
              };

              // Event 3: Check-out
              const checkOutTarget = checkOutDate || checkInDate;
              const checkOutEvent = {
                allDay: false,
                start: fmtDateTime(checkOutTarget, coH, coM),
                end: fmtDateTime(checkOutTarget, coH, coM),
                title: `Check Out: ${hotelName}`,
                description: checkOutDesc,
                location: pin.address || '',
              };

              // Saved preference
              const savedTz = localStorage.getItem('bo_cal_timezone') || 'America/New_York';

              const CalendarSection = () => {
                const [calTz, setCalTz] = useState(savedTz);
                const [showTzPicker, setShowTzPicker] = useState(false);
                const [expanded, setExpanded] = useState(false);

                const handleTzChange = (tz) => {
                  setCalTz(tz);
                  localStorage.setItem('bo_cal_timezone', tz);
                  setShowTzPicker(false);
                };

                const tzLabel = TZ_OPTIONS.find(t => t.id === calTz)?.label || calTz;
                const slug = hotelName.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');

                return (
                  <div className="pt-2 border-t dark:border-slate-700">
                    <button

                      className="w-full flex items-center justify-between py-1 group"

                      <h4 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider flex items-center gap-1.5">
                        📅 Add to Calendar

                    {expanded && <div className="space-y-2 mt-2">
                    <div className="flex items-center justify-end">

                        🕐 {tzLabel}
                      </button>
                    </div>
                    {showTzPicker && (
                      <div className="flex flex-wrap gap-1.5 pb-1">
                        {TZ_OPTIONS.map(tz => (
                          <button
                            key={tz.id}

                            className={`px-2.5 py-1 text-xs rounded-full border transition ${
                              calTz === tz.id
                                ? 'bg-blue-100 border-blue-500 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300 dark:border-blue-600'
                                : 'border-gray-300 dark:border-slate-600 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-800'

                    <div className="flex flex-col gap-1.5">
                      <button
                        onClick={() => downloadICS(makeICS([stayEvent], calTz), `hotel-${slug}.ics`)}

                      >
                        <span>🏨</span>
                        <div>
                          <span className="font-medium">Hotel Stay</span>
                          <span className="text-xs text-blue-500 dark:text-blue-400 block">All-day: {rd.check_in} — {rd.check_out || '...'}</span>
                        </div>
                      </button>
                      <button
                        onClick={() => downloadICS(makeICS([checkInEvent], calTz), `checkin-${slug}.ics`)}
                        className="flex items-center gap-2 px-3 py-2 text-sm bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-300 rounded-lg hover:bg-green-100 dark:hover:bg-green-900/30 transition text-left"
                      >
                        <span>📥</span>
                        <div>
                          <span className="font-medium">Check In</span>
                          <span className="text-xs text-green-500 dark:text-green-400 block">{rd.check_in} at {rd.check_in_time || '4:00 PM'}</span>
                        </div>
                      </button>
                      <button
                        onClick={() => downloadICS(makeICS([checkOutEvent], calTz), `checkout-${slug}.ics`)}
                        className="flex items-center gap-2 px-3 py-2 text-sm bg-orange-50 dark:bg-orange-900/20 text-orange-700 dark:text-orange-300 rounded-lg hover:bg-orange-100 dark:hover:bg-orange-900/30 transition text-left"
                      >
                        <span>📤</span>
                        <div>
                          <span className="font-medium">Check Out</span>
                          <span className="text-xs text-orange-500 dark:text-orange-400 block">{rd.check_out || rd.check_in} at {rd.check_out_time || '12:00 PM'}</span>
                        </div>
                      </button>
                      <button
                        onClick={() => downloadICS(makeICS([stayEvent, checkInEvent, checkOutEvent], calTz), `stay-${slug}.ics`)}
                        className="flex items-center gap-2 px-3 py-1.5 text-xs text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition"
                      >
                        <span>📅</span> Add all 3 events at once
                      </button>
                    </div>
                    </div>}
                  </div>
                );
              };

              return <CalendarSection />;
            })()}

            {/* Opening Hours — view only */}
            {!editing && Object.keys(pin.opening_hours || {}).length > 0 && (
              <div className="space-y-2">
                <div className="flex items-center gap-2">
                  <span className={`inline-block w-2 h-2 rounded-full ${openStatus.status === 'open' ? 'bg-green-500' : 'bg-red-500'}`} />
                  <span className={`text-sm font-semibold ${openStatus.status === 'open' ? 'text-green-600' : 'text-red-600'}`}>
                    {openStatus.label}
                  </span>
                </div>
                <div className="space-y-1">
                  {['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'].map(day => {
                    const today = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][new Date().getDay()];
                    const isToday = day === today;
                    return (
                      <div key={day} className={`text-xs flex justify-between ${isToday ? 'font-bold text-gray-900 dark:text-white' : 'text-gray-600 dark:text-gray-400'}`}>
                        <span className="font-medium">{dayName(day)}{isToday ? ' (today)' : ''}</span>
                        <span>{pin.opening_hours[day] || 'Closed'}</span>

                </div>
              </div>
            )}

            {/* Ratings — always read-only */}
            {(pin.google_rating || pin.yelp_rating) && (
              <div className="space-y-2 pt-2 border-t dark:border-slate-700">
                {pin.google_rating && (
                  <div className="flex items-center justify-between">
                    <div className="flex-1">
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-semibold text-gray-600 dark:text-gray-400">Google</span>
                        <span className="text-amber-400">⭐</span>

                        {pin.price_level && (

                      </div>
                    </div>
                    <div className="flex items-center gap-2 ml-2">
                      {pin.website && (
                        <a href={pin.website} target="_blank" rel="noopener noreferrer"
                          className="text-blue-600 dark:text-blue-400 text-xs hover:underline whitespace-nowrap">
                          Website
                        </a>
                      )}
                      <a
                        href={pin.google_maps_url || `https://www.google.com/maps/search/${encodeURIComponent(pin.name)}`}
                        target="_blank" rel="noopener noreferrer"
                        className="text-blue-600 dark:text-blue-400 text-xs hover:underline whitespace-nowrap"
                      >

                      </a>
                    </div>

                )}
                {pin.yelp_rating && (
                  <div className="flex items-center justify-between">
                    <div className="flex-1">
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-semibold text-gray-600 dark:text-gray-400">Yelp</span>
                        <span className="text-amber-400">⭐</span>
                        <span className="text-xs font-semibold text-gray-800 dark:text-gray-200">
                          {pin.yelp_rating.toFixed(1)}

                          · {pin.yelp_reviews_count?.toLocaleString() || 0} reviews

                      </div>
                    </div>
                    <a
                      href={`https://www.yelp.com/search?find_desc=${encodeURIComponent(pin.name)}`}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="text-blue-600 dark:text-blue-400 text-xs hover:underline whitespace-nowrap ml-2"
                    >
                      View
                    </a>
                  </div>
                )}
              </div>

            {!editing && !pin.google_rating && !pin.yelp_rating && (
              <div className="pt-2 border-t dark:border-slate-700 space-y-2">
                {fetchingRatings ? (
                  <div>

                      <a

            {/* Action Buttons */}

          {showEmojiPicker && (

    };

    // Unified search bar — searches existing pins + Photon (Komoot) for places/businesses
    const UnifiedSearchBar = ({ pins, onSelectPin, onAddPlace, onUploadConfirmation, onAddFromLink, isDarkMode, isMobile, activeCollection, collections, mapCenter }) => {
      const [query, setQuery] = useState('');
      const [placeResults, setPlaceResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [isFocused, setIsFocused] = useState(false);
      const timerRef = useRef(null);
      const searchIdRef = useRef(0); // track search requests to avoid stale results
      const containerRef = useRef(null);
      const inputWrapRef = useRef(null);
      const dropdownRef = useRef(null);
      const [dropdownPos, setDropdownPos] = useState(null);

      // Search using Photon API + Google Places API for businesses
      const doPlaceSearch = useCallback(async (q) => {
        if (q.length < 2) { setPlaceResults([]); return; }
        setSearching(true);
        const searchId = ++searchIdRef.current;

        try {
          // Build Photon URL with location bias
          let photonUrl = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5`;
          if (mapCenter && mapCenter.lat && mapCenter.lng) {
            photonUrl += `&lat=${mapCenter.lat}&lon=${mapCenter.lng}`;
          }

          // Search Photon and Google in parallel
          const [photonResp, googleResults] = await Promise.all([
            fetch(photonUrl).then(r => r.json()).catch(() => ({ features: [] })),
            (async () => {
              const apiKey = getGoogleApiKey();
              console.log('[BoWander Search] Google API key:', apiKey ? `${apiKey.substring(0,10)}...` : 'NONE');
              if (!apiKey) return [];
              try {
                const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'X-Goog-Api-Key': apiKey,
                    'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.location,places.types'
                  },
                  body: JSON.stringify({
                    textQuery: q,
                    maxResultCount: 5,
                    ...(mapCenter?.lat ? { locationBias: { circle: { center: { latitude: mapCenter.lat, longitude: mapCenter.lng }, radius: 50000.0 }}} : {})
                  })
                });
                console.log('[BoWander Search] Google Places response:', resp.status);
                if (!resp.ok) {
                  const errText = await resp.text();
                  console.error('[BoWander Search] Google Places error:', errText);
                  return [];
                }
                const data = await resp.json();
                console.log('[BoWander Search] Google Places results:', data.places?.length || 0, data);
                return (data.places || []).map(p => ({
                  name: p.displayName?.text || '',
                  address: p.formattedAddress || '',
                  lat: p.location?.latitude,
                  lng: p.location?.longitude,
                  type: p.types?.[0] || '',
                  source: 'google',
                })).filter(r => r.name && r.lat && r.lng);
              } catch (e) { console.error('[BoWander Search] Google fetch error:', e); return []; }
            })()
          ]);

          if (searchId !== searchIdRef.current) return;

          console.log('[BoWander Search] Photon results:', photonResp.features?.length || 0, 'Google results:', googleResults.length);

          // Parse Photon results
          const photonResults = (photonResp.features || []).map(f => {
            const p = f.properties || {};
            const geo = f.geometry?.coordinates || [];
            const name = p.name || p.street || '';
            const parts = [p.street, p.housenumber].filter(Boolean).join(' ');
            const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
            return {
              name, address: [parts || name, locality].filter(Boolean).join(', '),
              lat: geo[1], lng: geo[0],
              type: p.osm_value || p.osm_key || '', osmType: p.osm_type || '',
              source: 'osm',
            };
          }).filter(r => r.name && r.lat && r.lng);

          // Merge: Google first (better for businesses), then Photon, deduplicate
          const seen = new Set();
          const merged = [];
          for (const r of [...googleResults, ...photonResults]) {
            const key = r.name.toLowerCase().trim();
            if (!seen.has(key)) {
              seen.add(key);
              merged.push(r);
            }
          }

          setPlaceResults(merged.slice(0, 8));
        } catch {}
        if (searchId === searchIdRef.current) setSearching(false);
      }, [mapCenter]);

      const handleInput = (val) => {
        setQuery(val);
        // Clear stale results immediately when query changes
        if (val.length < 2) {
          setPlaceResults([]);
          setSearching(false);
        }
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => doPlaceSearch(val), 300);
      };

      // Filter and sort existing pins — current collection first, then others
      const matchingPins = useMemo(() => {
        if (!query || query.length < 2) return [];
        const q = query.toLowerCase();
        const matches = pins.filter(p =>
          p.name.toLowerCase().includes(q) ||
          p.address?.toLowerCase().includes(q) ||
          p.source_name?.toLowerCase().includes(q)
        );
        // Sort: current collection first, then alphabetical
        matches.sort((a, b) => {
          const aInCollection = a.collection_id === activeCollection ? 0 : 1;
          const bInCollection = b.collection_id === activeCollection ? 0 : 1;
          if (aInCollection !== bInCollection) return aInCollection - bInCollection;
          // Within same group, prefer name match over address/source match
          const aNameMatch = a.name.toLowerCase().includes(q) ? 0 : 1;
          const bNameMatch = b.name.toLowerCase().includes(q) ? 0 : 1;
          if (aNameMatch !== bNameMatch) return aNameMatch - bNameMatch;
          return a.name.localeCompare(b.name);
        });
        return matches.slice(0, 8);
      }, [query, pins, activeCollection]);

      const showDropdown = isFocused && query.length >= 2 && (matchingPins.length > 0 || placeResults.length > 0 || searching);

      // Update dropdown position when it should show
      useEffect(() => {
        if (inputWrapRef.current && showDropdown) {
          const rect = inputWrapRef.current.getBoundingClientRect();
          setDropdownPos({ top: rect.bottom, left: rect.left, width: rect.width });
        }
      }, [showDropdown]);

      // Close on outside click (check both container and portaled dropdown)
      useEffect(() => {
        const handler = (e) => {
          const inContainer = containerRef.current && containerRef.current.contains(e.target);
          const inDropdown = dropdownRef.current && dropdownRef.current.contains(e.target);
          if (!inContainer && !inDropdown) {
            setIsFocused(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const dropdownContent = showDropdown && dropdownPos ? ReactDOM.createPortal(
        <div
          ref={dropdownRef}
          className={`bg-white dark:bg-slate-800 border border-t-0 dark:border-slate-600 rounded-b-lg shadow-xl overflow-hidden`}
          style={{ position: 'fixed', top: dropdownPos.top, left: dropdownPos.left, width: dropdownPos.width, zIndex: 10002 }}
        >
          <div className="max-h-72 overflow-y-auto">
            {/* Matching existing pins */}
            {matchingPins.length > 0 && (
              <div className="px-3 py-1.5 text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide bg-gray-50 dark:bg-slate-750">Your places</div>
            )}
            {matchingPins.map(pin => {
              const catData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
              return (
                <button
                  key={pin.id}
                  className="w-full text-left px-2.5 py-1.5 hover:bg-blue-50 dark:hover:bg-slate-700 transition flex items-center gap-2 border-b dark:border-slate-700"
                  onClick={() => {
                    onSelectPin(pin);
                    setQuery('');
                    setIsFocused(false);
                    setPlaceResults([]);
                  }}
                >
                  {isCustomIcon(pin.emoji) ? (
                    <img src={pin.emoji} alt="" className="w-5 h-5 rounded-full object-cover flex-shrink-0" />
                  ) : (
                    <span className="text-sm flex-shrink-0">{pin.emoji}</span>
                  )}
                  <span className="font-medium text-sm dark:text-white truncate">{pin.name}</span>
                  <span className="text-xs text-gray-400 truncate ml-auto flex-shrink-0">{catData.label}</span>
                </button>
              );
            })}

            {/* Place search results */}
            {placeResults.length > 0 && (
              <div className="px-2.5 py-1 text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide bg-gray-50 dark:bg-slate-750">Search results</div>
            )}
            {placeResults.map((r, i) => (
              <button
                key={`place-${i}`}
                className="w-full text-left px-2.5 py-1.5 hover:bg-blue-50 dark:hover:bg-slate-700 transition flex items-center gap-2 border-b dark:border-slate-700"
                onClick={() => {
                  onAddPlace(r);
                  setQuery('');
                  setIsFocused(false);
                  setPlaceResults([]);
                }}
              >
                <span className="text-gray-400 text-sm flex-shrink-0">📍</span>
                <span className="font-medium text-sm dark:text-white truncate">{r.name}</span>
                <span className="text-xs text-gray-400 truncate ml-auto flex-shrink-0">{r.address.split(',').slice(0, 2).join(',')}</span>
              </button>
            ))}

            {searching && <div className="px-3 py-3 text-sm text-gray-400 text-center animate-pulse">Searching places...</div>}
          </div>

          {/* Action row at bottom */}
          <div className="border-t dark:border-slate-700 flex">
            <button
              className="flex-1 px-3 py-2 text-xs text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-slate-700 flex items-center justify-center gap-1"
              onClick={() => {
                onAddFromLink();
                setIsFocused(false);
                setQuery('');
              }}
            >
              🔗 Add from link
            </button>
            <button
              className="flex-1 px-3 py-2 text-xs text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-slate-700 flex items-center justify-center gap-1 border-l dark:border-slate-700"
              onClick={() => {
                onUploadConfirmation();
                setIsFocused(false);
                setQuery('');
              }}
            >
              ⬆️ Upload file
            </button>
          </div>
        </div>,
        document.body
      ) : null;

      return (
        <div className="flex-1 flex justify-center px-4" ref={containerRef}>
          <div className="relative w-full max-w-lg" ref={inputWrapRef}>
            <div className="relative flex items-center">
              <span className="absolute left-3 text-gray-400 text-sm"><SearchIcon /></span>
              <input
                type="text"
                placeholder="Search your places or find new ones..."
                value={query}
                onChange={e => handleInput(e.target.value)}
                onFocus={() => setIsFocused(true)}
                className={`w-full px-3 py-2 pl-9 pr-8 border text-sm dark:bg-slate-700 dark:border-slate-600 dark:text-white focus:ring-2 focus:ring-blue-500 ${showDropdown ? 'rounded-t-lg border-b-0' : 'rounded-lg'}`}
              />
              {query && (
                <button onClick={() => { setQuery(''); setPlaceResults([]); }} className="absolute right-3 text-gray-400 hover:text-gray-600 text-xs">✕</button>
              )}
              {searching && <span className="absolute right-8 text-gray-400 text-xs animate-pulse">...</span>}
            </div>
            {dropdownContent}
          </div>
        </div>
      );
    };

    // Place search via Photon API
    const PlaceSearch = ({ onSelectPlace, isDarkMode }) => {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const timerRef = useRef(null);

      // Search Google Places API
      const searchGoogle = useCallback(async (q) => {
        const apiKey = getGoogleApiKey();
        if (!apiKey) return [];
        try {
          const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Goog-Api-Key': apiKey,
              'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.location,places.types'
            },
            body: JSON.stringify({ textQuery: q, maxResultCount: 5 })
          });
          if (!resp.ok) return [];
          const data = await resp.json();
          return (data.places || []).map(p => ({
            name: p.displayName?.text || '',
            address: p.formattedAddress || '',
            lat: p.location?.latitude,
            lng: p.location?.longitude,
            type: p.types?.[0] || '',
            source: 'google',
          })).filter(r => r.name && r.lat && r.lng);
        } catch { return []; }
      }, []);

      const doSearch = useCallback(async (q) => {
        if (q.length < 2) { setResults([]); return; }
        setSearching(true);
        try {
          // Search Photon (OSM) first
          const photonResp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5`);
          const photonData = await photonResp.json();
          const photonResults = (photonData.features || []).map(f => {
            const p = f.properties || {};
            const geo = f.geometry?.coordinates || [];
            const name = p.name || p.street || '';
            const parts = [p.street, p.housenumber].filter(Boolean).join(' ');
            const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
            return {
              name,
              address: [parts || name, locality].filter(Boolean).join(', '),
              lat: geo[1],
              lng: geo[0],
              type: p.osm_value || p.osm_key || '',
              source: 'osm',
            };
          }).filter(r => r.name && r.lat && r.lng);

          // Also search Google Places for businesses
          const googleResults = await searchGoogle(q);

          // Merge: Google results first (better for businesses), then Photon, deduplicate by name
          const seen = new Set();
          const merged = [];
          for (const r of [...googleResults, ...photonResults]) {
            const key = r.name.toLowerCase().trim();
            if (!seen.has(key)) {
              seen.add(key);
              merged.push(r);
            }
          }
          setResults(merged.slice(0, 8));
        } catch {
          setResults([]);
        }
        setSearching(false);
      }, [searchGoogle]);

      const handleInput = (val) => {
        setQuery(val);
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => doSearch(val), 400);
      };

      return (
        <div className="space-y-2">
          <div className="relative">
            <input
              type="text"
              value={query}
              onChange={e => handleInput(e.target.value)}
              placeholder="Search for a place (e.g. Brooklyn Granary & Mill)..."
              className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white pr-8"
              autoFocus
            />
            {searching && <span className="absolute right-3 top-2.5 text-gray-400 text-sm animate-pulse">...</span>}
          </div>
          {results.length > 0 && (
            <div className="max-h-60 overflow-y-auto border rounded-lg dark:border-slate-700 divide-y dark:divide-slate-700">
              {results.map((r, i) => (
                <button
                  key={i}
                  onClick={() => onSelectPlace(r)}
                  className="w-full text-left px-3 py-2.5 hover:bg-blue-50 dark:hover:bg-slate-700 transition"
                >
                  <p className="font-medium text-sm dark:text-white">{r.name}</p>
                  <p className="text-xs text-gray-500 dark:text-gray-400 truncate">{r.address}</p>
                </button>
              ))}
            </div>
          )}
          {query.length >= 3 && !searching && results.length === 0 && (
            <p className="text-xs text-gray-500 dark:text-gray-400 text-center py-2">No results found. You can add manually below.</p>
          )}
        </div>
      );
    };

    const AddFromLinkModal = ({ onSelect, onClose, isDarkMode }) => {
      const [url, setUrl] = useState('');
      const [fetching, setFetching] = useState(false);
      const [preview, setPreview] = useState(null); // { name, description, source_name, source_url }
      const [error, setError] = useState('');

      const handleFetch = async () => {
        if (!url.trim()) { setError('Please enter a URL'); return; }
        setError('');
        setFetching(true);

        try {
          const urlObj = new URL(url);
          const domainName = urlObj.hostname.replace('www.', '');

          // Try to extract info from the URL structure
          const pathParts = urlObj.pathname.split('/').filter(Boolean);
          let guessedName = '';

          // Try common URL patterns: /place/place-name, /restaurant/name, etc.
          const lastPart = pathParts[pathParts.length - 1] || '';
          guessedName = lastPart
            .replace(/[-_]/g, ' ')
            .replace(/\.(html|php|aspx)$/i, '')
            // Remove date patterns, common article words, location/city names at end
            .replace(/^\d{4}\s+\d{2}\s+\d{2}\s+/, '')
            .replace(/\s+(restaurant|bar|cafe|hotel|nyc|opening|review|first look|new|best|top|guide|where to eat|where to stay)\b.*/i, '')
            .replace(/\b(nyc|la|sf|london|paris|tokyo)\b\s*/ig, '')
            .trim()
            .replace(/\b\w/g, c => c.toUpperCase());

          // Source-specific name extraction
          if (domainName.includes('yelp.com')) {
            guessedName = pathParts.find(p => !['biz', 'www'].includes(p))?.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) || guessedName;
          } else if (domainName.includes('tripadvisor')) {
            guessedName = lastPart.replace(/-.*Reviews-/, '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          } else if (domainName.includes('google.com/maps')) {
            const placeMatch = url.match(/place\/([^/]+)/);
            if (placeMatch) guessedName = decodeURIComponent(placeMatch[1]).replace(/\+/g, ' ');
          }

          // Try to fetch page title via allorigins CORS proxy
          let fetchedTitle = '';
          try {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(5000) });
            const data = await resp.json();
            if (data.contents) {
              const titleMatch = data.contents.match(/<title[^>]*>([^<]+)<\/title>/i);
              if (titleMatch) {
                fetchedTitle = titleMatch[1]
                  .replace(/\s*[|\-–—]\s*(Yelp|TripAdvisor|Google Maps|Lonely Planet|Eater|Booking\.com|Airbnb|Hotels\.com).*$/i, '')
                  .trim();
                // For blog/article URLs, try to extract the actual place name
                // Common patterns: "Place Name: Rest of article title", "Place Name - Description"
                // Also handle slug-based titles with location keywords
                if (fetchedTitle) {
                  // Remove common article prefixes
                  fetchedTitle = fetchedTitle
                    .replace(/^(review|first look|just opened|now open|new opening)[:\s-]*/i, '')
                    .replace(/\s*(restaurant|bar|cafe|hotel|opens?|opening|review|first look|in\s+\w+|\d{4})\s*$/i, '')
                    .trim();
                  // If title has a colon or dash separator, take the first meaningful part
                  const separatorMatch = fetchedTitle.match(/^([^:–—|]+?)\s*[:–—|]\s*/);
                  if (separatorMatch && separatorMatch[1].length >= 3) {
                    fetchedTitle = separatorMatch[1].trim();
                  }
                }
              }
              // Try to get meta description
              const descMatch = data.contents.match(/<meta[^>]*name=["']description["'][^>]*content=["']([^"']+)["']/i);
              if (descMatch) {
                preview?.description || setPreview(prev => prev ? { ...prev, description: descMatch[1] } : null);
              }
            }
          } catch {}

          const finalName = fetchedTitle || guessedName || '';
          setPreview({
            name: finalName,
            description: '',
            source_name: domainName,
            source_url: url,
            emoji: guessEmojiAndCategory(finalName, '').emoji
          });
        } catch (e) {
          setError('Invalid URL — make sure it starts with https://');
        }
        setFetching(false);
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 9999 }}>
          <div
            className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-md shadow-2xl`}
            onClick={e => e.stopPropagation()}
          >
            <div className="p-6 space-y-4 max-h-[85vh] overflow-y-auto">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-bold dark:text-white">Add from Link</h2>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded">
                  <CloseIcon />
                </button>
              </div>

              {!preview ? (
                <div className="space-y-3">
                  <p className="text-sm text-gray-600 dark:text-gray-400">Paste a link from Yelp, Google Maps, TripAdvisor, or any travel site</p>
                  <input
                    type="url"
                    value={url}
                    onChange={e => { setUrl(e.target.value); setError(''); }}
                    placeholder="https://www.yelp.com/biz/..."
                    className="w-full px-3 py-3 border-2 rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm focus:border-blue-500"
                    autoFocus
                    onKeyDown={e => e.key === 'Enter' && handleFetch()}
                  />
                  {error && <p className="text-xs text-red-500">{error}</p>}
                  <button
                    onClick={handleFetch}
                    disabled={fetching}
                    className="w-full px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium disabled:opacity-50"
                  >
                    {fetching ? 'Fetching...' : 'Fetch & Preview'}
                  </button>
                </div>
              ) : (
                <div className="space-y-3">
                  <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-3">
                    <p className="text-xs text-blue-600 dark:text-blue-400 truncate">🔗 {preview.source_url}</p>
                    <p className="text-xs text-blue-500 mt-0.5">Source: {preview.source_name}</p>
                  </div>
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Place Name *</label>
                    <input
                      type="text"
                      value={preview.name}
                      onChange={e => setPreview(p => ({ ...p, name: e.target.value }))}
                      placeholder="Place name"
                      className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white"
                      autoFocus
                    />
                  </div>
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Description</label>
                    <textarea
                      value={preview.description}
                      onChange={e => setPreview(p => ({ ...p, description: e.target.value }))}
                      placeholder="Add details about this place"
                      className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm"
                      rows={2}
                    />
                  </div>
                  <div className="flex gap-2 pt-2">
                    <button
                      onClick={() => setPreview(null)}
                      className="flex-1 px-4 py-2 border rounded-lg text-gray-700 dark:text-gray-300 dark:border-slate-600 hover:bg-gray-100 dark:hover:bg-slate-700 font-medium text-sm"
                    >
                      ← Back
                    </button>
                    <button
                      onClick={() => {
                        if (!preview.name.trim()) { alert('Please enter a name'); return; }
                        onSelect(preview);
                      }}
                      className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium text-sm"
                    >
                      Add Place
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // Parse confirmation text to extract hotel/booking details
    const parseConfirmationText = (text) => {
      const result = {
        propertyName: '', address: '', checkIn: '', checkOut: '',
        checkInTime: '', checkOutTime: '',
        confirmationNumber: '', pin: '', bookingSource: '', roomType: '', price: '',
        includesBreakfast: 'unknown'
      };
      if (!text) return result;
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const full = text.replace(/\n/g, ' ');

      // Booking source detection
      const sourcePatterns = [
        [/booking\.com/i, 'Booking.com'], [/airbnb/i, 'Airbnb'], [/expedia/i, 'Expedia'],
        [/hotels\.com/i, 'Hotels.com'], [/vrbo/i, 'VRBO'], [/marriott/i, 'Marriott'],
        [/hilton/i, 'Hilton'], [/hyatt/i, 'Hyatt'], [/agoda/i, 'Agoda'],
        [/trip\.com|ctrip/i, 'Trip.com'], [/priceline/i, 'Priceline'], [/hostelworld/i, 'Hostelworld'],
      ];
      for (const [pat, name] of sourcePatterns) {
        if (pat.test(full)) { result.bookingSource = name; break; }
      }

      // Confirmation / reservation number
      const confMatch = full.match(/(?:confirmation|booking|reservation|reference|itinerary)\s*(?:#|number|no\.?|code)?[:\s]*([A-Z0-9][-A-Z0-9]{4,20})/i);
      if (confMatch) result.confirmationNumber = confMatch[1].trim();

      // PIN code (common on Booking.com)
      const pinMatch = full.match(/(?:pin|pin\s*code)[:\s]+(\d{4,8})/i);
      if (pinMatch) result.pin = pinMatch[1].trim();

      // Check-in / check-out times
      // Strategy 1: Booking.com format — "Check-in Wednesday, May 6, 2026 (3:00 PM - 10:00 PM)"
      // For check-in ranges, take the EARLY (first) time; for check-out ranges, take the LATE (last) time
      const ciParenMatch = full.match(/check[\s-]?in[^()]*\(([^)]+)\)/i);
      if (ciParenMatch) {
        const ciTimes = ciParenMatch[1].match(/(\d{1,2}\s*:\s*\d{2}\s*(?:AM|PM))/gi);
        if (ciTimes) result.checkInTime = ciTimes[0].replace(/\s+/g, ' ').trim(); // earliest
      }
      const coParenMatch = full.match(/check[\s-]?out[^()]*\(([^)]+)\)/i);
      if (coParenMatch) {
        const coTimes = coParenMatch[1].match(/(\d{1,2}\s*:\s*\d{2}\s*(?:AM|PM))/gi);
        if (coTimes) result.checkOutTime = coTimes[coTimes.length - 1].replace(/\s+/g, ' ').trim(); // latest
      }
