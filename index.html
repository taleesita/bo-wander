              )}
            </div>
          </div>
        </div>
      );
    };

    const UploadConfirmationModal = ({ onSelect, onClose, isDarkMode, onMapCenter, onPreviewPin, onKMLImport, collectionId, onTransportSaved }) => {
      const [step, setStep] = useState('upload'); // 'upload' | 'review'
      const [bookingType, setBookingTypeRaw] = useState('hotel'); // 'hotel' | 'activity' | 'flight' | 'train' | 'transfer'
      const [dragging, setDragging] = useState(false);
      const [extractedText, setExtractedText] = useState('');
      const [processing, setProcessing] = useState(false);
      const [fileName, setFileName] = useState('');
      const [fileDataUrl, setFileDataUrl] = useState(''); // base64 of uploaded file for storage
      const [fileThumbnail, setFileThumbnail] = useState(''); // thumbnail preview
      // Activity/tour fields
      const [tourName, setTourName] = useState('');
      const [tourOperator, setTourOperator] = useState('');
      const [activityDate, setActivityDate] = useState('');
      const [activityTime, setActivityTime] = useState('');
      const [duration, setDuration] = useState('');
      const [contactInfo, setContactInfo] = useState('');
      const [activityDescription, setActivityDescription] = useState('');
      // Shared + hotel fields
      const [propertyName, setPropertyName] = useState('');
      const [address, setAddress] = useState('');
      const [checkIn, setCheckIn] = useState('');
      const [checkOut, setCheckOut] = useState('');
      const [confirmationNumber, setConfirmationNumber] = useState('');
      const [pin, setPin] = useState('');
      const [bookingSource, setBookingSource] = useState('');
      const [roomType, setRoomType] = useState('');
      const [price, setPrice] = useState('');
      const [checkInTime, setCheckInTime] = useState('');
      const [checkOutTime, setCheckOutTime] = useState('');
      const [includesBreakfast, setIncludesBreakfast] = useState('unknown');
      const [addressSuggestions, setAddressSuggestions] = useState([]);
      const [geocodingName, setGeocodingName] = useState(false);
      const [resolvedLat, setResolvedLat] = useState(0);
      const [resolvedLng, setResolvedLng] = useState(0);
      const [usdPrice, setUsdPrice] = useState('');
      const [exchangeRate, setExchangeRate] = useState(null);
      const [exchangeRateDate, setExchangeRateDate] = useState('');
      const [priceCurrency, setPriceCurrency] = useState('');
      // Transport fields (flight/train/transfer)
      const [transportFrom, setTransportFrom] = useState('');
      const [transportTo, setTransportTo] = useState('');
      const [departTime, setDepartTime] = useState('');
      const [arriveTime, setArriveTime] = useState('');
      const [carrier, setCarrier] = useState('');
      const [seat, setSeat] = useState('');
      const [passengers, setPassengers] = useState('');
      const [transportNotes, setTransportNotes] = useState('');
      const [transportDate, setTransportDate] = useState('');
      const geocodeTimerRef = useRef(null);
      const fileInputRef = useRef(null);

      // Normalize date string to YYYY-MM-DD for <input type="date">
      const toISODate = (str) => {
        if (!str) return '';
        // Already ISO format
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
        const d = new Date(str);
        if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
        return str; // fallback to original if unparseable
      };
      // Normalize time string to HH:MM for <input type="time">
      const toISOTime = (str) => {
        if (!str) return '';
        // Already 24h format
        if (/^\d{2}:\d{2}$/.test(str)) return str;
        const m12 = str.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
        if (m12) {
          let h = parseInt(m12[1]);
          if (m12[3].toUpperCase() === 'PM' && h !== 12) h += 12;
          if (m12[3].toUpperCase() === 'AM' && h === 12) h = 0;
          return String(h).padStart(2, '0') + ':' + m12[2];
        }
        const m24 = str.match(/(\d{1,2}):(\d{2})/);
        if (m24) return String(parseInt(m24[1])).padStart(2, '0') + ':' + m24[2];
        return str;
      };

      // When user switches booking type, re-parse the extracted text into the right fields
      const setBookingType = useCallback((newType) => {
        setBookingTypeRaw(newType);
        if (!extractedText) return;
        if (['flight', 'train', 'transfer'].includes(newType)) {
          const parsed = parseTransportText(extractedText);
          parsed.type = newType;
          setTransportFrom(parsed.from);
          setTransportTo(parsed.to);
          setTransportDate(parsed.date ? toISODate(parsed.date) : '');
          setDepartTime(parsed.departure_time ? toISOTime(parsed.departure_time) : '');
          setArriveTime(parsed.arrival_time ? toISOTime(parsed.arrival_time) : '');
          setCarrier(parsed.carrier);
          setSeat(parsed.seat);
          setConfirmationNumber(parsed.confirmation);
          setPassengers(parsed.passengers);
          setPrice(parsed.cost);
          setTransportNotes(parsed.notes);
          setTourName(parsed.title);
          return;
        }
        if (newType === 'activity') {
          const parsed = parseActivityText(extractedText);
          setTourName(parsed.tourName || propertyName); // fallback: use hotel name as tour name
          setTourOperator(parsed.tourOperator);
          setBookingSource(prev => parsed.bookingSite || prev);
          setConfirmationNumber(prev => parsed.confirmationNumber || prev);
          setActivityDate(toISODate(parsed.date || checkIn));
          setActivityTime(toISOTime(parsed.time || checkInTime));
          setDuration(parsed.duration);
          setContactInfo(parsed.contactInfo);
          setActivityDescription(parsed.description);
          setAddress(prev => parsed.address || prev);
          setPrice(prev => parsed.price || prev);
          if (parsed.address || parsed.tourName || propertyName) {
            geocodeHotelName(parsed.address || parsed.tourName || propertyName, parsed.address || address);
          }
        } else {
          const parsed = parseConfirmationText(extractedText);
          setPropertyName(prev => parsed.propertyName || tourName || prev);
          setAddress(prev => parsed.address || prev);
          setCheckIn(toISODate(parsed.checkIn || activityDate));
          setCheckOut(toISODate(parsed.checkOut));
          setCheckInTime(toISOTime(parsed.checkInTime || activityTime));
          setCheckOutTime(toISOTime(parsed.checkOutTime));
          setConfirmationNumber(prev => parsed.confirmationNumber || prev);
          setPin(parsed.pin);
          setBookingSource(prev => parsed.bookingSource || prev);
          setRoomType(parsed.roomType);
          setPrice(prev => parsed.price || prev);
          setIncludesBreakfast(parsed.includesBreakfast);
          if (parsed.propertyName || tourName) {
            geocodeHotelName(parsed.propertyName || tourName, parsed.address || address);
          }
        }
      }, [extractedText, propertyName, tourName, checkIn, checkInTime, activityDate, activityTime, address]);

      // Detect currency from price string and fetch USD conversion
      const CURRENCY_SYMBOLS = { '$': 'USD', 'вӮ¬': 'EUR', 'ВЈ': 'GBP', 'ВҘ': 'JPY', 'вӮ№': 'INR', 'вӮ©': 'KRW', 'аёҝ': 'THB', 'вӮ«': 'VND', 'вӮұ': 'PHP', 'R$': 'BRL', 'kr': 'SEK' };
      const CURRENCY_CODES = { USD: 1, EUR: 1, GBP: 1, JPY: 1, INR: 1, KRW: 1, THB: 1, VND: 1, PHP: 1, BRL: 1, SEK: 1, AUD: 1, CAD: 1, CHF: 1, CNY: 1, NZD: 1, MXN: 1, SGD: 1, HKD: 1, TWD: 1, CZK: 1, PLN: 1, DKK: 1, NOK: 1, HUF: 1, ILS: 1, ZAR: 1, MYR: 1, IDR: 1, ARS: 1, CLP: 1, COP: 1, PEN: 1 };

      const detectCurrency = (priceStr) => {
        if (!priceStr) return null;
        for (const [sym, code] of Object.entries(CURRENCY_SYMBOLS)) {
          if (priceStr.includes(sym)) return code;
        }
        const codeMatch = priceStr.match(/([A-Z]{3})/);
        if (codeMatch && CURRENCY_CODES[codeMatch[1]]) return codeMatch[1];
        return null;
      };

      const extractNumericPrice = (priceStr) => {
        if (!priceStr) return 0;
        const cleaned = priceStr.replace(/[^0-9.,]/g, '');
        // Handle comma as thousands separator (e.g., ВҘ561,600)
        const num = parseFloat(cleaned.replace(/,/g, ''));
        return isNaN(num) ? 0 : num;
      };

      const fetchExchangeRate = useCallback(async (currency, dateStr, priceVal) => {
        console.log('[BoWander FX] fetchExchangeRate called:', currency, dateStr, priceVal);
        if (!currency || currency === 'USD') {
          setUsdPrice(''); setExchangeRate(null); setPriceCurrency('');
          return;
        }
        setPriceCurrency(currency);
        try {
          // Try check-in date first, fallback to latest
          let apiDate = 'latest';
          if (dateStr) {
            const d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
              const today = new Date();
              if (d <= today) {
                apiDate = d.toISOString().split('T')[0];
              }
            }
          }
          const url = `https://api.frankfurter.app/${apiDate}?from=${currency}&to=USD`;
          console.log('[BoWander FX] fetching:', url);
          const resp = await fetch(url);
          const data = await resp.json();
          console.log('[BoWander FX] response:', data);
          if (data.rates?.USD) {
            setExchangeRate(data.rates.USD);
            setExchangeRateDate(data.date || apiDate);
            const numPrice = extractNumericPrice(priceVal);
            if (numPrice > 0) {
              const usd = '$' + (numPrice * data.rates.USD).toFixed(2);
              console.log('[BoWander FX] converted:', priceVal, '->', usd);
              setUsdPrice(usd);
            }
          }
        } catch (err) {
          console.error('[BoWander FX] error:', err);
        }
      }, []);

      // Geocode hotel name to get address (like add places)
      const geocodeHotelName = useCallback(async (name, currentAddress) => {
        console.log('[BoWander Geocode] called with:', name, 'currentAddress:', currentAddress);
        if (!name || name.length < 3) { setAddressSuggestions([]); return; }
        setGeocodingName(true);
        try {
          // Search Google Places + Photon in parallel (same as main search bar)
          const [photonResp, googleResults] = await Promise.all([
            fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(name)}&limit=5`).then(r => r.json()).catch(() => ({ features: [] })),
            (async () => {
              const apiKey = getGoogleApiKey();
              if (!apiKey) return [];
              try {
                const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'X-Goog-Api-Key': apiKey,
                    'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.location,places.types'
                  },
                  body: JSON.stringify({ textQuery: name, maxResultCount: 5 })
                });
                if (!resp.ok) return [];
                const data = await resp.json();
                return (data.places || []).map(p => ({
                  name: p.displayName?.text || '',
                  address: p.formattedAddress || '',
                  lat: p.location?.latitude,
                  lng: p.location?.longitude,
                  source: 'google',
                })).filter(r => r.name && r.lat && r.lng);
              } catch { return []; }
            })()
          ]);

          // Parse Photon results
          const photonResults = (photonResp.features || []).map(f => {
            const p = f.properties || {};
            const parts = [p.street, p.housenumber].filter(Boolean).join(' ');
            const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
            return {
              address: [parts || p.name, locality].filter(Boolean).join(', '),
              lat: f.geometry?.coordinates?.[1] || 0,
              lng: f.geometry?.coordinates?.[0] || 0,
              name: p.name || '',
              source: 'osm',
            };
          }).filter(s => s.address && s.lat && s.lng);

          // Merge: Google first (better for businesses), then Photon, deduplicate
          const seen = new Set();
          const suggestions = [];
          for (const r of [...googleResults, ...photonResults]) {
            const key = r.name.toLowerCase().trim();
            if (!seen.has(key)) { seen.add(key); suggestions.push(r); }
          }

          console.log('[BoWander Geocode] merged suggestions:', suggestions.length, '(Google:', googleResults.length, 'Photon:', photonResults.length, ')');
          setAddressSuggestions(suggestions.slice(0, 6));
          // Auto-select top result coordinates (user can override by picking a different suggestion)
          if (suggestions.length > 0 && suggestions[0].lat && suggestions[0].lng) {
            setResolvedLat(suggestions[0].lat);
            setResolvedLng(suggestions[0].lng);
            if (!currentAddress && suggestions[0].address) setAddress(suggestions[0].address);
            onPreviewPin?.({ lat: suggestions[0].lat, lng: suggestions[0].lng, name: name });
            onMapCenter?.([suggestions[0].lat, suggestions[0].lng], 15);
          }
        } catch (err) { console.error('[BoWander Geocode] error:', err); setAddressSuggestions([]); }
        setGeocodingName(false);
      }, [onPreviewPin, onMapCenter]);

      // Auto-geocode when hotel name changes (debounced)
      const handlePropertyNameChange = (name) => {
        setPropertyName(name);
        if (geocodeTimerRef.current) clearTimeout(geocodeTimerRef.current);
        geocodeTimerRef.current = setTimeout(() => geocodeHotelName(name, address), 500);
      };

      const selectAddressSuggestion = (suggestion) => {
        setAddress(suggestion.address);
        setResolvedLat(suggestion.lat);
        setResolvedLng(suggestion.lng);
        setAddressSuggestions([]);
        // Update the name field to the full place name if we have one
        if (suggestion.name) {
          if (bookingType === 'activity') {
            // For activities, only update if the name looks like a place (not the tour name)
          } else {
            setPropertyName(suggestion.name);
          }
        }
        // Show preview pin and center map
        if (suggestion.lat && suggestion.lng) {
          onPreviewPin?.({ lat: suggestion.lat, lng: suggestion.lng, name: suggestion.name || propertyName });
          onMapCenter?.([suggestion.lat, suggestion.lng], 15);
        }
      };

      // Store the file as a data URL for later retrieval
      const storeFile = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          setFileDataUrl(e.target.result);
          // Generate thumbnail for images
          if (file.type.startsWith('image/')) {
            setFileThumbnail(e.target.result);
          } else if (file.type === 'application/pdf') {
            setFileThumbnail('рҹ“„'); // emoji placeholder for PDFs
          } else {
            setFileThumbnail('рҹ“Һ');
          }
        };
        reader.readAsDataURL(file);
      };

      const [kmlError, setKmlError] = useState('');

      const processFile = async (file) => {
        // Handle KML/KMZ files вҖ” parse and hand off to bulk importer
        if (file.name.toLowerCase().endsWith('.kml') || file.name.toLowerCase().endsWith('.kmz')) {
          setProcessing(true);
          setKmlError('');
          try {
            const isKMZ = file.name.toLowerCase().endsWith('.kmz');
            let kmlString = '';
            if (isKMZ) {
              if (typeof JSZip === 'undefined') {
                setKmlError('KMZ support is still loading вҖ” please try again in a moment.');
                setProcessing(false);
                return;
              }
              const zip = await JSZip.loadAsync(file);
              const kmlFile = zip.file('doc.kml') || zip.file(/\.kml$/i)[0];
              if (!kmlFile) {
                setKmlError('No KML file found inside this KMZ archive.');
                setProcessing(false);
                return;
              }
              kmlString = await kmlFile.async('string');
            } else {
              kmlString = await file.text();
            }
            const { mapName, places } = parseKMLData(kmlString);
            if (places.length === 0) {
              setKmlError('No places found in this file.');
              setProcessing(false);
              return;
            }
            const srcName = mapName || file.name.replace(/\.(kmz|kml)$/i, '');
            if (onKMLImport) {
              onKMLImport({ places, source: { source_name: `Google My Maps: ${srcName}`, source_url: '' } });
            }
          } catch (err) {
            setKmlError('Failed to parse file: ' + err.message);
          }
          setProcessing(false);
          return;
        }
        setProcessing(true);
        setFileName(file.name);
        storeFile(file);
        let text = '';

        try {
          if (file.type.startsWith('text/') || file.name.endsWith('.txt') || file.name.endsWith('.csv') || file.name.endsWith('.html') || file.name.endsWith('.htm')) {
            text = await file.text();
            if (file.name.endsWith('.html') || file.name.endsWith('.htm') || file.type === 'text/html') {
              const tmp = document.createElement('div');
              tmp.innerHTML = text;
              text = tmp.textContent || tmp.innerText || text;
            }
          } else if (file.type === 'message/rfc822' || file.name.endsWith('.eml')) {
            text = await file.text();
            text = text.replace(/^[\s\S]*?\n\n/, '');
          } else if (file.type.startsWith('image/')) {
            try {
              const { data: { text: ocrText } } = await Tesseract.recognize(file, 'eng');
              text = ocrText || '[No text found in image]';
            } catch (e) {
              text = '[OCR failed: ' + e.message + ']';
            }
          } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
            try {
              const arrayBuffer = await file.arrayBuffer();
              const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              let allText = '';
              for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                allText += content.items.map(item => item.str).join(' ') + '\n';
              }
              text = allText.trim() || '[No text found in PDF]';
            } catch (e) {
              text = '[PDF parsing failed: ' + e.message + ']';
            }
          } else {
            try {
              text = await file.text();
              if (text.length > 0 && /[\x00-\x08\x0E-\x1F]/.test(text.substring(0, 100))) {
                text = `[Binary file: ${file.name}]\nPlease review and fill in the details manually.`;
              }
            } catch {
              text = `[Could not read file: ${file.name}]`;
            }
          }
        } catch (err) {
          text = `[Error processing file: ${err.message}]`;
        }

        setExtractedText(text);

        // Auto-detect booking type based on content
        const transportKeywords = /(?:flight|airline|boarding\s*pass|departure\s+gate|terminal|e-?ticket|itinerary.*(?:depart|arriv)|PNR|record\s+locator)/i;
        const trainKeywords = /(?:shinkansen|bullet\s*train|JR\s+pass|nozomi|hikari|kodama|sakura|mizuho|hayabusa|kagayaki|rail\s*pass|train\s+(?:ticket|booking|reservation)|carriage|coach\s+\d|platform\s+\d)/i;
        const transferKeywords = /(?:airport\s+transfer|private\s+(?:car|transfer|vehicle|driver)|shuttle\s+(?:service|booking|reservation)|pick[\s-]?up\s+(?:service|time|point)|chauffeur|limousine\s+(?:service|booking)|ground\s+transport)/i;
        const activityKeywords = /(?:tour|experience|ride|class|workshop|excursion|tasting|cruise|walk(?:ing)|adventure|activity|ticket|admission|voucher|rickshaw|safari|kayak|snorkel|diving|hik(?:e|ing)|cooking|zip\s*line|bungee|paraglid|surf(?:ing)?|cycling|sightseeing|day\s*trip)/i;
        const activitySites = /(?:klook|viator|getyourguide|musement|tiqets|civitatis|veltra|airbnb\s*experiences)/i;
        const strongHotelSignals = /(?:check[\s-]?in[\s:]+|check[\s-]?out[\s:]+|room\s*type|suite\s+with|breakfast\s+included|housekeeping|(?:nights?\s*,\s*\d)|hotel\s+(?:reservation|booking|confirmation))/i;

        let detectedType = 'hotel';
        if (trainKeywords.test(text)) {
          detectedType = 'train';
        } else if (transferKeywords.test(text)) {
          detectedType = 'transfer';
        } else if (transportKeywords.test(text) && !strongHotelSignals.test(text)) {
          detectedType = 'flight';
        } else {
          const hasActivitySignal = activityKeywords.test(text) || activitySites.test(text);
          const hasStrongHotelSignal = strongHotelSignals.test(text);
          const isActivitySite = activitySites.test(text);
          const isActivity = isActivitySite ? !hasStrongHotelSignal : (hasActivitySignal && !hasStrongHotelSignal);
          detectedType = isActivity ? 'activity' : 'hotel';
        }
        setBookingTypeRaw(detectedType);

        if (['flight', 'train', 'transfer'].includes(detectedType)) {
          const parsed = parseTransportText(text);
          parsed.type = detectedType;
          setTransportFrom(parsed.from);
          setTransportTo(parsed.to);
          setTransportDate(parsed.date ? toISODate(parsed.date) : '');
          setDepartTime(parsed.departure_time ? toISOTime(parsed.departure_time) : '');
          setArriveTime(parsed.arrival_time ? toISOTime(parsed.arrival_time) : '');
          setCarrier(parsed.carrier);
          setSeat(parsed.seat);
          setConfirmationNumber(parsed.confirmation);
          setPassengers(parsed.passengers);
          setPrice(parsed.cost);
          setTransportNotes(parsed.notes);
          setTourName(parsed.title);
        } else if (detectedType === 'activity') {
          const parsed = parseActivityText(text);
          setTourName(parsed.tourName);
          setTourOperator(parsed.tourOperator);
          setBookingSource(parsed.bookingSite);
          setConfirmationNumber(parsed.confirmationNumber);
          setActivityDate(toISODate(parsed.date));
          setActivityTime(toISOTime(parsed.time));
          setDuration(parsed.duration);
          setContactInfo(parsed.contactInfo);
          setActivityDescription(parsed.description);
          setAddress(parsed.address);
          setPrice(parsed.price);
          // Geocode the meeting point, or extract a location from the tour name
          let geoQuery = parsed.address;
          if (!geoQuery && parsed.tourName) {
            geoQuery = parsed.tourName.replace(/\b(?:tour|experience|ride|walk|cruise|class|workshop|adventure|excursion|tasting|show|visit|trip|pass|ticket|rickshaw|safari|kayak|snorkel|diving|hiking|cooking|cycling|sightseeing|transfer|shuttle|day)\b/gi, '').replace(/\s+/g, ' ').trim();
            if (geoQuery.length < 3) geoQuery = parsed.tourName;
          }
          if (geoQuery) geocodeHotelName(geoQuery, parsed.address);
        } else {
          const parsed = parseConfirmationText(text);
          setPropertyName(parsed.propertyName);
          setAddress(parsed.address);
          setCheckIn(toISODate(parsed.checkIn));
          setCheckOut(toISODate(parsed.checkOut));
          setCheckInTime(toISOTime(parsed.checkInTime));
          setCheckOutTime(toISOTime(parsed.checkOutTime));
          setConfirmationNumber(parsed.confirmationNumber);
          setPin(parsed.pin);
          setBookingSource(parsed.bookingSource);
          setRoomType(parsed.roomType);
          setPrice(parsed.price);
          setIncludesBreakfast(parsed.includesBreakfast);
          if (parsed.propertyName) geocodeHotelName(parsed.propertyName, parsed.address);
        }

        setProcessing(false);
        setStep('review');
      };

      const handleFiles = (files) => {
        if (files && files.length > 0) processFile(files[0]);
      };

      const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(true); };
      const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(false); };
      const handleDrop = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(false); handleFiles(e.dataTransfer.files); };

      const handleSubmit = async () => {
        // Transport types: save as standalone travel doc (no pin)
        if (['flight', 'train', 'transfer'].includes(bookingType)) {
          const title = tourName.trim() || (transportFrom && transportTo ? `${transportFrom} вҶ’ ${transportTo}` : bookingType.charAt(0).toUpperCase() + bookingType.slice(1));
          try {
            await MockFirebase.saveTravelDoc({
              collection_id: collectionId,
              type: bookingType,
              title,
              from: transportFrom,
              to: transportTo,
              date: transportDate,
              departure_time: departTime,
              arrival_time: arriveTime,
              carrier,
              seat,
              confirmation: confirmationNumber,
              passengers,
              cost: price,
              notes: transportNotes,
              file_data: fileDataUrl || null,
              file_name: fileName || '',
            });
            if (onTransportSaved) onTransportSaved();
            onClose();
          } catch (e) {
            console.error('Save transport doc failed:', e);
            alert('Failed to save document. Please try again.');
          }
          return;
        }
        if (bookingType === 'activity') {
          if (!tourName.trim()) { alert('Please enter a tour/activity name'); return; }
          onSelect({
            name: tourName,
            address: address,
            lat: resolvedLat,
            lng: resolvedLng,
            description: [
              activityDescription,
              duration && `Duration: ${duration}`,
              contactInfo && `Contact: ${contactInfo}`,
            ].filter(Boolean).join('\n'),
            emoji: 'рҹҺ«',
            category: 'activity',
            source_name: bookingSource || 'Booking',
            reservation_details: {
              type: 'activity',
              tour_name: tourName,
              tour_operator: tourOperator,
              booking_source: bookingSource,
              confirmation_number: confirmationNumber,
              date: activityDate,
              time: activityTime,
              duration: duration,
              contact_info: contactInfo,
              price: price,
              price_usd: usdPrice || '',
              exchange_rate: exchangeRate || null,
              exchange_rate_date: exchangeRateDate || '',
              price_currency: priceCurrency || '',
              description: activityDescription,
              address: address,
            },
            attachment: fileDataUrl ? { name: fileName, data: fileDataUrl, thumbnail: fileThumbnail } : null,
          });
        } else {
          if (!propertyName.trim()) { alert('Please enter a hotel/property name'); return; }
          onSelect({
            name: propertyName,
            address: address,
            lat: resolvedLat,
            lng: resolvedLng,
            description: [
              roomType && `Room: ${roomType}`,
              price && `Price: ${price}`,
              checkIn && `Check-in: ${checkIn}${checkInTime ? ' at ' + checkInTime : ''}`,
              checkOut && `Check-out: ${checkOut}${checkOutTime ? ' at ' + checkOutTime : ''}`,
              confirmationNumber && `Confirmation #: ${confirmationNumber}`,
              pin && `PIN: ${pin}`,
              includesBreakfast !== 'unknown' && `Breakfast: ${includesBreakfast === 'yes' ? 'Included' : 'Not included'}`,
              bookingSource && `Booked via: ${bookingSource}`,
            ].filter(Boolean).join('\n'),
            emoji: 'рҹҸЁ',
            category: 'hotel',
            source_name: bookingSource || 'Booking Confirmation',
            reservation_details: {
              type: 'hotel',
              check_in: checkIn,
              check_out: checkOut,
              check_in_time: checkInTime || '16:00',
              check_out_time: checkOutTime || '12:00',
              confirmation_number: confirmationNumber,
              pin: pin,
              booking_source: bookingSource,
              room_type: roomType,
              price: price,
              price_usd: usdPrice || '',
              exchange_rate: exchangeRate || null,
              exchange_rate_date: exchangeRateDate || '',
              price_currency: priceCurrency || '',
              includes_breakfast: includesBreakfast,
            },
            attachment: fileDataUrl ? { name: fileName, data: fileDataUrl, thumbnail: fileThumbnail } : null,
          });
        }
      };

      // Auto-fetch exchange rate when price or check-in changes
      useEffect(() => {
        const currency = detectCurrency(price);
        console.log('[BoWander FX] useEffect - price:', price, 'currency:', currency);
        if (currency && currency !== 'USD') {
          fetchExchangeRate(currency, checkIn, price);
        } else {
          setUsdPrice(''); setExchangeRate(null); setPriceCurrency('');
        }
      }, [price, checkIn, fetchExchangeRate]);

      // Update USD price when exchange rate changes
      useEffect(() => {
        if (exchangeRate && price) {
          const numPrice = extractNumericPrice(price);
          if (numPrice > 0) {
            setUsdPrice('$' + (numPrice * exchangeRate).toFixed(2));
          }
        }
      }, [exchangeRate, price]);

      const inputClass = "w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm";

      return (
        <div className="fixed inset-0 md:inset-auto md:top-0 md:right-0 md:bottom-0 md:w-96 bg-black bg-opacity-50 md:bg-opacity-0 flex items-end md:items-stretch justify-center md:justify-end" style={{ zIndex: 9999 }} onClick={onClose}>
          <div
            className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-t-xl md:rounded-none w-full md:w-96 shadow-2xl md:shadow-xl md:border-l dark:md:border-slate-700`}
            onClick={e => e.stopPropagation()}
            style={{ position: 'relative', zIndex: 10000 }}
          >
            <div className="max-h-[85vh] md:max-h-full md:h-full overflow-y-auto p-6 space-y-4">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-bold dark:text-white">
                  {step === 'upload' ? 'Upload Booking' : 'Review Booking'}
                </h2>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded">
                  <CloseIcon />
                </button>
              </div>

              {step === 'upload' && (
                <div className="space-y-3">
                  <p className="text-sm text-gray-500 dark:text-gray-400">
                    Upload a booking confirmation, travel ticket, or reservation document.
                  </p>

                  <div
                    className={`border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all ${
                      dragging
                        ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20'
                        : 'border-gray-300 dark:border-slate-600 hover:border-blue-400 hover:bg-gray-50 dark:hover:bg-slate-800'
                    }`}
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                    onClick={() => fileInputRef.current?.click()}
                  >
                    <input
                      ref={fileInputRef}
                      type="file"
                      className="hidden"
                      accept="image/*,.pdf,.txt,.html,.htm,.eml,.kml,.kmz,text/*"
                      onChange={e => handleFiles(e.target.files)}
                    />
                    {processing ? (
                      <div className="space-y-2">
                        <div className="text-3xl animate-pulse">рҹ“„</div>
                        <p className="text-sm font-medium dark:text-white">Processing {fileName}...</p>
                        <p className="text-xs text-gray-400">Extracting text and details</p>
                      </div>
                    ) : (
                      <div className="space-y-2">
                        <div className="text-4xl">{dragging ? 'рҹ“Ҙ' : 'рҹ“Һ'}</div>
                        <p className="text-sm font-medium dark:text-white">
                          {dragging ? 'Drop file here' : 'Drag & drop a file here'}
                        </p>
                        <p className="text-xs text-gray-400">or click to browse</p>
                        <p className="text-xs text-gray-400 mt-2">
                          Supports: PDF, images, text, HTML emails, KML/KMZ
                        </p>
                      </div>
                    )}
                  </div>
                  {kmlError && (
                    <p className="text-xs text-red-500 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg px-3 py-2">{kmlError}</p>
                  )}

                  <button
                    onClick={() => setStep('review')}
                    className="w-full text-sm text-blue-600 dark:text-blue-400 hover:underline py-1"
                  >
                    Or enter details manually
                  </button>
                </div>
              )}

              {step === 'review' && (
                <div className="space-y-3">
                  {/* File info + thumbnail */}
                  {(extractedText || fileDataUrl) && (
                    <div className="bg-gray-50 dark:bg-slate-800 rounded-lg p-3 mb-2">
                      <div className="flex items-start gap-3">
                        {fileThumbnail && fileThumbnail.startsWith('data:') ? (
                          <img src={fileThumbnail} alt="" className="w-12 h-12 rounded object-cover flex-shrink-0 cursor-pointer border" onClick={() => openDataFile(fileDataUrl, fileName)} />
                        ) : fileThumbnail ? (
                          <span className="text-3xl flex-shrink-0">{fileThumbnail}</span>
                        ) : null}
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center justify-between">
                            <span className="text-xs font-medium text-gray-500 dark:text-gray-400 truncate">{fileName}</span>
                            <button
                              onClick={() => { setStep('upload'); setExtractedText(''); setFileName(''); setFileDataUrl(''); setFileThumbnail(''); }}
                              className="text-xs text-blue-600 dark:text-blue-400 hover:underline flex-shrink-0 ml-2"
                            >
                              Change file
                            </button>
                          </div>
                          {extractedText && (
                            <details className="text-xs text-gray-500 dark:text-gray-400 mt-1">
                              <summary className="cursor-pointer hover:text-gray-700 dark:hover:text-gray-300">Show extracted text</summary>
                              <pre className="mt-1 max-h-24 overflow-y-auto whitespace-pre-wrap text-xs">{extractedText.slice(0, 2000)}</pre>
                            </details>
                          )}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Booking type toggle */}
                  <div className="flex rounded-lg overflow-hidden border dark:border-slate-700">
                    {[['hotel', 'рҹҸЁ Hotel'], ['activity', 'рҹҺҹпёҸ Activity'], ['flight', 'вңҲпёҸ Flight'], ['train', 'рҹҡ„ Train'], ['transfer', 'рҹҡҗ Transfer']].map(([val, label]) => (
                      <button
                        key={val}
                        onClick={() => setBookingType(val)}
                        className={`flex-1 px-3 py-2 text-sm font-medium transition ${
                          bookingType === val
                            ? 'bg-blue-600 text-white'
                            : 'bg-gray-50 dark:bg-slate-800 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700'
                        }`}
                      >
                        {label}
                      </button>
                    ))}
                  </div>

                  {/* Location status */}
                  {!['flight', 'train', 'transfer'].includes(bookingType) && (
                    <>
                    {resolvedLat && resolvedLng ? (
                      <div className="flex items-center gap-2 px-3 py-2 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg text-xs text-green-700 dark:text-green-400">
                        <span>рҹ“Қ</span>
                        <span>Location found вҖ” map centered on pin</span>
                      </div>
                    ) : step === 'review' && (
                      <div className="flex items-center gap-2 px-3 py-2 bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-lg text-xs text-yellow-700 dark:text-yellow-400">
                        <span>вҡ пёҸ</span>
                        <span>Location not yet found вҖ” enter an address to place on map</span>
                      </div>
                    )}
                    </>
                  )}

                  {/* --- HOTEL FORM --- */}
                  {bookingType === 'hotel' && <>
                  {/* Hotel Name with auto-geocode */}
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Hotel / Property *</label>
                    <div className="relative">
                      <input type="text" value={propertyName} onChange={e => handlePropertyNameChange(e.target.value)} placeholder="e.g. MIMARU SUITES Kyoto Shijo" className={inputClass} autoFocus autoComplete="off" data-1p-ignore data-lpignore="true" data-form-type="other" />
                      {geocodingName && <span className="absolute right-3 top-2.5 text-xs text-gray-400 animate-pulse">Looking up...</span>}
                    </div>
                    {addressSuggestions.length > 0 && (
                      <div className="mt-1 border rounded-lg overflow-hidden dark:border-slate-700 bg-white dark:bg-slate-800">
                        {addressSuggestions.map((s, i) => (
                          <button
                            key={i}
                            onClick={() => selectAddressSuggestion(s)}
                            className="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 dark:hover:bg-slate-700 border-b last:border-b-0 dark:border-slate-700 flex items-start gap-2"
                          >
                            <span className="text-red-400 mt-0.5">рҹ“Қ</span>
                            <div>
                              <span className="font-medium dark:text-white">{s.name || propertyName}</span>
                              <span className="text-gray-500 dark:text-gray-400 text-xs block">{s.address}</span>
                            </div>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* Address */}
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Address</label>
                    <input type="text" value={address} onChange={e => { setAddress(e.target.value); setAddressSuggestions([]); }} placeholder="Hotel address (auto-filled from name)" className={inputClass} autoComplete="off" data-1p-ignore data-lpignore="true" data-form-type="other" />
                  </div>

                  {/* Room Type */}
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Room Type</label>
                    <input type="text" value={roomType} onChange={e => setRoomType(e.target.value)} placeholder="e.g. Superior Two-Bedroom Suite" className={inputClass} autoComplete="off" data-1p-ignore />
                  </div>

                  {/* Price */}
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Price</label>
                    <input type="text" value={price} onChange={e => setPrice(e.target.value)} placeholder="e.g. ВҘ176,951" className={inputClass} autoComplete="off" data-1p-ignore />
                    {usdPrice && (
                      <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">
                        вүҲ {usdPrice} USD {exchangeRateDate && <span className="text-gray-400 dark:text-gray-500">(rate as of {exchangeRateDate})</span>}
                      </p>
                    )}
                  </div>

                  {/* Check-in date + time */}
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Check-in Date</label>
                      <input type="date" value={checkIn} onChange={e => setCheckIn(e.target.value)} className={inputClass} data-1p-ignore />
                    </div>
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Check-in Time</label>
                      <input type="time" value={checkInTime} onChange={e => setCheckInTime(e.target.value)} className={inputClass} data-1p-ignore />
                    </div>
                  </div>

                  {/* Check-out date + time */}
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Check-out Date</label>
                      <input type="date" value={checkOut} onChange={e => setCheckOut(e.target.value)} className={inputClass} data-1p-ignore />
                    </div>
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Check-out Time</label>
                      <input type="time" value={checkOutTime} onChange={e => setCheckOutTime(e.target.value)} className={inputClass} data-1p-ignore />
                    </div>
                  </div>

                  {/* Confirmation # + PIN */}
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Confirmation #</label>

    const AddressAutocomplete = ({ value, onChange, onSelectAddress, isDarkMode }) => {
      const [suggestions, setSuggestions] = useState([]);

      const [dropdownPos, setDropdownPos] = useState({ top: 0, left: 0, width: 0 });
      const inputRef = useRef(null);
      const timerRef = useRef(null);

      const fetchSuggestions = (q) => {
        if (q.length < 3) { setSuggestions([]); return; }
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => {
          fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5`)
            .then(r => r.json())
            .then(data => {
              const results = (data.features || []).map(f => {
                const p = f.properties || {};
                const geo = f.geometry?.coordinates || [];
                const parts = [p.housenumber, p.street].filter(Boolean).join(' ');
                const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
                return {
                  address: [p.name, parts, locality].filter(Boolean).join(', '),
                  lat: geo[1],
                  lng: geo[0],
                };
              }).filter(r => r.lat && r.lng);
              setSuggestions(results);
              if (results.length > 0 && inputRef.current) {
                const rect = inputRef.current.getBoundingClientRect();
                setDropdownPos({ top: rect.bottom + 2, left: rect.left, width: rect.width });
              }
              setShowSuggestions(results.length > 0);
            })
            .catch(() => {});
        }, 300);
      };

        <div className="relative">

            ref={inputRef}
            type="text"
            value={value}
            onChange={e => {
              onChange(e.target.value);

            onFocus={() => {

    // ---- PhotoCropModal ----
    // Presents a full-screen crop UI with Rectangle (Cropper.js) or Freeform (4-corner perspective) modes.
    const PhotoCropModal = ({ imageSrc, onApply, onCancel, isDarkMode }) => {
      const imgRef = useRef(null);
      const cropperRef = useRef(null);
      const [mode, setMode] = useState('rect'); // 'rect' | 'poly'
      const [savedCrops, setSavedCrops] = useState([]); // accumulated canvas crops for multi-crop flow
      const [activeImageSrc, setActiveImageSrc] = useState(imageSrc); // current image (supports multi-page)
      const addPageInputRef = useRef(null);

      // ---- Rectangle mode (Cropper.js) ----
      useEffect(() => {
        if (mode !== 'rect') { if (cropperRef.current) { try { cropperRef.current.destroy(); } catch {} cropperRef.current = null; } return; }
        if (!imgRef.current || typeof Cropper === 'undefined') return;
        // Small delay to let img src update in DOM before Cropper reads it
        const timer = setTimeout(() => {
          if (!imgRef.current) return;
          const c = new Cropper(imgRef.current, {
            viewMode: 1, autoCropArea: 0.85, dragMode: 'move', background: false,
            zoomable: true, scalable: false, rotatable: true, toggleDragModeOnDblclick: false, responsive: true,
          });
          cropperRef.current = c;
        }, 50);
        return () => { clearTimeout(timer); try { cropperRef.current?.destroy(); } catch {} cropperRef.current = null; };
      }, [mode, activeImageSrc]);

      // handleRectApply removed вҖ” use handleFinalApply + getCurrentCropCanvas instead

      // ---- Polygon (freeform) mode ----
      // Tap to add points, drag to move, double-tap to remove, tap midpoint to insert
      const polyCanvasRef = useRef(null);
      const polyImgRef = useRef(null);
      const [polyPts, setPolyPts] = useState(null); // [{x,y}, ...] in image coords
      const [dragIdx, setDragIdx] = useState(-1);
      const [polyDims, setPolyDims] = useState({ w: 0, h: 0, scale: 1, offX: 0, offY: 0 });
      const lastTapRef = useRef({ time: 0, idx: -1 });

      // Load image when switching to polygon mode
      useEffect(() => {
        if (mode !== 'poly') return;
        const img = new Image();
        img.onload = () => {
          polyImgRef.current = img;
          // Start with no points вҖ” user taps to place them
          setPolyPts([]);
        };
        img.src = activeImageSrc;
      }, [mode, activeImageSrc]);

      // Draw polygon overlay at full resolution
      useEffect(() => {
        if (mode !== 'poly' || !polyPts || !polyImgRef.current) return;
        const cvs = polyCanvasRef.current;
        if (!cvs) return;
        const container = cvs.parentElement;
        const cw = container.clientWidth;
        const ch = container.clientHeight;
        // Use device pixel ratio for crisp display
        const dpr = window.devicePixelRatio || 1;
        cvs.width = cw * dpr; cvs.height = ch * dpr;
        cvs.style.width = cw + 'px'; cvs.style.height = ch + 'px';
        const img = polyImgRef.current;
        const scale = Math.min(cw / img.width, ch / img.height);
        const offX = (cw - img.width * scale) / 2;
        const offY = (ch - img.height * scale) / 2;
        setPolyDims({ w: img.width, h: img.height, scale, offX, offY });
        const ctx = cvs.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.clearRect(0, 0, cw, ch);
        // Draw full image
        ctx.drawImage(img, offX, offY, img.width * scale, img.height * scale);
        if (polyPts.length >= 3) {
          // Darken outside polygon
          ctx.save();
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(0, 0, cw, ch);
          ctx.globalCompositeOperation = 'destination-out';
          ctx.beginPath();
          polyPts.forEach((p, i) => {
            const sx = offX + p.x * scale, sy = offY + p.y * scale;
            i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
          });
          ctx.closePath();
          ctx.fill();
          ctx.restore();
          // Redraw image inside polygon (crisp)
          ctx.save();
          ctx.beginPath();
          polyPts.forEach((p, i) => {
            const sx = offX + p.x * scale, sy = offY + p.y * scale;
            i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
          });
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, offX, offY, img.width * scale, img.height * scale);
          ctx.restore();
        }
        // Draw polygon outline
        if (polyPts.length >= 2) {
          ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
          ctx.beginPath();
          polyPts.forEach((p, i) => {
            const sx = offX + p.x * scale, sy = offY + p.y * scale;
            i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
          });
          if (polyPts.length >= 3) ctx.closePath();
          ctx.stroke();
        }
        // Draw edge midpoints (for inserting new points)
        if (polyPts.length >= 2) {
          for (let i = 0; i < polyPts.length; i++) {
            const next = polyPts[(i + 1) % polyPts.length];
            if (i === polyPts.length - 1 && polyPts.length < 3) continue; // don't show closing midpoint for 2 pts
            const mx = offX + (polyPts[i].x + next.x) / 2 * scale;
            const my = offY + (polyPts[i].y + next.y) / 2 * scale;
            ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(mx, my, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
          }
        }
        // Draw vertex handles
        polyPts.forEach((p, i) => {
          const sx = offX + p.x * scale, sy = offY + p.y * scale;
          ctx.fillStyle = '#3b82f6'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(sx, sy, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
          // Number label
          ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(i + 1, sx, sy);
        });
      }, [mode, polyPts]);

      // Coordinate helpers
      const polyScreenToImg = (clientX, clientY) => {
        const cvs = polyCanvasRef.current;
        if (!cvs) return { x: 0, y: 0 };
        const rect = cvs.getBoundingClientRect();
        return { x: (clientX - rect.left - polyDims.offX) / polyDims.scale, y: (clientY - rect.top - polyDims.offY) / polyDims.scale };
      };

      const findPolyHandle = (clientX, clientY) => {
        if (!polyPts || !polyPts.length) return { type: 'none', idx: -1 };
        const cvs = polyCanvasRef.current;
        if (!cvs) return { type: 'none', idx: -1 };
        const rect = cvs.getBoundingClientRect();
        const cx = clientX - rect.left, cy = clientY - rect.top;
        // Check vertices first (priority)
        for (let i = 0; i < polyPts.length; i++) {
          const sx = polyDims.offX + polyPts[i].x * polyDims.scale;
          const sy = polyDims.offY + polyPts[i].y * polyDims.scale;
          if (Math.hypot(cx - sx, cy - sy) < 25) return { type: 'vertex', idx: i };
        }
        // Check edge midpoints
        if (polyPts.length >= 2) {
          for (let i = 0; i < polyPts.length; i++) {
            const next = polyPts[(i + 1) % polyPts.length];
            if (i === polyPts.length - 1 && polyPts.length < 3) continue;
            const mx = polyDims.offX + (polyPts[i].x + next.x) / 2 * polyDims.scale;
            const my = polyDims.offY + (polyPts[i].y + next.y) / 2 * polyDims.scale;
            if (Math.hypot(cx - mx, cy - my) < 20) return { type: 'midpoint', idx: i };
          }
        }
        return { type: 'none', idx: -1 };
      };

      const polyPointerDown = (e) => {
        const touch = e.touches ? e.touches[0] : e;
        const hit = findPolyHandle(touch.clientX, touch.clientY);
        const now = Date.now();
        if (hit.type === 'vertex') {
          // Double-tap to remove (if >3 points)
          if (now - lastTapRef.current.time < 350 && lastTapRef.current.idx === hit.idx && polyPts.length > 3) {
            setPolyPts(prev => prev.filter((_, i) => i !== hit.idx));
            lastTapRef.current = { time: 0, idx: -1 };
            e.preventDefault();
            return;
          }
          lastTapRef.current = { time: now, idx: hit.idx };
          setDragIdx(hit.idx);
          e.preventDefault();
        } else if (hit.type === 'midpoint') {
          // Insert new point at midpoint
          const i = hit.idx;
          const next = (i + 1) % polyPts.length;
          const newPt = { x: (polyPts[i].x + polyPts[next].x) / 2, y: (polyPts[i].y + polyPts[next].y) / 2 };
          setPolyPts(prev => [...prev.slice(0, next), newPt, ...prev.slice(next)]);
          setDragIdx(next); // immediately start dragging the new point
          lastTapRef.current = { time: 0, idx: -1 };
          e.preventDefault();
        } else {
          // Tap empty area вҖ” add new point
          const pt = polyScreenToImg(touch.clientX, touch.clientY);
          const clamped = { x: Math.max(0, Math.min(polyDims.w, pt.x)), y: Math.max(0, Math.min(polyDims.h, pt.y)) };
          setPolyPts(prev => [...(prev || []), clamped]);
          lastTapRef.current = { time: 0, idx: -1 };
          e.preventDefault();
        }
      };

      const polyPointerMove = (e) => {
        if (dragIdx < 0 || !polyPts) return;
        e.preventDefault();
        const touch = e.touches ? e.touches[0] : e;
        const pt = polyScreenToImg(touch.clientX, touch.clientY);
        const clamped = { x: Math.max(0, Math.min(polyDims.w, pt.x)), y: Math.max(0, Math.min(polyDims.h, pt.y)) };
        setPolyPts(prev => prev.map((p, i) => i === dragIdx ? clamped : p));
      };

      const polyPointerUp = () => setDragIdx(-1);

      // handlePolyApply removed вҖ” use handleFinalApply + getCurrentCropCanvas instead

      const rotate = (deg) => cropperRef.current?.rotate(deg);
      const reset = () => {
        if (mode === 'rect') { cropperRef.current?.reset(); }
        else { setPolyPts([]); }
      };

      // Get current crop as a canvas (works for both modes)
      const getCurrentCropCanvas = () => {
        if (mode === 'rect') {
          const c = cropperRef.current;
          if (!c) return null;
          return c.getCroppedCanvas({ maxWidth: 2400, maxHeight: 2400, fillColor: '#ffffff', imageSmoothingQuality: 'high' });
        } else {
          if (!polyPts || polyPts.length < 3 || !polyImgRef.current) return null;
          const img = polyImgRef.current;
          let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
          polyPts.forEach(p => { minX = Math.min(minX, p.x); minY = Math.min(minY, p.y); maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y); });
          minX = Math.max(0, Math.floor(minX)); minY = Math.max(0, Math.floor(minY));
          maxX = Math.min(img.width, Math.ceil(maxX)); maxY = Math.min(img.height, Math.ceil(maxY));
          const w = maxX - minX, h = maxY - minY;
          if (w < 1 || h < 1) return null;
          const maxDim = 2400;
          const outScale = Math.min(1, maxDim / Math.max(w, h));
          const outW = Math.round(w * outScale), outH = Math.round(h * outScale);
          const out = document.createElement('canvas');
          out.width = outW; out.height = outH;
          const ctx = out.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, outW, outH);
          ctx.save();
          ctx.beginPath();
          polyPts.forEach((p, i) => {
            const sx = (p.x - minX) * outScale, sy = (p.y - minY) * outScale;
            i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
          });
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, minX, minY, w, h, 0, 0, outW, outH);
          ctx.restore();
          return out;
        }
      };

      // Save current crop and reset for another
      // Store as data URLs so canvas data isn't lost when Cropper resets
      const handleCropAndContinue = () => {
        const canvas = getCurrentCropCanvas();
        if (!canvas) return;
        const dataUrl = canvas.toDataURL('image/png');
        setSavedCrops(prev => [...prev, { dataUrl, width: canvas.width, height: canvas.height }]);
        // Reset for next crop
        if (mode === 'rect') { cropperRef.current?.reset(); }
        else { setPolyPts([]); }
      };

      // Load a new page image for cropping (multi-page support)
      const handleAddPage = (e) => {
        const file = e.target.files?.[0];
        if (e.target) e.target.value = '';
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          // Save current crop first if there's a valid selection
          const currentCanvas = getCurrentCropCanvas();
          if (currentCanvas) {
            const dataUrl = currentCanvas.toDataURL('image/png');
            setSavedCrops(prev => [...prev, { dataUrl, width: currentCanvas.width, height: currentCanvas.height }]);
          }
          // Switch to the new image
          setActiveImageSrc(reader.result);
          if (mode === 'poly') setPolyPts([]);
          // Cropper.js will reinit via the useEffect dependency on activeImageSrc
        };
        reader.readAsDataURL(file);
      };

      // Stitch all saved crops + current crop vertically, each OCR'd separately then combined
      // Instead of stitching into one canvas (which confuses Tesseract), we return an array
      // Actually, stitch visually but with clear separation for the photo record
      const stitchCrops = (cropItems) => {
        // cropItems: array of { dataUrl, width, height } or canvas elements
        return new Promise((resolve) => {
          const loadAll = cropItems.map(item => {
            if (item instanceof HTMLCanvasElement) return Promise.resolve(item);
            return new Promise(res => {
              const img = new Image();
              img.onload = () => {
                const c = document.createElement('canvas');
                c.width = img.width; c.height = img.height;
                c.getContext('2d').drawImage(img, 0, 0);
                res(c);
              };
              img.src = item.dataUrl;
            });
          });
          Promise.all(loadAll).then(canvases => {
            if (canvases.length === 1) { resolve(canvases[0]); return; }
            const maxW = Math.max(...canvases.map(c => c.width));
            const gap = 30;
            let totalH = 0;
            const scaled = canvases.map(c => {
              const s = maxW / c.width;
              const h = Math.round(c.height * s);
              totalH += h;
              return { canvas: c, w: maxW, h };
            });
            totalH += gap * (canvases.length - 1);
            const out = document.createElement('canvas');
            out.width = maxW; out.height = Math.min(totalH, 6000);
            const ctx = out.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, out.width, out.height);
            let y = 0;
            scaled.forEach(s => {
              ctx.drawImage(s.canvas, 0, 0, s.canvas.width, s.canvas.height, 0, y, s.w, s.h);
              y += s.h + gap;
            });
            resolve(out);
          });
        });
      };

      // Final apply: combine saved crops + current crop
      const handleFinalApply = async () => {
        const all = [...savedCrops];
        const currentCanvas = getCurrentCropCanvas();
        if (currentCanvas) {
          all.push(currentCanvas); // canvas element вҖ” stitchCrops handles both types
        }
        if (all.length === 0) return;
        const result = await stitchCrops(all);
        onApply(result);
      };

      return (
        <div className="fixed inset-0 bg-black flex flex-col" style={{ zIndex: 10050 }}>
          {/* Top bar */}
          <div className="flex items-center justify-between px-3 py-2 bg-slate-900 text-white flex-shrink-0">
            <button onClick={onCancel} className="px-3 py-1.5 rounded hover:bg-slate-700 text-sm">Cancel</button>
            <span className="text-xs text-gray-400">{mode === 'rect' ? 'Drag to move В· Pinch to zoom' : 'Tap to add points В· Drag to move'}</span>
            <div className="flex items-center gap-1.5">
              {(savedCrops.length > 0 || (mode === 'poly' ? polyPts && polyPts.length >= 3 : true)) && (
                <button onClick={handleCropAndContinue} className="px-2 py-1.5 rounded text-xs font-medium bg-slate-700 hover:bg-slate-600" title="Save this crop and select another area">+ More</button>
              )}
              <button onClick={handleFinalApply} className={`px-3 py-1.5 rounded text-sm font-semibold ${mode === 'poly' && (!polyPts || polyPts.length < 3) && savedCrops.length === 0 ? 'bg-gray-600 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`} disabled={mode === 'poly' && (!polyPts || polyPts.length < 3) && savedCrops.length === 0}>
                {savedCrops.length > 0 ? `Done (${savedCrops.length + 1})` : 'Use crop'}
              </button>
            </div>
          </div>
          {/* Saved crops indicator */}
          {savedCrops.length > 0 && (
            <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 text-xs text-gray-300 flex-shrink-0">
              <span>Saved crops:</span>
              {savedCrops.map((_, i) => (
                <span key={i} className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-blue-600 text-white text-[10px] font-bold">{i + 1}</span>
              ))}
              <span className="text-gray-500">вҶ’ now select crop {savedCrops.length + 1}</span>
            </div>
          )}
          {/* Image area */}
          <div className="flex-1 overflow-hidden flex items-center justify-center bg-black" style={{ minHeight: 0, position: 'relative' }}>
            {mode === 'rect' && (
              <img ref={imgRef} src={activeImageSrc} alt="Crop source" style={{ maxWidth: '100%', display: 'block' }} />
            )}
            {mode === 'poly' && (
              <canvas
                ref={polyCanvasRef}
                style={{ width: '100%', height: '100%', touchAction: 'none' }}
                onMouseDown={polyPointerDown} onMouseMove={polyPointerMove} onMouseUp={polyPointerUp} onMouseLeave={polyPointerUp}
                onTouchStart={polyPointerDown} onTouchMove={polyPointerMove} onTouchEnd={polyPointerUp}
              />
            )}
          </div>
          {/* Tool bar */}
          <div className="flex items-center justify-center gap-2 px-3 py-2 bg-slate-900 text-white flex-shrink-0 flex-wrap">
            <button
              onClick={() => setMode(mode === 'rect' ? 'poly' : 'rect')}
              className={`px-3 py-1.5 rounded text-sm font-medium ${mode === 'poly' ? 'bg-blue-600' : 'hover:bg-slate-700'}`}
            >
              {mode === 'rect' ? 'в—Ү Polygon' : 'в–ӯ Rectangle'}
            </button>
            {mode === 'poly' && polyPts && (<>
              <span className="text-xs text-gray-400">{polyPts.length} pts{polyPts.length < 3 ? ' (need 3+)' : ''}</span>
              {polyPts.length > 0 && (
                <button onClick={() => setPolyPts(prev => prev.slice(0, -1))} className="px-3 py-1.5 rounded hover:bg-slate-700 text-sm">вҶ© Undo</button>
              )}
            </>)}
            {mode === 'rect' && <>
              <button onClick={() => rotate(-90)} className="px-3 py-1.5 rounded hover:bg-slate-700 text-sm">вҶә Rotate L</button>
              <button onClick={() => rotate(90)} className="px-3 py-1.5 rounded hover:bg-slate-700 text-sm">вҶ» Rotate R</button>
            </>}
            <button onClick={reset} className="px-3 py-1.5 rounded hover:bg-slate-700 text-sm">{mode === 'poly' ? 'Clear all' : 'Reset'}</button>
            <span className="mx-1 text-gray-600">|</span>
            <button onClick={() => addPageInputRef.current?.click()} className="px-3 py-1.5 rounded hover:bg-slate-700 text-sm">рҹ“· Add page</button>
          </div>
          {/* Hidden file input for multi-page */}
          <input ref={addPageInputRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handleAddPage} />
        </div>
      );
    };

    const SourceLinksField = ({ sources, onChange }) => {
      const list = Array.isArray(sources) ? sources : [];
      const update = (idx, patch) => {
        const next = list.map((s, i) => i === idx ? { ...s, ...patch } : s);
        onChange(next);
      };
      const remove = (idx) => onChange(list.filter((_, i) => i !== idx));
      const add = () => onChange([...list, { label: '', url: '' }]);
      return (
        <div className="space-y-1.5">
          {list.length === 0 && (
            <p className="text-xs text-gray-400 dark:text-gray-500 italic">No links yet.</p>
          )}
          {list.map((s, idx) => (
            <div key={idx} className="flex gap-1 items-start">
              <div className="flex-1 min-w-0 space-y-1">
                <input
                  type="url"
                  value={s.url || ''}
                  onChange={e => update(idx, { url: e.target.value })}
                  placeholder="https://..."
                  className="w-full px-2 py-1.5 text-xs border rounded dark:bg-slate-800 dark:border-slate-600 dark:text-white"
                />
                <input
                  type="text"
                  value={s.label || ''}
                  onChange={e => update(idx, { label: e.target.value })}
                  placeholder="Display text (optional, e.g. 'Bon Traveler guide')"
                  className="w-full px-2 py-1.5 text-xs border rounded dark:bg-slate-800 dark:border-slate-600 dark:text-white"
                />
              </div>
              <button
                onClick={() => remove(idx)}
                className="text-gray-400 hover:text-red-500 text-xs px-2 py-1 flex-shrink-0"
                title="Remove link"
              >
                вң•
              </button>
            </div>
          ))}
          <button
            onClick={add}
            className="w-full text-xs text-blue-600 dark:text-blue-400 hover:underline py-1 border border-dashed border-blue-300 dark:border-blue-800 rounded"
          >
            + Add source link
          </button>
        </div>
      );
    };

    const SourceField = ({ value, onChange, allPins }) => {
      const [showCustom, setShowCustom] = useState(false);
      const [showManage, setShowManage] = useState(false);
      const [customValue, setCustomValue] = useState('');
      const [hiddenSources, setHiddenSources] = useState(() => {
        try { return JSON.parse(localStorage.getItem('boWanderHiddenSources') || '[]'); } catch { return []; }
      });
      const [deletedSources, setDeletedSources] = useState(() => {
        try { return JSON.parse(localStorage.getItem('boWanderDeletedSources') || '[]'); } catch { return []; }
      });
      const [confirmDelete, setConfirmDelete] = useState(null);

      const defaultSources = ['Lonely Planet', 'Eater', 'Google Maps', 'Yelp', 'Friend recommendation', 'Sarah R.', "Doug's friend"];
      const uniqueSources = [...new Set(allPins.map(p => p.source_name).filter(s => s && !defaultSources.includes(s)))];
      const allSources = [...defaultSources, ...uniqueSources].filter(s => !hiddenSources.includes(s) && !deletedSources.includes(s));

      const handleHideSource = (src) => {
        const updated = [...hiddenSources, src];
        setHiddenSources(updated);
        localStorage.setItem('boWanderHiddenSources', JSON.stringify(updated));
        if (value === src) onChange('');
      };
      const handleRestoreSource = (src) => {
        const updated = hiddenSources.filter(s => s !== src);
        setHiddenSources(updated);
        localStorage.setItem('boWanderHiddenSources', JSON.stringify(updated));
      };
      const handleDeleteSource = (src) => {
        // Remove from hidden list
        const updatedHidden = hiddenSources.filter(s => s !== src);
        setHiddenSources(updatedHidden);
        localStorage.setItem('boWanderHiddenSources', JSON.stringify(updatedHidden));
        // Add to permanently deleted list
        const updatedDeleted = [...deletedSources, src];
        setDeletedSources(updatedDeleted);
        localStorage.setItem('boWanderDeletedSources', JSON.stringify(updatedDeleted));
        setConfirmDelete(null);
      };

      return (
        <div className="space-y-2">
          <div className="flex gap-2">
            <select
              value={showCustom ? '__custom__' : (value || '')}
              onChange={e => {
                if (e.target.value === '__custom__') {
                  setShowCustom(true);
                } else if (e.target.value === '__manage__') {
                  setShowManage(true);
                } else {
                  onChange(e.target.value);
                  setShowCustom(false);
                }
              }}
              className="flex-1 px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white"
            >
              <option value="">Select a source...</option>
              {allSources.map(src => (
                <option key={src} value={src}>{src}</option>
              ))}
              <option value="__custom__">+ Add custom...</option>
              <option value="__manage__">Manage sources...</option>
            </select>
          </div>
          {showCustom && (
            <input
              type="text"
              value={customValue}
              onChange={e => {
                setCustomValue(e.target.value);
                onChange(e.target.value);
              }}
              placeholder="Enter custom source"
              className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white"
              autoFocus
            />
          )}
          {showManage && (
            <div className="border rounded-lg dark:border-slate-700 p-3 space-y-2 bg-gray-50 dark:bg-slate-800">
              <div className="flex justify-between items-center mb-1">
                <p className="text-xs font-semibold text-gray-600 dark:text-gray-400">Manage Sources</p>
                <button onClick={() => setShowManage(false)} className="text-xs text-blue-600 dark:text-blue-400 hover:underline">Done</button>
              </div>
              {allSources.map(src => (
                <div key={src} className="flex justify-between items-center py-1">
                  <span className="text-sm dark:text-white">{src}</span>
                  <button
                    onClick={() => handleHideSource(src)}
                    className="text-xs text-red-500 hover:underline"
                  >Remove</button>
                </div>
              ))}
              {hiddenSources.filter(s => !deletedSources.includes(s)).length > 0 && (
                <div className="pt-2 border-t dark:border-slate-700">
                  <p className="text-xs text-gray-500 dark:text-gray-400 mb-1">Removed</p>
                  {hiddenSources.filter(s => !deletedSources.includes(s)).map(src => (
                    <div key={src} className="flex justify-between items-center py-1">
                      <span className="text-sm text-gray-400 dark:text-gray-500">{src}</span>
                      <div className="flex gap-2">
                        <button
                          onClick={() => handleRestoreSource(src)}
                          className="text-xs text-blue-600 dark:text-blue-400 hover:underline"
                        >Restore</button>
                        {confirmDelete === src ? (
                          <button
                            onClick={() => handleDeleteSource(src)}
                            className="text-xs text-red-600 font-semibold hover:underline"
                          >Confirm?</button>
                        ) : (
                          <button
                            onClick={() => setConfirmDelete(src)}
                            className="text-xs text-gray-400 hover:text-red-500 hover:underline"
                          >Delete</button>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    };
