                            <div>
                              <label className={labelClass}>PIN / access code</label>
                              <input type="text" value={rd.pin || ''} onChange={e => updateRD('pin', e.target.value)} className={fieldClass} placeholder="Optional" data-1p-ignore data-lpignore="true" data-form-type="other" autoComplete="off" />
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })()}

                  <div>
                    <div className="flex items-center justify-between mb-1 gap-2">
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300">Description</label>
                      {/* Quick OCR from photo вҖ” appends extracted text to description */}
                      <label className="text-xs font-medium px-2 py-1 rounded-full border border-blue-300 dark:border-blue-700 text-blue-600 dark:text-blue-300 hover:bg-blue-50 dark:hover:bg-blue-900/30 cursor-pointer flex items-center gap-1 flex-shrink-0" title="Add info from photo (OCR). You'll be able to crop it first.">
                        <input
                          type="file"
                          accept="image/*,.heic,.heif"
                          capture="environment"
                          className="hidden"
                          onChange={async (e) => {
                            const original = e.target.files?.[0];
                            e.target.value = '';
                            if (!original) return;
                            if (typeof Tesseract === 'undefined') {
                              alert('OCR not loaded yet. Try again in a moment.');
                              return;
                            }
                            let file = original;
                            // Auto-convert HEIC/HEIF via heic2any so canvas + Cropper can decode it
                            const lowerName = (original.name || '').toLowerCase();
                            const isHeic = /\.(heic|heif)$/.test(lowerName) || /^image\/heic/.test(original.type) || /^image\/heif/.test(original.type);
                            if (isHeic) {
                              if (typeof heic2any === 'undefined') {
                                alert('HEIC converter not loaded. Refresh the page and try again.');
                                return;
                              }
                              try {
                                const converted = await heic2any({ blob: original, toType: 'image/jpeg', quality: 0.92 });
                                file = new File([converted], (original.name || 'photo').replace(/\.(heic|heif)$/i, '.jpg'), { type: 'image/jpeg' });
                              } catch (err) {
                                console.warn('HEIC conversion failed:', err);
                                alert('Could not convert this HEIC photo. Try taking a fresh shot.');
                                return;
                              }
                            }
                            // Read as data URL for the crop modal
                            const imgUrl = await new Promise((resolve, reject) => {
                              const reader = new FileReader();
                              reader.onload = () => resolve(reader.result);
                              reader.onerror = () => reject(new Error('Could not read file'));
                              reader.readAsDataURL(file);
                            });
                            setOcrCropPending({ imageSrc: imgUrl, fileName: file.name });
                          }}
                        />
                        <span>рҹ“·</span><span>from photo</span>
                      </label>
                    </div>
                    <textarea
                      value={formData.description || ''}
                      onChange={e => handleChange('description', e.target.value)}
                      className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm"
                      rows={2}
                      placeholder="What's special about this place?"
                    />
                  </div>

                  {pin.id && (
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Notes</label>
                    <textarea
                      value={formData.personal_notes || ''}
                      onChange={e => handleChange('personal_notes', e.target.value)}
                      className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm"
                      rows={2}
                      placeholder="Personal notes..."
                    />
                  </div>
                  )}

                  {/* Meal tags вҖ” for itinerary smart filtering */}
                  {(['cafe', 'treats', 'restaurant', 'bar'].includes(formData.category || guessEmojiAndCategory(formData.name || '', '').category)) && (
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Good for</label>
                    <div className="flex gap-2">
                      {[
                        { tag: 'breakfast', label: 'рҹҢ… Breakfast' },
                        { tag: 'lunch', label: 'вҳҖпёҸ Lunch' },
                        { tag: 'dinner', label: 'рҹҢҷ Dinner' },
                      ].map(({ tag, label }) => {
                        const tags = formData.mealTags || [];
                        const active = tags.includes(tag);
                        return (
                          <button key={tag} type="button"
                            onClick={() => handleChange('mealTags', active ? tags.filter(t => t !== tag) : [...tags, tag])}
                            className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${active ? 'bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 ring-1 ring-purple-400' : 'bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-slate-600'}`}
                          >
                            {label}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  )}

                  {/* Collection picker вҖ” only for new pins, not when editing, and not when collection already set */}
                  {!pin.id && !formData.collection_id && (
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Collection</label>
                    {!showNewCollection ? (
                      <div className="flex gap-2">
                        <select
                          value={formData.collection_id}
                          onChange={e => handleChange('collection_id', e.target.value)}
                          className="flex-1 px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white"
                        >
                          {collections.map(c => (
                            <option key={c.id} value={c.id}>{c.name}</option>

                        <button

                          type="text"

                        </button>
                      </div>
                    )}
                  </div>
                  )}
                </div>

              {(!showPlaceSearch || pin.id) && (

          {ocrCropPending && (
            <PhotoCropModal
              imageSrc={ocrCropPending.imageSrc}
              isDarkMode={isDarkMode}
              onCancel={() => setOcrCropPending(null)}
              onApply={async (croppedCanvas) => {
                const fileName = ocrCropPending.fileName;
                const originalSrc = ocrCropPending.imageSrc;
                setOcrCropPending(null);
                setOcrRunning(true);
                handleChange('description', (formData.description || '') + '\n\nрҹ“· Reading photoвҖҰ');

                // Save the cropped image as a photo record (thumbnail + full)
                const savePhoto = (ocrText) => {
                  try {
                    // Create thumbnail (200px wide)
                    const thumbCanvas = document.createElement('canvas');
                    const thumbScale = Math.min(200 / croppedCanvas.width, 200 / croppedCanvas.height, 1);
                    thumbCanvas.width = Math.round(croppedCanvas.width * thumbScale);
                    thumbCanvas.height = Math.round(croppedCanvas.height * thumbScale);
                    thumbCanvas.getContext('2d').drawImage(croppedCanvas, 0, 0, thumbCanvas.width, thumbCanvas.height);
                    const thumb = thumbCanvas.toDataURL('image/jpeg', 0.6);
                    const full = croppedCanvas.toDataURL('image/jpeg', 0.85);
                    const newPhoto = {
                      id: Math.random().toString(36).substr(2, 9),
                      thumbnail: thumb, full: full, name: fileName,
                      ocr_text: ocrText || '',
                      added_at: new Date().toISOString(),
                    };
                    handleChange('info_photos', [...(formData.info_photos || []), newPhoto]);
                  } catch (e) { console.warn('Could not save photo to info_photos:', e); }
                };

                try {
                  // Upscale small crops so Tesseract gets enough pixels
                  const longSide = Math.max(croppedCanvas.width, croppedCanvas.height) || 1;
                  const scale = longSide < 1600 ? 1600 / longSide : 1;
                  let ocrCanvas = croppedCanvas;
                  if (scale !== 1) {
                    const c = document.createElement('canvas');
                    c.width = Math.round(croppedCanvas.width * scale);
                    c.height = Math.round(croppedCanvas.height * scale);
                    const ctx = c.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, c.width, c.height);
                    ctx.drawImage(croppedCanvas, 0, 0, c.width, c.height);
                    ocrCanvas = c;
                  }
                  const result = await Tesseract.recognize(ocrCanvas, 'eng+jpn', { logger: () => {} });
                  const rawText = (result.data?.text || '').trim();
                  const confidence = result.data?.confidence || 0;
                  const ocrLines = rawText
                    .split('\n')
                    .map(l => l.trim())
                    .filter(l => {
                      if (!l) return false;
                      const wordish = (l.match(/[A-Za-z\u3040-\u30ff\u4e00-\u9fff]/g) || []).length;
                      if (l.length >= 3 && wordish / l.length < 0.4) return false;
                      if (l.length <= 2 && !/[.!?]/.test(l)) return false;
                      return true;
                    })
                    .map(l => l.replace(/\s*\|\s*/g, ' '));
                  // Join lines into paragraphs: single newlines become spaces, blank lines become paragraph breaks
                  const cleanedText = ocrLines.reduce((acc, line, i) => {
                    if (!acc) return line;
                    const prevEndsSection = /[.!?:]\s*$/.test(ocrLines[i - 1] || '');
                    const startsWithCap = /^[A-Z\u3040-\u30ff\u4e00-\u9fff]/.test(line);
                    if (prevEndsSection && startsWithCap) return acc + '\n\n' + line;
                    return acc + ' ' + line;
                  }, '').replace(/\n{3,}/g, '\n\n')
                    .trim();
                  const existing = (formData.description || '').replace(/\n\nрҹ“· Reading photoвҖҰ$/, '');
                  const divider = existing ? '\n\n---\n' : '';
                  const wordChars = (cleanedText.match(/[A-Za-z\u3040-\u30ff\u4e00-\u9fff]{2,}/g) || []).length;
                  if (!cleanedText || confidence < 40 || wordChars < 3) {
                    handleChange('description', existing);
                    // Still save the photo even if OCR failed
                    savePhoto('');
                  } else {
                    handleChange('description', `${existing}${divider}рҹ“· From ${fileName}:\n${cleanedText}`);
                    savePhoto(cleanedText);
                  }
                } catch (err) {
                  console.warn('OCR failed:', err);
                  handleChange('description', (formData.description || '').replace(/\n\nрҹ“· Reading photoвҖҰ$/, ''));
                  // Still save the photo even on OCR error
                  savePhoto('');
                }
                setOcrRunning(false);
              }}
            />
          )}
        </div>
      );
    };

    const MapView = ({ pins, selectedPin, onSelectPin, isDarkMode, onNavigate, sidebarWidth = 0, collectionName, onMapCenterChange, panTo, previewPin }) => {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const tileLayerRef = useRef(null);
      const markersRef = useRef(new Map());
      const prevCollectionKey = useRef(null);
      const userLocationRef = useRef(null);
      const userAccuracyRef = useRef(null);
      const previewMarkerRef = useRef(null);
      const pendingFlyRef = useRef(null);

      // Safe wrapper: checks map has valid dimensions before Leaflet fly/pan operations
      const safeFlyTo = useCallback((map, latLng, zoom, opts = {}) => {
        if (!map) return;
        const lat = parseFloat(Array.isArray(latLng) ? latLng[0] : latLng.lat);
        const lng = parseFloat(Array.isArray(latLng) ? latLng[1] : latLng.lng);
        if (isNaN(lat) || isNaN(lng)) { console.warn('[Map] safeFlyTo: invalid coords', latLng); return; }
        const doFly = () => {
          try {
            const size = map.getSize();
            if (!size || size.x === 0 || size.y === 0) {
              map.invalidateSize();
              const retrySize = map.getSize();
              if (!retrySize || retrySize.x === 0 || retrySize.y === 0) {
                console.warn('[Map] safeFlyTo: zero-size container, deferring');
                pendingFlyRef.current = { lat, lng, zoom, opts };
                return;
              }
            }
            map.flyTo([lat, lng], zoom, { duration: 0.5, ...opts });
          } catch (e) {
            console.warn('[Map] safeFlyTo error, trying setView:', e.message);
            try { map.setView([lat, lng], zoom, { animate: false }); } catch (e2) { console.warn('[Map] setView fallback failed:', e2.message); }
          }
        };
        doFly();
      }, []);

      const safeFitBounds = useCallback((map, bounds, opts = {}) => {
        if (!map) return;
        try {
          const size = map.getSize();
          if (!size || size.x === 0 || size.y === 0) {
            map.invalidateSize();
          }
          map.fitBounds(bounds, { padding: [60, 60], maxZoom: 15, animate: true, ...opts });
        } catch (e) { console.warn('[Map] safeFitBounds error:', e.message); }
      }, []);

      // Initialize map once
      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;
        const map = L.map(mapRef.current, {
          zoomControl: false,
          attributionControl: true,
          zoomAnimation: true,
          markerZoomAnimation: true
        }).setView([35.68, 139.69], 12);
        // Place zoom controls on the right (bottom) to avoid colliding with the floating back/search chips
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        mapInstanceRef.current = map;

        // Report map center for search biasing
        const reportCenter = () => {
          if (onMapCenterChange) {
            const c = map.getCenter();
            onMapCenterChange({ lat: c.lat, lng: c.lng });
          }
        };
        map.on('moveend', reportCenter);
        // Report initial center after a short delay
        setTimeout(reportCenter, 600);

        // Force Leaflet to recalculate container size after render
        setTimeout(() => { map.invalidateSize(); if (pendingFlyRef.current) { const { lat, lng, zoom, opts } = pendingFlyRef.current; pendingFlyRef.current = null; safeFlyTo(map, [lat, lng], zoom, opts); } }, 100);
        setTimeout(() => { map.invalidateSize(); if (pendingFlyRef.current) { const { lat, lng, zoom, opts } = pendingFlyRef.current; pendingFlyRef.current = null; safeFlyTo(map, [lat, lng], zoom, opts); } }, 300);
        setTimeout(() => { map.invalidateSize(); if (pendingFlyRef.current) { const { lat, lng, zoom, opts } = pendingFlyRef.current; pendingFlyRef.current = null; safeFlyTo(map, [lat, lng], zoom, opts); } }, 600);

        // Create a dedicated pane for user location so it always renders above pin markers
        if (!map.getPane('userLocationPane')) {
          map.createPane('userLocationPane');
          map.getPane('userLocationPane').style.zIndex = 650; // above markerPane (600)
          map.getPane('userLocationPane').style.pointerEvents = 'none';
        }

        // Request user location and show blue dot with pulse
        let geoWatchId = null;
        if ('geolocation' in navigator) {
          geoWatchId = navigator.geolocation.watchPosition(
            (pos) => {
              const { latitude, longitude, accuracy } = pos.coords;
              if (userLocationRef.current && userLocationRef.current._map) {
                userLocationRef.current.setLatLng([latitude, longitude]);
                if (userAccuracyRef.current) {
                  userAccuracyRef.current.setLatLng([latitude, longitude]);
                  userAccuracyRef.current.setRadius(accuracy);
                }
              } else {
                // Remove stale markers if they exist but aren't on this map
                if (userLocationRef.current) { try { map.removeLayer(userLocationRef.current); } catch(e){} }
                if (userAccuracyRef.current) { try { map.removeLayer(userAccuracyRef.current); } catch(e){} }
                userAccuracyRef.current = L.circle([latitude, longitude], {
                  radius: accuracy,
                  fillColor: '#4285F4',
                  fillOpacity: 0.08,
                  color: '#4285F4',
                  weight: 1,
                  opacity: 0.25,
                  interactive: false,
                  pane: 'userLocationPane'
                }).addTo(map);
                const locIcon = L.divIcon({
                  html: '<div class="user-location-pulse"></div>',
                  iconSize: [20, 20],
                  iconAnchor: [10, 10],
                  className: ''
                });
                userLocationRef.current = L.marker([latitude, longitude], {
                  icon: locIcon,
                  interactive: false,
                  pane: 'userLocationPane',
                  zIndexOffset: 10000
                }).addTo(map);
              }
            },
            (err) => { console.log('[Map] Geolocation error:', err.message); },
            { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
          );
        }

        // Handle window resize + retry pending fly
        const handleResize = () => {
          map.invalidateSize();
          if (pendingFlyRef.current) {
            const { lat, lng, zoom, opts } = pendingFlyRef.current;
            pendingFlyRef.current = null;
            setTimeout(() => safeFlyTo(map, [lat, lng], zoom, opts), 50);
          }
        };
        window.addEventListener('resize', handleResize);

        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        tileLayerRef.current = L.tileLayer(tileUrl, {
          attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);

        return () => {
          window.removeEventListener('resize', handleResize);
          if (geoWatchId != null) navigator.geolocation.clearWatch(geoWatchId);
          userLocationRef.current = null;
          userAccuracyRef.current = null;
          map.remove();
          mapInstanceRef.current = null;
        };
      }, []);

      // Pan/fly to a location when requested externally (e.g. from place search)
      useEffect(() => {
        const map = mapInstanceRef.current;
        console.log('[BoWander Map] panTo effect:', panTo, 'map exists:', !!map);
        if (!map || !panTo) return;
        safeFlyTo(map, [panTo.lat, panTo.lng], panTo.zoom || 15, { duration: 0.8 });
      }, [panTo]);

      // Show/hide preview pin (temporary marker while adding a place)
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        // Remove existing preview marker
        if (previewMarkerRef.current) {
          map.removeLayer(previewMarkerRef.current);
          previewMarkerRef.current = null;
        }
        // Guard against invalid coordinates
        if (previewPin && (isNaN(previewPin.lat) || isNaN(previewPin.lng) || !previewPin.lat || !previewPin.lng)) return;
        // Add new preview marker if we have one
        if (previewPin && previewPin.lat && previewPin.lng) {
          const icon = L.divIcon({
            className: 'preview-pin',
            html: `<div style="
              width: 36px; height: 36px;
              background: #3b82f6;
              border: 3px solid white;
              border-radius: 50%;
              box-shadow: 0 2px 8px rgba(59,130,246,0.5), 0 0 0 4px rgba(59,130,246,0.2);
              display: flex; align-items: center; justify-content: center;
              font-size: 18px;
              animation: pulse-preview 1.5s ease-in-out infinite;
            ">${previewPin.emoji || 'рҹ“Қ'}</div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 18],
          });
          previewMarkerRef.current = L.marker([previewPin.lat, previewPin.lng], { icon, zIndexOffset: 2000 }).addTo(map);
          previewMarkerRef.current.bindTooltip(previewPin.name || 'New pin', { permanent: true, direction: 'top', offset: [0, -20], className: 'preview-tooltip' });
        }
      }, [previewPin]);

      // Update tiles when dark mode changes
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        if (tileLayerRef.current) map.removeLayer(tileLayerRef.current);
        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        tileLayerRef.current = L.tileLayer(tileUrl, {
          attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);
      }, [isDarkMode]);

      // Update markers and fit bounds when pins change
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;

        // Clear old markers
        markersRef.current.forEach(marker => map.removeLayer(marker));
        markersRef.current.clear();

        // Add new markers вҖ” merge co-located pins into single markers
        const validPins = pins.filter(p => typeof p.lat === 'number' && typeof p.lng === 'number' && !isNaN(p.lat) && !isNaN(p.lng) && p.lat !== 0 && p.lng !== 0);
        // Group pins by rounded coords to detect overlaps (within ~10m)
        const coordGroups = {};
        validPins.forEach(pin => {
          const key = `${pin.lat.toFixed(4)},${pin.lng.toFixed(4)}`;
          if (!coordGroups[key]) coordGroups[key] = [];
          coordGroups[key].push(pin);
        });
        // Build a lookup from pin ID to its co-located group
        const pinGroupMap = {};
        Object.values(coordGroups).forEach(group => {
          group.forEach(pin => { pinGroupMap[pin.id] = group; });
        });
        // Track which coord groups have already been rendered
        const renderedGroups = new Set();

        validPins.forEach(pin => {
          const groupKey = `${pin.lat.toFixed(4)},${pin.lng.toFixed(4)}`;
          const group = pinGroupMap[pin.id] || [pin];
          const isGrouped = group.length > 1;

          // For grouped pins, only render one marker (the first in the group)
          if (isGrouped) {
            if (renderedGroups.has(groupKey)) {
              // Still register a reference so selection highlighting works
              const primaryMarker = markersRef.current.get(group[0].id);
              if (primaryMarker) markersRef.current.set(pin.id, primaryMarker);
              return;
            }
            renderedGroups.add(groupKey);
          }

          const isSelected = isGrouped ? group.some(p => selectedPin?.id === p.id) : selectedPin?.id === pin.id;
          const categoryData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
          const colorClass = isSelected ? 'category-pin-selected' : '';
          const icon = L.divIcon({
            html: renderPinHtml(pin, categoryData, colorClass, group),
            iconSize: [isSelected ? 44 : 36, isSelected ? 44 : 36],
            iconAnchor: [isSelected ? 22 : 18, isSelected ? 22 : 18],
            className: 'category-marker'
          });
          try {
            const marker = L.marker([pin.lat, pin.lng], { icon })
              .on('click', () => {
                // Pass the group along with the pin for co-located handling
                if (isGrouped) {
                  const relevant = pickRelevantPin(group);
                  onSelectPin(relevant, group);
                } else {
                  onSelectPin(pin);
                }
              })
              .addTo(map);
            markersRef.current.set(pin.id, marker);
          } catch (e) { console.warn('Marker error for pin', pin.id, e); }
        });

        // Smart center: find today's hotel, or fall back to pin cluster
        const findSmartCenter = () => {
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          // 1. Check for a hotel pin where today falls within check-in вҶ’ check-out
          const hotelPins = validPins.filter(p => p.category === 'hotel' && p.reservation_details);
          for (const hp of hotelPins) {
            const rd = hp.reservation_details;
            const ci = rd.check_in ? new Date(rd.check_in) : null;
            const co = rd.check_out ? new Date(rd.check_out) : null;
            if (ci && !isNaN(ci.getTime())) {
              ci.setHours(0, 0, 0, 0);
              if (co && !isNaN(co.getTime())) {
                co.setHours(0, 0, 0, 0);
                if (today >= ci && today <= co) return { lat: hp.lat, lng: hp.lng, zoom: 14, reason: 'hotel' };
              } else {
                // No checkout вҖ” match check-in day
                if (today.getTime() === ci.getTime()) return { lat: hp.lat, lng: hp.lng, zoom: 14, reason: 'hotel' };
              }
            }
          }
          // 2. Find the upcoming hotel (next check-in within 3 days)
          const threeDays = 3 * 24 * 60 * 60 * 1000;
          let nearestHotel = null;
          let nearestDiff = Infinity;
          for (const hp of hotelPins) {
            const ci = hp.reservation_details.check_in ? new Date(hp.reservation_details.check_in) : null;
            if (ci && !isNaN(ci.getTime())) {
              ci.setHours(0, 0, 0, 0);
              const diff = ci.getTime() - today.getTime();
              if (diff >= 0 && diff < threeDays && diff < nearestDiff) {
                nearestDiff = diff;
                nearestHotel = hp;
              }
            }
          }
          if (nearestHotel) return { lat: nearestHotel.lat, lng: nearestHotel.lng, zoom: 13, reason: 'upcoming' };
          // 3. No matching hotel вҖ” find the densest cluster of pins
          // Use a simple grid-based density approach
          const gridSize = 0.05; // ~5km grid cells
          const cells = {};
          validPins.forEach(p => {
            const key = `${Math.round(p.lat / gridSize)},${Math.round(p.lng / gridSize)}`;
            if (!cells[key]) cells[key] = { pins: [], sumLat: 0, sumLng: 0 };
            cells[key].pins.push(p);
            cells[key].sumLat += p.lat;
            cells[key].sumLng += p.lng;
          });
          // Find the cell with the most pins
          let bestCell = null;
          let bestCount = 0;
          Object.values(cells).forEach(cell => {
            if (cell.pins.length > bestCount) {
              bestCount = cell.pins.length;
              bestCell = cell;
            }
          });
          if (bestCell && bestCount >= 2) {
            const cLat = bestCell.sumLat / bestCell.pins.length;
            const cLng = bestCell.sumLng / bestCell.pins.length;
            return { lat: cLat, lng: cLng, zoom: 13, reason: 'cluster' };
          }
          // 4. Only 1 pin or all spread out вҖ” center on first hotel, or first pin
          if (hotelPins.length > 0) {
            return { lat: hotelPins[0].lat, lng: hotelPins[0].lng, zoom: 13, reason: 'first-hotel' };
          }
          if (validPins.length > 0) {
            return { lat: validPins[0].lat, lng: validPins[0].lng, zoom: 13, reason: 'first-pin' };
          }
          return null;
        };

        // Fit bounds when the set of pins changes (e.g. switching collection)
        const collectionKey = validPins.map(p => p.id).sort().join(',');
        if (validPins.length > 0 && collectionKey !== prevCollectionKey.current) {
          prevCollectionKey.current = collectionKey;
          const smartCenter = findSmartCenter();
          if (smartCenter) {
            safeFlyTo(map, [smartCenter.lat, smartCenter.lng], smartCenter.zoom);
          } else {
            try {
              const bounds = L.latLngBounds(validPins.map(p => [p.lat, p.lng]));
              safeFitBounds(map, bounds);
            } catch(e) { console.warn('bounds error:', e); }
          }
        } else if (validPins.length === 0 && collectionKey !== prevCollectionKey.current) {
          prevCollectionKey.current = collectionKey;
          // No pins вҖ” geocode the collection name to center the map there
          if (collectionName) {
            fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(collectionName)}&limit=1`)
              .then(r => r.json())
              .then(data => {
                const f = data.features?.[0];
                if (f && f.geometry?.coordinates) {
                  const [lng, lat] = f.geometry.coordinates;
                  safeFlyTo(map, [lat, lng], 12);
                }
              })
              .catch(() => {});
          }
        }
      }, [pins, collectionName]);

      // Update marker styles when selection changes (without rebuilding all markers)
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        markersRef.current.forEach((marker, id) => {
          const pin = pins.find(p => p.id === id);
          if (!pin) return;
          const isSelected = selectedPin?.id === id;
          const categoryData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
          const colorClass = isSelected ? 'category-pin-selected' : '';
          const icon = L.divIcon({
            html: renderPinHtml(pin, categoryData, colorClass),
            iconSize: [isSelected ? 44 : 36, isSelected ? 44 : 36],
            iconAnchor: [isSelected ? 22 : 18, isSelected ? 22 : 18],
            className: 'category-marker'
          });
          marker.setIcon(icon);
        });
        if (selectedPin && selectedPin.lat && selectedPin.lng && !isNaN(parseFloat(selectedPin.lat)) && !isNaN(parseFloat(selectedPin.lng))) {
          try {
            const sLat = parseFloat(selectedPin.lat);
            const sLng = parseFloat(selectedPin.lng);
            // Offset the center so the pin appears in the visible map area (left of sidebar)
            const targetZoom = Math.max(map.getZoom(), 14);
            if (sidebarWidth > 0) {
              try {
                const size = map.getSize();
                if (size && size.x > 0 && size.y > 0) {
                  const targetPoint = map.project([sLat, sLng], targetZoom);
                  const offsetPoint = L.point(targetPoint.x + sidebarWidth / 2, targetPoint.y);
                  const offsetLatLng = map.unproject(offsetPoint, targetZoom);
                  safeFlyTo(map, offsetLatLng, targetZoom, { duration: 0.4 });
                } else {
                  safeFlyTo(map, [sLat, sLng], targetZoom, { duration: 0.4 });
                }
              } catch (e) {
                safeFlyTo(map, [sLat, sLng], targetZoom, { duration: 0.4 });
              }
            } else {
              // Mobile: offset pin upward so it's visible above the bottom sheet
              // The sheet covers roughly the bottom 55% of the screen
              try {
                const size = map.getSize();
                if (size && size.x > 0 && size.y > 0 && size.x < 768) {
                  const targetPoint = map.project([sLat, sLng], targetZoom);
                  // Push the pin into the top third of the screen by shifting center down
                  const sheetOffset = size.y * 0.3;
                  const offsetPoint = L.point(targetPoint.x, targetPoint.y + sheetOffset);
                  const offsetLatLng = map.unproject(offsetPoint, targetZoom);
                  safeFlyTo(map, offsetLatLng, targetZoom, { duration: 0.4 });
                } else {
                  safeFlyTo(map, [sLat, sLng], targetZoom, { duration: 0.4 });
                }
              } catch (e) {
                safeFlyTo(map, [sLat, sLng], targetZoom, { duration: 0.4 });
              }
            }
          } catch (e) { console.warn('MapView flyTo error:', e); }
        }
      }, [selectedPin, sidebarWidth]);

      return (
        <div style={{ width: '100%', height: '100%', position: 'relative' }}>
          <div ref={mapRef} style={{ width: '100%', height: '100%' }} />
          {/* Locate me button вҖ” above Leaflet zoom controls */}
          <button
            onClick={() => {
              const map = mapInstanceRef.current;
              if (!map) return;
              if (userLocationRef.current) {
                const ll = userLocationRef.current.getLatLng();
                safeFlyTo(map, [ll.lat, ll.lng], 16);
              } else if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                  (pos) => safeFlyTo(map, [pos.coords.latitude, pos.coords.longitude], 16),
                  () => {},
                  { enableHighAccuracy: true, timeout: 8000 }
                );
              }
            }}
            className="absolute bg-white dark:bg-slate-800 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-md shadow-lg flex items-center justify-center"
            style={{ right: 10, bottom: 90, zIndex: 1000, width: 34, height: 34 }}
            title="Go to my location"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gray-700 dark:text-gray-200">
              <circle cx="12" cy="12" r="3" />
              <path d="M12 2v4M12 18v4M2 12h4M18 12h4" />
            </svg>
          </button>
        </div>
      );
    };

    const ListView = ({ pins, collections, onSelectPin, isDarkMode, onEdit, onDelete, filters: filtersProp, setFilters: setFiltersProp }) => {
      const [sortBy, setSortBy] = useState('name');
      const [expandedCategories, setExpandedCategories] = useState({});
      // Allow filters to be controlled from parent (so the map can use the same filter set)
      const [localFilters, setLocalFilters] = useState({
        openNow: false,
        openAt: null,
        category: null,
        source: null,
        myRating: null,
        googleRating: null,
        vegetarian: false,
      });
      const filters = filtersProp || localFilters;
      const setFilters = setFiltersProp || setLocalFilters;
      const [showOpenAtPicker, setShowOpenAtPicker] = useState(false);
      const [openAtDay, setOpenAtDay] = useState('mon');
      const [openAtTime, setOpenAtTime] = useState('12:00');

      // Group pins by category
      const grouped = useMemo(() => {
        let result = [...pins];

        // Apply filters
        if (filters.openNow) {
          result = result.filter(p => {
            const status = getOpenStatus(p.opening_hours || {});
            return status.status === 'open';
          });
        }
        if (filters.openAt) {
          result = result.filter(p => {
            const day = filters.openAt.day;
            const hours = (p.opening_hours || {})[day];
            // No time specified вҶ’ just check the place has any hours that day
            if (!filters.openAt.time) {
              if (!hours) return false;
              return !/^(closed|close)$/i.test(String(hours).trim());
            }
            const dayIndex = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'].indexOf(day);
            const [h, m] = filters.openAt.time.split(':').map(Number);
            const targetDate = new Date();
            const currentDay = targetDate.getDay();
            const diff = dayIndex - currentDay;
            targetDate.setDate(targetDate.getDate() + diff);
            targetDate.setHours(h, m, 0, 0);
            const status = getOpenStatus(p.opening_hours || {}, targetDate);
            return status.status === 'open';
          });
        }
        if (filters.category) {
          result = result.filter(p => p.category === filters.category);
        }
        if (filters.vegetarian) {
          result = result.filter(p => !!p.is_vegetarian);
        }
        if (filters.source) {
          result = result.filter(p => p.source_name === filters.source);
        }
        if (filters.myRating) {
          result = result.filter(p => (p.personal_rating || 0) >= filters.myRating);
        }
        if (filters.googleRating) {
          result = result.filter(p => (p.google_rating || 0) >= filters.googleRating);
        }

        // Sort
        switch (sortBy) {
          case 'name':
            result.sort((a, b) => a.name.localeCompare(b.name));
            break;
          case 'date':
            result.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            break;
          case 'rating':
            result.sort((a, b) => (b.google_rating || 0) - (a.google_rating || 0));
            break;
          case 'my-rating':
            result.sort((a, b) => (b.personal_rating || 0) - (a.personal_rating || 0));
            break;
          default:
            break;
        }

        // Merge co-located pins (same coordinates) into groups
        const coordGroupMap = {};
        result.forEach(pin => {
          const key = `${parseFloat(pin.lat).toFixed(4)},${parseFloat(pin.lng).toFixed(4)}`;
          if (!coordGroupMap[key]) coordGroupMap[key] = [];
          coordGroupMap[key].push(pin);
        });
        // Keep only the first pin per co-located group, attach group info
        const seen = new Set();
        const deduped = [];
        result.forEach(pin => {
          const key = `${parseFloat(pin.lat).toFixed(4)},${parseFloat(pin.lng).toFixed(4)}`;
          if (seen.has(key)) return;
          seen.add(key);
          const group = coordGroupMap[key];
          // Sort group chronologically
          group.sort((a, b) => {
            const da = a.reservation_details?.check_in ? new Date(a.reservation_details.check_in) : new Date(9999, 0);
            const db = b.reservation_details?.check_in ? new Date(b.reservation_details.check_in) : new Date(9999, 0);
            return da - db;
          });
          const representative = group.length > 1 ? pickRelevantPin(group) : group[0];
          deduped.push({ ...representative, _coLocatedGroup: group.length > 1 ? group : null });
        });

        // Group by category
        const groups = {};
        deduped.forEach(pin => {
          const catId = pin.category || 'other';
          if (!groups[catId]) {
            groups[catId] = [];
          }
          groups[catId].push(pin);
        });

        return groups;
      }, [pins, sortBy, filters]);

      // Get unique categories that have pins
      const categories = useMemo(() => {
        return Object.keys(grouped).map(catId => ({
          id: catId,
          ...PIN_CATEGORIES[catId]
        })).sort((a, b) => a.label.localeCompare(b.label));
      }, [grouped]);

      const toggleCategory = (catId) => {
        setExpandedCategories(prev => ({
          ...prev,
          [catId]: !prev[catId]
        }));
      };

      const sources = [...new Set(pins.map(p => p.source_name).filter(Boolean))];

      return (
        <div className="h-full overflow-y-auto pb-20">
          {/* Controls вҖ” pt-16 so sticky header clears the floating search bar (~64px) above */}
          <div className={`sticky top-0 ${isDarkMode ? 'bg-slate-900' : 'bg-white'} border-b dark:border-slate-700 px-4 pt-16 pb-4 space-y-3 z-10`}>
            <select
              value={sortBy}
              onChange={e => setSortBy(e.target.value)}
              className="w-full pl-3 pr-9 py-2 border rounded dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm"
            >
              <option value="name">Sort by Name</option>
              <option value="date">Sort by Date Added</option>
              <option value="rating">Sort by Rating</option>
              <option value="my-rating">Sort by My Rating</option>
            </select>

            <div className="space-y-2">
              <label className="text-xs font-semibold text-gray-600 dark:text-gray-400 block">Filters</label>
              <div className="flex flex-wrap gap-2">
                <button
                  onClick={() => setFilters(f => ({ ...f, vegetarian: !f.vegetarian }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium transition ${
                    filters.vegetarian
                      ? 'bg-green-700 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                  title="Only show vegetarian-friendly pins"
                >
                  рҹҢұ Veg
                </button>
                {sources.length > 0 && (
                  <select
                    value={filters.source || ''}
                    onChange={e => setFilters(f => ({ ...f, source: e.target.value || null }))}
                    className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                      filters.source
                        ? 'bg-purple-600 text-white'
                        : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                    }`}
                    style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                  >
                    <option value="">Source</option>
                    {sources.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                )}
                <select
                  value={filters.category || ''}
                  onChange={e => setFilters(f => ({ ...f, category: e.target.value || null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                    filters.category
                      ? 'bg-orange-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                  style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                >
                  <option value="">Category</option>
                  {Object.entries(PIN_CATEGORIES).map(([id, cat]) => (
                    <option key={id} value={id}>{cat.icon} {cat.label}</option>
                  ))}
                </select>
                <select
                  value={filters.myRating || ''}
                  onChange={e => setFilters(f => ({ ...f, myRating: e.target.value ? parseInt(e.target.value) : null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                    filters.myRating
                      ? 'bg-yellow-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                  style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                >
                  <option value="">My Rating</option>
                  <option value="1">вҳ… 1+</option>
                  <option value="2">вҳ… 2+</option>
                  <option value="3">вҳ… 3+</option>
                  <option value="4">вҳ… 4+</option>
                  <option value="5">вҳ… 5</option>
                </select>
                <select
                  value={filters.googleRating || ''}
                  onChange={e => setFilters(f => ({ ...f, googleRating: e.target.value ? parseFloat(e.target.value) : null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                    filters.googleRating
                      ? 'bg-blue-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                  style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                >
                  <option value="">Google Rating</option>
                  <option value="3">3+ вҳ…</option>
                  <option value="3.5">3.5+ вҳ…</option>
                  <option value="4">4+ вҳ…</option>
                  <option value="4.5">4.5+ вҳ…</option>
                </select>
                {/* Time-based filters last so the day/time picker that expands below sits directly beneath them */}
                <button
                  onClick={() => setFilters(f => ({ ...f, openNow: !f.openNow, openAt: f.openNow ? f.openAt : null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium transition ${
                    filters.openNow
                      ? 'bg-green-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                >
                  Open Now
                </button>
                <button
                  onClick={() => {
                    if (filters.openAt) {
                      setFilters(f => ({ ...f, openAt: null }));
                      setShowOpenAtPicker(false);
                    } else {
                      setShowOpenAtPicker(!showOpenAtPicker);
                    }
                  }}
                  className={`px-3 py-1 rounded-full text-xs font-medium transition ${
                    filters.openAt
                      ? 'bg-blue-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                >
                  {filters.openAt ? `Open ${filters.openAt.day.toUpperCase()}${filters.openAt.time ? ' ' + filters.openAt.time : ''}` : 'Open at...'}
                </button>
                {(filters.openNow || filters.openAt || filters.category || filters.source || filters.myRating || filters.googleRating || filters.vegetarian) && (
                  <button
                    onClick={() => { setFilters({ openNow: false, openAt: null, category: null, source: null, myRating: null, googleRating: null, vegetarian: false }); setShowOpenAtPicker(false); }}
                    className="px-3 py-1 rounded-full text-xs font-medium bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300 transition hover:bg-red-200"
                  >
                    Clear all
                  </button>
                )}
              </div>
              {showOpenAtPicker && !filters.openAt && (
                <div className={`flex flex-wrap items-center gap-2 p-2 rounded-lg ${isDarkMode ? 'bg-slate-800' : 'bg-gray-100'}`}>
                  <select
                    value={openAtDay}
                    onChange={e => setOpenAtDay(e.target.value)}
                    className="px-2 py-1 rounded text-xs border dark:bg-slate-700 dark:border-slate-600 dark:text-white"
                  >
                    {['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'].map(d => (
                      <option key={d} value={d}>{dayName(d)}</option>
                    ))}
                  </select>
                  <div className="flex items-center gap-1">
                    <input
                      type="time"
                      value={openAtTime || ''}
                      onChange={e => setOpenAtTime(e.target.value)}
                      placeholder="Any time"
                      className="px-2 py-1 rounded text-xs border dark:bg-slate-700 dark:border-slate-600 dark:text-white"
                    />
                    {openAtTime && (
                      <button
                        onClick={() => setOpenAtTime('')}
                        title="Clear time (just search by day)"
                        className="text-xs text-gray-500 dark:text-gray-400 hover:text-red-500 px-1"
                      >
                        вң•
                      </button>
                    )}
                  </div>
                  <button
                    onClick={() => {
                      setFilters(f => ({ ...f, openNow: false, openAt: { day: openAtDay, time: openAtTime || null } }));
                      setShowOpenAtPicker(false);
                    }}
                    className="px-3 py-1 rounded bg-blue-600 text-white text-xs font-medium hover:bg-blue-700 transition"
                  >
                    Apply
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* Grouped List */}
          {categories.length === 0 ? (
            <div className="flex flex-col items-center justify-center h-64 text-gray-500 dark:text-gray-400">
              <p className="text-lg">No pins match your filters</p>
            </div>
          ) : (
            <div className="divide-y dark:divide-slate-700">
              {categories.map(cat => (
                <div key={cat.id}>
                  {/* Category Header */}
                  <button
                    onClick={() => toggleCategory(cat.id)}
                    className={`w-full px-4 py-2 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-slate-800 transition border-b dark:border-slate-700 ${
                      isDarkMode ? 'bg-slate-800' : 'bg-gray-50'
                    }`}
                  >
                    <div className="flex items-center gap-2">
                      <span className="text-sm" style={{ color: cat.color }}>{cat.icon}</span>
                      <div className="text-xs font-semibold dark:text-white">
                        {cat.label} <span className="text-gray-500 dark:text-gray-400 font-normal">({grouped[cat.id].length})</span>
                      </div>
                    </div>
                    <span className={`text-gray-400 text-xs transition transform ${expandedCategories[cat.id] ? 'rotate-180' : ''}`}>
                      в–ј
                    </span>
                  </button>

                  {/* Category Items */}
                  {expandedCategories[cat.id] && (
                    <div className="divide-y dark:divide-slate-700">
                      {grouped[cat.id].map(pin => {
                        const openStatus = getOpenStatus(pin.opening_hours || {});
                        const coGroup = pin._coLocatedGroup;
                        const dates = coGroup
                          ? coGroup.map(p => formatPinDate(p.reservation_details)).filter(Boolean)
                          : [];
                        return (
                          <div
                            key={pin.id}
                            className="px-4 py-2 cursor-pointer hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2"
                            onClick={() => onSelectPin(pin, coGroup)}
                          >
                            <div
                              className="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 text-xs overflow-hidden"
                              style={{ backgroundColor: cat.color }}
                            >
                              {isCustomIcon(pin.emoji) ? (
                                <img src={pin.emoji} alt="" className="w-full h-full object-cover" />
                              ) : pin.emoji}
                            </div>
                            <div className="flex-1 min-w-0">
                              <span className="font-medium dark:text-white text-sm">{pin.name}</span>
                              {dates.length > 0 && (
                                <span className="ml-1.5 text-xs text-gray-400 dark:text-gray-500">
                                  {dates.join(' В· ')}
                                </span>
                              )}
                            </div>
                            <div className="flex items-center gap-1.5 flex-shrink-0">
                              {pin.is_vegetarian && (
                                <span className="text-[10px]" title="Vegetarian-friendly">рҹҢұ</span>
                              )}
                              {coGroup && (
                                <span className="text-xs text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-slate-700 px-1.5 py-0.5 rounded-full">
                                  {coGroup.length}Г—
                                </span>
                              )}
                              {pin.google_rating && (
                                <span className="text-xs text-gray-500 dark:text-gray-400">
                                  вҳ… {pin.google_rating.toFixed(1)}
                                </span>
                              )}
                              <span className={`inline-block w-1.5 h-1.5 rounded-full ${openStatus.status === 'open' ? 'bg-green-500' : 'bg-red-500'}`} />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    const NavigationView = ({ pin, onClose, isDarkMode }) => {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);

      useEffect(() => {
        if (!mapRef.current) return;

        const map = L.map(mapRef.current).setView([pin.lat, pin.lng], 14);
        mapInstanceRef.current = map;

        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        L.tileLayer(tileUrl, {
          attribution: '\u00a9 OpenStreetMap \u00a9 CARTO',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);

        // Destination emoji marker
        const icon = L.divIcon({
          html: isCustomIcon(pin.emoji) ? `<div class="emoji-pin"><img src="${pin.emoji}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;" /></div>` : `<div class="emoji-pin">${pin.emoji}</div>`,
          iconSize: [32, 32], iconAnchor: [16, 16],
          className: 'emoji-marker'
        });
        L.marker([pin.lat, pin.lng], { icon }).addTo(map);

        // Try to get user location and show route
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            const userLat = pos.coords.latitude;
            const userLng = pos.coords.longitude;
            L.circleMarker([userLat, userLng], { radius: 8, fillColor: '#4285F4', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(map);
            L.polyline([[userLat, userLng], [pin.lat, pin.lng]], { color: '#4285F4', weight: 4, opacity: 0.7, dashArray: '8 8' }).addTo(map);
            try { map.fitBounds([[userLat, userLng], [pin.lat, pin.lng]], { padding: [50, 50] }); } catch(e) {}
          }, () => {});
        }

        return () => { map.remove(); };
      }, [pin, isDarkMode]);

      return (
        <div className="fixed inset-0 z-40 flex flex-col dark:bg-slate-900">
          <div className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 p-4 flex items-center justify-between">
            <h2 className="font-semibold dark:text-white">Directions to {pin.name}</h2>
            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
              <CloseIcon />
            </button>
          </div>
          <div ref={mapRef} className="flex-1 w-full" />
          <div className="bg-white dark:bg-slate-800 border-t dark:border-slate-700 p-4 flex gap-2">
            <a
              href={`https://www.google.com/maps/search/${encodeURIComponent(pin.address)}`}
              target="_blank"
              rel="noopener noreferrer"
              className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg text-center hover:bg-blue-700 text-sm"
            >
              Google Maps
            </a>
            <button
              onClick={onClose}
              className="flex-1 px-4 py-2 border border-gray-300 dark:border-slate-600 rounded-lg dark:text-white text-sm hover:bg-gray-100 dark:hover:bg-slate-700"
            >
              Close
            </button>
          </div>
        </div>
      );
    };

    // ---- Toggleable hours display for shared view ----
    const SharedHoursToggle = ({ os, openingHours }) => {
      const [showHours, setShowHours] = useState(false);
      const todayDay = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][new Date().getDay()];
      return (
        <div className="mb-2">
          <button onClick={() => setShowHours(!showHours)} className="flex items-center gap-2 w-full text-left">
            {os && (
              <>
                <span className={`inline-block w-2 h-2 rounded-full ${os.status === 'open' ? 'bg-green-500' : os.status === 'closed' ? 'bg-red-500' : 'bg-gray-400'}`} />
                <span className={`text-xs font-semibold ${os.status === 'open' ? 'text-green-600' : os.status === 'closed' ? 'text-red-600' : 'text-gray-500'}`}>
                  {os.label}
                </span>
              </>
            )}
            <span className="text-xs text-gray-400">{showHours ? 'в–І' : 'в–ј'}</span>
          </button>
          {showHours && openingHours && (
            <div className="space-y-0.5 mt-1.5 ml-4">
              {['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'].map(day => {
                const isToday = day === todayDay;
                return (
                  <div key={day} className={`text-xs flex justify-between ${isToday ? 'font-bold text-gray-900 dark:text-white' : 'text-gray-600 dark:text-gray-400'}`}>
                    <span className="font-medium">{dayName(day)}{isToday ? ' (today)' : ''}</span>
                    <span>{openingHours[day] || 'Closed'}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // ==================== SHARED MAP VIEW (read-only, no auth) ====================
    const SharedMapView = ({ shareId, isDarkMode }) => {
      const [sharedData, setSharedData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [selectedPin, setSelectedPin] = useState(null);
      const [sharedViewMode, setSharedViewMode] = useState('map'); // 'map' or 'list'
      const [sharedFilters, setSharedFilters] = useState({
        openNow: false, openAt: null, category: null, source: null, googleRating: null, vegetarian: false,
      });
      const [sharedSortBy, setSharedSortBy] = useState('name');
      const [sharedExpandedCats, setSharedExpandedCats] = useState({});
      const [sharedShowOpenAtPicker, setSharedShowOpenAtPicker] = useState(false);
      const [sharedOpenAtDay, setSharedOpenAtDay] = useState('mon');
      const [sharedOpenAtTime, setSharedOpenAtTime] = useState('12:00');
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markersRef = useRef([]);

      useEffect(() => {
        (async () => {
          try {
            // Sign in anonymously to read shared data
            if (!firebase.auth().currentUser) {
              await firebase.auth().signInAnonymously();
            }
            const data = await MockFirebase.loadSharedMap(shareId);
            if (data) {
              setSharedData(data);
              document.title = `Bo Wander - ${data.collection_name || 'Shared Map'}`;
            } else {
              setError('This shared map was not found or has been removed.');
            }
          } catch (e) {
            console.warn('Shared map load error:', e);
            setError('Unable to load this shared map. It may not exist or may have been removed.');
          }
          setLoading(false);
        })();
      }, [shareId]);

      // Init Leaflet map (only when in map mode) вҖ” use small delay to ensure DOM is ready
      useEffect(() => {
        if (!sharedData || sharedViewMode !== 'map') return;

        const initTimer = setTimeout(() => {
          const container = mapRef.current;
          if (!container) return;

          // Clean up old map instance if switching back
          if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; markersRef.current = []; }

          const pins = sharedData.pins || [];
          const validPins = pins.filter(p => p.lat && p.lng);
          const center = validPins.length > 0 ? [validPins[0].lat, validPins[0].lng] : [35.6762, 139.6503];

          // Force container to have explicit dimensions before map init
          container.style.width = '100%';
          container.style.height = '100%';
          container.style.minHeight = '300px';

          const map = L.map(container, { zoomControl: false }).setView(center, 13);
          L.control.zoom({ position: 'bottomright' }).addTo(map);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png', {
            attribution: '\u00a9 OpenStreetMap \u00a9 CARTO',
            subdomains: 'abcd',
            maxZoom: 20
          }).addTo(map);
          mapInstanceRef.current = map;

          // Add markers
          validPins.forEach(pin => {
            const marker = L.marker([pin.lat, pin.lng], {
              icon: L.divIcon({
                className: 'shared-pin-marker',
                html: `<div style="font-size:24px;text-align:center;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">${pin.emoji || 'рҹ“Қ'}</div>`,
                iconSize: [32, 32],
                iconAnchor: [16, 16]
              })
            }).addTo(map);
            marker.on('click', () => setSelectedPin(pin));
            markersRef.current.push(marker);
          });

          // Aggressive invalidateSize to handle in-app browsers (iMessage, etc.)
          const fitMap = () => {
            map.invalidateSize();
            if (validPins.length > 1) {
              const bounds = L.latLngBounds(validPins.map(p => [p.lat, p.lng]));
              map.fitBounds(bounds, { padding: [40, 40] });
            }
          };
          map.whenReady(() => {
            fitMap();
            setTimeout(fitMap, 200);
          });
          setTimeout(fitMap, 100);
          setTimeout(() => map.invalidateSize(), 500);
          setTimeout(() => map.invalidateSize(), 1000);
          setTimeout(() => map.invalidateSize(), 2000);
        }, 50);

        return () => {
          clearTimeout(initTimer);
          if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; markersRef.current = []; }
        };
      }, [sharedData, sharedViewMode]);

      // Filtered + sorted + grouped pins for list view
      const sharedGrouped = useMemo(() => {
        if (!sharedData) return {};
        let result = [...(sharedData.pins || [])];

        // Apply filters
        if (sharedFilters.openNow) {
          result = result.filter(p => {
            const status = getOpenStatus(p.opening_hours || {});
            return status.status === 'open';
          });
        }
        if (sharedFilters.openAt) {
          result = result.filter(p => {
            const day = sharedFilters.openAt.day;
            const hours = (p.opening_hours || {})[day];
            if (!sharedFilters.openAt.time) {
              if (!hours) return false;
              return !/^(closed|close)$/i.test(String(hours).trim());
            }
            const dayIndex = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'].indexOf(day);
            const [h, m] = sharedFilters.openAt.time.split(':').map(Number);
            const targetDate = new Date();
            const currentDay = targetDate.getDay();
            const diff = dayIndex - currentDay;
            targetDate.setDate(targetDate.getDate() + diff);
            targetDate.setHours(h, m, 0, 0);
            const status = getOpenStatus(p.opening_hours || {}, targetDate);
            return status.status === 'open';
          });
        }
        if (sharedFilters.category) {
          result = result.filter(p => p.category === sharedFilters.category);
        }
        if (sharedFilters.vegetarian) {
          result = result.filter(p => !!p.is_vegetarian);
        }
        if (sharedFilters.source) {
          result = result.filter(p => p.source_name === sharedFilters.source);
        }
        if (sharedFilters.googleRating) {
          result = result.filter(p => (p.google_rating || 0) >= sharedFilters.googleRating);
        }

        // Sort
        switch (sharedSortBy) {
          case 'name': result.sort((a, b) => a.name.localeCompare(b.name)); break;
          case 'rating': result.sort((a, b) => (b.google_rating || 0) - (a.google_rating || 0)); break;
          default: break;
        }

        // Group by category
        const groups = {};
        result.forEach(pin => {
          const catId = pin.category || 'other';
          if (!groups[catId]) groups[catId] = [];
          groups[catId].push(pin);
        });
        return groups;
      }, [sharedData, sharedFilters, sharedSortBy]);

      const sharedCategories = useMemo(() => {
        return Object.keys(sharedGrouped).map(catId => ({
          id: catId,
          ...PIN_CATEGORIES[catId]
        })).sort((a, b) => (a.label || '').localeCompare(b.label || ''));
      }, [sharedGrouped]);

      const sharedSources = useMemo(() => {
        if (!sharedData) return [];
        return [...new Set((sharedData.pins || []).map(p => p.source_name).filter(Boolean))];
      }, [sharedData]);

      if (loading) {
        return (
          <div className={`${isDarkMode ? 'dark' : ''} flex items-center justify-center h-screen w-screen bg-white dark:bg-slate-900`}>
            <div className="text-center">
              <div className="loading-spinner mx-auto mb-3" />
              <p className="text-sm text-gray-500 dark:text-gray-400">Loading shared map...</p>
            </div>
          </div>
        );
      }

      if (error) {
        return (
          <div className={`${isDarkMode ? 'dark' : ''} flex items-center justify-center h-screen w-screen bg-white dark:bg-slate-900`}>
            <div className="text-center p-8 max-w-sm">
              <p className="text-4xl mb-4">рҹ—әпёҸ</p>
              <p className="text-lg font-semibold dark:text-white mb-2">Map not found</p>
              <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">{error}</p>
              <a href="#home" className="text-sm text-blue-600 hover:underline">Go to Bo Wander вҶ’</a>
            </div>
          </div>
        );
      }

      const openStatus = (pin) => {
        if (!pin.opening_hours || Object.keys(pin.opening_hours).length === 0) return null;
        return getOpenStatus(pin.opening_hours);
      };

      return (
        <div className={`${isDarkMode ? 'dark' : ''} h-screen w-screen bg-white dark:bg-slate-900 overflow-hidden flex flex-col`}>
          {/* Header with Map/List toggle */}
          <div className="flex items-center gap-3 px-4 py-3 bg-white dark:bg-slate-900 border-b dark:border-slate-700 flex-shrink-0" style={{ zIndex: 1000 }}>
            <span className="text-2xl">{sharedData.collection_emoji || 'рҹ—әпёҸ'}</span>
            <div className="flex-1 min-w-0">
              <h1 className="text-lg font-bold dark:text-white truncate">{sharedData.collection_name}</h1>
              <p className="text-xs text-gray-500 dark:text-gray-400">
                Shared by {sharedData.owner_name} В· {sharedData.pins?.length || 0} pins
              </p>
            </div>
            <div className="flex bg-gray-100 dark:bg-slate-700 rounded-lg p-0.5 flex-shrink-0">
              <button
                onClick={() => setSharedViewMode('map')}
                className={`px-3 py-1 rounded text-xs font-medium transition ${sharedViewMode === 'map' ? 'bg-white dark:bg-slate-600 text-gray-900 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400'}`}
              >Map</button>
              <button
                onClick={() => setSharedViewMode('list')}
                className={`px-3 py-1 rounded text-xs font-medium transition ${sharedViewMode === 'list' ? 'bg-white dark:bg-slate-600 text-gray-900 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400'}`}
              >List</button>
            </div>
          </div>

          {/* MAP VIEW */}
          {sharedViewMode === 'map' && (
            <div className="flex-1 flex overflow-hidden" style={{ minHeight: 0 }}>
              {/* Category-grouped sidebar (desktop only) */}
              <div className="w-80 hidden md:flex flex-col border-r dark:border-slate-700 bg-gray-50 dark:bg-slate-800 overflow-y-auto flex-shrink-0">
                {/* Filters */}
                <div className="px-3 py-2 border-b dark:border-slate-700 bg-white dark:bg-slate-900 space-y-2">
                  <div className="flex flex-wrap gap-1.5">
                    <button
                      onClick={() => setSharedFilters(f => ({ ...f, vegetarian: !f.vegetarian }))}
                      className={`px-2 py-0.5 rounded-full text-[11px] font-medium transition ${
                        sharedFilters.vegetarian ? 'bg-green-700 text-white' : 'bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300'
                      }`}
                    >рҹҢұ Veg</button>
                    {sharedSources.length > 0 && (
                      <select
                        value={sharedFilters.source || ''}
                        onChange={e => setSharedFilters(f => ({ ...f, source: e.target.value || null }))}
                        className={`px-2 py-0.5 rounded-full text-[11px] font-medium border-0 appearance-none cursor-pointer transition ${
                          sharedFilters.source ? 'bg-purple-600 text-white' : 'bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300'
                        }`}
                        style={{ paddingRight: '1.2rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.2rem center', backgroundSize: '0.8rem' }}
                      >
                        <option value="">Source</option>
                        {sharedSources.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                    )}
                    <select
                      value={sharedFilters.category || ''}
                      onChange={e => setSharedFilters(f => ({ ...f, category: e.target.value || null }))}
                      className={`px-2 py-0.5 rounded-full text-[11px] font-medium border-0 appearance-none cursor-pointer transition ${
                        sharedFilters.category ? 'bg-orange-600 text-white' : 'bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300'
                      }`}
                      style={{ paddingRight: '1.2rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.2rem center', backgroundSize: '0.8rem' }}
                    >
                      <option value="">Category</option>
                      {Object.entries(PIN_CATEGORIES).map(([id, cat]) => (
                        <option key={id} value={id}>{cat.icon} {cat.label}</option>
                      ))}
                    </select>
                    <select
                      value={sharedFilters.googleRating || ''}
                      onChange={e => setSharedFilters(f => ({ ...f, googleRating: e.target.value ? parseFloat(e.target.value) : null }))}
                      className={`px-2 py-0.5 rounded-full text-[11px] font-medium border-0 appearance-none cursor-pointer transition ${
                        sharedFilters.googleRating ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300'
                      }`}
                      style={{ paddingRight: '1.2rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.2rem center', backgroundSize: '0.8rem' }}
                    >
                      <option value="">Rating</option>
                      <option value="3">3+ вҳ…</option>
                      <option value="3.5">3.5+ вҳ…</option>
                      <option value="4">4+ вҳ…</option>
                      <option value="4.5">4.5+ вҳ…</option>
                    </select>
                    <button
                      onClick={() => setSharedFilters(f => ({ ...f, openNow: !f.openNow, openAt: f.openNow ? f.openAt : null }))}
                      className={`px-2 py-0.5 rounded-full text-[11px] font-medium transition ${
                        sharedFilters.openNow ? 'bg-green-600 text-white' : 'bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300'
                      }`}
                    >Open Now</button>
                    <button
                      onClick={() => {
                        if (sharedFilters.openAt) {
                          setSharedFilters(f => ({ ...f, openAt: null }));
                          setSharedShowOpenAtPicker(false);
                        } else {
                          setSharedShowOpenAtPicker(!sharedShowOpenAtPicker);
                        }
                      }}
                      className={`px-2 py-0.5 rounded-full text-[11px] font-medium transition ${
                        sharedFilters.openAt ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300'
                      }`}
                    >
                      {sharedFilters.openAt ? `Open ${sharedFilters.openAt.day.toUpperCase()}${sharedFilters.openAt.time ? ' ' + sharedFilters.openAt.time : ''}` : 'Open at...'}
                    </button>
                    {(sharedFilters.openNow || sharedFilters.openAt || sharedFilters.category || sharedFilters.source || sharedFilters.googleRating || sharedFilters.vegetarian) && (
                      <button
                        onClick={() => { setSharedFilters({ openNow: false, openAt: null, category: null, source: null, googleRating: null, vegetarian: false }); setSharedShowOpenAtPicker(false); }}
                        className="px-2 py-0.5 rounded-full text-[11px] font-medium bg-red-100 dark:bg-red-900 text-red-600 dark:text-red-300"
                      >Clear</button>
                    )}
                  </div>
                  {sharedShowOpenAtPicker && !sharedFilters.openAt && (
                    <div className="flex flex-wrap items-center gap-1.5 p-2 rounded-lg bg-gray-100 dark:bg-slate-800">
                      <select value={sharedOpenAtDay} onChange={e => setSharedOpenAtDay(e.target.value)}
                        className="px-2 py-0.5 rounded text-[11px] border dark:bg-slate-700 dark:border-slate-600 dark:text-white">
                        {['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'].map(d => (
                          <option key={d} value={d}>{dayName(d)}</option>
                        ))}
                      </select>
                      <input type="time" value={sharedOpenAtTime || ''} onChange={e => setSharedOpenAtTime(e.target.value)}
                        className="px-2 py-0.5 rounded text-[11px] border dark:bg-slate-700 dark:border-slate-600 dark:text-white" />
                      <button
                        onClick={() => {
                          setSharedFilters(f => ({ ...f, openNow: false, openAt: { day: sharedOpenAtDay, time: sharedOpenAtTime || null } }));
                          setSharedShowOpenAtPicker(false);
