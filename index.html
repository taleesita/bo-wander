      try {
        // Convert data URL to blob
        const [header, b64] = dataUrl.split(',');
        const mime = header.match(/:(.*?);/)?.[1] || 'application/octet-stream';
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const blob = new Blob([bytes], { type: mime });
        const blobUrl = URL.createObjectURL(blob);
        window.open(blobUrl, '_blank');
        // Revoke after a delay to allow the new tab to load
        setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);
      } catch (e) {
        console.error('Failed to open file:', e);

        return Promise.resolve();

    const getOpenStatus = (openingHours, customDate) => {
      const now = customDate || new Date();
      const dayOfWeek = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][now.getDay()];
      const currentHours = openingHours[dayOfWeek];

      if (!currentHours || currentHours === 'Closed') {
        return { status: 'closed', label: 'Closed', hoursText: currentHours || 'Closed' };
      }

      // If we have a custom time, try to parse hours and check if within range
      if (customDate && currentHours && currentHours !== 'Closed') {
        const timeMatch = currentHours.match(/(\d{1,2}):?(\d{2})?\s*(am|pm)?\s*[-вАУ]\s*(\d{1,2}):?(\d{2})?\s*(am|pm)?/i);
        if (timeMatch) {
          let openH = parseInt(timeMatch[1]);
          const openM = parseInt(timeMatch[2] || '0');
          const openAmPm = (timeMatch[3] || '').toLowerCase();
          let closeH = parseInt(timeMatch[4]);
          const closeM = parseInt(timeMatch[5] || '0');
          const closeAmPm = (timeMatch[6] || '').toLowerCase();

          if (openAmPm === 'pm' && openH < 12) openH += 12;
          if (openAmPm === 'am' && openH === 12) openH = 0;
          if (closeAmPm === 'pm' && closeH < 12) closeH += 12;
          if (closeAmPm === 'am' && closeH === 12) closeH = 0;

          const checkTime = customDate.getHours() * 60 + customDate.getMinutes();
          const openTime = openH * 60 + openM;
          const closeTime = closeH * 60 + closeM;

          if (closeTime > openTime) {
            if (checkTime >= openTime && checkTime <= closeTime) {
              return { status: 'open', label: 'Open', hoursText: currentHours };
            } else {
              return { status: 'closed', label: 'Closed', hoursText: currentHours };
            }
          } else {
            // Wraps past midnight
            if (checkTime >= openTime || checkTime <= closeTime) {
              return { status: 'open', label: 'Open', hoursText: currentHours };
            } else {
              return { status: 'closed', label: 'Closed', hoursText: currentHours };
            }
          }
        }
      }

      if (currentHours && currentHours !== 'Closed') {
        return { status: 'open', label: 'Open', hoursText: currentHours };
      }

      return { status: 'unknown', label: 'Hours not available', hoursText: '' };
    };

      const Container = isDesktop ? 'div' : 'div';
      const containerClass = isDesktop

      const inputClass = "w-full px-3 py-1.5 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none";

      return (

          <div className="p-6 space-y-4">
            {/* Header: Emoji + Name */}
            <div className="flex items-start justify-between">

                <div className="flex-1 min-w-0">

            {/* Address вАФ second field to match Add form order */}
            <div className="space-y-2">

                  <div className="flex gap-2">

            {/* Source вАФ third field to match Add form order */}

            {/* Category вАФ fourth field to match Add form order */}

            {/* Description вАФ fifth field to match Add form order */}

                <textarea

            {/* Attachment / Booking file */}

            {/* Opening Hours вАФ view only */}
            {!editing && Object.keys(pin.opening_hours || {}).length > 0 && (
              <div className="space-y-2">
                <div className="flex items-center gap-2">

                </div>
                <div className="space-y-1">
                  {['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'].map(day => {

            {/* Ratings вАФ always read-only */}
            {(pin.google_rating || pin.yelp_rating) && (
              <div className="space-y-2 pt-2 border-t dark:border-slate-700">
                {pin.google_rating && (
                  <div className="flex items-center justify-between">
                    <div className="flex-1">
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-semibold text-gray-600 dark:text-gray-400">Google</span>
                        <span className="text-amber-400">в≠Р</span>
                        <span className="text-xs font-semibold text-gray-800 dark:text-gray-200">

                        </span>

                          ¬Ј {pin.google_reviews_count?.toLocaleString() || 0} reviews
                        </span>
                        {pin.price_level && (
                          <span className="text-xs text-green-600 dark:text-green-400 font-medium">{pin.price_level}</span>
                        )}
                      </div>
                    </div>
                    <div className="flex items-center gap-2 ml-2">
                      {pin.website && (
                        <a href={pin.website} target="_blank" rel="noopener noreferrer"
                          className="text-blue-600 dark:text-blue-400 text-xs hover:underline whitespace-nowrap">
                          Website
                        </a>
                      )}
                      <a
                        href={pin.google_maps_url || `https://www.google.com/maps/search/${encodeURIComponent(pin.name)}`}
                        target="_blank" rel="noopener noreferrer"
                        className="text-blue-600 dark:text-blue-400 text-xs hover:underline whitespace-nowrap"
                      >
                        Maps
                      </a>
                    </div>
                  </div>
                )}
                {pin.yelp_rating && (
                  <div className="flex items-center justify-between">
                    <div className="flex-1">
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-semibold text-gray-600 dark:text-gray-400">Yelp</span>
                        <span className="text-amber-400">в≠Р</span>
                        <span className="text-xs font-semibold text-gray-800 dark:text-gray-200">
                          {pin.yelp_rating.toFixed(1)}
                        </span>
                        <span className="text-xs text-gray-500 dark:text-gray-400">
                          ¬Ј {pin.yelp_reviews_count?.toLocaleString() || 0} reviews
                        </span>
                      </div>
                    </div>
                    <a
                      href={`https://www.yelp.com/search?find_desc=${encodeURIComponent(pin.name)}`}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="text-blue-600 dark:text-blue-400 text-xs hover:underline whitespace-nowrap ml-2"
                    >
                      View
                    </a>
                  </div>

            {!editing && !pin.google_rating && !pin.yelp_rating && (
              <div className="pt-2 border-t dark:border-slate-700 space-y-2">
                {fetchingRatings ? (
                  <div>
                    <p className="text-sm text-gray-500 animate-pulse">{ratingFetchStatus || 'Fetching ratings...'}</p>
                  </div>
                ) : (

                    {ratingFetchStatus && (
                      <p className="text-xs text-gray-400">{ratingFetchStatus}</p>

                      <a
                        href={`https://www.google.com/maps/search/${encodeURIComponent(pin.name + ' ' + (pin.address || ''))}`}

                      </a>

                          className="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"

            {/* Personal Rating вАФ inline editable */}

              <span className="text-xs font-semibold text-gray-600 dark:text-gray-400">My Rating</span>
              <RatingStars
                rating={pin.personal_rating}
                onRate={(rating) => {
                  if (onInlineUpdate) onInlineUpdate({ ...pin, personal_rating: rating });
                }}
                color="purple"
              />
            </div>

            {/* Personal Notes */}
            {editing ? (
              <div>
                <label className="text-xs font-semibold text-gray-600 dark:text-gray-400 block mb-1">My Notes</label>
                <textarea
                  value={editData.personal_notes}
                  onChange={e => setEditData(d => ({ ...d, personal_notes: e.target.value }))}
                  className={inputClass}
                  rows={3}
                  placeholder="Personal notes..."
                />
              </div>
            ) : (
              <InlineEditableText
                label="My Notes"
                value={pin.personal_notes || ''}
                onSave={(notes) => {
                  if (onInlineUpdate) onInlineUpdate({ ...pin, personal_notes: notes });
                }}
                placeholder="Add personal notes..."
                emptyText="No notes yet вАФ tap to add"
              />
            )}

            {/* Action Buttons */}
            <div className="flex gap-2 border-t dark:border-slate-700 pt-4">
              {editing ? (
                <>
                  <button
                    onClick={cancelEditing}
                    className="flex-1 flex items-center justify-center gap-2 border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 px-3 py-2 rounded-lg text-sm hover:bg-gray-100 dark:hover:bg-slate-700"
                  >
                    Cancel
                  </button>
                  <button
                    onClick={saveEditing}
                    className="flex-1 flex items-center justify-center gap-2 bg-blue-600 text-white px-3 py-2 rounded-lg text-sm hover:bg-blue-700 font-medium"

                  </button>

              ) : (
                <>
                  {showTranslate && (
                    <button
                      onClick={handleTranslate}
                      disabled={translating}
                      className="flex-1 flex items-center justify-center gap-2 bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm hover:bg-gray-300 dark:hover:bg-slate-600 disabled:opacity-50"
                    >
                      <TranslateIcon /> {translating ? 'Translating...' : 'Translate'}
                    </button>
                  )}
                  <button
                    onClick={startEditing}
                    className="flex-1 flex items-center justify-center gap-2 bg-blue-600 text-white px-3 py-2 rounded-lg text-sm hover:bg-blue-700"
                  >
                    <PencilIcon /> Edit
                  </button>
                  <button
                    onClick={() => {
                      if (confirm('Delete this pin?')) {

                    className="flex-1 flex items-center justify-center gap-2 bg-red-600 text-white px-3 py-2 rounded-lg text-sm hover:bg-red-700"
                  >

          </div>
          {showEmojiPicker && (
            <EmojiPicker
              selectedEmoji={editData.emoji}
              customIcons={customIcons || []}
              onUploadIcon={onUploadIcon}
              onDeleteIcon={onDeleteIcon}
              onSelect={icon => {
                setEditData(d => ({ ...d, emoji: icon }));
                setShowEmojiPicker(false);
              }}
              onClose={() => setShowEmojiPicker(false)}
            />
          )}
        </Container>
      );
    };

    // Unified search bar вАФ searches existing pins + Photon (Komoot) for places/businesses
    const UnifiedSearchBar = ({ pins, onSelectPin, onAddPlace, onUploadConfirmation, onAddFromLink, isDarkMode, isMobile, activeCollection, collections, mapCenter }) => {
      const [query, setQuery] = useState('');
      const [placeResults, setPlaceResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [isFocused, setIsFocused] = useState(false);
      const timerRef = useRef(null);
      const searchIdRef = useRef(0); // track search requests to avoid stale results
      const containerRef = useRef(null);
      const inputWrapRef = useRef(null);
      const dropdownRef = useRef(null);
      const [dropdownPos, setDropdownPos] = useState(null);

      // Search using Photon API + Google Places API for businesses
      const doPlaceSearch = useCallback(async (q) => {
        if (q.length < 2) { setPlaceResults([]); return; }
        setSearching(true);
        const searchId = ++searchIdRef.current;

        try {
          // Build Photon URL with location bias
          let photonUrl = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5`;
          if (mapCenter && mapCenter.lat && mapCenter.lng) {
            photonUrl += `&lat=${mapCenter.lat}&lon=${mapCenter.lng}`;
          }

          // Search Photon and Google in parallel
          const [photonResp, googleResults] = await Promise.all([
            fetch(photonUrl).then(r => r.json()).catch(() => ({ features: [] })),
            (async () => {
              const apiKey = getGoogleApiKey();
              console.log('[BoWander Search] Google API key:', apiKey ? `${apiKey.substring(0,10)}...` : 'NONE');
              if (!apiKey) return [];
              try {
                const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'X-Goog-Api-Key': apiKey,
                    'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.location,places.types'
                  },
                  body: JSON.stringify({
                    textQuery: q,
                    maxResultCount: 5,
                    ...(mapCenter?.lat ? { locationBias: { circle: { center: { latitude: mapCenter.lat, longitude: mapCenter.lng }, radius: 50000.0 }}} : {})
                  })
                });
                console.log('[BoWander Search] Google Places response:', resp.status);
                if (!resp.ok) {
                  const errText = await resp.text();
                  console.error('[BoWander Search] Google Places error:', errText);
                  return [];
                }
                const data = await resp.json();
                console.log('[BoWander Search] Google Places results:', data.places?.length || 0, data);
                return (data.places || []).map(p => ({
                  name: p.displayName?.text || '',
                  address: p.formattedAddress || '',
                  lat: p.location?.latitude,
                  lng: p.location?.longitude,
                  type: p.types?.[0] || '',
                  source: 'google',
                })).filter(r => r.name && r.lat && r.lng);
              } catch (e) { console.error('[BoWander Search] Google fetch error:', e); return []; }
            })()
          ]);

          if (searchId !== searchIdRef.current) return;

          console.log('[BoWander Search] Photon results:', photonResp.features?.length || 0, 'Google results:', googleResults.length);

          // Parse Photon results
          const photonResults = (photonResp.features || []).map(f => {
            const p = f.properties || {};
            const geo = f.geometry?.coordinates || [];
            const name = p.name || p.street || '';
            const parts = [p.street, p.housenumber].filter(Boolean).join(' ');
            const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
            return {
              name, address: [parts || name, locality].filter(Boolean).join(', '),
              lat: geo[1], lng: geo[0],
              type: p.osm_value || p.osm_key || '', osmType: p.osm_type || '',
              source: 'osm',
            };
          }).filter(r => r.name && r.lat && r.lng);

          // Merge: Google first (better for businesses), then Photon, deduplicate
          const seen = new Set();
          const merged = [];
          for (const r of [...googleResults, ...photonResults]) {
            const key = r.name.toLowerCase().trim();
            if (!seen.has(key)) {
              seen.add(key);
              merged.push(r);
            }
          }

          setPlaceResults(merged.slice(0, 8));
        } catch {}
        if (searchId === searchIdRef.current) setSearching(false);
      }, [mapCenter]);

      const handleInput = (val) => {
        setQuery(val);
        // Clear stale results immediately when query changes
        if (val.length < 2) {
          setPlaceResults([]);
          setSearching(false);
        }
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => doPlaceSearch(val), 300);
      };

      // Filter and sort existing pins вАФ current collection first, then others
      const matchingPins = useMemo(() => {
        if (!query || query.length < 2) return [];
        const q = query.toLowerCase();
        const matches = pins.filter(p =>
          p.name.toLowerCase().includes(q) ||
          p.address?.toLowerCase().includes(q) ||
          p.source_name?.toLowerCase().includes(q)
        );
        // Sort: current collection first, then alphabetical
        matches.sort((a, b) => {
          const aInCollection = a.collection_id === activeCollection ? 0 : 1;
          const bInCollection = b.collection_id === activeCollection ? 0 : 1;
          if (aInCollection !== bInCollection) return aInCollection - bInCollection;
          // Within same group, prefer name match over address/source match
          const aNameMatch = a.name.toLowerCase().includes(q) ? 0 : 1;
          const bNameMatch = b.name.toLowerCase().includes(q) ? 0 : 1;
          if (aNameMatch !== bNameMatch) return aNameMatch - bNameMatch;
          return a.name.localeCompare(b.name);
        });
        return matches.slice(0, 8);
      }, [query, pins, activeCollection]);

      const showDropdown = isFocused && query.length >= 2 && (matchingPins.length > 0 || placeResults.length > 0 || searching);

      // Update dropdown position when it should show
      useEffect(() => {
        if (inputWrapRef.current && showDropdown) {
          const rect = inputWrapRef.current.getBoundingClientRect();
          setDropdownPos({ top: rect.bottom, left: rect.left, width: rect.width });
        }
      }, [showDropdown]);

      // Close on outside click (check both container and portaled dropdown)
      useEffect(() => {
        const handler = (e) => {
          const inContainer = containerRef.current && containerRef.current.contains(e.target);
          const inDropdown = dropdownRef.current && dropdownRef.current.contains(e.target);
          if (!inContainer && !inDropdown) {
            setIsFocused(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const dropdownContent = showDropdown && dropdownPos ? ReactDOM.createPortal(
        <div
          ref={dropdownRef}
          className={`bg-white dark:bg-slate-800 border border-t-0 dark:border-slate-600 rounded-b-lg shadow-xl overflow-hidden`}
          style={{ position: 'fixed', top: dropdownPos.top, left: dropdownPos.left, width: dropdownPos.width, zIndex: 10002 }}
        >
          <div className="max-h-72 overflow-y-auto">
            {/* Matching existing pins */}
            {matchingPins.length > 0 && (
              <div className="px-3 py-1.5 text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide bg-gray-50 dark:bg-slate-750">Your places</div>
            )}
            {matchingPins.map(pin => {
              const catData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
              return (
                <button
                  key={pin.id}
                  className="w-full text-left px-2.5 py-1.5 hover:bg-blue-50 dark:hover:bg-slate-700 transition flex items-center gap-2 border-b dark:border-slate-700"
                  onClick={() => {
                    onSelectPin(pin);
                    setQuery('');
                    setIsFocused(false);
                    setPlaceResults([]);
                  }}
                >
                  {isCustomIcon(pin.emoji) ? (
                    <img src={pin.emoji} alt="" className="w-5 h-5 rounded-full object-cover flex-shrink-0" />
                  ) : (
                    <span className="text-sm flex-shrink-0">{pin.emoji}</span>
                  )}
                  <span className="font-medium text-sm dark:text-white truncate">{pin.name}</span>
                  <span className="text-xs text-gray-400 truncate ml-auto flex-shrink-0">{catData.label}</span>
                </button>
              );
            })}

            {/* Place search results */}
            {placeResults.length > 0 && (
              <div className="px-2.5 py-1 text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide bg-gray-50 dark:bg-slate-750">Search results</div>
            )}
            {placeResults.map((r, i) => (
              <button
                key={`place-${i}`}
                className="w-full text-left px-2.5 py-1.5 hover:bg-blue-50 dark:hover:bg-slate-700 transition flex items-center gap-2 border-b dark:border-slate-700"
                onClick={() => {
                  onAddPlace(r);
                  setQuery('');
                  setIsFocused(false);
                  setPlaceResults([]);
                }}
              >
                <span className="text-gray-400 text-sm flex-shrink-0">рЯУН</span>
                <span className="font-medium text-sm dark:text-white truncate">{r.name}</span>
                <span className="text-xs text-gray-400 truncate ml-auto flex-shrink-0">{r.address.split(',').slice(0, 2).join(',')}</span>
              </button>
            ))}

            {searching && <div className="px-3 py-3 text-sm text-gray-400 text-center animate-pulse">Searching places...</div>}
          </div>

          {/* Action row at bottom */}
          <div className="border-t dark:border-slate-700 flex">
            <button
              className="flex-1 px-3 py-2 text-xs text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-slate-700 flex items-center justify-center gap-1"
              onClick={() => {
                onAddFromLink();
                setIsFocused(false);
                setQuery('');
              }}
            >
              рЯФЧ Add from link
            </button>
            <button
              className="flex-1 px-3 py-2 text-xs text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-slate-700 flex items-center justify-center gap-1 border-l dark:border-slate-700"
              onClick={() => {
                onUploadConfirmation();
                setIsFocused(false);
                setQuery('');
              }}
            >
              вђЖпЄП Upload file
            </button>
          </div>
        </div>,
        document.body
      ) : null;

      return (
        <div className="flex-1 flex justify-center px-4" ref={containerRef}>
          <div className="relative w-full max-w-lg" ref={inputWrapRef}>
            <div className="relative flex items-center">
              <span className="absolute left-3 text-gray-400 text-sm"><SearchIcon /></span>
              <input
                type="text"
                placeholder="Search your places or find new ones..."
                value={query}
                onChange={e => handleInput(e.target.value)}
                onFocus={() => setIsFocused(true)}
                className={`w-full px-3 py-2 pl-9 pr-8 border text-sm dark:bg-slate-700 dark:border-slate-600 dark:text-white focus:ring-2 focus:ring-blue-500 ${showDropdown ? 'rounded-t-lg border-b-0' : 'rounded-lg'}`}
              />
              {query && (
                <button onClick={() => { setQuery(''); setPlaceResults([]); }} className="absolute right-3 text-gray-400 hover:text-gray-600 text-xs">вЬХ</button>
              )}
              {searching && <span className="absolute right-8 text-gray-400 text-xs animate-pulse">...</span>}
            </div>
            {dropdownContent}
          </div>
        </div>
      );
    };

    // Place search via Photon API
    const PlaceSearch = ({ onSelectPlace, isDarkMode }) => {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const timerRef = useRef(null);

      // Search Google Places API
      const searchGoogle = useCallback(async (q) => {
        const apiKey = getGoogleApiKey();
        if (!apiKey) return [];
        try {
          const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Goog-Api-Key': apiKey,
              'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.location,places.types'
            },
            body: JSON.stringify({ textQuery: q, maxResultCount: 5 })
          });
          if (!resp.ok) return [];
          const data = await resp.json();
          return (data.places || []).map(p => ({
            name: p.displayName?.text || '',
            address: p.formattedAddress || '',
            lat: p.location?.latitude,
            lng: p.location?.longitude,
            type: p.types?.[0] || '',
            source: 'google',
          })).filter(r => r.name && r.lat && r.lng);
        } catch { return []; }
      }, []);

      const doSearch = useCallback(async (q) => {
        if (q.length < 2) { setResults([]); return; }
        setSearching(true);
        try {
          // Search Photon (OSM) first
          const photonResp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5`);
          const photonData = await photonResp.json();
          const photonResults = (photonData.features || []).map(f => {
            const p = f.properties || {};
            const geo = f.geometry?.coordinates || [];
            const name = p.name || p.street || '';
            const parts = [p.street, p.housenumber].filter(Boolean).join(' ');
            const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
            return {
              name,
              address: [parts || name, locality].filter(Boolean).join(', '),
              lat: geo[1],
              lng: geo[0],
              type: p.osm_value || p.osm_key || '',
              source: 'osm',
            };
          }).filter(r => r.name && r.lat && r.lng);

          // Also search Google Places for businesses
          const googleResults = await searchGoogle(q);

          // Merge: Google results first (better for businesses), then Photon, deduplicate by name
          const seen = new Set();
          const merged = [];
          for (const r of [...googleResults, ...photonResults]) {
            const key = r.name.toLowerCase().trim();
            if (!seen.has(key)) {
              seen.add(key);
              merged.push(r);
            }
          }
          setResults(merged.slice(0, 8));
        } catch {
          setResults([]);
        }
        setSearching(false);
      }, [searchGoogle]);

      const handleInput = (val) => {
        setQuery(val);
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => doSearch(val), 400);
      };

      return (
        <div className="space-y-2">
          <div className="relative">
            <input
              type="text"
              value={query}
              onChange={e => handleInput(e.target.value)}
              placeholder="Search for a place (e.g. Brooklyn Granary & Mill)..."
              className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white pr-8"
              autoFocus
            />
            {searching && <span className="absolute right-3 top-2.5 text-gray-400 text-sm animate-pulse">...</span>}
          </div>
          {results.length > 0 && (
            <div className="max-h-60 overflow-y-auto border rounded-lg dark:border-slate-700 divide-y dark:divide-slate-700">
              {results.map((r, i) => (
                <button
                  key={i}
                  onClick={() => onSelectPlace(r)}
                  className="w-full text-left px-3 py-2.5 hover:bg-blue-50 dark:hover:bg-slate-700 transition"
                >
                  <p className="font-medium text-sm dark:text-white">{r.name}</p>
                  <p className="text-xs text-gray-500 dark:text-gray-400 truncate">{r.address}</p>
                </button>
              ))}
            </div>
          )}
          {query.length >= 3 && !searching && results.length === 0 && (
            <p className="text-xs text-gray-500 dark:text-gray-400 text-center py-2">No results found. You can add manually below.</p>
          )}
        </div>
      );
    };

    const AddFromLinkModal = ({ onSelect, onClose, isDarkMode }) => {
      const [url, setUrl] = useState('');
      const [fetching, setFetching] = useState(false);
      const [preview, setPreview] = useState(null); // { name, description, source_name, source_url }
      const [error, setError] = useState('');

      const handleFetch = async () => {
        if (!url.trim()) { setError('Please enter a URL'); return; }
        setError('');
        setFetching(true);

        try {
          const urlObj = new URL(url);
          const domainName = urlObj.hostname.replace('www.', '');

          // Try to extract info from the URL structure
          const pathParts = urlObj.pathname.split('/').filter(Boolean);
          let guessedName = '';

          // Try common URL patterns: /place/place-name, /restaurant/name, etc.
          const lastPart = pathParts[pathParts.length - 1] || '';
          guessedName = lastPart
            .replace(/[-_]/g, ' ')
            .replace(/\.(html|php|aspx)$/i, '')
            // Remove date patterns, common article words, location/city names at end
            .replace(/^\d{4}\s+\d{2}\s+\d{2}\s+/, '')
            .replace(/\s+(restaurant|bar|cafe|hotel|nyc|opening|review|first look|new|best|top|guide|where to eat|where to stay)\b.*/i, '')
            .replace(/\b(nyc|la|sf|london|paris|tokyo)\b\s*/ig, '')
            .trim()
            .replace(/\b\w/g, c => c.toUpperCase());

          // Source-specific name extraction
          if (domainName.includes('yelp.com')) {
            guessedName = pathParts.find(p => !['biz', 'www'].includes(p))?.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) || guessedName;
          } else if (domainName.includes('tripadvisor')) {
            guessedName = lastPart.replace(/-.*Reviews-/, '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          } else if (domainName.includes('google.com/maps')) {
            const placeMatch = url.match(/place\/([^/]+)/);
            if (placeMatch) guessedName = decodeURIComponent(placeMatch[1]).replace(/\+/g, ' ');
          }

          // Try to fetch page title via allorigins CORS proxy
          let fetchedTitle = '';
          try {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(5000) });
            const data = await resp.json();
            if (data.contents) {
              const titleMatch = data.contents.match(/<title[^>]*>([^<]+)<\/title>/i);
              if (titleMatch) {
                fetchedTitle = titleMatch[1]
                  .replace(/\s*[|\-вАУвАФ]\s*(Yelp|TripAdvisor|Google Maps|Lonely Planet|Eater|Booking\.com|Airbnb|Hotels\.com).*$/i, '')
                  .trim();
                // For blog/article URLs, try to extract the actual place name
                // Common patterns: "Place Name: Rest of article title", "Place Name - Description"
                // Also handle slug-based titles with location keywords
                if (fetchedTitle) {
                  // Remove common article prefixes
                  fetchedTitle = fetchedTitle
                    .replace(/^(review|first look|just opened|now open|new opening)[:\s-]*/i, '')
                    .replace(/\s*(restaurant|bar|cafe|hotel|opens?|opening|review|first look|in\s+\w+|\d{4})\s*$/i, '')
                    .trim();
                  // If title has a colon or dash separator, take the first meaningful part
                  const separatorMatch = fetchedTitle.match(/^([^:вАУвАФ|]+?)\s*[:вАУвАФ|]\s*/);
                  if (separatorMatch && separatorMatch[1].length >= 3) {
                    fetchedTitle = separatorMatch[1].trim();
                  }
                }
              }
              // Try to get meta description
              const descMatch = data.contents.match(/<meta[^>]*name=["']description["'][^>]*content=["']([^"']+)["']/i);
              if (descMatch) {
                preview?.description || setPreview(prev => prev ? { ...prev, description: descMatch[1] } : null);
              }
            }
          } catch {}

          const finalName = fetchedTitle || guessedName || '';
          setPreview({
            name: finalName,
            description: '',
            source_name: domainName,
            source_url: url,
            emoji: guessEmojiAndCategory(finalName, '').emoji
          });
        } catch (e) {
          setError('Invalid URL вАФ make sure it starts with https://');
        }
        setFetching(false);
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 9999 }}>
          <div
            className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-md shadow-2xl`}
            onClick={e => e.stopPropagation()}
          >
            <div className="p-6 space-y-4 max-h-[85vh] overflow-y-auto">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-bold dark:text-white">Add from Link</h2>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded">
                  <CloseIcon />
                </button>
              </div>

              {!preview ? (
                <div className="space-y-3">
                  <p className="text-sm text-gray-600 dark:text-gray-400">Paste a link from Yelp, Google Maps, TripAdvisor, or any travel site</p>
                  <input
                    type="url"
                    value={url}
                    onChange={e => { setUrl(e.target.value); setError(''); }}
                    placeholder="https://www.yelp.com/biz/..."
                    className="w-full px-3 py-3 border-2 rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm focus:border-blue-500"
                    autoFocus
                    onKeyDown={e => e.key === 'Enter' && handleFetch()}
                  />
                  {error && <p className="text-xs text-red-500">{error}</p>}
                  <button
                    onClick={handleFetch}
                    disabled={fetching}
                    className="w-full px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium disabled:opacity-50"
                  >
                    {fetching ? 'Fetching...' : 'Fetch & Preview'}
                  </button>
                </div>
              ) : (
                <div className="space-y-3">
                  <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-3">
                    <p className="text-xs text-blue-600 dark:text-blue-400 truncate">рЯФЧ {preview.source_url}</p>
                    <p className="text-xs text-blue-500 mt-0.5">Source: {preview.source_name}</p>
                  </div>
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Place Name *</label>
                    <input
                      type="text"
                      value={preview.name}
                      onChange={e => setPreview(p => ({ ...p, name: e.target.value }))}
                      placeholder="Place name"
                      className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white"
                      autoFocus
                    />
                  </div>
                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Description</label>
                    <textarea
                      value={preview.description}
                      onChange={e => setPreview(p => ({ ...p, description: e.target.value }))}
                      placeholder="Add details about this place"
                      className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm"
                      rows={2}
                    />
                  </div>
                  <div className="flex gap-2 pt-2">
                    <button
                      onClick={() => setPreview(null)}
                      className="flex-1 px-4 py-2 border rounded-lg text-gray-700 dark:text-gray-300 dark:border-slate-600 hover:bg-gray-100 dark:hover:bg-slate-700 font-medium text-sm"
                    >
                      вЖР Back
                    </button>
                    <button
                      onClick={() => {
                        if (!preview.name.trim()) { alert('Please enter a name'); return; }
                        onSelect(preview);
                      }}
                      className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium text-sm"
                    >
                      Add Place
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // Parse confirmation text to extract hotel/booking details
    const parseConfirmationText = (text) => {
      const result = {
        propertyName: '', address: '', checkIn: '', checkOut: '',
        confirmationNumber: '', bookingSource: '', roomType: '', price: ''
      };
      if (!text) return result;
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const full = text.replace(/\n/g, ' ');

      // Booking source detection
      const sourcePatterns = [
        [/booking\.com/i, 'Booking.com'], [/airbnb/i, 'Airbnb'], [/expedia/i, 'Expedia'],
        [/hotels\.com/i, 'Hotels.com'], [/vrbo/i, 'VRBO'], [/marriott/i, 'Marriott'],
        [/hilton/i, 'Hilton'], [/hyatt/i, 'Hyatt'], [/agoda/i, 'Agoda'],
        [/trip\.com|ctrip/i, 'Trip.com'], [/priceline/i, 'Priceline'], [/hostelworld/i, 'Hostelworld'],
      ];
      for (const [pat, name] of sourcePatterns) {
        if (pat.test(full)) { result.bookingSource = name; break; }
      }

      // Confirmation / reservation number
      const confMatch = full.match(/(?:confirmation|booking|reservation|reference|itinerary)\s*(?:#|number|no\.?|code)?[:\s]*([A-Z0-9][-A-Z0-9]{4,20})/i);
      if (confMatch) result.confirmationNumber = confMatch[1].trim();

      // Property name вАФ look for specific patterns first
      const namePatterns = [
        /(?:confirmed at|booked at)\s+([^\n,;]{3,60})/i,
        /(?:your (?:stay|booking|reservation) at)\s+([^\n,;]{3,60})/i,
        /(?:hotel|property|accommodation)[:\s]+([^\n,;]{3,60})/i,
        /(?:you(?:'re| are)\s+(?:staying|booked)\s+at)\s+([^\n,;]{3,60})/i,
        /(?:reservation\s+(?:at|for))\s+([^\n,;]{3,60})/i,
      ];
      for (const pat of namePatterns) {
        const m = full.match(pat);
        if (m) {
          let name = m[1].trim().replace(/[.!]+$/, '');
          // Strip trailing junk: dates, common words, "Date:", "Your", etc.
          name = name.replace(/\s+(?:date|your|on|for|from|in|the|a)\s*[:].*/i, '');
          name = name.replace(/\s+(?:date|your|on|for|from|in|the|a)\s*$/i, '');
          // Strip trailing date patterns like "Date : March 23" or "March 23, 2026"
          name = name.replace(/\s+Date\s*:.*/i, '');
          name = name.replace(/\s+\w{3,9}\s+\d{1,2}(?:,?\s+\d{4})?\s*$/, '');
          result.propertyName = name.trim();
          break;
        }
      }
      // Fallback: look for lines with hotel-like keywords
      if (!result.propertyName) {
        for (const line of lines.slice(0, 15)) {
          if (/(?:hotel|suites?|inn|resort|hostel|lodge|villa|apartment|ryokan|pension|bnb)/i.test(line) && line.length >= 5 && line.length <= 80) {
            let name = line.replace(/[.!:]+$/, '').trim();
            name = name.replace(/^(?:your\s+(?:stay|booking)\s+(?:at|in)\s*)/i, '');
            // Strip trailing date/price junk
            name = name.replace(/\s+Date\s*:.*/i, '');
            name = name.replace(/\s+\d{1,2}[\s\/\-]\w{3,9}.*$/, '');
            if (name.length >= 4) { result.propertyName = name.trim(); break; }
          }
        }
      }
      // Last fallback: first capitalized line that looks like a name
      if (!result.propertyName) {
        for (const line of lines.slice(0, 10)) {
          if (line.length >= 4 && line.length <= 80 && /[A-Z]/.test(line[0]) && !/^\d/.test(line) && !/check|confirm|book|date|reservation|itinerary|guest|price|cancel|total|payment|email/i.test(line)) {
            result.propertyName = line.replace(/[.!:]+$/, '');
            break;
          }
        }
      }

      // Room type вАФ look for room/suite/bed patterns, but stop before currency symbols
      const roomPatterns = [
        /(?:room\s*type|accommodation)[:\s]+([^$вВђ¬£¬•вВє\n]{3,60})/i,
        /(\d+\s+(?:superior|deluxe|standard|premium|executive|classic|economy|luxury)\s+(?:[\w-]+\s+){0,4}(?:room|suite|studio|apartment|bed))/i,
        /((?:superior|deluxe|standard|premium|executive|classic|economy|luxury)\s+(?:[\w-]+\s+){0,3}(?:room|suite|studio|apartment))/i,
        /((?:double|single|twin|king|queen|family)\s+(?:room|suite|studio|bed)(?:\s+[\w-]+){0,2})/i,
      ];
      for (const pat of roomPatterns) {
        const m = full.match(pat);
        if (m) {
          let rt = (m[1] || m[0]).trim();
          // Strip trailing currency/price that leaked in
          rt = rt.replace(/\s*[$вВђ¬£¬•вВє]\s*[\d,]+.*$/, '').trim();
          rt = rt.replace(/\s*\d{2,}[,.]?\d*\s*$/, '').trim(); // trailing numbers
          result.roomType = rt.replace(/[.!:]+$/, '');
          break;
        }
      }

      // Price вАФ look for total price with currency. Be specific to avoid matching random text.
      // First try "total" context, then standalone large currency amounts
      const pricePatterns = [
        /(?:total\s*(?:price|cost|amount|charge|due))[:\s]*([$вВђ¬£¬•вВє]\s*[\d,]+\.?\d*)/i,
        /(?:total\s*(?:price|cost|amount|charge|due))[:\s]*([\d,]+\.?\d*\s*(?:USD|EUR|GBP|JPY))/i,
        /(?:price|cost|total)[:\s]*([$вВђ¬£¬•вВє]\s*[\d,]+\.?\d*)/i,
        // Standalone large currency amounts (at least 3 digits to avoid matching "¬• 160" room count)
        /([$вВђ¬£¬•вВє]\s*[\d,]{3,}\.?\d*)/,
        /([\d,]{4,}\.?\d*\s*(?:USD|EUR|GBP|JPY|INR))/i,
      ];
      for (const pat of pricePatterns) {
        const m = full.match(pat);
        if (m) {
          const val = (m[1] || m[0]).trim();
          // Validate: must contain at least 3 digit characters to be a real price
          const digits = val.replace(/[^0-9]/g, '');
          if (digits.length >= 3) {
            result.price = val;
            break;
          }
        }
      }

      // Dates вАФ prefer explicit check-in/check-out labels
      const dateRe = /(\d{1,2}[\s\/\-\.]\w{3,9}[\s\/\-\.]\d{2,4}|\w{3,9}\s+\d{1,2},?\s+\d{4}|\d{4}[\-\/]\d{2}[\-\/]\d{2}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/g;

      // Strategy 1: Look for labeled check-in/check-out with dates nearby
      const checkInPatterns = [
        /check[\s-]?in\s*(?:date)?[:\s]*([^\n]{6,40})/i,
        /(?:arrival|arriving|from)\s*(?:date)?[:\s]*([^\n]{6,40})/i,
      ];
      const checkOutPatterns = [
        /check[\s-]?out\s*(?:date)?[:\s]*([^\n]{6,40})/i,
        /(?:departure|departing|(?:check[\s-]?out)|until|to)\s*(?:date)?[:\s]*([^\n]{6,40})/i,
      ];

      for (const pat of checkInPatterns) {
        const m = full.match(pat);
        if (m) {
          const d = m[1].match(dateRe);
          if (d) { result.checkIn = d[0]; break; }
        }
      }
      for (const pat of checkOutPatterns) {
        const m = full.match(pat);
        if (m) {
          const d = m[1].match(dateRe);
          if (d) { result.checkOut = d[0]; break; }
        }
      }

      // Strategy 2: Look for date ranges like "Mar 23 - Apr 28, 2026" or "23 Mar вАУ 28 Apr"
      if (!result.checkIn) {
        const rangeMatch = full.match(/(\w{3,9}\s+\d{1,2})\s*[-вАУвАФ]\s*(\w{3,9}\s+\d{1,2},?\s+\d{4})/);
        if (rangeMatch) {
          result.checkIn = rangeMatch[1];
          result.checkOut = rangeMatch[2];
        }
      }

      // Strategy 3: Find dates near "stay" or "nights" context (skip email-date, cancel-by, etc.)
      if (!result.checkIn) {
        // Find all dates, then pick the ones most likely to be stay dates
        const allDates = [];
        let m;
        const dateReGlobal = /(\d{1,2}[\s\/\-\.]\w{3,9}[\s\/\-\.]\d{2,4}|\w{3,9}\s+\d{1,2},?\s+\d{4}|\d{4}[\-\/]\d{2}[\-\/]\d{2}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/g;
        while ((m = dateReGlobal.exec(full)) !== null) {
          const idx = m.index;
          // Check context around this date вАФ skip if near "cancel", "sent", "email", "created", "payment due"
          const contextBefore = full.substring(Math.max(0, idx - 50), idx).toLowerCase();
          const isBookingDate = /cancel|sent|email|created|payment\s*due|free\s*cancel|modified|updated/.test(contextBefore);
          allDates.push({ date: m[1], idx, isBookingDate });
        }
        // Filter out booking/email dates, keep stay dates
        const stayDates = allDates.filter(d => !d.isBookingDate);
        if (stayDates.length >= 2) {
          result.checkIn = stayDates[0].date;
          result.checkOut = stayDates[1].date;
        } else if (stayDates.length === 1) {
          result.checkIn = stayDates[0].date;
        } else if (allDates.length >= 2) {
          result.checkIn = allDates[0].date;
          result.checkOut = allDates[1].date;
        }
      }

      // Address вАФ look for address patterns, but truncate at phone/contact/fax
      const addrPatterns = [
        /(?:address|location|located\s+at|property\s+address)[:\s]+([^\n]{10,200})/i,
        /(?:directions?|find\s+us)[:\s]+([^\n]{10,200})/i,
      ];
      for (const pat of addrPatterns) {
        const m = full.match(pat);
        if (m) {
          let addr = m[1].trim();
          // Truncate at phone, contact, fax, email patterns
          addr = addr.replace(/\s*(?:phone|tel|fax|contact|email|website|www\.|http)[:\s].*/i, '').trim();
          addr = addr.replace(/\s*\+\d{1,3}\s*\d[\d\s-]+$/, '').trim(); // strip trailing phone numbers
          result.address = addr;
          break;
        }
      }

      return result;
    };

    const UploadConfirmationModal = ({ onSelect, onClose, isDarkMode }) => {
      const [step, setStep] = useState('upload'); // 'upload' | 'review'
      const [dragging, setDragging] = useState(false);
      const [extractedText, setExtractedText] = useState('');
      const [processing, setProcessing] = useState(false);
      const [fileName, setFileName] = useState('');
      const [fileDataUrl, setFileDataUrl] = useState(''); // base64 of uploaded file for storage
      const [fileThumbnail, setFileThumbnail] = useState(''); // thumbnail preview
      // Review form fields
      const [propertyName, setPropertyName] = useState('');
      const [address, setAddress] = useState('');
      const [checkIn, setCheckIn] = useState('');
      const [checkOut, setCheckOut] = useState('');
      const [confirmationNumber, setConfirmationNumber] = useState('');
      const [bookingSource, setBookingSource] = useState('');
      const [roomType, setRoomType] = useState('');
      const [price, setPrice] = useState('');
      const fileInputRef = useRef(null);

      // Store the file as a data URL for later retrieval
      const storeFile = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          setFileDataUrl(e.target.result);
          // Generate thumbnail for images
          if (file.type.startsWith('image/')) {
            setFileThumbnail(e.target.result);
          } else if (file.type === 'application/pdf') {
            setFileThumbnail('рЯУД'); // emoji placeholder for PDFs
          } else {
            setFileThumbnail('рЯУО');
          }
        };
        reader.readAsDataURL(file);
      };

      const processFile = async (file) => {
        setProcessing(true);
        setFileName(file.name);
        storeFile(file);
        let text = '';

        try {
          if (file.type.startsWith('text/') || file.name.endsWith('.txt') || file.name.endsWith('.csv') || file.name.endsWith('.html') || file.name.endsWith('.htm')) {
            text = await file.text();
            if (file.name.endsWith('.html') || file.name.endsWith('.htm') || file.type === 'text/html') {
              const tmp = document.createElement('div');
              tmp.innerHTML = text;
              text = tmp.textContent || tmp.innerText || text;
            }
          } else if (file.type === 'message/rfc822' || file.name.endsWith('.eml')) {
            text = await file.text();
            text = text.replace(/^[\s\S]*?\n\n/, '');
          } else if (file.type.startsWith('image/')) {
            try {
              const { data: { text: ocrText } } = await Tesseract.recognize(file, 'eng');
              text = ocrText || '[No text found in image]';
            } catch (e) {
              text = '[OCR failed: ' + e.message + ']';
            }
          } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
            try {
              const arrayBuffer = await file.arrayBuffer();
              const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              let allText = '';
              for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                allText += content.items.map(item => item.str).join(' ') + '\n';
              }
              text = allText.trim() || '[No text found in PDF]';
            } catch (e) {
              text = '[PDF parsing failed: ' + e.message + ']';
            }
          } else {
            try {
              text = await file.text();
              if (text.length > 0 && /[\x00-\x08\x0E-\x1F]/.test(text.substring(0, 100))) {
                text = `[Binary file: ${file.name}]\nPlease review and fill in the details manually.`;
              }
            } catch {
              text = `[Could not read file: ${file.name}]`;
            }
          }
        } catch (err) {
          text = `[Error processing file: ${err.message}]`;
        }

        setExtractedText(text);

        // Parse the text and pre-fill fields
        const parsed = parseConfirmationText(text);
        setPropertyName(parsed.propertyName);
        setAddress(parsed.address);
        setCheckIn(parsed.checkIn);
        setCheckOut(parsed.checkOut);
        setConfirmationNumber(parsed.confirmationNumber);
        setBookingSource(parsed.bookingSource);
        setRoomType(parsed.roomType);
        setPrice(parsed.price);

        setProcessing(false);
        setStep('review');
      };

      const handleFiles = (files) => {
        if (files && files.length > 0) processFile(files[0]);
      };

      const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(true); };
      const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(false); };
      const handleDrop = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(false); handleFiles(e.dataTransfer.files); };

      const handleSubmit = () => {
        if (!propertyName.trim()) {
          alert('Please enter a hotel/property name');
          return;
        }
        onSelect({
          name: propertyName,
          address: address,
          description: [
            roomType && `Room: ${roomType}`,
            price && `Price: ${price}`,
            checkIn && `Check-in: ${checkIn}`,
            checkOut && `Check-out: ${checkOut}`,
            confirmationNumber && `Confirmation #: ${confirmationNumber}`,
            bookingSource && `Booked via: ${bookingSource}`,
          ].filter(Boolean).join('\n'),
          emoji: 'рЯП®',
          category: 'hotel',
          source_name: bookingSource || 'Booking Confirmation',
          reservation_details: {
            check_in: checkIn,
            check_out: checkOut,
            confirmation_number: confirmationNumber,
            booking_source: bookingSource,
            room_type: roomType,
            price: price,
          },
          attachment: fileDataUrl ? { name: fileName, data: fileDataUrl, thumbnail: fileThumbnail } : null,
        });
      };

      const inputClass = "w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm";

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 9999 }} onClick={onClose}>
          <div
            className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-md shadow-2xl`}
            onClick={e => e.stopPropagation()}
          >
            <div className="p-6 space-y-4 max-h-[85vh] overflow-y-auto">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-bold dark:text-white">
                  {step === 'upload' ? 'Upload Booking' : 'Review Booking'}
                </h2>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded">
                  <CloseIcon />
                </button>
              </div>

              {step === 'upload' && (
                <div className="space-y-3">
                  <p className="text-sm text-gray-500 dark:text-gray-400">
                    Upload a hotel confirmation, booking email, or reservation screenshot.
                  </p>

                  <div
                    className={`border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all ${
                      dragging
                        ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20'
                        : 'border-gray-300 dark:border-slate-600 hover:border-blue-400 hover:bg-gray-50 dark:hover:bg-slate-800'
                    }`}
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                    onClick={() => fileInputRef.current?.click()}
                  >
                    <input
                      ref={fileInputRef}
                      type="file"
                      className="hidden"
                      accept="image/*,.pdf,.txt,.html,.htm,.eml,text/*"
                      onChange={e => handleFiles(e.target.files)}
                    />
                    {processing ? (
                      <div className="space-y-2">
                        <div className="text-3xl animate-pulse">рЯУД</div>
                        <p className="text-sm font-medium dark:text-white">Processing {fileName}...</p>
                        <p className="text-xs text-gray-400">Extracting text and details</p>
                      </div>
                    ) : (
                      <div className="space-y-2">
                        <div className="text-4xl">{dragging ? 'рЯУ•' : 'рЯУО'}</div>
                        <p className="text-sm font-medium dark:text-white">
                          {dragging ? 'Drop file here' : 'Drag & drop a file here'}
                        </p>
                        <p className="text-xs text-gray-400">or click to browse</p>
                        <p className="text-xs text-gray-400 mt-2">
                          Supports: PDF, images, text, HTML emails
                        </p>
                      </div>
                    )}
                  </div>

                  <button
                    onClick={() => setStep('review')}
                    className="w-full text-sm text-blue-600 dark:text-blue-400 hover:underline py-1"
                  >
                    Or enter details manually
                  </button>
                </div>
              )}

              {step === 'review' && (
                <div className="space-y-3">
                  {/* File info + thumbnail */}
                  {(extractedText || fileDataUrl) && (
                    <div className="bg-gray-50 dark:bg-slate-800 rounded-lg p-3 mb-2">
                      <div className="flex items-start gap-3">
                        {fileThumbnail && fileThumbnail.startsWith('data:') ? (
                          <img src={fileThumbnail} alt="" className="w-12 h-12 rounded object-cover flex-shrink-0 cursor-pointer border" onClick={() => openDataFile(fileDataUrl, fileName)} />
                        ) : fileThumbnail ? (
                          <span className="text-3xl flex-shrink-0">{fileThumbnail}</span>
                        ) : null}
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center justify-between">
                            <span className="text-xs font-medium text-gray-500 dark:text-gray-400 truncate">{fileName}</span>
                            <button
                              onClick={() => { setStep('upload'); setExtractedText(''); setFileName(''); setFileDataUrl(''); setFileThumbnail(''); }}
                              className="text-xs text-blue-600 dark:text-blue-400 hover:underline flex-shrink-0 ml-2"
                            >
                              Change file
                            </button>
                          </div>
                          {extractedText && (
                            <details className="text-xs text-gray-500 dark:text-gray-400 mt-1">
                              <summary className="cursor-pointer hover:text-gray-700 dark:hover:text-gray-300">Show extracted text</summary>
                              <pre className="mt-1 max-h-24 overflow-y-auto whitespace-pre-wrap text-xs">{extractedText.slice(0, 2000)}</pre>
                            </details>
                          )}
                        </div>
                      </div>
                    </div>
                  )}

                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Hotel / Property *</label>
                    <input type="text" value={propertyName} onChange={e => setPropertyName(e.target.value)} placeholder="e.g. MIMARU SUITES Kyoto Shijo" className={inputClass} autoFocus />
                  </div>

                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Room Type</label>
                    <input type="text" value={roomType} onChange={e => setRoomType(e.target.value)} placeholder="e.g. Superior Two-Bedroom Suite" className={inputClass} />
                  </div>

                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Address</label>
                    <input type="text" value={address} onChange={e => setAddress(e.target.value)} placeholder="Hotel address" className={inputClass} />
                  </div>

                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Price</label>
                    <input type="text" value={price} onChange={e => setPrice(e.target.value)} placeholder="e.g. ¬•176,951" className={inputClass} />
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Check-in</label>
                      <input type="text" value={checkIn} onChange={e => setCheckIn(e.target.value)} placeholder="e.g. Mar 23, 2026" className={inputClass} />
                    </div>
                    <div>
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Check-out</label>
                      <input type="text" value={checkOut} onChange={e => setCheckOut(e.target.value)} placeholder="e.g. Apr 28, 2026" className={inputClass} />
                    </div>
                  </div>

                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Confirmation #</label>
                    <input type="text" value={confirmationNumber} onChange={e => setConfirmationNumber(e.target.value)} placeholder="e.g. 6232626558" className={inputClass} />
                  </div>

                  <div>
                    <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 block mb-1">Booking Source</label>
                    <input type="text" value={bookingSource} onChange={e => setBookingSource(e.target.value)} placeholder="e.g. Booking.com, Airbnb" className={inputClass} />
                  </div>

                  <div className="flex gap-2 pt-4 border-t dark:border-slate-700">
                    <button
                      onClick={onClose}
                      className="flex-1 px-4 py-2.5 border border-gray-300 dark:border-slate-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 font-medium"
                    >
                      Cancel
                    </button>
                    <button
                      onClick={handleSubmit}
                      className="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium"
                    >
                      Add to Map
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // Custom categories stored in localStorage, merged into PIN_CATEGORIES
    const loadCustomCategories = () => {
      try { return JSON.parse(localStorage.getItem('bo_custom_categories') || '{}'); } catch { return {}; }
    };
    const saveCustomCategory = (id, data) => {
      const customs = loadCustomCategories();
      customs[id] = data;
      localStorage.setItem('bo_custom_categories', JSON.stringify(customs));
      PIN_CATEGORIES[id] = data;
    };
    // Load custom categories on startup
    Object.assign(PIN_CATEGORIES, loadCustomCategories());

    const CATEGORY_COLORS = ['#2D8A4E', '#4A90D9', '#D94A4A', '#7B4AD9', '#D4A843', '#6B8E23', '#2196F3', '#795548', '#9C27B0', '#607D8B', '#E91E63', '#FF9800', '#00BCD4', '#FF5722', '#8BC34A', '#3F51B5', '#009688', '#F44336'];

    const CategoryField = ({ value, onChange }) => {
      const [showCustom, setShowCustom] = useState(false);
      const [newCatName, setNewCatName] = useState('');
      const [newCatEmoji, setNewCatEmoji] = useState('рЯУН');
      const [newCatColor, setNewCatColor] = useState('#FF5722');

      return (
        <div className="space-y-2">
          {!showCustom ? (
            <div className="flex gap-2">
              <select
                value={value}
                onChange={e => {
                  if (e.target.value === '__new__') {
                    setShowCustom(true);
                  } else {
                    onChange(e.target.value);
                  }
                }}
                className="flex-1 px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm"
              >
                {Object.entries(PIN_CATEGORIES).map(([id, cat]) => (
                  <option key={id} value={id}>{cat.icon} {cat.label}</option>
                ))}
                <option value="__new__">+ Add new category...</option>
              </select>
            </div>
          ) : (
            <div className="space-y-2 p-3 bg-gray-50 dark:bg-slate-800 rounded-lg">
              <div className="flex gap-2">
                <input
                  type="text"
                  value={newCatEmoji}
                  onChange={e => setNewCatEmoji(e.target.value)}
                  className="w-12 px-2 py-1.5 border rounded dark:bg-slate-700 dark:border-slate-600 dark:text-white text-center text-lg"
                  maxLength={2}
                />
                <input
                  type="text"
                  value={newCatName}
                  onChange={e => setNewCatName(e.target.value)}
                  placeholder="Category name (e.g. Boba)"
                  className="flex-1 px-3 py-1.5 border rounded dark:bg-slate-700 dark:border-slate-600 dark:text-white text-sm"
                  autoFocus
                />
              </div>
              <div className="flex flex-wrap gap-1">
                {CATEGORY_COLORS.map(c => (
                  <button
                    key={c}
                    onClick={() => setNewCatColor(c)}
                    className={`w-6 h-6 rounded-full ${newCatColor === c ? 'ring-2 ring-offset-1 ring-blue-500' : ''}`}
                    style={{ backgroundColor: c }}
                  />
                ))}
              </div>
              <div className="flex gap-2">
                <button
                  onClick={() => setShowCustom(false)}
                  className="flex-1 px-3 py-1.5 border rounded text-sm dark:border-slate-600 dark:text-gray-300"
                >
                  Cancel
                </button>
                <button
                  onClick={() => {
                    if (!newCatName.trim()) return;
                    const id = newCatName.trim().toLowerCase().replace(/\s+/g, '-');
                    saveCustomCategory(id, { label: newCatName.trim(), icon: newCatEmoji, color: newCatColor });
                    onChange(id);
                    setShowCustom(false);
                    setNewCatName('');
                  }}
                  className="flex-1 px-3 py-1.5 bg-blue-600 text-white rounded text-sm font-medium"
                >
                  Add
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const AddressAutocomplete = ({ value, onChange, onSelectAddress, isDarkMode }) => {
      const [suggestions, setSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [dropdownPos, setDropdownPos] = useState({ top: 0, left: 0, width: 0 });
      const inputRef = useRef(null);
      const timerRef = useRef(null);

      const fetchSuggestions = (q) => {
        if (q.length < 3) { setSuggestions([]); return; }
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => {
          fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5`)
            .then(r => r.json())
            .then(data => {
              const results = (data.features || []).map(f => {
                const p = f.properties || {};
                const geo = f.geometry?.coordinates || [];
                const parts = [p.housenumber, p.street].filter(Boolean).join(' ');
                const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
                return {
                  address: [p.name, parts, locality].filter(Boolean).join(', '),
                  lat: geo[1],
                  lng: geo[0],
                };
              }).filter(r => r.lat && r.lng);
              setSuggestions(results);
              if (results.length > 0 && inputRef.current) {
                const rect = inputRef.current.getBoundingClientRect();
                setDropdownPos({ top: rect.bottom + 2, left: rect.left, width: rect.width });
              }
              setShowSuggestions(results.length > 0);
            })
            .catch(() => {});
        }, 300);
      };

      return (
        <div className="relative">
          <input
            ref={inputRef}
            type="text"
            value={value}
            onChange={e => {
              onChange(e.target.value);
              fetchSuggestions(e.target.value);
            }}
            onFocus={() => {
              if (suggestions.length > 0 && inputRef.current) {
                const rect = inputRef.current.getBoundingClientRect();
                setDropdownPos({ top: rect.bottom + 2, left: rect.left, width: rect.width });
                setShowSuggestions(true);
              }
            }}
            onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
            className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white"
            placeholder="Start typing an address..."
          />
          {showSuggestions && ReactDOM.createPortal(
            <div
              className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-lg shadow-2xl overflow-hidden"
              style={{ position: 'fixed', top: dropdownPos.top, left: dropdownPos.left, width: dropdownPos.width, zIndex: 10002 }}
            >
              {suggestions.map((s, i) => (
                <button
                  key={i}
                  className="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 dark:hover:bg-slate-700 dark:text-white border-b dark:border-slate-700 last:border-0"
                  onMouseDown={(e) => {
                    e.preventDefault();
                    onSelectAddress(s);
                    setSuggestions([]);
                    setShowSuggestions(false);
                  }}
                >
                  <p className="truncate">{s.address}</p>
                </button>
              ))}
            </div>,
            document.body
          )}
        </div>
      );
    };

    const SourceField = ({ value, onChange, allPins }) => {
      const [showCustom, setShowCustom] = useState(false);
      const [showManage, setShowManage] = useState(false);
      const [customValue, setCustomValue] = useState('');
      const [hiddenSources, setHiddenSources] = useState(() => {
        try { return JSON.parse(localStorage.getItem('boWanderHiddenSources') || '[]'); } catch { return []; }
      });

      const defaultSources = ['Lonely Planet', 'Eater', 'Google Maps', 'Yelp', 'Friend recommendation', 'Sarah R.', "Doug's friend"];
      const uniqueSources = [...new Set(allPins.map(p => p.source_name).filter(s => s && !defaultSources.includes(s)))];
      const allSources = [...defaultSources, ...uniqueSources].filter(s => !hiddenSources.includes(s));

      const handleHideSource = (src) => {
        const updated = [...hiddenSources, src];
        setHiddenSources(updated);
        localStorage.setItem('boWanderHiddenSources', JSON.stringify(updated));
        if (value === src) onChange('');
      };
      const handleRestoreSource = (src) => {
        const updated = hiddenSources.filter(s => s !== src);
        setHiddenSources(updated);
        localStorage.setItem('boWanderHiddenSources', JSON.stringify(updated));
      };

      return (
        <div className="space-y-2">
          <div className="flex gap-2">
            <select
              value={showCustom ? '__custom__' : (value || '')}
              onChange={e => {
                if (e.target.value === '__custom__') {
                  setShowCustom(true);
                } else if (e.target.value === '__manage__') {
                  setShowManage(true);
                } else {
                  onChange(e.target.value);
                  setShowCustom(false);
                }
              }}
              className="flex-1 px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white"
            >
              <option value="">Select a source...</option>
              {allSources.map(src => (
                <option key={src} value={src}>{src}</option>
              ))}
              <option value="__custom__">+ Add custom...</option>
              <option value="__manage__">Manage sources...</option>
            </select>
          </div>
          {showCustom && (
            <input
              type="text"
              value={customValue}
              onChange={e => {
                setCustomValue(e.target.value);
                onChange(e.target.value);
              }}
              placeholder="Enter custom source"
              className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white"
              autoFocus
            />
          )}
          {showManage && (
            <div className="border rounded-lg dark:border-slate-700 p-3 space-y-2 bg-gray-50 dark:bg-slate-800">
              <div className="flex justify-between items-center mb-1">
                <p className="text-xs font-semibold text-gray-600 dark:text-gray-400">Manage Sources</p>
                <button onClick={() => setShowManage(false)} className="text-xs text-blue-600 dark:text-blue-400 hover:underline">Done</button>
              </div>
              {allSources.map(src => (
                <div key={src} className="flex justify-between items-center py-1">
                  <span className="text-sm dark:text-white">{src}</span>
                  <button
                    onClick={() => handleHideSource(src)}
                    className="text-xs text-red-500 hover:underline"
                  >Remove</button>
                </div>
              ))}
              {hiddenSources.length > 0 && (
                <div className="pt-2 border-t dark:border-slate-700">
