    const MapView = ({ pins, selectedPin, onSelectPin, isDarkMode, onNavigate, sidebarWidth = 0, collectionName, onMapCenterChange, panTo, previewPin }) => {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const tileLayerRef = useRef(null);
      const markersRef = useRef(new Map());
      const prevCollectionKey = useRef(null);
      const userLocationRef = useRef(null);
      const userAccuracyRef = useRef(null);
      const previewMarkerRef = useRef(null);

      // Initialize map once
      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;
        const map = L.map(mapRef.current, {
          zoomControl: true,
          attributionControl: true,
          zoomAnimation: true,
          markerZoomAnimation: true
        }).setView([35.68, 139.69], 12);
        mapInstanceRef.current = map;

        // Report map center for search biasing
        const reportCenter = () => {
          if (onMapCenterChange) {
            const c = map.getCenter();
            onMapCenterChange({ lat: c.lat, lng: c.lng });
          }
        };
        map.on('moveend', reportCenter);
        // Report initial center after a short delay
        setTimeout(reportCenter, 600);

        // Force Leaflet to recalculate container size after render
        setTimeout(() => map.invalidateSize(), 100);
        setTimeout(() => map.invalidateSize(), 200);
        setTimeout(() => map.invalidateSize(), 500);

        // Request user location and show blue dot
        if ('geolocation' in navigator) {
          navigator.geolocation.watchPosition(
            (pos) => {
              const { latitude, longitude, accuracy } = pos.coords;
              if (userLocationRef.current) {
                userLocationRef.current.setLatLng([latitude, longitude]);
                userAccuracyRef.current.setLatLng([latitude, longitude]);
                userAccuracyRef.current.setRadius(accuracy);
              } else {
                userAccuracyRef.current = L.circle([latitude, longitude], {
                  radius: accuracy,
                  fillColor: '#4285F4',
                  fillOpacity: 0.1,
                  color: '#4285F4',
                  weight: 1,
                  opacity: 0.3
                }).addTo(map);
                userLocationRef.current = L.circleMarker([latitude, longitude], {
                  radius: 7,
                  fillColor: '#4285F4',
                  color: '#fff',
                  weight: 2.5,
                  fillOpacity: 1
                }).addTo(map);
                userLocationRef.current.setZIndex(1000);
              }
            },
            () => {},
            { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
          );
        }

        // Handle window resize
        const handleResize = () => {
          map.invalidateSize();
        };
        window.addEventListener('resize', handleResize);

        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        tileLayerRef.current = L.tileLayer(tileUrl, {
          attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);

        return () => {
          window.removeEventListener('resize', handleResize);
          map.remove();
          mapInstanceRef.current = null;
        };
      }, []);

      // Pan/fly to a location when requested externally (e.g. from place search)
      useEffect(() => {
        const map = mapInstanceRef.current;
        console.log('[BoWander Map] panTo effect:', panTo, 'map exists:', !!map);
        if (!map || !panTo || !panTo.lat || !panTo.lng) return;
        console.log('[BoWander Map] Flying to:', panTo.lat, panTo.lng);
        map.flyTo([panTo.lat, panTo.lng], 15, { duration: 0.8 });
      }, [panTo]);

      // Show/hide preview pin (temporary marker while adding a place)
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        // Remove existing preview marker
        if (previewMarkerRef.current) {
          map.removeLayer(previewMarkerRef.current);
          previewMarkerRef.current = null;
        }
        // Add new preview marker if we have one
        if (previewPin && previewPin.lat && previewPin.lng) {
          const icon = L.divIcon({
            className: 'preview-pin',
            html: `<div style="
              width: 36px; height: 36px;
              background: #3b82f6;
              border: 3px solid white;
              border-radius: 50%;
              box-shadow: 0 2px 8px rgba(59,130,246,0.5), 0 0 0 4px rgba(59,130,246,0.2);
              display: flex; align-items: center; justify-content: center;
              font-size: 18px;
              animation: pulse-preview 1.5s ease-in-out infinite;
            ">${previewPin.emoji || 'рЯУН'}</div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 18],
          });
          previewMarkerRef.current = L.marker([previewPin.lat, previewPin.lng], { icon, zIndexOffset: 2000 }).addTo(map);
          previewMarkerRef.current.bindTooltip(previewPin.name || 'New pin', { permanent: true, direction: 'top', offset: [0, -20], className: 'preview-tooltip' });
        }
      }, [previewPin]);

      // Update tiles when dark mode changes
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        if (tileLayerRef.current) map.removeLayer(tileLayerRef.current);
        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        tileLayerRef.current = L.tileLayer(tileUrl, {
          attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);
      }, [isDarkMode]);

      // Update markers and fit bounds when pins change
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;

        // Clear old markers
        markersRef.current.forEach(marker => map.removeLayer(marker));
        markersRef.current.clear();

        // Add new markers
        const validPins = pins.filter(p => p.lat && p.lng);
        validPins.forEach(pin => {
          const isSelected = selectedPin?.id === pin.id;
          const categoryData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
          const colorClass = isSelected ? 'category-pin-selected' : '';
          const icon = L.divIcon({
            html: renderPinHtml(pin, categoryData, colorClass),
            iconSize: [isSelected ? 44 : 36, isSelected ? 44 : 36],
            iconAnchor: [isSelected ? 22 : 18, isSelected ? 22 : 18],
            className: 'category-marker'
          });
          const marker = L.marker([pin.lat, pin.lng], { icon })
            .on('click', () => onSelectPin(pin))
            .addTo(map);
          markersRef.current.set(pin.id, marker);
        });

        // Fit bounds when the set of pins changes (e.g. switching collection)
        const collectionKey = validPins.map(p => p.id).sort().join(',');
        if (validPins.length > 0 && collectionKey !== prevCollectionKey.current) {
          prevCollectionKey.current = collectionKey;
          const bounds = L.latLngBounds(validPins.map(p => [p.lat, p.lng]));
          map.invalidateSize();
          setTimeout(() => {
            map.fitBounds(bounds, { padding: [60, 60], maxZoom: 15, animate: true });
          }, 50);
        } else if (validPins.length === 0 && collectionKey !== prevCollectionKey.current) {
          prevCollectionKey.current = collectionKey;
          // No pins вАФ geocode the collection name to center the map there
          if (collectionName) {
            fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(collectionName)}&limit=1`)
              .then(r => r.json())
              .then(data => {
                const f = data.features?.[0];
                if (f && f.geometry?.coordinates) {
                  const [lng, lat] = f.geometry.coordinates;
                  map.flyTo([lat, lng], 12, { duration: 0.5 });
                }
              })
              .catch(() => {});
          }
        }
      }, [pins, collectionName]);

      // Update marker styles when selection changes (without rebuilding all markers)
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        markersRef.current.forEach((marker, id) => {
          const pin = pins.find(p => p.id === id);
          if (!pin) return;
          const isSelected = selectedPin?.id === id;
          const categoryData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
          const colorClass = isSelected ? 'category-pin-selected' : '';
          const icon = L.divIcon({
            html: renderPinHtml(pin, categoryData, colorClass),
            iconSize: [isSelected ? 44 : 36, isSelected ? 44 : 36],
            iconAnchor: [isSelected ? 22 : 18, isSelected ? 22 : 18],
            className: 'category-marker'
          });
          marker.setIcon(icon);
        });
        if (selectedPin && selectedPin.lat) {
          // Offset the center so the pin appears in the visible map area (left of sidebar)
          const targetZoom = Math.max(map.getZoom(), 14);
          if (sidebarWidth > 0) {
            const targetPoint = map.project([selectedPin.lat, selectedPin.lng], targetZoom);
            // Shift center to the right by half the sidebar width so pin lands in visible area
            const offsetPoint = L.point(targetPoint.x + sidebarWidth / 2, targetPoint.y);
            const offsetLatLng = map.unproject(offsetPoint, targetZoom);
            map.flyTo(offsetLatLng, targetZoom, { duration: 0.4 });
          } else {
            map.flyTo([selectedPin.lat, selectedPin.lng], targetZoom, { duration: 0.4 });
          }
        }
      }, [selectedPin, sidebarWidth]);

      return <div ref={mapRef} style={{ width: '100%', height: '100%' }} />;
    };

    const ListView = ({ pins, collections, onSelectPin, isDarkMode, onEdit, onDelete }) => {
      const [sortBy, setSortBy] = useState('name');
      const [expandedCategories, setExpandedCategories] = useState({});
      const [filters, setFilters] = useState({
        openNow: false,
        openAt: null, // { day: 'mon', time: '12:00' }
        category: null,
        source: null,
        myRating: null,
        googleRating: null
      });
      const [showOpenAtPicker, setShowOpenAtPicker] = useState(false);
      const [openAtDay, setOpenAtDay] = useState('mon');
      const [openAtTime, setOpenAtTime] = useState('12:00');

      // Group pins by category
      const grouped = useMemo(() => {
        let result = [...pins];

        // Apply filters
        if (filters.openNow) {
          result = result.filter(p => {
            const status = getOpenStatus(p.opening_hours || {});
            return status.status === 'open';
          });
        }
        if (filters.openAt) {
          result = result.filter(p => {
            const dayIndex = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'].indexOf(filters.openAt.day);
            const [h, m] = filters.openAt.time.split(':').map(Number);
            // Create a date object for the target day/time
            const targetDate = new Date();
            const currentDay = targetDate.getDay();
            const diff = dayIndex - currentDay;
            targetDate.setDate(targetDate.getDate() + diff);
            targetDate.setHours(h, m, 0, 0);
            const status = getOpenStatus(p.opening_hours || {}, targetDate);
            return status.status === 'open';
          });
        }
        if (filters.category) {
          result = result.filter(p => p.category === filters.category);
        }
        if (filters.source) {
          result = result.filter(p => p.source_name === filters.source);
        }
        if (filters.myRating) {
          result = result.filter(p => (p.personal_rating || 0) >= filters.myRating);
        }
        if (filters.googleRating) {
          result = result.filter(p => (p.google_rating || 0) >= filters.googleRating);
        }

        // Sort
        switch (sortBy) {
          case 'name':
            result.sort((a, b) => a.name.localeCompare(b.name));
            break;
          case 'date':
            result.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            break;
          case 'rating':
            result.sort((a, b) => (b.google_rating || 0) - (a.google_rating || 0));
            break;
          case 'my-rating':
            result.sort((a, b) => (b.personal_rating || 0) - (a.personal_rating || 0));
            break;
          default:
            break;
        }

        // Group by category
        const groups = {};
        result.forEach(pin => {
          const catId = pin.category || 'other';
          if (!groups[catId]) {
            groups[catId] = [];
          }
          groups[catId].push(pin);
        });

        return groups;
      }, [pins, sortBy, filters]);

      // Get unique categories that have pins
      const categories = useMemo(() => {
        return Object.keys(grouped).map(catId => ({
          id: catId,
          ...PIN_CATEGORIES[catId]

      useEffect(() => {
        if (!mapRef.current) return;

        const map = L.map(mapRef.current).setView([pin.lat, pin.lng], 14);
        mapInstanceRef.current = map;

        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        L.tileLayer(tileUrl, {
          attribution: '\u00a9 OpenStreetMap \u00a9 CARTO',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);

        // Destination emoji marker
        const icon = L.divIcon({
          html: isCustomIcon(pin.emoji) ? `<div class="emoji-pin"><img src="${pin.emoji}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;" /></div>` : `<div class="emoji-pin">${pin.emoji}</div>`,
          iconSize: [32, 32], iconAnchor: [16, 16],
          className: 'emoji-marker'
        });
        L.marker([pin.lat, pin.lng], { icon }).addTo(map);

        // Try to get user location and show route
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            const userLat = pos.coords.latitude;
            const userLng = pos.coords.longitude;
            L.circleMarker([userLat, userLng], { radius: 8, fillColor: '#4285F4', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(map);
            L.polyline([[userLat, userLng], [pin.lat, pin.lng]], { color: '#4285F4', weight: 4, opacity: 0.7, dashArray: '8 8' }).addTo(map);
            map.fitBounds([[userLat, userLng], [pin.lat, pin.lng]], { padding: [50, 50] });
          }, () => {});
        }

        return () => { map.remove(); };
      }, [pin, isDarkMode]);

      const getCoverForName = (name, index = 0) => {
        const key = name.toLowerCase().trim();
        let covers = DESTINATION_COVERS[key];
        if (!covers) {
          for (const [dest, urls] of Object.entries(DESTINATION_COVERS)) {
            if (key.includes(dest) || dest.includes(key)) { covers = urls; break; }
          }
        }
        if (!covers || covers.length === 0) return null;
        return covers[index % covers.length];
      };

      const getCoversForName = (name) => {
        const key = name.toLowerCase().trim();
        let covers = DESTINATION_COVERS[key];
        if (!covers) {
          for (const [dest, urls] of Object.entries(DESTINATION_COVERS)) {
            if (key.includes(dest) || dest.includes(key)) { covers = urls; break; }
          }
        }
        return covers || [];
      };

      // Generate a map tile URL from lat/lng for collection cover
      const getMapTileCover = (lat, lng, zoom = 12) => {
        const n = Math.pow(2, zoom);
        const xtile = Math.floor((lng + 180) / 360 * n);
        const ytile = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * n);
        return `https://a.basemaps.cartocdn.com/rastertiles/voyager/${zoom}/${xtile}/${ytile}@2x.png`;
      };

      const [photoResults, setPhotoResults] = useState([]);

      // Build cover photo options from curated Unsplash covers + map tiles
      const searchCoverPhotos = (query) => {
        if (!query || query.length < 2) return;
        setCoverSearching(true);

        // Get curated Unsplash covers for this destination
        const covers = getCoversForName(query);
        const photos = covers.map((url, i) => ({
          url, thumb: url, label: `${query} вАФ option ${i + 1}`, credit: 'Unsplash',
        }));
        setPhotoResults(photos);

        // Also get map tile options
        fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=2`)
          .then(r => r.json())
          .then(data => {
            const results = [];
            (data.features || []).slice(0, 1).forEach(f => {
              const [lng, lat] = f.geometry?.coordinates || [];
              if (!lat || !lng) return;
              const name = f.properties?.name || query;
              [12, 10].forEach(z => {
                results.push({
                  url: getMapTileCover(lat, lng, z),
                  label: z >= 11 ? `${name} (city)` : `${name} (region)`,
                });
              });
            });
            setMapTileResults(results);

          .catch(() => setMapTileResults([]))
          .finally(() => setCoverSearching(false));

              {collections.length === 0 ? (

                  <div className="text-6xl mb-4">рЯЧЇпЄП</div>

                    const stats = getCollectionStats(col.id);
                    const gradient = CARD_GRADIENTS[idx % CARD_GRADIENTS.length];

                    const coverIdx = col._coverIdx || 0;
                    const coverImg = col.cover_image || getCoverForName(col.name, coverIdx) || getCollectionMapUrl(collectionPins);

                    return (

                        <button

                        />

    // ==================== MAIN APP ====================
    function BoWanderApp() {
      const [user, setUser] = useState(MockFirebase.currentUser);
      const [authorized, setAuthorized] = useState(
        user ? ALLOWED_EMAILS.includes(user.email) : false
      );
      const [loading, setLoading] = useState(!user);
      const [darkMode, setDarkMode] = useState(
        window.matchMedia('(prefers-color-scheme: dark)').matches
      );

      // Restore view state from URL hash on load (e.g. #collection/nyc)
      const initialHash = window.location.hash.replace('#', '');
      const [hashView, hashCollection] = initialHash.includes('/') ? initialHash.split('/') : [initialHash || 'home', ''];

      const [view, setView] = useState(hashView === 'collection' && hashCollection ? 'collection' : 'home');
      const [showList, setShowList] = useState(true); // sidebar visibility on desktop
      const [selectedPin, setSelectedPin] = useState(null);
      const [pins, setPins] = useState(() => {
        // Start with localStorage cache for instant load, Firestore will overwrite
        try {
          const cached = JSON.parse(localStorage.getItem('boWanderPins'));
          if (cached && cached.length > 0) return cached;
        } catch {}
        return [];
      });
      const [collections, setCollections] = useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem('boWanderCollections'));
          if (saved && saved.length > 0) return saved;
        } catch {}
        return SAMPLE_COLLECTIONS;
      });
      const [activeCollection, setActiveCollection] = useState(
        hashView === 'collection' && hashCollection ? hashCollection : 'tokyo'
      );
      const [searchQuery, setSearchQuery] = useState('');
      const [editingPin, setEditingPin] = useState(null);
      const [showAddMenu, setShowAddMenu] = useState(false);
      const [navigationPin, setNavigationPin] = useState(null);
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      const [showAddFromLink, setShowAddFromLink] = useState(false);
      // Custom uploaded icons stored in localStorage
      const [customIcons, setCustomIcons] = useState(() => {
        try { return JSON.parse(localStorage.getItem('bo_custom_icons') || '[]'); } catch { return []; }
      });
      const handleUploadIcon = (dataUrl) => {
        setCustomIcons(prev => {
          const updated = prev.includes(dataUrl) ? prev : [...prev, dataUrl];
          localStorage.setItem('bo_custom_icons', JSON.stringify(updated));
          return updated;
        });
      };
      const handleDeleteIcon = (iconUrl) => {
        setCustomIcons(prev => {
          const updated = prev.filter(u => u !== iconUrl);
          localStorage.setItem('bo_custom_icons', JSON.stringify(updated));
          return updated;
        });
      };
      const [showUploadConfirmation, setShowUploadConfirmation] = useState(false);
      const [mapCenter, setMapCenter] = useState(null); // passive: where the map currently is (for search biasing)
      const [mapPanTarget, setMapPanTarget] = useState(null); // active: where to fly the map to
      const [previewPin, setPreviewPin] = useState(null); // temporary pin shown while adding a place
      const [fetchingRatingsFor, setFetchingRatingsFor] = useState(null); // pin id currently fetching ratings for
      const [ratingFetchStatus, setRatingFetchStatus] = useState(''); // status message for rating fetch

      useEffect(() => {
        let unsubPins = null;
        let unsubCollections = null;

        MockFirebase.init().then(() => {
          const currentUser = MockFirebase.currentUser;
          setUser(currentUser);
          if (currentUser && ALLOWED_EMAILS.includes(currentUser.email)) {
            setAuthorized(true);
            // Subscribe to real-time Firestore updates (pins sync between devices)
            unsubPins = MockFirebase.onPinsSnapshot(firestorePins => {
              setPins(firestorePins);
            });
            unsubCollections = MockFirebase.onCollectionsSnapshot(firestoreCols => {
              setCollections(firestoreCols);
            });
            // First-run seed: if Firestore has no collections, push the samples
            MockFirebase.loadCollections().then(cols => {
              if (cols === SAMPLE_COLLECTIONS || cols.length === 0) {
                SAMPLE_COLLECTIONS.forEach(c => MockFirebase.saveCollection(c));
              }
            });
          }
          setLoading(false);
        });

        const darkMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        const handleChange = (e) => setDarkMode(e.matches);
        darkMediaQuery.addEventListener('change', handleChange);

        const handleResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', handleResize);

        return () => {
          darkMediaQuery.removeEventListener('change', handleChange);
          window.removeEventListener('resize', handleResize);
          if (unsubPins) unsubPins();
          if (unsubCollections) unsubCollections();
        };
      }, []);

      // Sync URL hash with current view state
      useEffect(() => {
        if (view === 'collection' && activeCollection) {
          window.location.hash = `collection/${activeCollection}`;
        } else {
          window.location.hash = 'home';
        }
      }, [view, activeCollection]);

      // Listen for browser back/forward
      useEffect(() => {
        const onHashChange = () => {
          const hash = window.location.hash.replace('#', '');
          const [hView, hCol] = hash.includes('/') ? hash.split('/') : [hash || 'home', ''];
          if (hView === 'collection' && hCol) {
            setView('collection');
            setActiveCollection(hCol);
          } else {
            setView('home');
          }
        };
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      const filteredPins = useMemo(() => {
        let result = activeCollection === 'all'
          ? pins
          : pins.filter(p => p.collection_id === activeCollection);

        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          result = result.filter(p =>
            p.name.toLowerCase().includes(q) ||
            p.address.toLowerCase().includes(q) ||
            p.source_name?.toLowerCase().includes(q)
          );
        }

        return result;
      }, [pins, activeCollection, searchQuery]);

      // Auto-fetch ratings from Google and Yelp for a pin
      const fetchRatingsForPin = async (pinData) => {
        const apiKey = getGoogleApiKey();
        if (!apiKey) {
          setRatingFetchStatus('No Google API key set. Add one in Settings (gear icon on home page) to auto-fetch ratings.');
          return;
        }
        setFetchingRatingsFor(pinData.id);
        setRatingFetchStatus('Searching Google Places...');
        const searchQuery = `${pinData.name} ${pinData.address || ''}`.trim();
        const updates = {};

        try {
          // Use Google Places API (New) вАФ Text Search
          const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Goog-Api-Key': apiKey,
              'X-Goog-FieldMask': 'places.displayName,places.rating,places.userRatingCount,places.priceLevel,places.websiteUri,places.googleMapsUri,places.formattedAddress,places.types'
            },
            body: JSON.stringify({
              textQuery: searchQuery,
              maxResultCount: 1
            })
          });

          if (!resp.ok) {
            const errText = await resp.text();
            console.error('Places API error:', resp.status, errText);
            if (resp.status === 403 || resp.status === 401) {
              setRatingFetchStatus('API key invalid or Places API not enabled. Check your Google Cloud Console.');
            } else {
              setRatingFetchStatus(`Places API error (${resp.status}). Check console for details.`);
            }
            setFetchingRatingsFor(null);
            return;
          }

          const data = await resp.json();
          const place = data.places?.[0];

          if (place) {
            if (place.rating) {
              updates.google_rating = place.rating;
            }
            if (place.userRatingCount) {
              updates.google_reviews_count = place.userRatingCount;
            }
            if (place.priceLevel) {
              // Convert PRICE_LEVEL_FREE, PRICE_LEVEL_INEXPENSIVE, etc. to $, $$, $$$
              const priceLevels = { 'PRICE_LEVEL_FREE': 'Free', 'PRICE_LEVEL_INEXPENSIVE': '$', 'PRICE_LEVEL_MODERATE': '$$', 'PRICE_LEVEL_EXPENSIVE': '$$$', 'PRICE_LEVEL_VERY_EXPENSIVE': '$$$$' };
              updates.price_level = priceLevels[place.priceLevel] || place.priceLevel;
            }
            if (place.websiteUri) {
              updates.website = place.websiteUri;
            }
            if (place.googleMapsUri) {
              updates.google_maps_url = place.googleMapsUri;
            }
            // Use the Google-provided address if we don't have one or ours is messy
            if (place.formattedAddress && (!pinData.address || pinData.address.length > 100)) {
              updates.address = place.formattedAddress;
            }
          }
        } catch (e) {
          console.error('Places API fetch error:', e);
          setRatingFetchStatus(`Network error fetching ratings: ${e.message}`);
          setFetchingRatingsFor(null);
          return;
        }

        // If we found any data, update the pin
        if (Object.keys(updates).length > 0) {
          setPins(prev => prev.map(p => {
            if (p.id === pinData.id) {
              const updated = { ...p, ...updates };
              MockFirebase.savePin(updated);
              setSelectedPin(sel => sel?.id === pinData.id ? updated : sel);
              return updated;
            }
            return p;
          }));
          setRatingFetchStatus('');
        } else {
          setRatingFetchStatus('Place found but no rating data available.');
        }
        setFetchingRatingsFor(null);
      };

      const handleSavePin = (pin) => {
        // Handle delete via _delete flag from edit form
        if (pin._delete) {
          handleDeletePin(pin.id, pin.collection_id);
          return;
        }
        const isExisting = !!pin.id;
        // Generate ID upfront for new pins so all references use the same ID
        const savedPin = isExisting ? pin : { ...pin, id: Date.now().toString(), created_at: new Date().toISOString() };
        MockFirebase.savePin(savedPin);
        setPins(prev => {
          const idx = prev.findIndex(p => p.id === savedPin.id);
          if (idx > -1) {
            return [...prev.slice(0, idx), savedPin, ...prev.slice(idx + 1)];
          } else {
            return [...prev, savedPin];
          }
        });
        setEditingPin(null);
        setSelectedPin(savedPin);
        if (!isExisting) {
          // Auto-fetch ratings for new pins in the background
          setTimeout(() => fetchRatingsForPin(savedPin), 200);
        }
      };

      // Inline update: save pin data directly without opening edit form (for ratings, notes)
      const handleInlineUpdate = (updatedPin) => {
        MockFirebase.savePin(updatedPin);
        setPins(prev => {
          const idx = prev.findIndex(p => p.id === updatedPin.id);
          if (idx > -1) return [...prev.slice(0, idx), updatedPin, ...prev.slice(idx + 1)];
          return prev;
        });
        setSelectedPin(updatedPin);
      };

      const handleDeletePin = async (pinId, collectionId) => {
        // Optimistically update UI
        setPins(prev => prev.filter(p => p.id !== pinId));
        setSelectedPin(null);
        setEditingPin(null);
        try {
          await MockFirebase.deletePin(pinId, collectionId);
          console.log('[BoWander] Pin deleted:', pinId);
        } catch (err) {
          console.error('[BoWander] Delete failed:', err);
          alert('Failed to delete: ' + (err.message || 'Unknown error. Check if you are logged in.'));
          // Re-fetch pins since optimistic update may be wrong
          try {
            const fresh = await MockFirebase.loadPins();
            setPins(fresh);
          } catch {}
        }
      };

      const handleAddCollection = (newCol) => {
        const { _update, ...colData } = newCol;
        setCollections(prev => {
          let updated;
          if (_update) {
            updated = prev.map(c => c.id === colData.id ? { ...c, ...colData } : c);
          } else {
            updated = [...prev, colData];
          }
          localStorage.setItem('boWanderCollections', JSON.stringify(updated));
          return updated;
        });
        // Save to Firestore вАФ find the full collection object to persist
        if (_update) {
          // Merge update into existing
          const existing = collections.find(c => c.id === colData.id);
          MockFirebase.saveCollection({ ...existing, ...colData });
        } else {
          MockFirebase.saveCollection(colData);
        }
      };

      const handleDeleteCollection = (collectionId) => {
        setCollections(prev => {
          const updated = prev.filter(c => c.id !== collectionId);
          localStorage.setItem('boWanderCollections', JSON.stringify(updated));
          return updated;
        });
        setPins(prev => prev.filter(p => p.collection_id !== collectionId));
        // Delete from Firestore (also deletes child pins)
        MockFirebase.deleteCollection(collectionId);
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center h-screen w-screen bg-white dark:bg-slate-900">
            <div className="loading-spinner" />
          </div>
        );
      }

      if (!user || !authorized) {
        return <LoginScreen isDarkMode={darkMode} />;
      }

      // Home view
      if (view === 'home') {
        return (
          <div className={`${darkMode ? 'dark' : ''} h-screen w-screen bg-white dark:bg-slate-900 text-gray-900 dark:text-white overflow-hidden`}>
            <HomePage
              collections={collections}
              pins={pins}
              onSelectCollection={(collectionId) => {
                setActiveCollection(collectionId);
                setView('collection');
                setSearchQuery('');
              }}
              onCreateCollection={handleAddCollection}
              onDeleteCollection={handleDeleteCollection}
              isDarkMode={darkMode}
              isMobile={isMobile}
            />
          </div>
        );
      }

      // Collection view (map + list)
      return (
        <div className={`${darkMode ? 'dark' : ''} h-screen w-screen bg-white dark:bg-slate-900 text-gray-900 dark:text-white overflow-hidden`}>
          {/* Top Navigation */}
          <div className="h-16 bg-white dark:bg-slate-800 border-b dark:border-slate-700 px-4 flex items-center justify-between sticky top-0" style={{ zIndex: 9001 }}>
            <div className="flex items-center gap-4">
              <button
                onClick={() => setView('home')}
                className="p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-lg"
              >
                вЖР
              </button>
              <h1 className="text-xl font-bold">{collections.find(c => c.id === activeCollection)?.name || 'Collection'}</h1>
            </div>

            {/* Unified Search Bar */}
            <UnifiedSearchBar
              pins={pins}
              isDarkMode={darkMode}
              isMobile={isMobile}
              activeCollection={activeCollection}
              collections={collections}
              mapCenter={mapCenter}
              onSelectPin={(pin) => {
                setSelectedPin(pin);
              }}
              onAddPlace={(place) => {
                const result = guessEmojiAndCategory(place.name, place.type);
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                // Pan map and show preview pin
                if (place.lat && place.lng) {
                  setMapPanTarget({ lat: place.lat, lng: place.lng, _t: Date.now() });
                  setPreviewPin({ lat: place.lat, lng: place.lng, name: place.name, emoji: result.emoji });
                }
                setEditingPin({
                  name: place.name,
                  address: place.address,
                  lat: place.lat,
                  lng: place.lng,
                  emoji: result.emoji,
                  category: result.category,
                  description: '',
                  source_name: '',
                  collection_id: defaultCollection,
                  photos: [],
                  opening_hours: {}
                });
              }}
              onAddFromLink={() => setShowAddFromLink(true)}
              onUploadConfirmation={() => setShowUploadConfirmation(true)}
            />

            <div className="flex items-center gap-1 flex-shrink-0">
              <button
                onClick={() => setShowAddFromLink(true)}
                className="p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-sm"
                title="Add from URL"
              >
                рЯФЧ
              </button>
              <button
                onClick={() => setShowUploadConfirmation(true)}
                className="p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-sm"
                title="Upload confirmation"
              >
                вђЖпЄП
              </button>
            </div>
          </div>

          {/* Main Content */}
          <div className="overflow-hidden" style={{ height: isMobile ? 'calc(100vh - 4rem - 60px)' : 'calc(100vh - 4rem)' }}>
            <div className="h-full flex">
              {/* Desktop Sidebar */}
              {!isMobile && showList && (
                <div className="w-96 border-r dark:border-slate-700 bg-white dark:bg-slate-800 overflow-y-auto">
                  <ListView
                    pins={filteredPins}
                    collections={collections}
                    onSelectPin={setSelectedPin}
                    isDarkMode={darkMode}
                    onEdit={setEditingPin}
                    onDelete={handleDeletePin}
                  />
                </div>
              )}

              {/* Map View */}
              <div className="flex-1">
                <MapView
                  pins={filteredPins}
                  selectedPin={selectedPin}
                  onSelectPin={setSelectedPin}
                  isDarkMode={darkMode}
                  onNavigate={setNavigationPin}
                  sidebarWidth={selectedPin && !isMobile ? 384 : 0}
                  collectionName={collections.find(c => c.id === activeCollection)?.name}
                  onMapCenterChange={setMapCenter}
                  panTo={mapPanTarget}
                  previewPin={previewPin}
                />
              </div>
            </div>
          </div>

          {/* Detail Sheet / Side Panel */}
          {selectedPin && !isMobile && (
            <PinDetailSheet
              pin={selectedPin}
              onClose={() => setSelectedPin(null)}
              onEdit={(pin) => setEditingPin(pin)}
              onInlineUpdate={handleInlineUpdate}
              isDarkMode={darkMode}
              isDesktop={!isMobile}
              onDelete={handleDeletePin}
              onNavigate={setNavigationPin}
              collections={collections}
              allPins={pins}
              fetchingRatings={fetchingRatingsFor === selectedPin?.id}
              ratingFetchStatus={ratingFetchStatus}
              onRetryRatings={() => fetchRatingsForPin(selectedPin)}
              customIcons={customIcons}
              onUploadIcon={handleUploadIcon}
              onDeleteIcon={handleDeleteIcon}
            />
          )}

          {selectedPin && isMobile && (
            <PinDetailSheet
              pin={selectedPin}
              onClose={() => setSelectedPin(null)}
              onEdit={(pin) => setEditingPin(pin)}
              onInlineUpdate={handleInlineUpdate}
              isDarkMode={darkMode}
              isDesktop={false}
              onDelete={handleDeletePin}
              onNavigate={setNavigationPin}
              collections={collections}
              allPins={pins}
              fetchingRatings={fetchingRatingsFor === selectedPin?.id}
              ratingFetchStatus={ratingFetchStatus}
              onRetryRatings={() => fetchRatingsForPin(selectedPin)}
              customIcons={customIcons}
              onUploadIcon={handleUploadIcon}
              onDeleteIcon={handleDeleteIcon}
            />
          )}


          {/* Edit Form */}
          {editingPin && (
            <PinEditForm
              key={editingPin ? `${editingPin.name}-${editingPin.lat}-${editingPin.lng}` : 'new'}
              pin={editingPin}
              collections={collections}
              onSave={(pin) => { setPreviewPin(null); handleSavePin(pin); }}
              onCancel={() => { setPreviewPin(null); setEditingPin(null); }}
              isDarkMode={darkMode}
              onAddCollection={handleAddCollection}
              allPins={pins}
              customIcons={customIcons}
              onUploadIcon={handleUploadIcon}
              onDeleteIcon={handleDeleteIcon}
              onMapCenter={setMapPanTarget}
              onPreviewPin={setPreviewPin}
            />
          )}

          {/* Navigation View */}
          {navigationPin && (
            <NavigationView
              pin={navigationPin}
              onClose={() => setNavigationPin(null)}
              isDarkMode={darkMode}
            />
          )}

          {/* Add from Link Modal */}
          {showAddFromLink && (
            <AddFromLinkModal
              onSelect={(data) => {
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                const newPin = {
                  name: data.name,
                  address: '',
                  description: data.description,
                  emoji: data.emoji,
                  source_name: data.source_name,
                  source_url: data.source_url,
                  collection_id: defaultCollection,
                  photos: [],
                  opening_hours: {},
                  lat: 0,
                  lng: 0
                };
                setEditingPin(newPin);
                setShowAddFromLink(false);
              }}
              onClose={() => setShowAddFromLink(false)}
              isDarkMode={darkMode}
            />
          )}

          {/* Upload Confirmation Modal */}
          {showUploadConfirmation && (
            <UploadConfirmationModal
              onSelect={async (data) => {
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                let lat = 0, lng = 0;
                // Clean the address before geocoding вАФ strip phone numbers, fax, contact info
                const cleanAddr = (addr) => {
                  if (!addr) return '';
                  return addr
                    .replace(/\s*(?:phone|tel|fax|contact|email|website|www\.|http)[:\s].*/i, '')
                    .replace(/\s*\+\d{1,3}[\s\d-]{6,}/, '')
                    .replace(/\s*Contac.*$/i, '')
                    .trim();
                };
                const cleanedAddress = cleanAddr(data.address);
                // Geocode with cleaned address
                if (cleanedAddress) {
                  try {
                    const geoResp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(cleanedAddress)}&limit=1`);
                    const geoData = await geoResp.json();
                    const f = geoData.features?.[0];
                    if (f?.geometry?.coordinates) {
                      lng = f.geometry.coordinates[0];
                      lat = f.geometry.coordinates[1];
                    }
                  } catch {}
                }
                // Fallback: try property name (hotel name often geocodes well)
                if (!lat && data.name) {
                  try {
                    const geoResp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(data.name)}&limit=1`);
                    const geoData = await geoResp.json();
                    const f = geoData.features?.[0];
                    if (f?.geometry?.coordinates) {
                      lng = f.geometry.coordinates[0];
                      lat = f.geometry.coordinates[1];
                      if (!data.address) data.address = [f.properties?.street, f.properties?.city, f.properties?.country].filter(Boolean).join(', ');
                    }
                  } catch {}
                }
                // Fallback: try just the city/country part of the address (last 2-3 comma segments)
                if (!lat && cleanedAddress) {
                  try {
                    const parts = cleanedAddress.split(',').map(s => s.trim()).filter(Boolean);
                    const cityCountry = parts.slice(-2).join(', ');
                    if (cityCountry.length >= 3) {
                      const geoResp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(cityCountry)}&limit=1`);
                      const geoData = await geoResp.json();
                      const f = geoData.features?.[0];
                      if (f?.geometry?.coordinates) {
                        lng = f.geometry.coordinates[0];
                        lat = f.geometry.coordinates[1];
                      }
                    }
                  } catch {}
                }
                // Store the cleaned address back
                if (cleanedAddress && cleanedAddress !== data.address) data.address = cleanedAddress;
                const newPin = {
                  name: data.name,
                  address: data.address,
                  description: data.description,
                  emoji: data.emoji || 'рЯП®',
                  category: data.category || 'hotel',
                  source_name: data.source_name,
                  collection_id: defaultCollection,
                  photos: [],
                  opening_hours: {},
                  lat, lng,
                  reservation_details: data.reservation_details,
                  attachment: data.attachment,
                };
                // Save directly вАФ no need to open edit form
                handleSavePin(newPin);
                setShowUploadConfirmation(false);
              }}
              onClose={() => setShowUploadConfirmation(false)}
              isDarkMode={darkMode}
            />
          )}

          {/* Floating bottom buttons (Mobile) */}
          {isMobile && view === 'collection' && !selectedPin && !editingPin && (
            <div className="fixed bottom-4 left-0 right-0 flex justify-center gap-3" style={{ zIndex: 500 }}>
              <button
                onClick={() => setShowList(!showList)}
                className={`flex items-center gap-2 px-4 py-2.5 rounded-full shadow-lg text-sm font-medium transition ${
                  showList
                    ? 'bg-blue-600 text-white'
                    : 'bg-white dark:bg-slate-800 text-gray-700 dark:text-gray-200 border dark:border-slate-600'
                }`}
              >
                {showList ? <><MapIcon /> Map</> : <><ListIcon /> List</>}
              </button>
              <button
                onClick={() => setView('home')}
                className="flex items-center gap-2 px-4 py-2.5 rounded-full shadow-lg text-sm font-medium bg-white dark:bg-slate-800 text-gray-700 dark:text-gray-200 border dark:border-slate-600 transition"
              >
                рЯП†
              </button>
            </div>
          )}

          {/* Add Menu (Floating) */}
          {showAddMenu && isMobile && (
            <div className="floating-action-menu">
              <div
                className="fam-item"
                onClick={() => {
                  const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                  setEditingPin({ name: '', address: '', description: '', emoji: 'рЯУМ', category: 'other', source_name: '', collection_id: defaultCollection, photos: [], opening_hours: {} });
                  setShowAddMenu(false);
                }}
              >
                <span>вЬПпЄП</span>
                <span>Manual</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowAddFromLink(true);
                  setShowAddMenu(false);
                }}
              >
                <span>рЯФЧ</span>
                <span>From URL</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  alert('Add from Photo feature coming soon');
                }}
              >
                <span>рЯУЄ</span>
                <span>From Photo</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowUploadConfirmation(true);
                  setShowAddMenu(false);
                }}
              >
                <span>рЯОЂ</span>
                <span>Upload Confirmation</span>
              </div>
            </div>
          )}


          {/* Service Worker Registration */}
          {typeof navigator !== 'undefined' && 'serviceWorker' in navigator && (
            <script dangerouslySetInnerHTML={{
              __html: `
                if ('serviceWorker' in navigator) {
                  const swCode = \`
const CACHE_NAME = 'bo-wander-v1';
const urlsToCache = [
  '/',
  '/index.html'
];

self.addEventListener('install', event => {
  event.waitUntil(
    caches.open(CACHE_NAME)
      .then(cache => cache.addAll(urlsToCache).catch(() => {}))
  );
  self.skipWaiting();
});

self.addEventListener('activate', event => {
  self.clients.matchAll().then(clients => {
    clients.forEach(client => client.postMessage({ type: 'SKIP_WAITING' }));
  });
  event.waitUntil(caches.keys().then(cacheNames => {
    return Promise.all(
      cacheNames.map(cacheName => {
        if (cacheName !== CACHE_NAME) {
