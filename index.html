                        }}
                        className="px-2 py-0.5 rounded bg-blue-600 text-white text-[11px] font-medium hover:bg-blue-700"
                      >Apply</button>
                    </div>
                  )}
                </div>
                {/* Category groups */}
                {sharedCategories.length === 0 ? (
                  <div className="flex items-center justify-center h-32 text-gray-400 text-sm">No pins match filters</div>
                ) : (
                  <div className="divide-y dark:divide-slate-700">
                    {sharedCategories.map(cat => (
                      <div key={cat.id}>
                        <button
                          onClick={() => setSharedExpandedCats(prev => ({ ...prev, [cat.id]: !prev[cat.id] }))}
                          className="w-full px-3 py-2 flex items-center justify-between hover:bg-white dark:hover:bg-slate-700 transition"
                        >
                          <div className="flex items-center gap-2">
                            <span className="text-sm" style={{ color: cat.color }}>{cat.icon}</span>
                            <span className="text-xs font-semibold dark:text-white">
                              {cat.label} <span className="text-gray-400 font-normal">({sharedGrouped[cat.id].length})</span>
                            </span>
                          </div>
                          <span className={`text-gray-400 text-[10px] transition transform ${sharedExpandedCats[cat.id] ? 'rotate-180' : ''}`}>в–ј</span>
                        </button>
                        {sharedExpandedCats[cat.id] && (
                          <div className="divide-y dark:divide-slate-700">
                            {sharedGrouped[cat.id].map(pin => (
                              <button key={pin.id}
                                onClick={() => {
                                  setSelectedPin(pin);
                                  if (mapInstanceRef.current && pin.lat && pin.lng) {
                                    mapInstanceRef.current.flyTo([pin.lat, pin.lng], 16, { duration: 0.5 });
                                  }
                                }}
                                className={`w-full text-left px-3 py-2 hover:bg-white dark:hover:bg-slate-700 transition ${selectedPin?.id === pin.id ? 'bg-white dark:bg-slate-700' : ''}`}
                              >
                                <div className="flex items-center gap-2">
                                  <div className="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 text-[10px] overflow-hidden" style={{ backgroundColor: cat.color }}>
                                    {isCustomIcon(pin.emoji) ? <img src={pin.emoji} alt="" className="w-full h-full object-cover" /> : pin.emoji}
                                  </div>
                                  <div className="flex-1 min-w-0">
                                    <p className="text-sm font-medium dark:text-white truncate">{pin.name}</p>
                                    {pin.address && <p className="text-[10px] text-gray-400 truncate">{pin.address}</p>}
                                  </div>
                                  <div className="flex items-center gap-1 flex-shrink-0">
                                    {pin.google_rating && (
                                      <span className="text-[11px] text-amber-500">вҳ… {pin.google_rating}</span>
                                    )}
                                    {pin.opening_hours && Object.keys(pin.opening_hours).length > 0 && (() => {
                                      const os = getOpenStatus(pin.opening_hours);
                                      return <span className={`inline-block w-1.5 h-1.5 rounded-full ${os.status === 'open' ? 'bg-green-500' : 'bg-red-500'}`} />;
                                    })()}
                                  </div>
                                </div>
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Map */}
              <div className="flex-1 relative">
                <div ref={mapRef} className="w-full h-full" />

                {/* Selected pin detail sheet */}
                {selectedPin && (
                  <div className="absolute bottom-0 left-0 right-0 md:left-auto md:right-4 md:bottom-4 md:w-96 bg-white dark:bg-slate-900 rounded-t-2xl md:rounded-xl shadow-2xl border dark:border-slate-700 max-h-[60vh] overflow-y-auto" style={{ zIndex: 1000 }}>
                    <div className="p-4">
                      <div className="flex items-start justify-between mb-2">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2">
                            <span className="text-xl">{selectedPin.emoji || 'рҹ“Қ'}</span>
                            <h3 className="text-lg font-bold dark:text-white">{selectedPin.name}</h3>
                          </div>
                          {selectedPin.address && (
                            <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">{selectedPin.address}</p>
                          )}
                        </div>
                        <button onClick={() => setSelectedPin(null)} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded flex-shrink-0 ml-2">
                          <CloseIcon />
                        </button>
                      </div>

                      {/* Ratings */}
                      {(selectedPin.google_rating || selectedPin.personal_rating || selectedPin.tabelog_rating) && (
                        <div className="flex flex-wrap items-center gap-3 mb-3 text-sm">
                          {selectedPin.google_rating && (
                            <span className="text-amber-500">вҳ… {selectedPin.google_rating}{selectedPin.google_reviews_count ? ` (${selectedPin.google_reviews_count.toLocaleString()})` : ''}</span>
                          )}
                          {selectedPin.tabelog_rating && (
                            <span className="flex items-center gap-1">
                              <span className="text-xs font-semibold" style={{ color: '#E63E1C' }}>Tabelog</span>
                              <span style={{ color: '#E63E1C' }}>вҳ… {selectedPin.tabelog_rating.toFixed(2)}</span>
                              {selectedPin.tabelog_url && <a href={selectedPin.tabelog_url} target="_blank" rel="noopener" className="text-xs" style={{ color: '#E63E1C' }}>вҶ—</a>}
                            </span>
                          )}
                          {selectedPin.personal_rating && (
                            <span className="text-purple-500">{'вҳ…'.repeat(selectedPin.personal_rating)}{'вҳҶ'.repeat(5 - selectedPin.personal_rating)}</span>
                          )}
                        </div>
                      )}

                      {/* Source badges */}
                      {(() => {
                        const links = Array.isArray(selectedPin.sources) && selectedPin.sources.length
                          ? selectedPin.sources.filter(s => s.url)
                          : (selectedPin.source_url ? [{ label: '', url: selectedPin.source_url }] : []);
                        const recommenderDuped = selectedPin.source_name && links.some(s => {
                          const label = (s.label || '').toLowerCase();
                          let domain = ''; try { domain = new URL(s.url).hostname.replace('www.','').toLowerCase(); } catch {}
                          const rn = selectedPin.source_name.toLowerCase();
                          return label === rn || domain === rn || label.includes(rn) || rn.includes(domain);
                        });
                        if (!selectedPin.source_name && links.length === 0) return null;
                        return (
                          <div className="flex flex-wrap gap-1.5 mb-2">
                            {selectedPin.source_name && !recommenderDuped && (
                              <span className="inline-block bg-gray-600 text-white px-1.5 py-px rounded-full" style={{ fontSize: '10px' }}>
                                {selectedPin.source_name}
                              </span>
                            )}
                            {links.map((s, i) => (
                              <a key={i} href={s.url} target="_blank" rel="noopener"
                                className="inline-block bg-blue-600 hover:bg-blue-700 text-white px-1.5 py-px rounded-full" style={{ fontSize: '10px' }}>
                                {s.label || (() => { try { return new URL(s.url).hostname.replace('www.',''); } catch { return s.url; } })()} вҶ—
                              </a>
                            ))}
                          </div>
                        );
                      })()}

                      {/* Hours */}
                      {(() => {
                        const os = openStatus(selectedPin);
                        const hasHours = selectedPin.opening_hours && Object.keys(selectedPin.opening_hours).length > 0;
                        if (!os && !hasHours) return null;
                        return <SharedHoursToggle os={os} openingHours={selectedPin.opening_hours} />;
                      })()}

                      {/* Description */}
                      {selectedPin.description && (
                        <p className="text-sm text-gray-700 dark:text-gray-300 mb-3 whitespace-pre-line">{selectedPin.description}</p>
                      )}

                      {/* Personal notes */}
                      {selectedPin.personal_notes && (
                        <div className="bg-purple-50 dark:bg-purple-900/20 rounded-lg p-2.5 mb-3">
                          <p className="text-xs font-medium text-purple-700 dark:text-purple-300 mb-0.5">Notes</p>
                          <p className="text-sm text-purple-900 dark:text-purple-200">{selectedPin.personal_notes}</p>
                        </div>
                      )}

                      {/* Google Maps link */}
                      {selectedPin.website && (
                        <a href={selectedPin.website} target="_blank" rel="noopener noreferrer"
                          className="text-xs text-blue-600 hover:underline">
                          Open in Google Maps вҶ—
                        </a>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* LIST VIEW */}
          {sharedViewMode === 'list' && (
            <div className="flex-1 overflow-y-auto">
              {/* Sort + Filters */}
              <div className="sticky top-0 bg-white dark:bg-slate-900 border-b dark:border-slate-700 px-4 py-3 space-y-3" style={{ zIndex: 10 }}>
                <select
                  value={sharedSortBy}
                  onChange={e => setSharedSortBy(e.target.value)}
                  className="w-full pl-3 pr-9 py-2 border rounded dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm"
                >
                  <option value="name">Sort by Name</option>
                  <option value="rating">Sort by Rating</option>
                </select>

                <div className="space-y-2">
                  <label className="text-xs font-semibold text-gray-600 dark:text-gray-400 block">Filters</label>
                  <div className="flex flex-wrap gap-2">
                    <button
                      onClick={() => setSharedFilters(f => ({ ...f, vegetarian: !f.vegetarian }))}
                      className={`px-3 py-1 rounded-full text-xs font-medium transition ${
                        sharedFilters.vegetarian ? 'bg-green-700 text-white' : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                      }`}
                    >рҹҢұ Veg</button>
                    {sharedSources.length > 0 && (
                      <select
                        value={sharedFilters.source || ''}
                        onChange={e => setSharedFilters(f => ({ ...f, source: e.target.value || null }))}
                        className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                          sharedFilters.source ? 'bg-purple-600 text-white' : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                        }`}

        setLoggingIn(true);
        setLoginError('');
        try {
          await MockFirebase.signInWithGoogle();
          window.location.reload();
        } catch (e) {
          console.error('Login error:', e);
          if (e.code === 'auth/popup-blocked') {
            setLoginError('Pop-up blocked вҖ” please allow pop-ups for this site.');
          } else if (e.code === 'auth/unauthorized-domain') {
            setLoginError('This domain is not authorized in Firebase. Add it under Authentication вҶ’ Settings вҶ’ Authorized domains.');
          } else {
            setLoginError(e.message || 'Login failed. Please try again.');
          }
          setLoggingIn(false);
        }
      };

        <div className={`${isDarkMode ? 'dark' : ''} h-screen w-screen flex flex-col items-center justify-center bg-white dark:bg-slate-900`}>

        'seattle': [U('photo-1502175353174-a7a70e73b362'), U('photo-1516820612845-a13894592046')],
      };

      const getCoverForName = (name, index = 0) => {
        const key = name.toLowerCase().trim();
        let covers = DESTINATION_COVERS[key];
        if (!covers) {
          for (const [dest, urls] of Object.entries(DESTINATION_COVERS)) {
            if (key.includes(dest) || dest.includes(key)) { covers = urls; break; }
          }
        }
        if (!covers || covers.length === 0) return null;
        return covers[index % covers.length];
      };

      const getCoversForName = (name) => {
        const key = name.toLowerCase().trim();
        let covers = DESTINATION_COVERS[key];
        if (!covers) {
          for (const [dest, urls] of Object.entries(DESTINATION_COVERS)) {
            if (key.includes(dest) || dest.includes(key)) { covers = urls; break; }
          }
        }
        return covers || [];
      };

      // Generate a map tile URL from lat/lng for collection cover
      const getMapTileCover = (lat, lng, zoom = 12) => {
        const n = Math.pow(2, zoom);
        const xtile = Math.floor((lng + 180) / 360 * n);
        const ytile = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * n);
        return `https://a.basemaps.cartocdn.com/rastertiles/voyager/${zoom}/${xtile}/${ytile}@2x.png`;
      };

      const [photoResults, setPhotoResults] = useState([]);
      const [mapTileResults, setMapTileResults] = useState([]);
      const [googlePhotoResults, setGooglePhotoResults] = useState([]);

      // Build cover photo options from curated Unsplash covers + Google Places photos + map tiles
      const searchCoverPhotos = (query) => {
        if (!query || query.length < 2) return;
        setCoverSearching(true);
        setGooglePhotoResults([]);

        // Get curated Unsplash covers for this destination
        const covers = getCoversForName(query);
        const photos = covers.map((url, i) => ({
          url, thumb: url, label: `${query} вҖ” option ${i + 1}`, credit: 'Unsplash',
        }));
        setPhotoResults(photos);

        // Google Places Photos вҖ” search for the destination and pull photos
        const apiKey = getGoogleApiKey();
        if (apiKey) {
          fetch('https://places.googleapis.com/v1/places:searchText', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Goog-Api-Key': apiKey,
              'X-Goog-FieldMask': 'places.photos,places.displayName',
            },
            body: JSON.stringify({ textQuery: query + ' tourist attraction', maxResultCount: 5 }),
          })
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
              const gPhotos = [];
              const seen = new Set();
              (data.places || []).forEach(place => {
                (place.photos || []).slice(0, 2).forEach(photo => {
                  if (seen.has(photo.name)) return;
                  seen.add(photo.name);
                  const photoUrl = `https://places.googleapis.com/v1/${photo.name}/media?maxWidthPx=600&maxHeightPx=400&key=${apiKey}`;
                  gPhotos.push({
                    url: photoUrl,
                    thumb: photoUrl,
                    label: place.displayName?.text || query,
                    credit: photo.authorAttributions?.[0]?.displayName || 'Google',
                  });
                });
              });
              setGooglePhotoResults(gPhotos.slice(0, 9));
            })
            .catch(() => setGooglePhotoResults([]))
            .finally(() => setCoverSearching(false));
        } else {
          setCoverSearching(false);
        }

        // Also get map tile options
        fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=2`)
          .then(r => r.json())
          .then(data => {
            const results = [];
            (data.features || []).slice(0, 1).forEach(f => {
              const [lng, lat] = f.geometry?.coordinates || [];
              if (!lat || !lng) return;
              const name = f.properties?.name || query;
              [12, 10].forEach(z => {
                results.push({
                  url: getMapTileCover(lat, lng, z),
                  label: z >= 11 ? `${name} (city)` : `${name} (region)`,
                });
              });
            });
            setMapTileResults(results);
          })
          .catch(() => setMapTileResults([]));
      };

      // Auto-search when cover picker opens
      useEffect(() => {
        if (editingCover?.name && coverAutoSearchedRef.current !== editingCover.id) {
          coverAutoSearchedRef.current = editingCover.id;
          setCoverSearchQuery(editingCover.name);
          searchCoverPhotos(editingCover.name);
        }
        if (!editingCover) {
          coverAutoSearchedRef.current = null;
        }
      }, [editingCover]);

      const handleCoverUpload = (file) => {
        if (!file || !editingCover) return;
        // Resize to max 600px wide to avoid localStorage quota issues
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const maxW = 600, maxH = 300;
            let w = img.width, h = img.height;
            if (w > maxW) { h = h * maxW / w; w = maxW; }
            if (h > maxH) { w = w * maxH / h; h = maxH; }
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const resized = canvas.toDataURL('image/jpeg', 0.8);
            onCreateCollection({ id: editingCover.id, cover_image: resized, _update: true });
            setEditingCover(null);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleCoverSave = (url) => {
        if (!editingCover || !url) return;
        onCreateCollection({ id: editingCover.id, cover_image: url, _update: true });
        setEditingCover(null);
        setCoverUrl('');
        setCoverSearchResults([]);
        setCoverSearchQuery('');
        setGooglePhotoResults([]);
        setPhotoResults([]);
        setMapTileResults([]);
      };

      const handleCreateCollection = () => {
        if (!newCollectionName.trim()) return;
        const name = newCollectionName.trim();
        const id = name.toLowerCase().replace(/\s+/g, '-');
        const hardcodedCover = getCoverForName(name);

        // Create collection immediately
        const newCol = {
          id,
          name,
          cover_image: hardcodedCover || null,
          created_at: new Date().toISOString()

        onCreateCollection(newCol);
        setNewCollectionName('');
        setShowCreateDialog(false);

        // If no hardcoded cover, geocode and generate a map tile cover
        if (!hardcodedCover) {
          fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(name)}&limit=1`)
            .then(r => r.json())
            .then(data => {
              const f = data.features?.[0];
              if (f && f.geometry?.coordinates) {
                const [lng, lat] = f.geometry.coordinates;
                const coverUrl = getMapTileCover(lat, lng, 11);
                // Update the collection with the cover
                onCreateCollection({ ...newCol, cover_image: coverUrl, _update: true });
              }
            })
            .catch(() => {});
        }
      };

      const getCollectionStats = (collectionId) => {
        const collectionPins = pins.filter(p => p.collection_id === collectionId);
        const created = collections.find(c => c.id === collectionId)?.created_at;
        return {
          pinCount: collectionPins.length,
          createdDate: created ? new Date(created).toLocaleDateString('en-US', { month: 'short', year: 'numeric' }) : 'Unknown'
        };
      };

      return (

          <div className="h-16 bg-white dark:bg-slate-800 border-b dark:border-slate-700 px-4 flex items-center justify-between sticky top-0" style={{ zIndex: 9001 }}>

            <div className="flex items-center gap-2 flex-1 justify-end">

              <button

                className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 transition text-gray-500 dark:text-gray-400"

                <SettingsIcon />
              </button>
            </div>
          </div>

          {/* Settings Panel */}

            <div className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 px-6 py-4 shadow-inner" style={{ zIndex: 9000 }}>
              <div className="max-w-xl">
                <h3 className="font-semibold text-sm mb-3 text-gray-700 dark:text-gray-300">Settings</h3>
                <div className="space-y-2">
                  <details className="group">
                    <summary className="flex items-center justify-between cursor-pointer py-2 text-sm font-medium text-gray-700 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400">
                      <span>рҹ”‘ Google Places API Key</span>
                      <span className="text-xs text-gray-400 group-open:rotate-90 transition-transform">в–¶</span>
                    </summary>
                    <div className="pt-2 pb-3 pl-2">
                      <div className="flex gap-2">
                        <input
                          type="password"
                          value={apiKeyInput}
                          onChange={(e) => setApiKeyInput(e.target.value)}
                          placeholder="AIza..."
                          className="flex-1 px-3 py-1.5 text-sm border rounded-lg bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-white"
                        />
                        <button
                          onClick={() => { setGoogleApiKey(apiKeyInput); }}
                          className="px-3 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition"
                        >
                          Save
                        </button>
                      </div>
                      <p className="text-xs text-gray-400 mt-1">
                        Free tier: ~10k lookups/month. Get a key at <a href="https://console.cloud.google.com/apis/credentials" target="_blank" className="underline text-blue-500">console.cloud.google.com</a> вҖ” enable "Places API (New)".
                      </p>
                    </div>
                  </details>

                  <details className="group">
                    <summary className="flex items-center justify-between cursor-pointer py-2 text-sm font-medium text-gray-700 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400">
                      <span>рҹҸ·пёҸ Recommenders</span>
                      <span className="text-xs text-gray-400 group-open:rotate-90 transition-transform">в–¶</span>
                    </summary>
                    <div className="pt-1 pl-2">
                      <GlobalSourcesPanel allPins={pins || []} />
                    </div>
                  </details>

                  <details className="group">
                    <summary className="flex items-center justify-between cursor-pointer py-2 text-sm font-medium text-gray-700 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400">
                      <span>рҹ“Ҡ API Usage</span>
                      <span className="text-xs text-gray-400 group-open:rotate-90 transition-transform">в–¶</span>
                    </summary>
                    <div className="pt-1 pl-2">
                      <ApiUsagePanel />
                    </div>
                  </details>
                </div>
              </div>
            </div>
          )}

          {/* Main Content */}
          <div className="flex-1 overflow-y-auto">
            <div className="p-6 max-w-7xl mx-auto">
              {/* Create Dialog */}
              {showCreateDialog && (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-9999 flex items-center justify-center p-4" style={{ zIndex: 9999 }}>
                  <div className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-sm shadow-2xl p-6`}>
                    <h2 className="text-xl font-bold dark:text-white mb-4">Create a New Collection</h2>
                    <input
                      type="text"
                      value={newCollectionName}
                      onChange={e => setNewCollectionName(e.target.value)}
                      placeholder="e.g., Paris, Tokyo, NYC..."
                      className="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white mb-4"
                      autoFocus
                      onKeyDown={e => e.key === 'Enter' && handleCreateCollection()}

                    <div className="flex gap-2">
                      <button
                        onClick={() => {
                          setShowCreateDialog(false);
                          setNewCollectionName('');

                        className="flex-1 px-4 py-2 border border-gray-300 dark:border-slate-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 font-medium"
                      >
                        Cancel
                      </button>
                      <button
                        onClick={handleCreateCollection}
                        className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium"
                      >
                        Create
                      </button>
                    </div>
                  </div>
                </div>

              {collections.length === 0 ? (
                <div className="text-center py-16">
                  <div className="text-6xl mb-4">рҹ—әпёҸ</div>
                  <h2 className="text-2xl font-bold dark:text-white mb-2">No Collections Yet</h2>
                  <p className="text-gray-600 dark:text-gray-400 mb-6">Create your first travel map to get started</p>
                  <button
                    onClick={() => setShowCreateDialog(true)}
                    className="px-6 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition"
                  >
                    Create Your First Map
                  </button>
                </div>
              ) : (
                <div className={`grid gap-6 ${isMobile ? 'grid-cols-1' : 'grid-cols-2 lg:grid-cols-3 xl:grid-cols-4'}`}>
                  {collections.map((col, idx) => {
                    const stats = getCollectionStats(col.id);
                    const gradient = CARD_GRADIENTS[idx % CARD_GRADIENTS.length];
                    const collectionPins = pins.filter(p => p.collection_id === col.id);
                    const coverIdx = col._coverIdx || 0;
                    const coverImg = col.cover_image || getCoverForName(col.name, coverIdx) || getCollectionMapUrl(collectionPins);
                    const hasMultipleCovers = !col.cover_image && getCoversForName(col.name).length > 1;
                    return (
                      <div key={col.id} className="group relative rounded-xl overflow-hidden shadow-lg hover:shadow-xl transition transform hover:-translate-y-1">
                        <button
                          onClick={() => onSelectCollection(col.id)}
                          className="w-full text-left cursor-pointer"
                        >
                          <div
                            style={{
                              background: coverImg ? `linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.05) 100%), url(${coverImg}) center/cover no-repeat` : gradient
                            }}
                            className="h-40 flex flex-col justify-between p-4 text-white relative"
                          >
                            <div>
                              <h3 className="text-2xl font-bold drop-shadow-lg group-hover:scale-105 transition">{col.name}</h3>
                            </div>
                            <div className="text-sm opacity-90 drop-shadow">
                              <p>{stats.createdDate}</p>
                            </div>
                          </div>
                          <div className="bg-white dark:bg-slate-800 p-4">
                            <p className="text-sm font-medium text-gray-600 dark:text-gray-400">
                              {stats.pinCount} {stats.pinCount === 1 ? 'place' : 'places'}
                            </p>
                          </div>
                        </button>
                        {/* Hover action buttons вҖ” hidden on mobile to prevent touch-hover eating clicks */}
                        <div className={`absolute top-2 right-2 flex gap-1 transition-opacity ${isMobile ? 'hidden' : 'opacity-0 group-hover:opacity-100'}`}>
                          {hasMultipleCovers && (
                            <button
                              onClick={(e) => {
                                e.stopPropagation();
                                const covers = getCoversForName(col.name);
                                const nextIdx = ((col._coverIdx || 0) + 1) % covers.length;
                                // Save the shuffled cover as the actual cover_image
                                onCreateCollection({ id: col.id, cover_image: covers[nextIdx], _update: true });
                              }}
                              className="p-1.5 bg-black bg-opacity-40 hover:bg-opacity-70 rounded-full text-white"
                              title="Shuffle cover photo"
                            >
                              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
                            </button>
                          )}
                          <button
                            onClick={(e) => {
                              e.stopPropagation();
                              setEditingCover({ id: col.id, name: col.name });
                              setCoverSearchQuery(col.name);
                              searchCoverPhotos(col.name);
                            }}
                            className="p-1.5 bg-black bg-opacity-40 hover:bg-opacity-70 rounded-full text-white"
                            title="Change cover photo"
                          >
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                          </button>
                          <button
                            onClick={(e) => { e.stopPropagation(); setConfirmDelete(col.id); }}
                            className="p-1.5 bg-black bg-opacity-40 hover:bg-opacity-70 rounded-full text-white"
                            title="Delete collection"
                          >
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg>
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

                  <div
                    className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-lg shadow-2xl`}
                    onClick={e => e.stopPropagation()}
                  >
                    <div className="p-5 space-y-4 max-h-[85vh] overflow-y-auto">
                      <div className="flex items-center justify-between">
                        <h2 className="text-lg font-bold dark:text-white">Cover photo for {editingCover.name}</h2>
                        <button onClick={() => setEditingCover(null)} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded">
                          <CloseIcon />

                      </div>

                      {/* Search photos */}
                      <div className="flex gap-2">
                        <input
                          type="text"
                          value={coverSearchQuery}
                          onChange={e => setCoverSearchQuery(e.target.value)}
                          onKeyDown={e => e.key === 'Enter' && searchCoverPhotos(coverSearchQuery)}
                          placeholder="Search photos (e.g. Maui beach, Asheville skyline...)"
                          className="flex-1 px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white"
                        />
                        <button
                          onClick={() => searchCoverPhotos(coverSearchQuery)}
                          className="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700"
                        >
                          Search
                        </button>
                      </div>

                      {coverSearching && <p className="text-sm text-gray-400 text-center animate-pulse">Searching photos...</p>}

                      {/* Google Places photos */}
                      {googlePhotoResults.length > 0 && (
                        <div>
                          <p className="text-xs font-medium text-gray-500 dark:text-gray-400 mb-2">Google Photos ({googlePhotoResults.length})</p>
                          <div className="grid grid-cols-3 gap-2">

                                onClick={() => handleCoverSave(r.url)}

                      {/* Map tile options */}
                      {mapTileResults.length > 0 && (

                      {/* No results hint */}
                      {!coverSearching && googlePhotoResults.length === 0 && photoResults.length === 0 && mapTileResults.length === 0 && coverSearchQuery && (
                        <p className="text-xs text-gray-400 text-center py-2">No photos found. Try a different search term or upload your own.</p>
                      )}

                      {/* Upload or paste URL */}
                      <div className="flex gap-2 pt-2 border-t dark:border-slate-700">
                        <input
                          ref={coverFileRef}
                          type="file"
                          accept="image/*"
                          className="hidden"
                          onChange={e => handleCoverUpload(e.target.files?.[0])}
                        />
                        <button
                          onClick={() => coverFileRef.current?.click()}
                          className="flex-1 px-3 py-2 border border-gray-300 dark:border-slate-600 rounded-lg text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-800 flex items-center justify-center gap-1"
                        >
                          рҹ“· Upload
                        </button>
                        <input
                          type="text"
                          value={coverUrl}
                          onChange={e => setCoverUrl(e.target.value)}
                          placeholder="or paste image URL..."
                          className="flex-1 px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white"
                          onKeyDown={e => e.key === 'Enter' && coverUrl && handleCoverSave(coverUrl)}
                        />
                        {coverUrl && (
                          <button
                            onClick={() => handleCoverSave(coverUrl)}
                            className="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700"

                            Use

              {/* Delete confirmation dialog */}
              {confirmDelete && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 9999 }}>
                  <div className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-sm shadow-2xl p-6`}>
                    <h2 className="text-lg font-bold dark:text-white mb-2">Delete collection?</h2>
                    <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">
                      This will permanently delete "{collections.find(c => c.id === confirmDelete)?.name}" and all {pins.filter(p => p.collection_id === confirmDelete).length} places in it.
                    </p>
                    <div className="flex gap-2">
                      <button
                        onClick={() => setConfirmDelete(null)}
                        className="flex-1 px-4 py-2 border border-gray-300 dark:border-slate-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 font-medium"
                      >
                        Cancel
                      </button>
                      <button
                        onClick={() => {
                          onDeleteCollection(confirmDelete);
                          setConfirmDelete(null);
                        }}
                        className="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium"
                      >
                        Delete
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ==================== MAIN APP ====================
    // ==================== ITINERARY PLANNER ====================

    const generateId = () => Math.random().toString(36).substr(2, 9) + Date.now().toString(36);

    // Format date as "Mon, May 11"
    const formatDayDate = (dateStr) => {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    };

    // Generate array of dates between start and end (inclusive)
    const generateDateRange = (start, end) => {
      const dates = [];
      const d = new Date(start + 'T12:00:00');
      const endD = new Date(end + 'T12:00:00');
      while (d <= endD) {
        dates.push(d.toISOString().split('T')[0]);
        d.setDate(d.getDate() + 1);
      }
      return dates;
    };

    // ---- StartingPointPicker ----
    const StartingPointPicker = ({ pins, currentPoint, onSelect, onClose, isDarkMode }) => {
      const [search, setSearch] = useState('');
      const [addressResults, setAddressResults] = useState([]);
      const [addrLoading, setAddrLoading] = useState(false);
      const timerRef = useRef(null);

      const hotelPins = pins.filter(p => p.category === 'hotel' || p.emoji === 'рҹҸЁ');
      const pinMatches = search
        ? pins.filter(p => p.name.toLowerCase().includes(search.toLowerCase()))
        : hotelPins;

      // Debounced Photon lookup for any place/address (matches AddressAutocomplete)
      useEffect(() => {
        clearTimeout(timerRef.current);
        if (search.length < 3) { setAddressResults([]); setAddrLoading(false); return; }
        setAddrLoading(true);
        timerRef.current = setTimeout(() => {
          fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(search)}&limit=5`)
            .then(r => r.json())
            .then(data => {
              const results = (data.features || []).map(f => {
                const p = f.properties || {};
                const geo = f.geometry?.coordinates || [];
                const parts = [p.housenumber, p.street].filter(Boolean).join(' ');
                const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
                return {
                  label: p.name || [parts, locality].filter(Boolean).join(', ') || search,
                  address: [p.name, parts, locality].filter(Boolean).join(', '),
                  lat: geo[1],
                  lng: geo[0],
                };
              }).filter(r => r.lat && r.lng);
              setAddressResults(results);
              setAddrLoading(false);
            })
            .catch(() => { setAddrLoading(false); });
        }, 300);
        return () => clearTimeout(timerRef.current);
      }, [search]);

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 10001 }} onClick={onClose}>
          <div className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-sm shadow-2xl`} onClick={e => e.stopPropagation()}>
            <div className="p-4 space-y-3">
              <div className="flex items-center justify-between">
                <h3 className="font-bold dark:text-white">Starting Point</h3>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded"><CloseIcon /></button>
              </div>
              <input
                type="text"
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="Search pins or any address..."
                className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white"
              />
              <div className="max-h-80 overflow-y-auto space-y-1">
                {/* Pin matches */}
                {pinMatches.length > 0 && (
                  <div>
                    <p className="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wide px-1 pt-1 pb-0.5">Your pins</p>
                    {pinMatches.map(pin => (
                      <button
                        key={pin.id}
                        onClick={() => { onSelect({ pin_id: pin.id, label: pin.name, lat: pin.lat, lng: pin.lng, emoji: pin.emoji }); onClose(); }}
                        className={`w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 hover:bg-gray-100 dark:hover:bg-slate-700 ${currentPoint?.pin_id === pin.id ? 'bg-blue-50 dark:bg-blue-900/30 ring-1 ring-blue-400' : ''}`}
                      >
                        <span>{pin.emoji || 'рҹ“Ң'}</span>
                        <span className="truncate dark:text-white">{pin.name}</span>
                      </button>
                    ))}
                  </div>
                )}

                {/* Address results */}
                {search.length >= 3 && (
                  <div>
                    <p className="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wide px-1 pt-2 pb-0.5">Places & addresses</p>
                    {addrLoading && <p className="text-xs text-gray-400 text-center py-2">SearchingвҖҰ</p>}
                    {!addrLoading && addressResults.length === 0 && pinMatches.length === 0 && (
                      <p className="text-sm text-gray-400 text-center py-4">No results</p>
                    )}
                    {addressResults.map((r, i) => (
                      <button
                        key={i}
                        onClick={() => { onSelect({ pin_id: null, label: r.label, address: r.address, lat: r.lat, lng: r.lng, emoji: 'рҹ“Қ' }); onClose(); }}
                        className="w-full text-left px-3 py-2 rounded-lg text-sm flex items-start gap-2 hover:bg-gray-100 dark:hover:bg-slate-700"
                      >
                        <span>рҹ“Қ</span>
                        <span className="flex-1 min-w-0">
                          <span className="block font-medium truncate dark:text-white">{r.label}</span>
                          {r.address && r.address !== r.label && (
                            <span className="block text-xs text-gray-500 dark:text-gray-400 truncate">{r.address}</span>
                          )}
                        </span>
                      </button>
                    ))}
                  </div>
                )}

                {!search && pinMatches.length === 0 && (
                  <p className="text-sm text-gray-400 text-center py-4">Type to search pins or any address</p>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ---- ItineraryItemForm (add/edit modal) ----
    const ItineraryItemForm = ({ item, pins, onSave, onClose, isDarkMode }) => {
      const [type, setType] = useState(item?.type || 'pin');
      const [selectedPinId, setSelectedPinId] = useState(item?.pin_id || '');
      const [name, setName] = useState(item?.name || '');
      const [emoji, setEmoji] = useState(item?.emoji || 'рҹ“Ң');
      const [scheduledTime, setScheduledTime] = useState(item?.scheduled_time || '');
      // Allow empty duration for arrival markers / instant items. Default blank вҖ” user picks per-item.
      const [duration, setDuration] = useState(
        item?.estimated_duration_minutes != null && item.estimated_duration_minutes !== 0
          ? String(item.estimated_duration_minutes)
          : ''
      );
      const [description, setDescription] = useState(item?.description || '');
      const [pinSearch, setPinSearch] = useState('');

      // If a meal preset passed an anchor location (e.g. "sort by proximity to my 12:30 item"),
      // filter to food-like pins and sort by distance.
      const mealMode = item?.__mealCategories || null; // array of categories to filter
      const mealType = item?.__mealType || null; // 'breakfast' | 'lunch' | 'dinner'
      const dayDate = item?.__dayDate || null; // 'YYYY-MM-DD' string for the itinerary day
      const anchorLat = item?.__anchorLat;
      const anchorLng = item?.__anchorLng;
      const haversine = (lat1, lng1, lat2, lng2) => {
        const R = 6371;
        const toRad = x => x * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLng = toRad(lng2 - lng1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
        return 2 * R * Math.asin(Math.sqrt(a));
      };

      // Smart meal relevance scoring
      const getMealScore = (pin) => {
        const cat = pin.category || '';
        const tags = pin.mealTags || [];
        // If user explicitly tagged this pin for the current meal, boost it heavily
        if (mealType && tags.includes(mealType)) return 100;
        // If tagged for a different meal, deprioritize
        if (tags.length > 0 && mealType && !tags.includes(mealType)) return -20;
        // Heuristic scoring by category + meal type
        if (mealType === 'breakfast') {
          if (cat === 'cafe') return 30;
          if (cat === 'treats') return 20; // bakeries
          if (cat === 'restaurant') return 10;
          if (cat === 'bar') return -30; // breweries unlikely for breakfast
        } else if (mealType === 'lunch') {
          if (cat === 'restaurant') return 20;
          if (cat === 'cafe') return 10;
          if (cat === 'bar') return 5;
          if (cat === 'treats') return 5;
        } else if (mealType === 'dinner') {
          if (cat === 'restaurant') return 25;
          if (cat === 'bar') return 15;
          if (cat === 'cafe') return 0;
          if (cat === 'treats') return -5;
        }
        return 0;
      };

      // Check if pin is open on the itinerary day
      const isOpenOnDay = (pin) => {
        if (!dayDate || !pin.opening_hours || Object.keys(pin.opening_hours).length === 0) return null; // unknown
        const d = new Date(dayDate + 'T12:00:00');
        const status = getOpenStatus(pin.opening_hours, d);
        return status.status !== 'closed';
      };

      let filteredPins;
      if (pinSearch) {
        filteredPins = pins.filter(p => p.name.toLowerCase().includes(pinSearch.toLowerCase()));
      } else if (mealMode && mealMode.length > 0) {
        // Filter to food-relevant categories or pins with matching meal tags
        const foodCats = new Set([...mealMode, 'restaurant', 'cafe', 'treats', 'bar']);
        let foodPins = pins.filter(p => foodCats.has(p.category) || (mealType && (p.mealTags || []).includes(mealType)));
        // Filter out pins known to be closed on this day
        if (dayDate) {
          foodPins = foodPins.filter(p => {
            const open = isOpenOnDay(p);
            return open === null || open === true; // keep unknown + open, exclude known-closed
          });
        }
        // Score and sort
        if (anchorLat != null && anchorLng != null && foodPins.length > 0) {
          filteredPins = foodPins
            .map(p => ({
              ...p,
              __dist: p.lat && p.lng ? haversine(anchorLat, anchorLng, p.lat, p.lng) : Infinity,
              __mealScore: getMealScore(p),
              __isOpen: isOpenOnDay(p),
            }))
            // Sort: meal score first (desc), then distance (asc)
            .sort((a, b) => (b.__mealScore - a.__mealScore) || (a.__dist - b.__dist))
            .slice(0, 30);
        } else {
          filteredPins = foodPins
            .map(p => ({ ...p, __mealScore: getMealScore(p), __isOpen: isOpenOnDay(p) }))
            .sort((a, b) => b.__mealScore - a.__mealScore)
            .slice(0, 30);
        }
      } else {
        filteredPins = pins.slice(0, 20);
      }

      const handleSave = () => {
        let lat = item?.lat || 0, lng = item?.lng || 0;
        let finalName = name;
        let finalEmoji = emoji;
        if (type === 'pin' && selectedPinId) {
          const pin = pins.find(p => p.id === selectedPinId);
          if (pin) {
            lat = pin.lat; lng = pin.lng;
            finalName = finalName || pin.name;
            finalEmoji = pin.emoji || finalEmoji;
          }
        }
        // Strip transient hint fields that shouldn't be persisted
        const base = { ...(item || {}) };
        delete base.__mealCategories;
        delete base.__mealType;
        delete base.__dayDate;
        delete base.__anchorLat;
        delete base.__anchorLng;
        onSave({
          ...base,
          id: item?.id || generateId(),
          type, pin_id: type === 'pin' ? selectedPinId : null,
          name: finalName, emoji: finalEmoji,
          scheduled_time: scheduledTime,
          estimated_duration_minutes: duration === '' ? 0 : (parseInt(duration) || 0),
          description, lat, lng,
        });
        onClose();
      };

      const mealEmojis = ['рҹҚұ', 'рҹҚң', 'рҹҚЈ', 'вҳ•', 'рҹҚө', 'рҹҚә', 'рҹҚҰ', 'рҹҘҗ'];

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 10001 }} onClick={onClose}>
          <div className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-md shadow-2xl`} onClick={e => e.stopPropagation()}>
            <div className="p-4 space-y-3 max-h-[85vh] overflow-y-auto">
              <div className="flex items-center justify-between">
                <h3 className="font-bold dark:text-white">{item?.id ? 'Edit Item' : 'Add to Day'}</h3>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded"><CloseIcon /></button>
              </div>

              {/* Type tabs */}
              <div className="flex gap-1 bg-gray-100 dark:bg-slate-800 rounded-lg p-1">
                {[['pin', 'рҹ“Ң Pin'], ['meal', 'рҹҚҪпёҸ Meal'], ['entry', 'вңҸпёҸ Custom']].map(([t, label]) => (
                  <button key={t} onClick={() => { setType(t); if (t === 'meal' && !name) { setEmoji('рҹҚұ'); setName(''); } }}
                    className={`flex-1 text-sm py-1.5 rounded-md font-medium transition ${type === t ? 'bg-white dark:bg-slate-700 shadow text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-400'}`}>
                    {label}
                  </button>
                ))}
              </div>

              {/* Pin selector */}
              {type === 'pin' && (
                <div className="space-y-2">
                  {mealMode && !pinSearch && (
                    <p className="text-xs text-blue-600 dark:text-blue-400 flex items-center gap-1">
                      <span>рҹ“Қ</span> {mealType ? `${mealType.charAt(0).toUpperCase() + mealType.slice(1)} spots` : 'Food pins'}{dayDate ? ` В· ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(dayDate + 'T12:00:00').getDay()]}` : ''}{anchorLat != null ? ' В· by distance' : ''}
                    </p>
                  )}
                  <input
                    type="text" value={pinSearch} onChange={e => setPinSearch(e.target.value)}
                    placeholder={mealMode ? 'Search all pinsвҖҰ' : 'Search your pins...'}
                    className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white"
                  />
                  <div className="max-h-56 overflow-y-auto space-y-1 border rounded-lg dark:border-slate-700 p-1">
                    {filteredPins.length === 0 && (
                      <p className="text-xs text-gray-400 text-center py-3">
                        {mealMode ? 'No food pins yet вҖ” add some restaurants to your map first.' : 'No pins found'}
                      </p>
                    )}
                    {filteredPins.map(pin => (
                      <button key={pin.id}
                        onClick={() => { setSelectedPinId(pin.id); setName(pin.name); setEmoji(pin.emoji || 'рҹ“Ң'); }}
                        className={`w-full text-left px-2 py-1.5 rounded text-sm flex items-center gap-2 hover:bg-gray-100 dark:hover:bg-slate-700 ${selectedPinId === pin.id ? 'bg-blue-50 dark:bg-blue-900/30 ring-1 ring-blue-400' : ''}`}>
                        <span>{pin.emoji || 'рҹ“Ң'}</span>
                        <span className="truncate dark:text-white flex-1 min-w-0">{pin.name}</span>
                        <span className="flex items-center gap-1 flex-shrink-0">
                          {pin.mealTags && pin.mealTags.length > 0 && (
                            <span className="text-[10px] text-purple-400" title={`Tagged: ${pin.mealTags.join(', ')}`}>
                              {pin.mealTags.includes('breakfast') ? 'рҹҢ…' : ''}{pin.mealTags.includes('lunch') ? 'вҳҖпёҸ' : ''}{pin.mealTags.includes('dinner') ? 'рҹҢҷ' : ''}
                            </span>
                          )}
                          {pin.__dist != null && pin.__dist !== Infinity && (
                            <span className="text-[10px] text-gray-400">{pin.__dist < 1 ? `${Math.round(pin.__dist * 1000)}m` : `${pin.__dist.toFixed(1)}km`}</span>
                          )}
                        </span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Meal emoji picker */}
              {type === 'meal' && (
                <div className="space-y-2">
                  <label className="text-xs font-medium text-gray-500 dark:text-gray-400">Meal type</label>
                  <div className="flex gap-1 flex-wrap">
                    {mealEmojis.map(e => (
                      <button key={e} onClick={() => setEmoji(e)}
                        className={`text-xl p-1.5 rounded-lg transition ${emoji === e ? 'bg-blue-100 dark:bg-blue-900/40 ring-1 ring-blue-400' : 'hover:bg-gray-100 dark:hover:bg-slate-700'}`}>
                        {e}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Name */}
              <div>
                <label className="text-xs font-medium text-gray-500 dark:text-gray-400">Name</label>
                <input type="text" value={name} onChange={e => setName(e.target.value)}
                  placeholder={type === 'meal' ? 'e.g. Lunch at Tsukiji' : 'Item name'}
                  className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white" />
              </div>

              {/* Time + Duration */}
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs font-medium text-gray-500 dark:text-gray-400">Time</label>
                  <input type="time" value={scheduledTime} onChange={e => setScheduledTime(e.target.value)}
                    className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white" />
                </div>
                <div>
                  <label className="text-xs font-medium text-gray-500 dark:text-gray-400">Duration (min)</label>
                  <input type="number" value={duration} onChange={e => setDuration(e.target.value)} min="0" step="5"
                    placeholder="вҖ”"
                    className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white" />
                  <p className="text-[10px] text-gray-400 mt-0.5">Leave blank for marker</p>
                </div>
              </div>

              {/* Notes */}
              <div>
                <label className="text-xs font-medium text-gray-500 dark:text-gray-400">Notes</label>
                <textarea value={description} onChange={e => setDescription(e.target.value)} rows={2}
                  className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white resize-none" />
              </div>

              <button onClick={handleSave}
                className="w-full py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                {item?.id ? 'Save Changes' : 'Add Item'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ---- Single Itinerary Item Row ----
    const ItineraryItemRow = ({ item, index, isDarkMode, onEdit, onDelete, onDragStart, onDragOver, onDrop, isDragTarget, transitInfo, onFlyTo, autoTime, onMoveUp, onMoveDown, isFirst, isLast }) => {
      const [confirmDelete, setConfirmDelete] = useState(false);
      const touchDragRef = useRef(null);
      const touchStartY = useRef(0);
      const touchActive = useRef(false);

      // If item has its own scheduled_time, prefer that. Otherwise fall back to auto-computed time from day start.
      const timeStr = item.scheduled_time || autoTime || '';
      const isAutoTime = !item.scheduled_time && !!autoTime;
      const formatTime = (t) => {
        if (!t) return '';
        const [h, m] = t.split(':');
        const hr = parseInt(h);
        const ampm = hr >= 12 ? 'PM' : 'AM';
        return `${hr % 12 || 12}:${m} ${ampm}`;
      };

      // Touch drag handlers for mobile
      const handleTouchStart = (e) => {
        touchStartY.current = e.touches[0].clientY;
        touchActive.current = false;
        // Start drag after a small movement threshold
        onDragStart(item.id);
      };
      const handleTouchMove = (e) => {
        const dy = e.touches[0].clientY - touchStartY.current;
        if (Math.abs(dy) > 10) {
          touchActive.current = true;
          e.preventDefault(); // prevent scroll while dragging
        }
        if (!touchActive.current) return;
        // Find which item we're over
        const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        if (el) {
          const row = el.closest('[data-drag-index]');
          if (row) {
            const overIdx = parseInt(row.dataset.dragIndex);
            if (!isNaN(overIdx)) onDragOver(overIdx);
          }
        }
      };
      const handleTouchEnd = (e) => {
        if (touchActive.current) {
          onDrop(null); // signal drop at current dragOverIndex
        }
        touchActive.current = false;
      };

      return (
        <React.Fragment>
          {/* Transit info between items */}
          {transitInfo && transitInfo.estimated_time_minutes != null && (
            <div className="flex items-center gap-1.5 py-1 px-3 text-xs text-gray-400 dark:text-gray-500">
              <div className="flex-1 border-t dark:border-slate-700 border-dashed"></div>
              {transitInfo.all_modes && Object.keys(transitInfo.all_modes).length > 1 ? (
                // Show all available modes as small pills
                Object.entries(transitInfo.all_modes).map(([mode, data]) => (
                  <span key={mode} className={`inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full ${mode === transitInfo.mode ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : ''}`}>
                    {mode === 'walking' ? 'рҹҡ¶' : mode === 'transit' ? 'рҹҡғ' : 'рҹҡ—'}
                    <span>{data.minutes}m</span>
                  </span>
                ))
              ) : (
                <>
                  <span>{transitInfo.mode === 'walking' ? 'рҹҡ¶' : transitInfo.mode === 'transit' ? 'рҹҡғ' : 'рҹҡ—'}</span>
                  <span>{transitInfo.estimated_time_minutes} min</span>
                </>
              )}
              {transitInfo.maps_url && (
                <a href={transitInfo.maps_url} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline ml-0.5">вҶ—</a>
              )}
              <div className="flex-1 border-t dark:border-slate-700 border-dashed"></div>
            </div>
          )}

          {/* Item row */}
          <div
            data-drag-index={index}
            draggable
            onDragStart={(e) => { e.dataTransfer.effectAllowed = 'move'; onDragStart(item.id); }}
            onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; onDragOver(index); }}
            onDrop={(e) => { e.preventDefault(); onDrop(index); }}
            className={`group flex items-center gap-2 px-2 py-2 rounded-lg cursor-grab active:cursor-grabbing transition ${
              isDragTarget ? 'bg-blue-50 dark:bg-blue-900/20 ring-1 ring-blue-400 ring-dashed' : 'hover:bg-gray-50 dark:hover:bg-slate-700/50'
            }`}
          >
            {/* Drag handle вҖ” desktop: visual grab, mobile: touch drag + up/down buttons */}
            <div className="flex items-center gap-0.5 flex-shrink-0">
              {/* Up/down buttons (mobile only) */}
              <div className="flex flex-col md:hidden">
                <button
                  onClick={(e) => { e.stopPropagation(); onMoveUp && onMoveUp(); }}
                  disabled={isFirst}
                  className={`px-1 py-0 text-[10px] leading-tight ${isFirst ? 'text-gray-300 dark:text-gray-600' : 'text-gray-500 dark:text-gray-400 active:text-blue-500'}`}
                >в–І</button>
                <button
                  onClick={(e) => { e.stopPropagation(); onMoveDown && onMoveDown(); }}
                  disabled={isLast}
                  className={`px-1 py-0 text-[10px] leading-tight ${isLast ? 'text-gray-300 dark:text-gray-600' : 'text-gray-500 dark:text-gray-400 active:text-blue-500'}`}
                >в–ј</button>
              </div>
              {/* Desktop drag handle */}
              <div
                className="hidden md:flex flex-col gap-0.5 opacity-30 group-hover:opacity-60 px-0.5 touch-none"
                style={{ cursor: 'grab' }}
                onTouchStart={handleTouchStart}
                onTouchMove={handleTouchMove}
                onTouchEnd={handleTouchEnd}
              >
                <div className="w-3 h-0.5 bg-gray-400 rounded"></div>
                <div className="w-3 h-0.5 bg-gray-400 rounded"></div>
                <div className="w-3 h-0.5 bg-gray-400 rounded"></div>
              </div>
            </div>

            {/* Emoji */}
            <span className="text-lg flex-shrink-0 cursor-pointer hover:scale-110 transition-transform" onClick={() => item.lat && onFlyTo?.(item.lat, item.lng)}>{item.emoji || 'рҹ“Ң'}</span>

            {/* Content */}
            <div className="flex-1 min-w-0 cursor-pointer" onClick={() => item.lat && onFlyTo?.(item.lat, item.lng)}>
              <div className="flex items-center gap-2">
                {timeStr && <span className={`text-xs font-mono flex-shrink-0 ${isAutoTime ? 'text-gray-400 dark:text-gray-500 italic' : 'text-blue-600 dark:text-blue-400'}`} title={isAutoTime ? 'Auto-scheduled from day start' : 'Scheduled time'}>{formatTime(timeStr)}</span>}
                <span className="text-sm font-medium truncate dark:text-white">{item.name || 'Untitled'}</span>
              </div>
              {item.estimated_duration_minutes > 0 && (
                <span className="text-xs text-gray-400">{item.estimated_duration_minutes} min</span>
              )}
            </div>

            {/* Actions */}
            <div className="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition flex-shrink-0">
              <button onClick={() => onEdit(item)} className="p-1 hover:bg-gray-200 dark:hover:bg-slate-600 rounded text-gray-500">
                <PencilIcon />
              </button>
              {!confirmDelete ? (
                <button onClick={() => setConfirmDelete(true)} className="p-1 hover:bg-red-100 dark:hover:bg-red-900/30 rounded text-gray-500 hover:text-red-500">
                  <TrashIcon />
                </button>
              ) : (
                <div className="flex items-center gap-0.5">
                  <button onClick={() => setConfirmDelete(false)} className="p-1 hover:bg-gray-200 dark:hover:bg-slate-600 rounded text-xs">вң•</button>
                  <button onClick={() => onDelete(item.id)} className="p-1 hover:bg-red-100 dark:hover:bg-red-900/30 rounded text-xs text-red-500 font-bold">вң“</button>
                </div>
              )}
            </div>
          </div>
        </React.Fragment>
      );
    };

    // ---- DayView (single day card) ----
    const DayView = ({ day, items, pins, isDarkMode, onUpdateItems, onDeleteItem, onAddItem, onEditItem, onSetStartingPoint, onSetStartTime, onDeleteDay, isExpanded, onToggle, onFlyTo, transitError, onRecalcTransit }) => {
      const [dragItemId, setDragItemId] = useState(null);
      const [dragOverIndex, setDragOverIndex] = useState(null);
      const [showStartPicker, setShowStartPicker] = useState(false);
      const [confirmDeleteDay, setConfirmDeleteDay] = useState(false);
      const [editingStartTime, setEditingStartTime] = useState(false);
      const [startTimeDraft, setStartTimeDraft] = useState(day.start_time || '');

      // Separate ordered items (have scheduled_time) and unordered.
      // If the day has a start_time and items are in order_in_day order without explicit times,
      // auto-compute scheduled times for display: start_time + cumulative (transit + duration).
      const itemsByOrder = [...items].sort((a, b) => (a.order_in_day || 0) - (b.order_in_day || 0));
      const orderedItems = items.filter(i => i.scheduled_time).sort((a, b) => a.scheduled_time.localeCompare(b.scheduled_time));
      const unorderedItems = items.filter(i => !i.scheduled_time);
      const allSorted = orderedItems.length > 0 ? [...orderedItems, ...unorderedItems] : itemsByOrder;

      // Compute auto-scheduled times when day has a start_time
      const autoTimes = {};
      if (day.start_time && itemsByOrder.length > 0) {
        const [sh, sm] = day.start_time.split(':').map(Number);
        let cursor = sh * 60 + sm;
        for (const it of itemsByOrder) {
          // Add transit BEFORE this item (transit_info travel time to reach this item)
          const transitMin = it.transit_info?.estimated_time_minutes || 0;
          cursor += transitMin;
          const hh = Math.floor(cursor / 60) % 24;
          const mm = cursor % 60;
          autoTimes[it.id] = `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
          cursor += (it.estimated_duration_minutes || 0);
        }
      }

      const totalActivityMin = items.reduce((sum, i) => sum + (i.estimated_duration_minutes || 0), 0);
      const totalTransitMin = items.reduce((sum, i) => sum + (i.transit_info?.estimated_time_minutes || 0), 0);
      const totalMinutes = totalActivityMin + totalTransitMin;
      const totalHrs = Math.floor(totalMinutes / 60);
      const totalMins = totalMinutes % 60;

      const handleDrop = (targetIndex, moveItemId, moveFromIdx) => {
        // Support both drag-drop (uses dragItemId state) and direct move (passes itemId/fromIdx)
        const itemId = moveItemId || dragItemId;
        if (itemId == null) return;
        // If targetIndex is null (touch drop), use dragOverIndex
        const tIdx = targetIndex != null ? targetIndex : dragOverIndex;
        if (tIdx == null) { setDragItemId(null); setDragOverIndex(null); return; }
        const draggedIdx = moveFromIdx != null ? moveFromIdx : allSorted.findIndex(i => i.id === itemId);
        if (draggedIdx === -1 || draggedIdx === tIdx) { setDragItemId(null); setDragOverIndex(null); return; }

        const reordered = [...allSorted];
        const [removed] = reordered.splice(draggedIdx, 1);
        reordered.splice(tIdx, 0, removed);

        // Reassign times based on order for those that had times, leave unscheduled ones alone
        onUpdateItems(reordered.map((item, i) => ({
          ...item,
          order_in_day: i,
        })));
        setDragItemId(null);
        setDragOverIndex(null);
      };

      // Drop from external (pin detail sheet adds items via this)
      const handleExternalDrop = (e) => {
        e.preventDefault();
        const pinId = e.dataTransfer.getData('text/pin-id');
        if (pinId) {
          const pin = pins.find(p => p.id === pinId);
          if (pin) {
            onAddItem({
              id: generateId(),
              type: 'pin', pin_id: pin.id,
              name: pin.name, emoji: pin.emoji || 'рҹ“Ң',
              lat: pin.lat, lng: pin.lng,
              estimated_duration_minutes: 0,
              order_in_day: items.length,
              scheduled_time: '', description: '',
            });
          }
        }
      };

      return (
        <div
          className={`border rounded-xl dark:border-slate-700 overflow-hidden transition-all ${isExpanded ? '' : ''}`}
          onDragOver={(e) => { if (e.dataTransfer.types.includes('text/pin-id')) e.preventDefault(); }}
          onDrop={handleExternalDrop}
        >
          {/* Day header */}
          <button
            onClick={onToggle}
            className="w-full flex items-center justify-between px-3 py-2.5 bg-gray-50 dark:bg-slate-800/80 hover:bg-gray-100 dark:hover:bg-slate-700/80 transition text-left"
          >
            <div className="flex items-center gap-2 min-w-0">
              <span className="text-xs font-bold text-gray-400 dark:text-gray-500 flex-shrink-0">D{day.day_number}</span>
              <span className="text-sm font-semibold dark:text-white flex-shrink-0">{formatDayDate(day.date)}</span>
            </div>
            <div className="flex items-center gap-2">
              <span className="text-xs text-gray-400">{items.length} item{items.length !== 1 ? 's' : ''}{totalMinutes > 0 ? ` В· ${totalHrs > 0 ? totalHrs + 'h ' : ''}${totalMins > 0 ? totalMins + 'm' : ''}` : ''}{totalTransitMin > 0 ? ` (${totalTransitMin}m travel)` : ''}</span>
              <span className={`text-gray-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`}>в–ҫ</span>
            </div>
          </button>

          {/* Expanded content */}
          {isExpanded && (
            <div className="p-2 space-y-1">
              {/* Starting point + start time */}
              <div className="flex items-center gap-1">
                <button
                  onClick={() => setShowStartPicker(true)}
                  className="flex-1 text-left px-2 py-1.5 rounded-lg text-xs text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-700/50 border border-dashed dark:border-slate-700 flex items-center gap-2"
                >
                  {day.starting_point?.label ? (
                    <><span>{day.starting_point.emoji || 'рҹҸЁ'}</span> Start: {day.starting_point.label}</>
                  ) : (
                    <><span>рҹ“Қ</span> Set starting point...</>
                  )}
                </button>
                {/* Start time chip */}
                {!editingStartTime ? (
                  <button
                    onClick={() => { setStartTimeDraft(day.start_time || ''); setEditingStartTime(true); }}
                    className="px-2 py-1.5 rounded-lg text-xs border border-dashed dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700/50 text-gray-500 dark:text-gray-400 flex items-center gap-1 flex-shrink-0"
                    title="Set start time for this day (auto-schedules items)"
                  >
                    рҹ•җ {day.start_time ? day.start_time : 'Time'}
                  </button>
                ) : (
                  <div className="flex items-center gap-0.5 flex-shrink-0">
                    <input
                      type="time"
                      value={startTimeDraft}
                      onChange={e => setStartTimeDraft(e.target.value)}
                      autoFocus
                      className="px-1 py-1 text-xs border rounded dark:bg-slate-800 dark:border-slate-700 dark:text-white"
                    />
                    <button
                      onClick={() => { onSetStartTime(day.id, startTimeDraft); setEditingStartTime(false); }}
                      className="px-1.5 py-1 text-xs text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded"
                    >вң“</button>
                    <button
                      onClick={() => { onSetStartTime(day.id, ''); setEditingStartTime(false); }}
                      className="px-1.5 py-1 text-xs text-gray-400 hover:text-gray-600 hover:bg-gray-100 dark:hover:bg-slate-700 rounded"
                      title="Clear"
                    >вң•</button>
                  </div>
                )}
              </div>

              {/* Transit-fetch error notice (shown once if any segment failed) */}
              {transitError && (
                <div className="text-xs text-amber-600 dark:text-amber-400 px-2 py-1 bg-amber-50 dark:bg-amber-900/20 rounded">
                  вҡ пёҸ Travel times unavailable вҖ” {transitError}
                </div>
              )}

              {/* Quick-add meal slots вҖ” clicking opens the form with nearby food pins sorted by distance */}
              <div className="flex gap-1 flex-wrap pb-0.5">
                {[
                  // target: middle of the eating window; used to find the day's item closest to meal time
                  { name: 'Breakfast', emoji: 'рҹҘҗ', time: '09:30', targetMin: 9 * 60 + 30 },
                  { name: 'Lunch',     emoji: 'рҹҚұ', time: '12:30', targetMin: 12 * 60 + 30 },
                  { name: 'Dinner',    emoji: 'рҹҚҪпёҸ', time: '18:00', targetMin: 18 * 60 },
                ].map(meal => (
                  <button
                    key={meal.name}
                    onClick={() => {
                      // Pick an anchor: the item whose (auto-)scheduled time is closest to the meal's target.
                      // Fallback to day starting_point, then last item with coordinates.
                      let anchor = null;
                      const timedItems = itemsByOrder
                        .map(it => {
                          const t = it.scheduled_time || autoTimes[it.id];
                          if (!t || !/^\d{2}:\d{2}$/.test(t)) return null;
                          const [h, m] = t.split(':').map(Number);
                          return { item: it, mins: h * 60 + m };
                        })
                        .filter(Boolean);
                      if (timedItems.length > 0) {
                        timedItems.sort((a, b) => Math.abs(a.mins - meal.targetMin) - Math.abs(b.mins - meal.targetMin));
                        const best = timedItems[0].item;
                        if (best.lat && best.lng) anchor = { lat: best.lat, lng: best.lng };
                      }
                      if (!anchor && day.starting_point?.lat) {
                        anchor = { lat: day.starting_point.lat, lng: day.starting_point.lng };
                      }
                      if (!anchor) {
                        const last = [...itemsByOrder].reverse().find(i => i.lat && i.lng);
                        if (last) anchor = { lat: last.lat, lng: last.lng };
                      }
                      onAddItem({
                        __mealPreset: true,
                        __mealCategories: ['restaurant', 'cafe', 'treats', 'bar', 'shopping'],
                        __mealType: meal.name.toLowerCase(),
                        __dayDate: day.date,
                        __anchorLat: anchor?.lat,
                        __anchorLng: anchor?.lng,
                        type: 'pin',
                        name: meal.name,
                        emoji: meal.emoji,
                        scheduled_time: day.start_time ? '' : meal.time,
                        description: '',
                      });
                    }}
                    className="flex-1 min-w-[80px] text-xs px-2 py-1.5 rounded-lg border border-dashed dark:border-slate-700 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-700/50 hover:text-gray-700 hover:border-gray-400 transition flex items-center justify-center gap-1"
                    title={`Add ${meal.name.toLowerCase()} вҖ” suggests food pins near your other stops at this time`}
                  >
                    <span>{meal.emoji}</span>
                    <span>+ {meal.name}</span>
