    // Parse confirmation text to extract hotel/booking details
    const parseConfirmationText = (text) => {
      const result = {
        propertyName: '', address: '', checkIn: '', checkOut: '',
        checkInTime: '', checkOutTime: '',
        confirmationNumber: '', pin: '', bookingSource: '', roomType: '', price: '',
        includesBreakfast: 'unknown'
      };
      if (!text) return result;
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const full = text.replace(/\n/g, ' ');

      // Booking source detection
      const sourcePatterns = [
        [/booking\.com/i, 'Booking.com'], [/airbnb/i, 'Airbnb'], [/expedia/i, 'Expedia'],
        [/hotels\.com/i, 'Hotels.com'], [/vrbo/i, 'VRBO'], [/marriott/i, 'Marriott'],
        [/hilton/i, 'Hilton'], [/hyatt/i, 'Hyatt'], [/agoda/i, 'Agoda'],
        [/trip\.com|ctrip/i, 'Trip.com'], [/priceline/i, 'Priceline'], [/hostelworld/i, 'Hostelworld'],
      ];
      for (const [pat, name] of sourcePatterns) {
        if (pat.test(full)) { result.bookingSource = name; break; }
      }

      // Confirmation / reservation number
      const confMatch = full.match(/(?:confirmation|booking|reservation|reference|itinerary)\s*(?:#|number|no\.?|code)?[:\s]*([A-Z0-9][-A-Z0-9]{4,20})/i);
      if (confMatch) result.confirmationNumber = confMatch[1].trim();

      // PIN code (common on Booking.com)
      const pinMatch = full.match(/(?:pin|pin\s*code)[:\s]+(\d{4,8})/i);
      if (pinMatch) result.pin = pinMatch[1].trim();

      // Check-in / check-out times
      // Strategy 1: Booking.com format вҖ” "Check-in Wednesday, May 6, 2026 (3:00 PM - 10:00 PM)"
      // For check-in ranges, take the EARLY (first) time; for check-out ranges, take the LATE (last) time
      const ciParenMatch = full.match(/check[\s-]?in[^()]*\(([^)]+)\)/i);
      if (ciParenMatch) {
        const ciTimes = ciParenMatch[1].match(/(\d{1,2}\s*:\s*\d{2}\s*(?:AM|PM))/gi);
        if (ciTimes) result.checkInTime = ciTimes[0].replace(/\s+/g, ' ').trim(); // earliest
      }
      const coParenMatch = full.match(/check[\s-]?out[^()]*\(([^)]+)\)/i);
      if (coParenMatch) {
        const coTimes = coParenMatch[1].match(/(\d{1,2}\s*:\s*\d{2}\s*(?:AM|PM))/gi);
        if (coTimes) result.checkOutTime = coTimes[coTimes.length - 1].replace(/\s+/g, ' ').trim(); // latest
      }
      // Strategy 2: Labeled time вҖ” "Check-in time: 3:00 PM" or "Check-in: ... 3:00 PM"
      if (!result.checkInTime) {
        const ciTimeMatch = full.match(/check[\s-]?in\s*(?:time)?[:\s]+.*?(\d{1,2}\s*:\s*\d{2}\s*(?:AM|PM))/i);
        if (ciTimeMatch) result.checkInTime = ciTimeMatch[1].replace(/\s+/g, ' ').trim();
      }
      if (!result.checkOutTime) {
        const coTimeMatch = full.match(/check[\s-]?out\s*(?:time)?[:\s]+.*?(\d{1,2}\s*:\s*\d{2}\s*(?:AM|PM))/i);
        if (coTimeMatch) result.checkOutTime = coTimeMatch[1].replace(/\s+/g, ' ').trim();
      }
      // Normalize: collapse any spaces around colons ("3 : 00 PM" вҶ’ "3:00 PM")
      if (result.checkInTime) result.checkInTime = result.checkInTime.replace(/\s*:\s*/, ':');
      if (result.checkOutTime) result.checkOutTime = result.checkOutTime.replace(/\s*:\s*/, ':');

      // Breakfast detection
      if (/breakfast\s*included|includes?\s*breakfast|complimentary\s*breakfast|free\s*breakfast|with\s*breakfast/i.test(full)) {
        result.includesBreakfast = 'yes';
      } else if (/no\s*breakfast|without\s*breakfast|breakfast\s*not\s*included|room\s*only|no\s*meal\s*is\s*included|no\s*meal\s*option/i.test(full)) {
        result.includesBreakfast = 'no';
      }

      // Property name вҖ” look for specific patterns first
      const namePatterns = [
        /(?:confirmed at|booked at)\s+([^\n,;]{3,60})/i,
        /(?:your (?:stay|booking|reservation) at)\s+([^\n,;]{3,60})/i,
        /(?:hotel|property|accommodation)[:\s]+([^\n,;]{3,60})/i,
        /(?:you(?:'re| are)\s+(?:staying|booked)\s+at)\s+([^\n,;]{3,60})/i,
        /(?:reservation\s+(?:at|for))\s+([^\n,;]{3,60})/i,
      ];
      for (const pat of namePatterns) {
        const m = full.match(pat);
        if (m) {
          let name = m[1].trim().replace(/[.!]+$/, '');
          // Strip trailing junk: dates, common words, "Date:", "Your", etc.
          name = name.replace(/\s+(?:date|your|on|for|from|in|the|a)\s*[:].*/i, '');
          name = name.replace(/\s+(?:date|your|on|for|from|in|the|a)\s*$/i, '');
          // Strip trailing date patterns like "Date : March 23" or "March 23, 2026"
          name = name.replace(/\s+Date\s*:.*/i, '');
          name = name.replace(/\s+\w{3,9}\s+\d{1,2}(?:,?\s+\d{4})?\s*$/, '');
          result.propertyName = name.trim();
          break;
        }
      }
      // Fallback: look for lines with hotel-like keywords
      if (!result.propertyName) {
        for (const line of lines.slice(0, 15)) {
          if (/(?:hotel|suites?|inn|resort|hostel|lodge|villa|apartment|ryokan|pension|bnb)/i.test(line) && line.length >= 5 && line.length <= 80) {
            let name = line.replace(/[.!:]+$/, '').trim();
            name = name.replace(/^(?:your\s+(?:stay|booking)\s+(?:at|in)\s*)/i, '');
            // Strip trailing date/price junk
            name = name.replace(/\s+Date\s*:.*/i, '');
            name = name.replace(/\s+\d{1,2}[\s\/\-]\w{3,9}.*$/, '');
            if (name.length >= 4) { result.propertyName = name.trim(); break; }
          }
        }
      }
      // Last fallback: first capitalized line that looks like a name
      if (!result.propertyName) {
        for (const line of lines.slice(0, 10)) {
          if (line.length >= 4 && line.length <= 80 && /[A-Z]/.test(line[0]) && !/^\d/.test(line) && !/check|confirm|book|date|reservation|itinerary|guest|price|cancel|total|payment|email/i.test(line)) {
            result.propertyName = line.replace(/[.!:]+$/, '');
            break;
          }
        }
      }

      // Room type вҖ” look for room/suite/bed patterns, but stop before currency symbols
      const roomPatterns = [
        /(?:room\s*type|accommodation)[:\s]+([^$вӮ¬ВЈВҘвӮ№\n]{3,60})/i,
        // Booking.com: "Your reservation 1 night, Two-Bedroom Suite with Living Room"
        /(?:your\s+reservation|reserved)\s+\d+\s+nights?,\s*([^$вӮ¬ВЈВҘвӮ№\n]{3,80}?)(?=\s+(?:You\b|\d+\s+(?:adult|guest)))/i,
        // X-Bedroom patterns: "Two-Bedroom Suite", "1-Bedroom Apartment"
        /((?:\w+-)?Bedroom\s+(?:Suite|Room|Studio|Apartment|Villa)(?:\s+(?:with|and)\s+(?:[\w]+\s*){1,4}?(?:Room|View|Bed|Sofa|Bath|Kitchen|Balcony|Terrace|Pool|Garden)))/i,
        /(\d+\s+(?:superior|deluxe|standard|premium|executive|classic|economy|luxury)\s+(?:[\w-]+\s+){0,4}(?:room|suite|studio|apartment|bed))/i,
        /((?:superior|deluxe|standard|premium|executive|classic|economy|luxury)\s+(?:[\w-]+\s+){0,3}(?:room|suite|studio|apartment))/i,
        /((?:double|single|twin|king|queen|family)\s+(?:room|suite|studio|bed)(?:\s+[\w-]+){0,2})/i,
      ];
      for (const pat of roomPatterns) {
        const m = full.match(pat);
        if (m) {
          let rt = (m[1] || m[0]).trim();
          // Strip trailing currency/price that leaked in
          rt = rt.replace(/\s*[$вӮ¬ВЈВҘвӮ№]\s*[\d,]+.*$/, '').trim();
          rt = rt.replace(/\s*\d{2,}[,.]?\d*\s*$/, '').trim(); // trailing numbers
          result.roomType = rt.replace(/[.!:]+$/, '');
          break;
        }
      }

      // Price вҖ” look for total price with currency. Be specific to avoid matching random text.
      // First try "total" context, then standalone large currency amounts
      const pricePatterns = [
        /(?:total\s*(?:price|cost|amount|charge|due))[:\s]*([$вӮ¬ВЈВҘвӮ№]\s*[\d,]+\.?\d*)/i,
        /(?:total\s*(?:price|cost|amount|charge|due))[:\s]*([\d,]+\.?\d*\s*(?:USD|EUR|GBP|JPY))/i,
        /(?:price|cost|total)[:\s]*([$вӮ¬ВЈВҘвӮ№]\s*[\d,]+\.?\d*)/i,
        // Standalone large currency amounts (at least 3 digits to avoid matching "ВҘ 160" room count)
        /([$вӮ¬ВЈВҘвӮ№]\s*[\d,]{3,}\.?\d*)/,
        /([\d,]{4,}\.?\d*\s*(?:USD|EUR|GBP|JPY|INR))/i,
      ];
      for (const pat of pricePatterns) {
        const m = full.match(pat);
        if (m) {
          const val = (m[1] || m[0]).trim();
          // Validate: must contain at least 3 digit characters to be a real price
          const digits = val.replace(/[^0-9]/g, '');
          if (digits.length >= 3) {
            result.price = val;
            break;
          }
        }
      }

      // Dates вҖ” prefer explicit check-in/check-out labels
      const dateRe = /(\d{1,2}[\s\/\-\.]\w{3,9}[\s\/\-\.]\d{2,4}|\w{3,9}\s+\d{1,2},?\s+\d{4}|\d{4}[\-\/]\d{2}[\-\/]\d{2}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/g;

      // Strategy 1: Look for labeled check-in/check-out with dates nearby
      const checkInPatterns = [
        /check[\s-]?in\s*(?:date)?[:\s]*([^\n]{6,40})/i,
        /(?:arrival|arriving|from)\s*(?:date)?[:\s]*([^\n]{6,40})/i,
      ];
      const checkOutPatterns = [
        /check[\s-]?out\s*(?:date)?[:\s]*([^\n]{6,40})/i,
        /(?:departure|departing|(?:check[\s-]?out)|until|to)\s*(?:date)?[:\s]*([^\n]{6,40})/i,
      ];

      for (const pat of checkInPatterns) {
        const m = full.match(pat);
        if (m) {
          const d = m[1].match(dateRe);
          if (d) { result.checkIn = d[0]; break; }
        }
      }
      for (const pat of checkOutPatterns) {
        const m = full.match(pat);
        if (m) {
          const d = m[1].match(dateRe);
          if (d) { result.checkOut = d[0]; break; }
        }
      }

      // Strategy 2: Look for date ranges like "Mar 23 - Apr 28, 2026" or "23 Mar вҖ“ 28 Apr"
      if (!result.checkIn) {
        const rangeMatch = full.match(/(\w{3,9}\s+\d{1,2})\s*[-вҖ“вҖ”]\s*(\w{3,9}\s+\d{1,2},?\s+\d{4})/);
        if (rangeMatch) {
          result.checkIn = rangeMatch[1];
          result.checkOut = rangeMatch[2];
        }
      }

      // Strategy 3: Find dates near "stay" or "nights" context (skip email-date, cancel-by, etc.)
      if (!result.checkIn) {
        // Find all dates, then pick the ones most likely to be stay dates
        const allDates = [];
        let m;
        const dateReGlobal = /(\d{1,2}[\s\/\-\.]\w{3,9}[\s\/\-\.]\d{2,4}|\w{3,9}\s+\d{1,2},?\s+\d{4}|\d{4}[\-\/]\d{2}[\-\/]\d{2}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/g;
        while ((m = dateReGlobal.exec(full)) !== null) {
          const idx = m.index;
          // Check context around this date вҖ” skip if near "cancel", "sent", "email", "created", "payment due"
          const contextBefore = full.substring(Math.max(0, idx - 50), idx).toLowerCase();
          const isBookingDate = /cancel|sent|email|created|payment\s*due|free\s*cancel|modified|updated/.test(contextBefore);
          allDates.push({ date: m[1], idx, isBookingDate });
        }
        // Filter out booking/email dates, keep stay dates
        const stayDates = allDates.filter(d => !d.isBookingDate);
        if (stayDates.length >= 2) {
          result.checkIn = stayDates[0].date;
          result.checkOut = stayDates[1].date;
        } else if (stayDates.length === 1) {
          result.checkIn = stayDates[0].date;
        } else if (allDates.length >= 2) {
          result.checkIn = allDates[0].date;
          result.checkOut = allDates[1].date;
        }
      }

      // Address вҖ” look for address patterns, but truncate at phone/contact/fax
      const addrPatterns = [
        /(?:address|location|located\s+at|property\s+address)[:\s]+([^\n]{10,200})/i,
        /(?:directions?|find\s+us)[:\s]+([^\n]{10,200})/i,
      ];
      for (const pat of addrPatterns) {
        const m = full.match(pat);
        if (m) {
          let addr = m[1].trim();
          // Truncate at phone, contact, fax, email patterns
          addr = addr.replace(/\s*(?:phone|tel|fax|contact|email|website|www\.|http)[:\s].*/i, '').trim();
          addr = addr.replace(/\s*\+\d{1,3}\s*\d[\d\s-]+$/, '').trim(); // strip trailing phone numbers
          result.address = addr;
          break;
        }
      }

      return result;
    };

    // Parse activity/tour booking text
    const parseActivityText = (text) => {
      const result = {
        tourName: '', tourOperator: '', bookingSite: '', confirmationNumber: '',
        date: '', time: '', duration: '', contactInfo: '', description: '',
        address: '', price: '',
      };
      if (!text) return result;
      const full = text.replace(/\n/g, ' ');
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

      // Booking site detection
      const sitePatterns = [
        [/klook/i, 'Klook'], [/viator/i, 'Viator'], [/getyourguide/i, 'GetYourGuide'],
        [/airbnb\s*experiences/i, 'Airbnb Experiences'], [/tripadvisor/i, 'TripAdvisor'],
        [/musement/i, 'Musement'], [/tiqets/i, 'Tiqets'], [/civitatis/i, 'Civitatis'],
        [/veltra/i, 'Veltra'], [/booking\.com/i, 'Booking.com'],
      ];
      for (const [pat, name] of sitePatterns) {
        if (pat.test(full)) { result.bookingSite = name; break; }
      }

      // Confirmation / booking number вҖ” try URL patterns first (most reliable, full number)
      const confPatterns = [
        /bookingNo=([A-Z0-9][-A-Z0-9]{3,20})/i, // from URLs like Klook
        /booking\s*(?:no|number|#|ref|reference)\.?\s*:?\s*([A-Z0-9][-A-Z0-9]{3,20})/i,
        /(?:confirmation|reservation|order|reference)\s*(?:#|no|number|code)?\.?\s*:?\s*([A-Z0-9][-A-Z0-9]{3,20})/i,
      ];
      for (const pat of confPatterns) {
        const m = full.match(pat);
        if (m) { result.confirmationNumber = m[1].trim(); break; }
      }

      // Date and time вҖ” look for ISO-like dates first: "2026-05-08 11:00:00"
      const isoMatch = full.match(/(\d{4}-\d{2}-\d{2})\s+(\d{1,2}:\d{2}(?::\d{2})?)\s*(?:\((?:local|[A-Z]{2,4})\s*time)?/i);
      if (isoMatch) {
        result.date = isoMatch[1];
        result.time = isoMatch[2].replace(/:\d{2}$/, ''); // strip seconds
      } else {
        // Try other date formats
        const dateMatch = full.match(/(?:date|when|scheduled)[:\s]+([^\n]{6,40})/i);
        if (dateMatch) {
          const d = dateMatch[1].match(/(\d{4}[\-\/]\d{2}[\-\/]\d{2}|\w{3,9}\s+\d{1,2},?\s+\d{4}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/);
          if (d) result.date = d[1];
          const t = dateMatch[1].match(/(\d{1,2}:\d{2}\s*(?:AM|PM)?)/i);
          if (t) result.time = t[1];
        }
      }

      // Duration вҖ” look for "X-minute", "X hour", "X.5 hours" etc.
      const durMatch = full.match(/(\d+(?:\.\d+)?)\s*[-вҖ“]?\s*(?:minute|min|hour|hr)s?\s*(?:tour|ride|experience|activity|trip)?/i);
      if (durMatch) {
        const num = parseFloat(durMatch[0]);
        result.duration = durMatch[0].replace(/\s*(tour|ride|experience|activity|trip)/i, '').trim();
      }

      // Price
      const priceMatch = full.match(/(?:US)?\s*\$\s*[\d,]+\.?\d*|вӮ¬\s*[\d,]+\.?\d*|ВЈ\s*[\d,]+\.?\d*|ВҘ\s*[\d,]+|[\d,]+\.?\d*\s*(?:USD|EUR|GBP|JPY)/i);
      if (priceMatch) result.price = priceMatch[0].trim();

      // Contact info вҖ” collect phone numbers and emails
      // Use stricter phone regex: must start with + or ( or have separators, and exclude date-like patterns
      const phoneMatches = full.match(/(?:\+\d{1,4}[-.\s]?\(?\d{1,5}\)?[-.\s]?\d{1,5}[-.\s]?\d{1,5}|\(\d{3,5}\)[-.\s]?\d[-.\s]?\d{3,5}[-.\s]?\d{3,5})/g) || [];
      const emails = full.match(/[\w.-]+@[\w.-]+\.\w{2,}/g) || [];
      const contacts = [];
      phoneMatches.forEach(p => {
        const digits = p.replace(/\D/g, '');
        // Must be 7-15 digits and not look like a date (YYYYMMDD pattern)
        if (digits.length >= 7 && digits.length <= 15 && !/^20\d{6}/.test(digits)) {
          contacts.push(p.trim());
        }
      });
      emails.forEach(e => { if (!/noreply|no-reply|mailer/i.test(e)) contacts.push(e); });
      result.contactInfo = contacts.slice(0, 3).join(' | ');

      // Tour operator вҖ” extract from email domain first (most reliable), then try labeled patterns
      // Skip generic matches like "operator for more information"
      const opEmail = emails.find(e => !/klook|viator|getyourguide|airbnb|tripadvisor|musement|tiqets|civitatis|noreply|no-reply|mailer/i.test(e));
      if (opEmail) {
        const domain = opEmail.split('@')[1]?.split('.')[0];
        if (domain && domain.length > 2) {
          result.tourOperator = domain.charAt(0).toUpperCase() + domain.slice(1);
        }
      }
      if (!result.tourOperator) {
        // Try "supplied by X", "organized by X", "hosted by X" вҖ” require the name to start with uppercase
        const opMatch = full.match(/(?:supplied|organized?|hosted|operated|provided)\s+by[:\s]+([A-Z][\w\s&'.]{2,40}?)(?=[,.\n]|\s{2,}|$)/i);
        if (opMatch && !/more\s+info|contact/i.test(opMatch[1])) {
          result.tourOperator = opMatch[1].trim();
        }
      }

      // Tour name вҖ” use LINE-BASED parsing for much better accuracy
      // Strategy 1: Find a line that ends with a Tour/Experience/etc keyword and is a proper title
      const activityEndWords = /(?:Tour|Experience|Ride|Walk|Cruise|Class|Workshop|Adventure|Excursion|Tasting|Show|Visit|Trip|Pass|Ticket)$/i;
      for (const line of lines) {
        const trimmed = line.trim();
        // Skip very short lines, URLs, or lines that are clearly navigation/UI text
        if (trimmed.length < 10 || trimmed.length > 120) continue;
        if (/^(http|www\.|search|help|go to|en usd|recently|more ideas|spring deal)/i.test(trimmed)) continue;
        // Skip lines starting with durations, numbers, prices, or UI elements
        if (/^(\d+[-вҖ“\s]?(?:minute|min|hour|hr)|US\$|вӮ¬|ВЈ|ВҘ|See |Cancel|Change|Receipt|From |вҳ…)/i.test(trimmed)) continue;
        if (activityEndWords.test(trimmed)) {
          let name = trimmed;
          name = name.replace(/^(?:the|a|an|your)\s+/i, '');
          // Must start with an uppercase letter and be a real title (not "Contact operator", "30-minute Tour")
          if (name.length >= 10 && /^[A-Z]/.test(name) && !/^(?:tour operator|experience details|activity details|contact operator|contact klook)/i.test(name)) {
            result.tourName = name;
            break;
          }
        }
      }
      // Strategy 2: If no match, look for a prominent line right after "Booking confirmed"
      if (!result.tourName) {
        for (let i = 0; i < lines.length; i++) {
          if (/booking\s+confirmed/i.test(lines[i])) {
            // Scan the next few non-empty lines for a substantial title
            for (let j = i + 1; j < Math.min(i + 10, lines.length); j++) {
              const candidate = lines[j].trim();
              if (candidate.length >= 10 && candidate.length <= 120
                && /^[A-Z]/.test(candidate)
                && !/^(US\$|вӮ¬|ВЈ|ВҘ|See |Cancel|Change|Receipt|Payment|You can)/i.test(candidate)
                && !/^\d/.test(candidate)) {
                result.tourName = candidate;
                break;
              }
            }
            if (result.tourName) break;
          }
        }
      }
      // Strategy 3: fallback to flattened text regex
      if (!result.tourName) {
        const m = full.match(/((?:[A-Z][\w]+\s+){1,8}(?:Tour|Experience|Ride|Walk|Cruise|Class|Workshop|Adventure|Excursion|Tasting|Show|Visit|Trip|Pass|Ticket))/);
        if (m && m[1].length >= 8) result.tourName = m[1].trim();
      }

      // Description вҖ” what's included (capture content between "What's included" and next section header)
      const inclMatch = text.match(/what'?s\s+included[:\s]*\n([\s\S]{5,500}?)(?=\n\s*(?:what'?s\s+not|not\s+included|how\s+to\s+use|how\s+to\s+get|before\s+you|itinerary|cancel|refund|important|terms|condition|contact|meeting|address|location)\b)/i);
      if (inclMatch) {
        result.description = inclMatch[1].replace(/\n/g, ', ').replace(/,\s*,/g, ',').replace(/\s+/g, ' ').trim();
      } else {
        // Fallback: try "includes:" or "included:" patterns
        const incl2 = full.match(/(?:includes?|what\s+you(?:'ll)?\s+get)[:\s]+([^.]{10,200})/i);
        if (incl2) result.description = incl2[1].trim();
      }

      // Address / meeting point вҖ” be strict about what constitutes an address
      const meetPatterns = [
        /(?:meet\s+(?:up\s+)?at)\s+([^\n]{5,150})/i,
        /(?:meet(?:ing)?\s*point|pick[\s-]?up\s*(?:point|location|address)|starting\s+point)[:\s]+([^\n]{5,150})/i,
        /(?:getting\s+there|venue\s+address|meeting\s+location)[:\s]+([^\n]{5,150})/i,
      ];
      for (const pat of meetPatterns) {
        const m = text.match(pat); // use original text (with newlines) not flattened
        if (m) {
          let addr = m[1].trim();
          // Stop at section boundaries
          addr = addr.replace(/\s*(?:what'?s|how\s+to|before|itinerary|cancel|refund|important|terms|please|note:)\s.*/i, '').trim();
          // Skip if it looks like a section header rather than an address
          if (addr.length >= 5 && addr.length <= 150 && !/^(?:what|how|before|cancel)/i.test(addr)) {
            result.address = addr;
            break;
          }
        }
      }

      return result;
    };

    const parseTransportText = (text) => {
      const result = {
        type: 'flight',
        title: '', from: '', to: '', date: '', departure_time: '', arrival_time: '',
        carrier: '', seat: '', confirmation: '', passengers: '', cost: '', notes: '',
      };
      if (!text) return result;
      const full = text.replace(/\n/g, ' ');
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

      if (/shinkansen|bullet\s*train|JR\s+pass|nozomi|hikari|kodama|sakura|mizuho|hayabusa|kagayaki|train|rail/i.test(full)) {
        result.type = 'train';
      } else if (/transfer|shuttle|pickup|pick[\s-]?up|airport.*car|car.*airport|private\s+(?:car|vehicle|driver)|limousine|chauffeur/i.test(full)) {
        result.type = 'transfer';
      } else {
        result.type = 'flight';
      }

      const carrierPatterns = [
        /(?:airline|carrier|operator|company)[:\s]+([^\n,]{3,40})/i,
        /(?:Japan\s+Airlines|JAL|ANA|All\s+Nippon|United|Delta|American|Southwest|JetBlue|Spirit|Alaska|Hawaiian|Emirates|Qatar|Singapore|Cathay|Korean\s+Air|Asiana|Turkish|Lufthansa|British\s+Airways|Air\s+France|KLM|Qantas|Virgin|Ryanair|EasyJet|Peach|Jetstar|Air\s+Do|Skymark|Solaseed|StarFlyer)/i,
        /(?:Shinkansen|Tokaido|Sanyo|Hokuriku|Tohoku|Joetsu|Nozomi|Hikari|Kodama|Sakura|Mizuho|Hayabusa|Kagayaki|Tsubame)/i,
      ];
      for (const pat of carrierPatterns) {
        const m = full.match(pat);
        if (m) { result.carrier = (m[1] || m[0]).trim(); break; }
      }

      const flightNum = full.match(/(?:flight|flt)[\s#:]*([A-Z]{2}\s*\d{1,5})/i);
      const trainNum = full.match(/(?:train|service)[\s#:]*(\w{1,5}\s*\d{1,5})/i);
      if (flightNum) result.carrier = (result.carrier ? result.carrier + ' ' : '') + flightNum[1].trim();
      if (trainNum && result.type === 'train') result.carrier = (result.carrier ? result.carrier + ' ' : '') + trainNum[1].trim();

      const routePatterns = [
        /(?:from|departure|depart(?:ing)?|origin)[:\s]+([^\nвҶ’вһЎ>]{3,60}?)(?:\s*(?:вҶ’|вһЎ|->|>|to)\s*|\s+(?:to|вҶ’)\s+)([^\n,]{3,60})/i,
        /([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)\s*(?:вҶ’|вһЎ|->|>|вҖ“|вҖ”|to)\s*([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/,
        /([A-Z]{3})\s*(?:вҶ’|вһЎ|->|>|вҖ“|вҖ”|to)\s*([A-Z]{3})/,
      ];
      for (const pat of routePatterns) {
        const m = full.match(pat);
        if (m) { result.from = m[1].trim(); result.to = m[2].trim(); break; }
      }

      const datePatterns = [
        /(?:date|depart(?:ure)?|travel)\s*(?:date)?[:\s]+(\d{4}[\-\/]\d{2}[\-\/]\d{2})/i,
        /(\d{4}[\-\/]\d{2}[\-\/]\d{2})/,
        /(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{4})/i,
        /(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{1,2},?\s+\d{4}/i,
      ];
      for (const pat of datePatterns) {
        const m = full.match(pat);
        if (m) {
          const ds = m[1] || m[0];
          const d = new Date(ds);
          if (!isNaN(d.getTime())) { result.date = d.toISOString().split('T')[0]; break; }
          result.date = ds; break;
        }
      }

      const depMatch = full.match(/(?:depart(?:ure|s|ing)?|leave?s?)\s*(?:at|time)?[:\s]+(\d{1,2}:\d{2}\s*(?:AM|PM)?)/i);
      const arrMatch = full.match(/(?:arriv(?:al|es?|ing)?)\s*(?:at|time)?[:\s]+(\d{1,2}:\d{2}\s*(?:AM|PM)?)/i);
      if (depMatch) result.departure_time = depMatch[1].trim();
      if (arrMatch) result.arrival_time = arrMatch[1].trim();
      if (!result.departure_time) {
        const timeRange = full.match(/(\d{1,2}:\d{2}\s*(?:AM|PM)?)\s*(?:[-вҖ“вҖ”вҶ’>]|to)\s*(\d{1,2}:\d{2}\s*(?:AM|PM)?)/i);
        if (timeRange) {
          result.departure_time = timeRange[1].trim();
          result.arrival_time = timeRange[2].trim();
        }
      }

      const seatMatch = full.match(/(?:seat|car|coach|carriage)\s*(?:#|no\.?|number)?[:\s]+([A-Z0-9][-A-Z0-9]{0,8})/i);
      if (seatMatch) result.seat = seatMatch[1].trim();

      const confPatterns = [
        /(?:booking|confirmation|reservation|order|reference|e-?ticket)\s*(?:#|no\.?|number|ref|code)?[:\s]+([A-Z0-9][-A-Z0-9]{3,20})/i,
        /(?:PNR|record\s+locator)[:\s]+([A-Z0-9]{5,8})/i,
      ];
      for (const pat of confPatterns) {
        const m = full.match(pat);
        if (m) { result.confirmation = m[1].trim(); break; }
      }

      const paxMatch = full.match(/(?:passenger|travele?r|guest|pax)s?[:\s]+(\d+|[^\n,]{3,60})/i);
      if (paxMatch) result.passengers = paxMatch[1].trim();
      if (!result.passengers) {
        const nameMatch = full.match(/(?:passenger|travele?r|guest)\s*(?:name)?[:\s]+([A-Z][a-z]+\s+[A-Z][a-z]+(?:\s*[,&]\s*[A-Z][a-z]+\s+[A-Z][a-z]+)*)/);
        if (nameMatch) result.passengers = nameMatch[1].trim();
      }

      const priceMatch = full.match(/(?:US)?\s*\$\s*[\d,]+\.?\d*|вӮ¬\s*[\d,]+\.?\d*|ВЈ\s*[\d,]+\.?\d*|ВҘ\s*[\d,]+|[\d,]+\.?\d*\s*(?:USD|EUR|GBP|JPY)/i);
      if (priceMatch) result.cost = priceMatch[0].trim();

      if (result.from && result.to) {
        result.title = `${result.from} вҶ’ ${result.to}`;
        if (result.carrier) result.title += ` (${result.carrier})`;
      } else if (result.carrier) {
        result.title = result.carrier;
      }

      return result;
    };

    // ==================== TRAVEL DOCS PANEL ====================
    const TRAVEL_DOC_TYPES = {
      flight: { label: 'Flight', icon: 'вңҲпёҸ', color: '#2196F3' },
      train: { label: 'Train', icon: 'рҹҡ„', color: '#4CAF50' },
      transfer: { label: 'Transfer', icon: 'рҹҡҗ', color: '#FF9800' },
      hotel: { label: 'Hotel', icon: 'рҹҸЁ', color: '#9C27B0' },
      activity: { label: 'Activity', icon: 'рҹҺ«', color: '#E91E63' },
      general: { label: 'Other', icon: 'рҹ“Һ', color: '#607D8B' },
    };

    const TravelDocsPanel = ({ collectionId, pins, isDarkMode, isMobile, onClose, onSelectPin, showToast }) => {
      const [docs, setDocs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showForm, setShowForm] = useState(false);
      const [editDoc, setEditDoc] = useState(null);
      const [expandedId, setExpandedId] = useState(null);
      const [filterType, setFilterType] = useState('all');
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);
      const fileInputRef = useRef(null);

      // Load standalone travel docs with real-time listener
      useEffect(() => {
        if (!collectionId) return;
        setLoading(true);
        const unsub = MockFirebase.onTravelDocsSnapshot(collectionId, items => {
          setDocs(items);
          setLoading(false);
        });
        return () => { if (unsub) unsub(); };
      }, [collectionId]);

      // Merge pin-attached docs (hotels, activities) into the timeline
      const pinDocs = useMemo(() => {
        if (!pins) return [];
        return pins
          .filter(p => p.collection_id === collectionId && (p.attachment || p.reservation_details))
          .map(p => {
            const rd = p.reservation_details || {};
            const isActivity = rd.booking_type === 'activity';
            let date = '';
            if (isActivity && rd.date) date = rd.date;
            else if (rd.check_in) date = rd.check_in;
            return {
              id: `pin_${p.id}`,
              _pinDoc: true,
              _pin: p,
              type: isActivity ? 'activity' : 'hotel',
              title: p.name,
              date,
              departure_time: isActivity ? rd.time : '',
              arrival_time: '',
              carrier: rd.booking_source || '',
              confirmation: rd.confirmation_number || '',
              cost: rd.price || '',
              check_in: rd.check_in || '',
              check_out: rd.check_out || '',
              notes: isActivity ? rd.description : '',
              address: p.address || '',
              file_data: p.attachment?.data || null,
              file_name: p.attachment?.name || '',
            };
          });
      }, [pins, collectionId]);

      const allDocs = useMemo(() => {
        return [...docs, ...pinDocs].sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.departure_time || '').localeCompare(b.departure_time || ''));
      }, [docs, pinDocs]);

      const filteredDocs = filterType === 'all' ? allDocs : allDocs.filter(d => d.type === filterType);

      // Group docs by date
      const groupedDocs = useMemo(() => {
        const groups = {};
        filteredDocs.forEach(d => {
          const key = d.date || 'No date';
          if (!groups[key]) groups[key] = [];
          groups[key].push(d);
        });
        return Object.entries(groups).sort(([a], [b]) => a.localeCompare(b));
      }, [filteredDocs]);

      const handleSave = async (docData) => {
        try {
          await MockFirebase.saveTravelDoc({ ...docData, collection_id: collectionId });
          setShowForm(false);
          setEditDoc(null);
          if (showToast) showToast('Document saved!');
        } catch (e) {
          console.error('Save travel doc failed:', e);
          if (showToast) showToast('Save failed', 'error');
        }
      };

      const handleDelete = async (docId) => {
        try {
          await MockFirebase.deleteTravelDoc(docId);
          setConfirmDeleteId(null);
          setExpandedId(null);
          if (showToast) showToast('Document deleted');
        } catch (e) {
          if (showToast) showToast('Delete failed', 'error');
        }
      };

      const openFile = (doc) => {
        if (!doc.file_data) return;
        try {
          const parts = doc.file_data.match(/^data:([^;]+);base64,(.*)$/);
          if (!parts) return;
          const byteString = atob(parts[2]);
          const ab = new ArrayBuffer(byteString.length);
          const ia = new Uint8Array(ab);
          for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
          const blob = new Blob([ab], { type: parts[1] });
          window.open(URL.createObjectURL(blob), '_blank');
        } catch (e) { console.error('Open file failed:', e); }
      };

      const formatDate = (dateStr) => {
        if (!dateStr) return '';
        try {
          const d = new Date(dateStr + 'T00:00:00');
          return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        } catch { return dateStr; }
      };

      // Panel container
      const panelClass = isMobile
        ? 'fixed inset-0 z-[1000] flex flex-col bg-white dark:bg-slate-900'
        : 'fixed top-0 right-0 h-full w-[420px] z-[600] flex flex-col bg-white dark:bg-slate-900 shadow-2xl border-l dark:border-slate-700';

      return (
        <div className={panelClass}>
          {/* Header */}
          <div className="flex items-center justify-between px-4 py-3 border-b dark:border-slate-700 bg-white dark:bg-slate-800 shrink-0">
            <div className="flex items-center gap-2">
              <span className="text-lg">рҹ“„</span>
              <h2 className="font-semibold text-gray-900 dark:text-white text-base">Documents</h2>
              <span className="text-xs text-gray-400 dark:text-gray-500">{allDocs.length}</span>
            </div>
            <div className="flex items-center gap-2">
              <button
                onClick={() => { setEditDoc(null); setShowForm(true); }}
                className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium rounded-full transition"
              >
                + Add
              </button>
              <button onClick={onClose} className="p-1.5 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-full transition">
                <svg className="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </div>

          {/* Type filter chips */}
          <div className="flex gap-1.5 px-4 py-2 overflow-x-auto shrink-0 border-b dark:border-slate-700">
            {[{ key: 'all', label: 'All', icon: '' }, ...Object.entries(TRAVEL_DOC_TYPES).map(([k, v]) => ({ key: k, label: v.label, icon: v.icon }))].map(f => (
              <button
                key={f.key}
                onClick={() => setFilterType(f.key)}
                className={`flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium whitespace-nowrap transition ${
                  filterType === f.key
                    ? 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300'
                    : 'bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-600'
                }`}
              >
                {f.icon && <span>{f.icon}</span>}{f.label}
              </button>
            ))}
          </div>

          {/* Doc list */}
          <div className="flex-1 overflow-y-auto px-4 py-3">
            {loading ? (
              <div className="flex items-center justify-center py-12 text-gray-400"><div className="animate-spin w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full"></div></div>
            ) : filteredDocs.length === 0 ? (
              <div className="text-center py-12">
                <div className="text-4xl mb-3">рҹ“„</div>
                <p className="text-gray-500 dark:text-gray-400 text-sm">No documents yet</p>
                <p className="text-gray-400 dark:text-gray-500 text-xs mt-1">Add flights, trains, transfers & more. Pin-attached hotel/activity docs also show here.</p>
              </div>
            ) : (
              <div className="space-y-4">
                {groupedDocs.map(([date, dateDocs]) => (
                  <div key={date}>
                    <div className="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2 px-1">
                      {formatDate(date)}
                    </div>
                    <div className="space-y-2">
                      {dateDocs.map(doc => {
                        const typeInfo = TRAVEL_DOC_TYPES[doc.type] || TRAVEL_DOC_TYPES.general;
                        const isExpanded = expandedId === doc.id;
                        return (
                          <div
                            key={doc.id}
                            className={`rounded-xl border transition overflow-hidden ${
                              isExpanded
                                ? 'border-blue-300 dark:border-blue-700 shadow-md'
                                : 'border-gray-200 dark:border-slate-700 hover:border-gray-300 dark:hover:border-slate-600'
                            }`}
                          >
                            {/* Card header вҖ” always visible */}
                            <button
                              onClick={() => setExpandedId(isExpanded ? null : doc.id)}
                              className="w-full flex items-start gap-3 p-3 text-left"
                            >
                              <div className="w-9 h-9 rounded-lg flex items-center justify-center text-lg shrink-0" style={{ backgroundColor: typeInfo.color + '20' }}>
                                {typeInfo.icon}
                              </div>
                              <div className="flex-1 min-w-0">
                                <div className="font-medium text-sm text-gray-900 dark:text-white truncate flex items-center gap-1.5">
                                  {doc.title}
                                  {doc._pinDoc && <span className="text-[10px] bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 px-1.5 py-0.5 rounded-full font-medium shrink-0">рҹ“Қ pin</span>}
                                </div>
                                <div className="flex flex-wrap items-center gap-x-2 gap-y-0.5 mt-0.5">
                                  {doc.departure_time && (
                                    <span className="text-xs text-gray-500 dark:text-gray-400">
                                      {doc.departure_time}{doc.arrival_time ? ` вҶ’ ${doc.arrival_time}` : ''}
                                    </span>
                                  )}
                                  {doc.carrier && <span className="text-xs text-gray-400 dark:text-gray-500">{doc.carrier}</span>}
                                  {doc.cost && <span className="text-xs font-medium text-gray-600 dark:text-gray-300">{doc.cost}</span>}
                                </div>
                              </div>
                              <svg className={`w-4 h-4 text-gray-400 shrink-0 mt-1 transition-transform ${isExpanded ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
                            </button>

                            {/* Expanded details */}
                            {isExpanded && (
                              <div className="px-3 pb-3 border-t dark:border-slate-700">
                                <div className="grid grid-cols-2 gap-x-4 gap-y-2 mt-3 text-xs">
                                  {doc.from && <div><span className="text-gray-400 dark:text-gray-500">From</span><div className="text-gray-800 dark:text-gray-200 font-medium">{doc.from}</div></div>}
                                  {doc.to && <div><span className="text-gray-400 dark:text-gray-500">To</span><div className="text-gray-800 dark:text-gray-200 font-medium">{doc.to}</div></div>}
                                  {doc.seat && <div><span className="text-gray-400 dark:text-gray-500">Seat</span><div className="text-gray-800 dark:text-gray-200">{doc.seat}</div></div>}
                                  {doc.confirmation && <div><span className="text-gray-400 dark:text-gray-500">Confirmation</span><div className="text-gray-800 dark:text-gray-200 font-mono">{doc.confirmation}</div></div>}
                                  {doc.passengers && <div><span className="text-gray-400 dark:text-gray-500">Passengers</span><div className="text-gray-800 dark:text-gray-200">{doc.passengers}</div></div>}
                                  {doc.check_in && <div><span className="text-gray-400 dark:text-gray-500">Check-in</span><div className="text-gray-800 dark:text-gray-200">{doc.check_in}</div></div>}
                                  {doc.check_out && <div><span className="text-gray-400 dark:text-gray-500">Check-out</span><div className="text-gray-800 dark:text-gray-200">{doc.check_out}</div></div>}
                                  {doc.address && <div className="col-span-2"><span className="text-gray-400 dark:text-gray-500">Address</span><div className="text-gray-800 dark:text-gray-200">{doc.address}</div></div>}
                                </div>
                                {doc.notes && <div className="mt-2 text-xs text-gray-500 dark:text-gray-400 italic">{doc.notes}</div>}
                                <div className="flex gap-2 mt-3">
                                  {doc.file_data && (
                                    <button onClick={() => openFile(doc)} className="flex items-center gap-1 px-2.5 py-1.5 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg text-xs font-medium hover:bg-blue-100 dark:hover:bg-blue-900/50 transition">
                                      рҹ“„ View File
                                    </button>
                                  )}
                                  {doc._pinDoc && onSelectPin ? (
                                    <button
                                      onClick={() => { onSelectPin(doc._pin); onClose(); }}
                                      className="flex items-center gap-1 px-2.5 py-1.5 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-lg text-xs font-medium hover:bg-green-100 dark:hover:bg-green-900/50 transition"
                                    >
                                      рҹ“Қ View on Map
                                    </button>
                                  ) : !doc._pinDoc && (
                                    <>
                                      <button
                                        onClick={() => { setEditDoc(doc); setShowForm(true); }}
                                        className="flex items-center gap-1 px-2.5 py-1.5 bg-gray-50 dark:bg-slate-700 text-gray-600 dark:text-gray-300 rounded-lg text-xs font-medium hover:bg-gray-100 dark:hover:bg-slate-600 transition"
                                      >
                                        вңҸпёҸ Edit
                                      </button>
                                      {confirmDeleteId === doc.id ? (
                                        <div className="flex gap-1">
                                          <button onClick={() => handleDelete(doc.id)} className="px-2.5 py-1.5 bg-red-600 text-white rounded-lg text-xs font-medium">Delete</button>
                                          <button onClick={() => setConfirmDeleteId(null)} className="px-2.5 py-1.5 bg-gray-200 dark:bg-slate-600 text-gray-700 dark:text-gray-300 rounded-lg text-xs">Cancel</button>
                                        </div>
                                      ) : (
                                        <button onClick={() => setConfirmDeleteId(doc.id)} className="flex items-center gap-1 px-2.5 py-1.5 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg text-xs transition">
                                          рҹ—‘пёҸ
                                        </button>
                                      )}
                                    </>
                                  )}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Upload/Edit Form Modal */}
          {showForm && (
            <TravelDocForm
              doc={editDoc}
              onSave={handleSave}
              onClose={() => { setShowForm(false); setEditDoc(null); }}
              isDarkMode={isDarkMode}
            />
          )}
        </div>
      );
    };

    // ---- Travel Doc Form (modal overlay) ----
    const TravelDocForm = ({ doc, onSave, onClose, isDarkMode }) => {
      const isEdit = !!doc;
      const [type, setType] = useState(doc?.type || 'flight');
      const [title, setTitle] = useState(doc?.title || '');
      const [date, setDate] = useState(doc?.date || '');
      const [departureTime, setDepartureTime] = useState(doc?.departure_time || '');
      const [arrivalTime, setArrivalTime] = useState(doc?.arrival_time || '');
      const [from, setFrom] = useState(doc?.from || '');
      const [to, setTo] = useState(doc?.to || '');
      const [carrier, setCarrier] = useState(doc?.carrier || '');
      const [seat, setSeat] = useState(doc?.seat || '');
      const [confirmation, setConfirmation] = useState(doc?.confirmation || '');
      const [passengers, setPassengers] = useState(doc?.passengers || '');
      const [cost, setCost] = useState(doc?.cost || '');
      const [notes, setNotes] = useState(doc?.notes || '');
      const [address, setAddress] = useState(doc?.address || '');
      const [checkIn, setCheckIn] = useState(doc?.check_in || '');
      const [checkOut, setCheckOut] = useState(doc?.check_out || '');
      const [fileData, setFileData] = useState(doc?.file_data || null);
      const [fileName, setFileName] = useState(doc?.file_name || '');
      const [saving, setSaving] = useState(false);

      const handleFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > 4 * 1024 * 1024) {
          alert('File too large (max 4MB). Try a smaller file or screenshot.');
          return;
        }
        setFileName(file.name);
        const reader = new FileReader();
        reader.onload = () => setFileData(reader.result);
        reader.readAsDataURL(file);
      };

      // Auto-generate title from route
      useEffect(() => {
        if (!title && from && to) {
          const typeInfo = TRAVEL_DOC_TYPES[type];
          setTitle(`${from} вҶ’ ${to}${carrier ? ` (${carrier})` : ''}`);
        }
      }, [from, to, carrier, type]);

      const handleSubmit = async () => {
        if (!title.trim()) return;
        setSaving(true);
        const data = {
          ...(isEdit ? doc : {}),
          id: doc?.id || Date.now().toString(),
          type, title: title.trim(), date,
          departure_time: departureTime, arrival_time: arrivalTime,
          from, to, carrier, seat, confirmation,
          passengers: passengers ? parseInt(passengers) : null,
          cost, notes, address,
          check_in: checkIn, check_out: checkOut,
          file_data: fileData, file_name: fileName,
        };
        await onSave(data);
        setSaving(false);
      };

      const inputClass = "w-full px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none";
      const labelClass = "block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1";

      return (
        <div className="absolute inset-0 bg-white dark:bg-slate-900 z-10 flex flex-col">
          {/* Form header */}
          <div className="flex items-center justify-between px-4 py-3 border-b dark:border-slate-700 shrink-0">
            <h3 className="font-semibold text-gray-900 dark:text-white text-sm">{isEdit ? 'Edit Document' : 'Add Travel Document'}</h3>
            <button onClick={onClose} className="p-1.5 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-full">
              <svg className="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>

          <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4">
            {/* Type selector */}
            <div>
              <label className={labelClass}>Type</label>
              <div className="flex gap-1.5 flex-wrap">
                {Object.entries(TRAVEL_DOC_TYPES).map(([k, v]) => (
                  <button
                    key={k}
                    onClick={() => setType(k)}
                    className={`flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-medium transition ${
                      type === k ? 'ring-2 ring-blue-500 bg-blue-50 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300' : 'bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300'
                    }`}
                  >
                    {v.icon} {v.label}
                  </button>
                ))}
              </div>
            </div>

            {/* File upload */}
            <div>
              <label className={labelClass}>Attachment</label>
              <div className="flex items-center gap-2">
                <button
                  onClick={() => document.getElementById('travel-doc-file').click()}
                  className="px-3 py-2 bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 rounded-lg text-xs font-medium text-gray-700 dark:text-gray-300 transition"
                >
                  {fileData ? 'рҹ“Һ Change file' : 'рҹ“Һ Choose file'}
                </button>
                {fileName && <span className="text-xs text-gray-500 dark:text-gray-400 truncate max-w-[200px]">{fileName}</span>}
                {fileData && <button onClick={() => { setFileData(null); setFileName(''); }} className="text-xs text-red-500 hover:text-red-700">Remove</button>}
              </div>

    const DocumentCenter = ({ pins, onClose, isDarkMode, onSelectPin }) => {
      const docs = useMemo(() => {
        return pins
          .filter(p => p.attachment || p.reservation_details)
          .map(p => {
            const rd = p.reservation_details || {};
            const isActivity = rd.type === 'activity' || p.category === 'activity';
            const dateStr = rd.check_in || rd.date || '';
            let sortDate = null;
            if (dateStr) {
              const d = new Date(dateStr);
              if (!isNaN(d.getTime())) sortDate = d;
            }
            return { pin: p, rd, isActivity, dateStr, sortDate };
          })
          .sort((a, b) => {
            if (a.sortDate && b.sortDate) return a.sortDate - b.sortDate;
            if (a.sortDate) return -1;
            if (b.sortDate) return 1;
            return a.pin.name.localeCompare(b.pin.name);
          });

      const formatDate = (str) => {
        if (!str) return '';

      return (

          <div className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-t-xl md:rounded-none w-full md:w-96 shadow-2xl md:shadow-xl md:border-l dark:md:border-slate-700`} onClick={e => e.stopPropagation()} style={{ position: 'relative', zIndex: 10000 }}>
            <div className="max-h-[85vh] md:max-h-full md:h-full overflow-y-auto p-6 space-y-4">

              {docs.length === 0 ? (

                    <div
                      key={p.id}
                      className="flex items-start gap-3 p-3 rounded-lg border dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800 cursor-pointer transition"
                      onClick={() => { onSelectPin(p); onClose(); }}
                    >
                      <span className="text-2xl flex-shrink-0">{p.emoji || (isActivity ? 'рҹҺ«' : 'рҹҸЁ')}</span>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-semibold dark:text-white truncate">{p.name}</p>
                        <div className="flex items-center gap-2 mt-0.5">
                          {dateStr && <span className="text-xs text-blue-600 dark:text-blue-400 font-medium">{formatDate(dateStr)}</span>}
                          {rd.booking_source && <span className="text-xs text-gray-400">via {rd.booking_source}</span>}
                        </div>
                        <div className="flex flex-wrap gap-1 mt-1">

                            <span className="text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded">#{rd.confirmation_number}</span>
                          )}
                          {rd.price && (
                            <span className="text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded">{rd.price}</span>

                            <span className="text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded">{rd.time}</span>
                          )}
                          {!isActivity && rd.check_out && (
                            <span className="text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded">вҶ’ {formatDate(rd.check_out)}</span>
                          )}
                        </div>
                      </div>
                      {p.attachment && (
                        <button
                          onClick={(e) => { e.stopPropagation(); openDataFile(p.attachment.data, p.attachment.name); }}

                          title="View file"
                        >
                          рҹ“Һ
                        </button>
                      )}

                  ))}
