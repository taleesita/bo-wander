    const MapView = ({ pins, selectedPin, onSelectPin, isDarkMode, onNavigate, sidebarWidth = 0, collectionName, onMapCenterChange, panTo, previewPin }) => {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const tileLayerRef = useRef(null);
      const markersRef = useRef(new Map());
      const prevCollectionKey = useRef(null);
      const userLocationRef = useRef(null);
      const userAccuracyRef = useRef(null);
      const previewMarkerRef = useRef(null);
      const pendingFlyRef = useRef(null);

      // Safe wrapper: checks map has valid dimensions before Leaflet fly/pan operations
      const safeFlyTo = useCallback((map, latLng, zoom, opts = {}) => {
        if (!map) return;
        const lat = parseFloat(Array.isArray(latLng) ? latLng[0] : latLng.lat);
        const lng = parseFloat(Array.isArray(latLng) ? latLng[1] : latLng.lng);
        if (isNaN(lat) || isNaN(lng)) { console.warn('[Map] safeFlyTo: invalid coords', latLng); return; }
        const doFly = () => {
          try {
            const size = map.getSize();
            if (!size || size.x === 0 || size.y === 0) {
              map.invalidateSize();
              const retrySize = map.getSize();
              if (!retrySize || retrySize.x === 0 || retrySize.y === 0) {
                console.warn('[Map] safeFlyTo: zero-size container, deferring');
                pendingFlyRef.current = { lat, lng, zoom, opts };
                return;
              }
            }
            map.flyTo([lat, lng], zoom, { duration: 0.5, ...opts });
          } catch (e) {
            console.warn('[Map] safeFlyTo error, trying setView:', e.message);
            try { map.setView([lat, lng], zoom, { animate: false }); } catch (e2) { console.warn('[Map] setView fallback failed:', e2.message); }
          }
        };
        doFly();
      }, []);

      const safeFitBounds = useCallback((map, bounds, opts = {}) => {
        if (!map) return;
        try {
          const size = map.getSize();
          if (!size || size.x === 0 || size.y === 0) {
            map.invalidateSize();
          }
          map.fitBounds(bounds, { padding: [60, 60], maxZoom: 15, animate: true, ...opts });
        } catch (e) { console.warn('[Map] safeFitBounds error:', e.message); }
      }, []);

      // Initialize map once
      useEffect(() => {
        if (!mapRef.current || mapInstanceRef.current) return;
        const map = L.map(mapRef.current, {
          zoomControl: false,
          attributionControl: true,
          zoomAnimation: true,
          markerZoomAnimation: true
        }).setView([35.68, 139.69], 12);
        // Place zoom controls on the right (bottom) to avoid colliding with the floating back/search chips
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        mapInstanceRef.current = map;

        // Report map center for search biasing
        const reportCenter = () => {
          if (onMapCenterChange) {
            const c = map.getCenter();
            onMapCenterChange({ lat: c.lat, lng: c.lng });
          }
        };
        map.on('moveend', reportCenter);
        // Report initial center after a short delay
        setTimeout(reportCenter, 600);

        // Force Leaflet to recalculate container size after render
        setTimeout(() => { map.invalidateSize(); if (pendingFlyRef.current) { const { lat, lng, zoom, opts } = pendingFlyRef.current; pendingFlyRef.current = null; safeFlyTo(map, [lat, lng], zoom, opts); } }, 100);
        setTimeout(() => { map.invalidateSize(); if (pendingFlyRef.current) { const { lat, lng, zoom, opts } = pendingFlyRef.current; pendingFlyRef.current = null; safeFlyTo(map, [lat, lng], zoom, opts); } }, 300);
        setTimeout(() => { map.invalidateSize(); if (pendingFlyRef.current) { const { lat, lng, zoom, opts } = pendingFlyRef.current; pendingFlyRef.current = null; safeFlyTo(map, [lat, lng], zoom, opts); } }, 600);

        // Request user location and show blue dot
        if ('geolocation' in navigator) {
          navigator.geolocation.watchPosition(
            (pos) => {
              const { latitude, longitude, accuracy } = pos.coords;
              if (userLocationRef.current) {
                userLocationRef.current.setLatLng([latitude, longitude]);
                userAccuracyRef.current.setLatLng([latitude, longitude]);
                userAccuracyRef.current.setRadius(accuracy);
              } else {
                userAccuracyRef.current = L.circle([latitude, longitude], {
                  radius: accuracy,
                  fillColor: '#4285F4',
                  fillOpacity: 0.1,
                  color: '#4285F4',
                  weight: 1,
                  opacity: 0.3
                }).addTo(map);
                userLocationRef.current = L.circleMarker([latitude, longitude], {
                  radius: 7,
                  fillColor: '#4285F4',
                  color: '#fff',
                  weight: 2.5,
                  fillOpacity: 1
                }).addTo(map);
                userLocationRef.current.setZIndex(1000);
              }
            },
            () => {},
            { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
          );
        }

        // Handle window resize + retry pending fly
        const handleResize = () => {
          map.invalidateSize();
          if (pendingFlyRef.current) {
            const { lat, lng, zoom, opts } = pendingFlyRef.current;
            pendingFlyRef.current = null;
            setTimeout(() => safeFlyTo(map, [lat, lng], zoom, opts), 50);
          }
        };
        window.addEventListener('resize', handleResize);

        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        tileLayerRef.current = L.tileLayer(tileUrl, {
          attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);

        return () => {
          window.removeEventListener('resize', handleResize);
          map.remove();
          mapInstanceRef.current = null;
        };
      }, []);

      // Pan/fly to a location when requested externally (e.g. from place search)
      useEffect(() => {
        const map = mapInstanceRef.current;
        console.log('[BoWander Map] panTo effect:', panTo, 'map exists:', !!map);
        if (!map || !panTo) return;
        safeFlyTo(map, [panTo.lat, panTo.lng], panTo.zoom || 15, { duration: 0.8 });
      }, [panTo]);

      // Show/hide preview pin (temporary marker while adding a place)
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        // Remove existing preview marker
        if (previewMarkerRef.current) {
          map.removeLayer(previewMarkerRef.current);
          previewMarkerRef.current = null;
        }
        // Guard against invalid coordinates
        if (previewPin && (isNaN(previewPin.lat) || isNaN(previewPin.lng) || !previewPin.lat || !previewPin.lng)) return;
        // Add new preview marker if we have one
        if (previewPin && previewPin.lat && previewPin.lng) {
          const icon = L.divIcon({
            className: 'preview-pin',
            html: `<div style="
              width: 36px; height: 36px;
              background: #3b82f6;
              border: 3px solid white;
              border-radius: 50%;
              box-shadow: 0 2px 8px rgba(59,130,246,0.5), 0 0 0 4px rgba(59,130,246,0.2);
              display: flex; align-items: center; justify-content: center;
              font-size: 18px;
              animation: pulse-preview 1.5s ease-in-out infinite;
            ">${previewPin.emoji || '📍'}</div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 18],
          });
          previewMarkerRef.current = L.marker([previewPin.lat, previewPin.lng], { icon, zIndexOffset: 2000 }).addTo(map);
          previewMarkerRef.current.bindTooltip(previewPin.name || 'New pin', { permanent: true, direction: 'top', offset: [0, -20], className: 'preview-tooltip' });
        }
      }, [previewPin]);

      // Update tiles when dark mode changes
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        if (tileLayerRef.current) map.removeLayer(tileLayerRef.current);
        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        tileLayerRef.current = L.tileLayer(tileUrl, {
          attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);
      }, [isDarkMode]);

      // Update markers and fit bounds when pins change
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;

        // Clear old markers
        markersRef.current.forEach(marker => map.removeLayer(marker));
        markersRef.current.clear();

        // Add new markers — merge co-located pins into single markers
        const validPins = pins.filter(p => typeof p.lat === 'number' && typeof p.lng === 'number' && !isNaN(p.lat) && !isNaN(p.lng) && p.lat !== 0 && p.lng !== 0);
        // Group pins by rounded coords to detect overlaps (within ~10m)
        const coordGroups = {};
        validPins.forEach(pin => {
          const key = `${pin.lat.toFixed(4)},${pin.lng.toFixed(4)}`;
          if (!coordGroups[key]) coordGroups[key] = [];
          coordGroups[key].push(pin);
        });
        // Build a lookup from pin ID to its co-located group
        const pinGroupMap = {};
        Object.values(coordGroups).forEach(group => {
          group.forEach(pin => { pinGroupMap[pin.id] = group; });
        });
        // Track which coord groups have already been rendered
        const renderedGroups = new Set();

        validPins.forEach(pin => {
          const groupKey = `${pin.lat.toFixed(4)},${pin.lng.toFixed(4)}`;
          const group = pinGroupMap[pin.id] || [pin];
          const isGrouped = group.length > 1;

          // For grouped pins, only render one marker (the first in the group)
          if (isGrouped) {
            if (renderedGroups.has(groupKey)) {
              // Still register a reference so selection highlighting works
              const primaryMarker = markersRef.current.get(group[0].id);
              if (primaryMarker) markersRef.current.set(pin.id, primaryMarker);
              return;
            }
            renderedGroups.add(groupKey);
          }

          const isSelected = isGrouped ? group.some(p => selectedPin?.id === p.id) : selectedPin?.id === pin.id;
          const categoryData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
          const colorClass = isSelected ? 'category-pin-selected' : '';
          const icon = L.divIcon({
            html: renderPinHtml(pin, categoryData, colorClass, group),
            iconSize: [isSelected ? 44 : 36, isSelected ? 44 : 36],
            iconAnchor: [isSelected ? 22 : 18, isSelected ? 22 : 18],
            className: 'category-marker'
          });
          try {
            const marker = L.marker([pin.lat, pin.lng], { icon })
              .on('click', () => {
                // Pass the group along with the pin for co-located handling
                if (isGrouped) {
                  const relevant = pickRelevantPin(group);
                  onSelectPin(relevant, group);
                } else {
                  onSelectPin(pin);
                }
              })
              .addTo(map);
            markersRef.current.set(pin.id, marker);
          } catch (e) { console.warn('Marker error for pin', pin.id, e); }
        });

        // Smart center: find today's hotel, or fall back to pin cluster
        const findSmartCenter = () => {
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          // 1. Check for a hotel pin where today falls within check-in → check-out
          const hotelPins = validPins.filter(p => p.category === 'hotel' && p.reservation_details);
          for (const hp of hotelPins) {
            const rd = hp.reservation_details;
            const ci = rd.check_in ? new Date(rd.check_in) : null;
            const co = rd.check_out ? new Date(rd.check_out) : null;
            if (ci && !isNaN(ci.getTime())) {
              ci.setHours(0, 0, 0, 0);
              if (co && !isNaN(co.getTime())) {
                co.setHours(0, 0, 0, 0);
                if (today >= ci && today <= co) return { lat: hp.lat, lng: hp.lng, zoom: 14, reason: 'hotel' };
              } else {
                // No checkout — match check-in day
                if (today.getTime() === ci.getTime()) return { lat: hp.lat, lng: hp.lng, zoom: 14, reason: 'hotel' };
              }
            }
          }
          // 2. Find the upcoming hotel (next check-in within 3 days)
          const threeDays = 3 * 24 * 60 * 60 * 1000;
          let nearestHotel = null;
          let nearestDiff = Infinity;
          for (const hp of hotelPins) {
            const ci = hp.reservation_details.check_in ? new Date(hp.reservation_details.check_in) : null;
            if (ci && !isNaN(ci.getTime())) {
              ci.setHours(0, 0, 0, 0);
              const diff = ci.getTime() - today.getTime();
              if (diff >= 0 && diff < threeDays && diff < nearestDiff) {
                nearestDiff = diff;
                nearestHotel = hp;
              }
            }
          }
          if (nearestHotel) return { lat: nearestHotel.lat, lng: nearestHotel.lng, zoom: 13, reason: 'upcoming' };
          // 3. No matching hotel — find the densest cluster of pins
          // Use a simple grid-based density approach
          const gridSize = 0.05; // ~5km grid cells
          const cells = {};
          validPins.forEach(p => {
            const key = `${Math.round(p.lat / gridSize)},${Math.round(p.lng / gridSize)}`;
            if (!cells[key]) cells[key] = { pins: [], sumLat: 0, sumLng: 0 };
            cells[key].pins.push(p);
            cells[key].sumLat += p.lat;
            cells[key].sumLng += p.lng;
          });
          // Find the cell with the most pins
          let bestCell = null;
          let bestCount = 0;
          Object.values(cells).forEach(cell => {
            if (cell.pins.length > bestCount) {
              bestCount = cell.pins.length;
              bestCell = cell;
            }
          });
          if (bestCell && bestCount >= 2) {
            const cLat = bestCell.sumLat / bestCell.pins.length;
            const cLng = bestCell.sumLng / bestCell.pins.length;
            return { lat: cLat, lng: cLng, zoom: 13, reason: 'cluster' };
          }
          // 4. Only 1 pin or all spread out — center on first hotel, or first pin
          if (hotelPins.length > 0) {
            return { lat: hotelPins[0].lat, lng: hotelPins[0].lng, zoom: 13, reason: 'first-hotel' };
          }
          if (validPins.length > 0) {
            return { lat: validPins[0].lat, lng: validPins[0].lng, zoom: 13, reason: 'first-pin' };
          }
          return null;
        };

        // Fit bounds when the set of pins changes (e.g. switching collection)
        const collectionKey = validPins.map(p => p.id).sort().join(',');
        if (validPins.length > 0 && collectionKey !== prevCollectionKey.current) {
          prevCollectionKey.current = collectionKey;
          const smartCenter = findSmartCenter();
          if (smartCenter) {
            safeFlyTo(map, [smartCenter.lat, smartCenter.lng], smartCenter.zoom);
          } else {
            try {
              const bounds = L.latLngBounds(validPins.map(p => [p.lat, p.lng]));
              safeFitBounds(map, bounds);
            } catch(e) { console.warn('bounds error:', e); }
          }
        } else if (validPins.length === 0 && collectionKey !== prevCollectionKey.current) {
          prevCollectionKey.current = collectionKey;
          // No pins — geocode the collection name to center the map there
          if (collectionName) {
            fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(collectionName)}&limit=1`)
              .then(r => r.json())
              .then(data => {
                const f = data.features?.[0];
                if (f && f.geometry?.coordinates) {
                  const [lng, lat] = f.geometry.coordinates;
                  safeFlyTo(map, [lat, lng], 12);
                }
              })
              .catch(() => {});
          }
        }
      }, [pins, collectionName]);

      // Update marker styles when selection changes (without rebuilding all markers)
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map) return;
        markersRef.current.forEach((marker, id) => {
          const pin = pins.find(p => p.id === id);
          if (!pin) return;
          const isSelected = selectedPin?.id === id;
          const categoryData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
          const colorClass = isSelected ? 'category-pin-selected' : '';
          const icon = L.divIcon({
            html: renderPinHtml(pin, categoryData, colorClass),
            iconSize: [isSelected ? 44 : 36, isSelected ? 44 : 36],
            iconAnchor: [isSelected ? 22 : 18, isSelected ? 22 : 18],
            className: 'category-marker'
          });
          marker.setIcon(icon);
        });
        if (selectedPin && selectedPin.lat && selectedPin.lng && !isNaN(parseFloat(selectedPin.lat)) && !isNaN(parseFloat(selectedPin.lng))) {
          try {
            const sLat = parseFloat(selectedPin.lat);
            const sLng = parseFloat(selectedPin.lng);
            // Offset the center so the pin appears in the visible map area (left of sidebar)
            const targetZoom = Math.max(map.getZoom(), 14);
            if (sidebarWidth > 0) {
              try {
                const size = map.getSize();
                if (size && size.x > 0 && size.y > 0) {
                  const targetPoint = map.project([sLat, sLng], targetZoom);
                  const offsetPoint = L.point(targetPoint.x + sidebarWidth / 2, targetPoint.y);
                  const offsetLatLng = map.unproject(offsetPoint, targetZoom);
                  safeFlyTo(map, offsetLatLng, targetZoom, { duration: 0.4 });
                } else {
                  safeFlyTo(map, [sLat, sLng], targetZoom, { duration: 0.4 });
                }
              } catch (e) {
                safeFlyTo(map, [sLat, sLng], targetZoom, { duration: 0.4 });
              }
            } else {
              safeFlyTo(map, [sLat, sLng], targetZoom, { duration: 0.4 });
            }
          } catch (e) { console.warn('MapView flyTo error:', e); }
        }
      }, [selectedPin, sidebarWidth]);

      return <div ref={mapRef} style={{ width: '100%', height: '100%' }} />;
    };

    const ListView = ({ pins, collections, onSelectPin, isDarkMode, onEdit, onDelete, filters: filtersProp, setFilters: setFiltersProp }) => {
      const [sortBy, setSortBy] = useState('name');
      const [expandedCategories, setExpandedCategories] = useState({});
      // Allow filters to be controlled from parent (so the map can use the same filter set)
      const [localFilters, setLocalFilters] = useState({
        openNow: false,
        openAt: null,
        category: null,
        source: null,
        myRating: null,
        googleRating: null,
        vegetarian: false,
      });
      const filters = filtersProp || localFilters;
      const setFilters = setFiltersProp || setLocalFilters;
      const [showOpenAtPicker, setShowOpenAtPicker] = useState(false);
      const [openAtDay, setOpenAtDay] = useState('mon');
      const [openAtTime, setOpenAtTime] = useState('12:00');

      // Group pins by category
      const grouped = useMemo(() => {
        let result = [...pins];

        // Apply filters
        if (filters.openNow) {
          result = result.filter(p => {
            const status = getOpenStatus(p.opening_hours || {});
            return status.status === 'open';
          });
        }
        if (filters.openAt) {
          result = result.filter(p => {
            const day = filters.openAt.day;
            const hours = (p.opening_hours || {})[day];
            // No time specified → just check the place has any hours that day
            if (!filters.openAt.time) {
              if (!hours) return false;
              return !/^(closed|close)$/i.test(String(hours).trim());
            }
            const dayIndex = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'].indexOf(day);
            const [h, m] = filters.openAt.time.split(':').map(Number);
            const targetDate = new Date();
            const currentDay = targetDate.getDay();
            const diff = dayIndex - currentDay;
            targetDate.setDate(targetDate.getDate() + diff);
            targetDate.setHours(h, m, 0, 0);
            const status = getOpenStatus(p.opening_hours || {}, targetDate);
            return status.status === 'open';
          });
        }
        if (filters.category) {
          result = result.filter(p => p.category === filters.category);
        }
        if (filters.vegetarian) {
          result = result.filter(p => !!p.is_vegetarian);
        }
        if (filters.source) {
          result = result.filter(p => p.source_name === filters.source);
        }
        if (filters.myRating) {
          result = result.filter(p => (p.personal_rating || 0) >= filters.myRating);
        }
        if (filters.googleRating) {
          result = result.filter(p => (p.google_rating || 0) >= filters.googleRating);
        }

        // Sort
        switch (sortBy) {
          case 'name':
            result.sort((a, b) => a.name.localeCompare(b.name));
            break;
          case 'date':
            result.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            break;
          case 'rating':
            result.sort((a, b) => (b.google_rating || 0) - (a.google_rating || 0));
            break;
          case 'my-rating':
            result.sort((a, b) => (b.personal_rating || 0) - (a.personal_rating || 0));
            break;
          default:
            break;
        }

        // Merge co-located pins (same coordinates) into groups
        const coordGroupMap = {};
        result.forEach(pin => {
          const key = `${parseFloat(pin.lat).toFixed(4)},${parseFloat(pin.lng).toFixed(4)}`;
          if (!coordGroupMap[key]) coordGroupMap[key] = [];
          coordGroupMap[key].push(pin);
        });
        // Keep only the first pin per co-located group, attach group info
        const seen = new Set();
        const deduped = [];
        result.forEach(pin => {
          const key = `${parseFloat(pin.lat).toFixed(4)},${parseFloat(pin.lng).toFixed(4)}`;
          if (seen.has(key)) return;
          seen.add(key);
          const group = coordGroupMap[key];
          // Sort group chronologically
          group.sort((a, b) => {
            const da = a.reservation_details?.check_in ? new Date(a.reservation_details.check_in) : new Date(9999, 0);
            const db = b.reservation_details?.check_in ? new Date(b.reservation_details.check_in) : new Date(9999, 0);
            return da - db;
          });
          const representative = group.length > 1 ? pickRelevantPin(group) : group[0];
          deduped.push({ ...representative, _coLocatedGroup: group.length > 1 ? group : null });
        });

        // Group by category
        const groups = {};
        deduped.forEach(pin => {
          const catId = pin.category || 'other';
          if (!groups[catId]) {
            groups[catId] = [];
          }
          groups[catId].push(pin);
        });

        return groups;
      }, [pins, sortBy, filters]);

      // Get unique categories that have pins
      const categories = useMemo(() => {
        return Object.keys(grouped).map(catId => ({
          id: catId,
          ...PIN_CATEGORIES[catId]
        })).sort((a, b) => a.label.localeCompare(b.label));
      }, [grouped]);

      const toggleCategory = (catId) => {
        setExpandedCategories(prev => ({
          ...prev,
          [catId]: !prev[catId]
        }));
      };

      const sources = [...new Set(pins.map(p => p.source_name).filter(Boolean))];

      return (
        <div className="h-full overflow-y-auto pb-20">
          {/* Controls — pt-16 so sticky header clears the floating search bar (~64px) above */}
          <div className={`sticky top-0 ${isDarkMode ? 'bg-slate-900' : 'bg-white'} border-b dark:border-slate-700 px-4 pt-16 pb-4 space-y-3 z-10`}>
            <select
              value={sortBy}
              onChange={e => setSortBy(e.target.value)}
              className="w-full pl-3 pr-9 py-2 border rounded dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm"
            >
              <option value="name">Sort by Name</option>
              <option value="date">Sort by Date Added</option>
              <option value="rating">Sort by Rating</option>
              <option value="my-rating">Sort by My Rating</option>
            </select>

            <div className="space-y-2">
              <label className="text-xs font-semibold text-gray-600 dark:text-gray-400 block">Filters</label>
              <div className="flex flex-wrap gap-2">
                <button
                  onClick={() => setFilters(f => ({ ...f, vegetarian: !f.vegetarian }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium transition ${
                    filters.vegetarian
                      ? 'bg-green-700 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                  title="Only show vegetarian-friendly pins"
                >
                  🌱 Veg
                </button>
                {sources.length > 0 && (
                  <select
                    value={filters.source || ''}
                    onChange={e => setFilters(f => ({ ...f, source: e.target.value || null }))}
                    className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                      filters.source
                        ? 'bg-purple-600 text-white'
                        : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                    }`}
                    style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                  >
                    <option value="">Source</option>
                    {sources.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                )}
                <select
                  value={filters.category || ''}
                  onChange={e => setFilters(f => ({ ...f, category: e.target.value || null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                    filters.category
                      ? 'bg-orange-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                  style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                >
                  <option value="">Category</option>
                  {Object.entries(PIN_CATEGORIES).map(([id, cat]) => (
                    <option key={id} value={id}>{cat.icon} {cat.label}</option>
                  ))}
                </select>
                <select
                  value={filters.myRating || ''}
                  onChange={e => setFilters(f => ({ ...f, myRating: e.target.value ? parseInt(e.target.value) : null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                    filters.myRating
                      ? 'bg-yellow-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                  style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                >
                  <option value="">My Rating</option>
                  <option value="1">★ 1+</option>
                  <option value="2">★ 2+</option>
                  <option value="3">★ 3+</option>
                  <option value="4">★ 4+</option>
                  <option value="5">★ 5</option>
                </select>
                <select
                  value={filters.googleRating || ''}
                  onChange={e => setFilters(f => ({ ...f, googleRating: e.target.value ? parseFloat(e.target.value) : null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium border-0 appearance-none cursor-pointer transition ${
                    filters.googleRating
                      ? 'bg-blue-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                  style={{ paddingRight: '1.5rem', backgroundImage: 'url("data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3e%3cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3e%3c/svg%3e")', backgroundRepeat: 'no-repeat', backgroundPosition: 'right 0.3rem center', backgroundSize: '1rem' }}
                >
                  <option value="">Google Rating</option>
                  <option value="3">3+ ★</option>
                  <option value="3.5">3.5+ ★</option>
                  <option value="4">4+ ★</option>
                  <option value="4.5">4.5+ ★</option>
                </select>
                {/* Time-based filters last so the day/time picker that expands below sits directly beneath them */}
                <button
                  onClick={() => setFilters(f => ({ ...f, openNow: !f.openNow, openAt: f.openNow ? f.openAt : null }))}
                  className={`px-3 py-1 rounded-full text-xs font-medium transition ${
                    filters.openNow
                      ? 'bg-green-600 text-white'
                      : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300'
                  }`}
                >
                  Open Now
                </button>
                <button
                  onClick={() => {
                    if (filters.openAt) {
                      setFilters(f => ({ ...f, openAt: null }));
                      setShowOpenAtPicker(false);
                    } else {

        mapInstanceRef.current = map;

        const tileUrl = isDarkMode
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
          : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';
        L.tileLayer(tileUrl, {
          attribution: '\u00a9 OpenStreetMap \u00a9 CARTO',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(map);

        // Destination emoji marker
        const icon = L.divIcon({
          html: isCustomIcon(pin.emoji) ? `<div class="emoji-pin"><img src="${pin.emoji}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;" /></div>` : `<div class="emoji-pin">${pin.emoji}</div>`,
          iconSize: [32, 32], iconAnchor: [16, 16],
          className: 'emoji-marker'

        L.marker([pin.lat, pin.lng], { icon }).addTo(map);

        // Try to get user location and show route
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            const userLat = pos.coords.latitude;
            const userLng = pos.coords.longitude;
            L.circleMarker([userLat, userLng], { radius: 8, fillColor: '#4285F4', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(map);

          }, () => {});

        return () => { map.remove(); };

            setLoginError('This domain is not authorized in Firebase. Add it under Authentication → Settings → Authorized domains.');

        'thailand': [U('photo-1552465011-b4e21bf6e79a'), U('photo-1528181304800-259b08848526')],
      };

      const getCoverForName = (name, index = 0) => {
        const key = name.toLowerCase().trim();
        let covers = DESTINATION_COVERS[key];
        if (!covers) {
          for (const [dest, urls] of Object.entries(DESTINATION_COVERS)) {
            if (key.includes(dest) || dest.includes(key)) { covers = urls; break; }
          }
        }
        if (!covers || covers.length === 0) return null;
        return covers[index % covers.length];
      };

      const getCoversForName = (name) => {
        const key = name.toLowerCase().trim();
        let covers = DESTINATION_COVERS[key];
        if (!covers) {
          for (const [dest, urls] of Object.entries(DESTINATION_COVERS)) {
            if (key.includes(dest) || dest.includes(key)) { covers = urls; break; }
          }
        }
        return covers || [];

      // Generate a map tile URL from lat/lng for collection cover
      const getMapTileCover = (lat, lng, zoom = 12) => {
        const n = Math.pow(2, zoom);
        const xtile = Math.floor((lng + 180) / 360 * n);
        const ytile = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * n);
        return `https://a.basemaps.cartocdn.com/rastertiles/voyager/${zoom}/${xtile}/${ytile}@2x.png`;

        const photos = covers.map((url, i) => ({
          url, thumb: url, label: `${query} — option ${i + 1}`, credit: 'Unsplash',
        }));
        setPhotoResults(photos);

        fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=2`)

          .then(data => {
            const results = [];
            (data.features || []).slice(0, 1).forEach(f => {
              const [lng, lat] = f.geometry?.coordinates || [];
              if (!lat || !lng) return;
              const name = f.properties?.name || query;

                results.push({
                  url: getMapTileCover(lat, lng, z),

        if (!newCollectionName.trim()) return;

        // Create collection immediately
        const newCol = {
          id,
          name,
          cover_image: hardcodedCover || null,
          created_at: new Date().toISOString()

        onCreateCollection(newCol);
        setNewCollectionName('');
        setShowCreateDialog(false);

        // If no hardcoded cover, geocode and generate a map tile cover
        if (!hardcodedCover) {
          fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(name)}&limit=1`)

            .then(data => {
              const f = data.features?.[0];
              if (f && f.geometry?.coordinates) {
                const [lng, lat] = f.geometry.coordinates;
                const coverUrl = getMapTileCover(lat, lng, 11);
                // Update the collection with the cover
                onCreateCollection({ ...newCol, cover_image: coverUrl, _update: true });

                        />
                        <button

                          <div className="grid grid-cols-3 gap-2">
                            {photoResults.map((r, i) => (
                              <button
                                key={`photo-${i}`}
                                onClick={() => handleCoverSave(r.url)}
                                className="rounded-lg overflow-hidden border-2 border-transparent hover:border-blue-500 transition relative"
                              >
                                <img src={r.thumb} alt={r.label || ''} className="w-full h-20 object-cover" loading="lazy" />
                                {r.credit && (

                      {/* Map tile options */}

                    <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">

    // ==================== MAIN APP ====================
    // ==================== ITINERARY PLANNER ====================

    const generateId = () => Math.random().toString(36).substr(2, 9) + Date.now().toString(36);

    // Format date as "Mon, May 11"
    const formatDayDate = (dateStr) => {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    };

    // Generate array of dates between start and end (inclusive)
    const generateDateRange = (start, end) => {
      const dates = [];
      const d = new Date(start + 'T12:00:00');
      const endD = new Date(end + 'T12:00:00');
      while (d <= endD) {
        dates.push(d.toISOString().split('T')[0]);
        d.setDate(d.getDate() + 1);
      }
      return dates;
    };

    // ---- StartingPointPicker ----
    const StartingPointPicker = ({ pins, currentPoint, onSelect, onClose, isDarkMode }) => {
      const [search, setSearch] = useState('');
      const [addressResults, setAddressResults] = useState([]);
      const [addrLoading, setAddrLoading] = useState(false);
      const timerRef = useRef(null);

      const hotelPins = pins.filter(p => p.category === 'hotel' || p.emoji === '🏨');
      const pinMatches = search
        ? pins.filter(p => p.name.toLowerCase().includes(search.toLowerCase()))
        : hotelPins;

      // Debounced Photon lookup for any place/address (matches AddressAutocomplete)
      useEffect(() => {
        clearTimeout(timerRef.current);
        if (search.length < 3) { setAddressResults([]); setAddrLoading(false); return; }
        setAddrLoading(true);
        timerRef.current = setTimeout(() => {
          fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(search)}&limit=5`)
            .then(r => r.json())
            .then(data => {
              const results = (data.features || []).map(f => {
                const p = f.properties || {};
                const geo = f.geometry?.coordinates || [];
                const parts = [p.housenumber, p.street].filter(Boolean).join(' ');
                const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
                return {
                  label: p.name || [parts, locality].filter(Boolean).join(', ') || search,
                  address: [p.name, parts, locality].filter(Boolean).join(', '),
                  lat: geo[1],
                  lng: geo[0],
                };
              }).filter(r => r.lat && r.lng);
              setAddressResults(results);
              setAddrLoading(false);
            })
            .catch(() => { setAddrLoading(false); });
        }, 300);
        return () => clearTimeout(timerRef.current);
      }, [search]);

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 10001 }} onClick={onClose}>
          <div className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-sm shadow-2xl`} onClick={e => e.stopPropagation()}>
            <div className="p-4 space-y-3">

                <h3 className="font-bold dark:text-white">Starting Point</h3>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded"><CloseIcon /></button>
              </div>
              <input
                type="text"
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="Search pins or any address..."
                className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white"
              />
              <div className="max-h-80 overflow-y-auto space-y-1">
                {/* Pin matches */}
                {pinMatches.length > 0 && (
                  <div>
                    <p className="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wide px-1 pt-1 pb-0.5">Your pins</p>
                    {pinMatches.map(pin => (
                      <button
                        key={pin.id}
                        onClick={() => { onSelect({ pin_id: pin.id, label: pin.name, lat: pin.lat, lng: pin.lng, emoji: pin.emoji }); onClose(); }}
                        className={`w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 hover:bg-gray-100 dark:hover:bg-slate-700 ${currentPoint?.pin_id === pin.id ? 'bg-blue-50 dark:bg-blue-900/30 ring-1 ring-blue-400' : ''}`}
                      >
                        <span>{pin.emoji || '📌'}</span>
                        <span className="truncate dark:text-white">{pin.name}</span>
                      </button>
                    ))}
                  </div>
                )}

                {/* Address results */}
                {search.length >= 3 && (
                  <div>
                    <p className="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wide px-1 pt-2 pb-0.5">Places & addresses</p>

                    {!addrLoading && addressResults.length === 0 && pinMatches.length === 0 && (
                      <p className="text-sm text-gray-400 text-center py-4">No results</p>

                      <button
                        key={i}
                        onClick={() => { onSelect({ pin_id: null, label: r.label, address: r.address, lat: r.lat, lng: r.lng, emoji: '📍' }); onClose(); }}

                      >
                        <span>📍</span>
                        <span className="flex-1 min-w-0">
                          <span className="block font-medium truncate dark:text-white">{r.label}</span>
                          {r.address && r.address !== r.label && (
                            <span className="block text-xs text-gray-500 dark:text-gray-400 truncate">{r.address}</span>
                          )}
                        </span>
                      </button>
                    ))}
                  </div>
                )}

                {!search && pinMatches.length === 0 && (
                  <p className="text-sm text-gray-400 text-center py-4">Type to search pins or any address</p>
                )}
              </div>
            </div>
          </div>
        </div>
      );

    // ---- ItineraryItemForm (add/edit modal) ----
    const ItineraryItemForm = ({ item, pins, onSave, onClose, isDarkMode }) => {
      const [type, setType] = useState(item?.type || 'pin');
      const [selectedPinId, setSelectedPinId] = useState(item?.pin_id || '');
      const [name, setName] = useState(item?.name || '');
      const [emoji, setEmoji] = useState(item?.emoji || '📌');
      const [scheduledTime, setScheduledTime] = useState(item?.scheduled_time || '');
      // Allow empty duration for arrival markers / instant items. Default blank — user picks per-item.
      const [duration, setDuration] = useState(
        item?.estimated_duration_minutes != null && item.estimated_duration_minutes !== 0
          ? String(item.estimated_duration_minutes)
          : ''
      );
      const [description, setDescription] = useState(item?.description || '');
      const [pinSearch, setPinSearch] = useState('');

      // If a meal preset passed an anchor location (e.g. "sort by proximity to my 12:30 item"),
      // filter to food-like pins and sort by distance.
      const mealMode = item?.__mealCategories || null; // array of categories to filter
      const anchorLat = item?.__anchorLat;
      const anchorLng = item?.__anchorLng;
      const haversine = (lat1, lng1, lat2, lng2) => {
        const R = 6371;
        const toRad = x => x * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLng = toRad(lng2 - lng1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
        return 2 * R * Math.asin(Math.sqrt(a));
      };
      let filteredPins;
      if (pinSearch) {
        filteredPins = pins.filter(p => p.name.toLowerCase().includes(pinSearch.toLowerCase()));
      } else if (mealMode && mealMode.length > 0) {
        const foodPins = pins.filter(p => mealMode.includes(p.category));
        if (anchorLat != null && anchorLng != null && foodPins.length > 0) {
          filteredPins = foodPins
            .map(p => ({ ...p, __dist: p.lat && p.lng ? haversine(anchorLat, anchorLng, p.lat, p.lng) : Infinity }))
            .sort((a, b) => a.__dist - b.__dist)
            .slice(0, 30);
        } else {
          filteredPins = foodPins.slice(0, 30);
        }
      } else {
        filteredPins = pins.slice(0, 20);
      }

      const handleSave = () => {
        let lat = item?.lat || 0, lng = item?.lng || 0;
        let finalName = name;
        let finalEmoji = emoji;
        if (type === 'pin' && selectedPinId) {
          const pin = pins.find(p => p.id === selectedPinId);
          if (pin) {
            lat = pin.lat; lng = pin.lng;
            finalName = finalName || pin.name;
            finalEmoji = pin.emoji || finalEmoji;
          }
        }
        // Strip transient hint fields that shouldn't be persisted
        const base = { ...(item || {}) };
        delete base.__mealCategories;
        delete base.__anchorLat;
        delete base.__anchorLng;
        onSave({
          ...base,
          id: item?.id || generateId(),
          type, pin_id: type === 'pin' ? selectedPinId : null,
          name: finalName, emoji: finalEmoji,
          scheduled_time: scheduledTime,
          estimated_duration_minutes: duration === '' ? 0 : (parseInt(duration) || 0),
          description, lat, lng,
        });
        onClose();
      };

      const mealEmojis = ['🍱', '🍜', '🍣', '☕', '🍵', '🍺', '🍦', '🥐'];

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 10001 }} onClick={onClose}>
          <div className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-md shadow-2xl`} onClick={e => e.stopPropagation()}>
            <div className="p-4 space-y-3 max-h-[85vh] overflow-y-auto">
              <div className="flex items-center justify-between">
                <h3 className="font-bold dark:text-white">{item?.id ? 'Edit Item' : 'Add to Day'}</h3>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded"><CloseIcon /></button>
              </div>

              {/* Type tabs */}
              <div className="flex gap-1 bg-gray-100 dark:bg-slate-800 rounded-lg p-1">
                {[['pin', '📌 Pin'], ['meal', '🍽️ Meal'], ['entry', '✏️ Custom']].map(([t, label]) => (
                  <button key={t} onClick={() => { setType(t); if (t === 'meal' && !name) { setEmoji('🍱'); setName(''); } }}
                    className={`flex-1 text-sm py-1.5 rounded-md font-medium transition ${type === t ? 'bg-white dark:bg-slate-700 shadow text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-400'}`}>
                    {label}
                  </button>
                ))}
              </div>

              {/* Pin selector */}
              {type === 'pin' && (
                <div className="space-y-2">
                  {mealMode && !pinSearch && (
                    <p className="text-xs text-blue-600 dark:text-blue-400 flex items-center gap-1">
                      <span>📍</span> Nearby food pins{anchorLat != null ? ' (sorted by distance)' : ''}
                    </p>
                  )}
                  <input
                    type="text" value={pinSearch} onChange={e => setPinSearch(e.target.value)}
                    placeholder={mealMode ? 'Search all pins…' : 'Search your pins...'}
                    className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white"
                  />
                  <div className="max-h-56 overflow-y-auto space-y-1 border rounded-lg dark:border-slate-700 p-1">
                    {filteredPins.length === 0 && (
                      <p className="text-xs text-gray-400 text-center py-3">
                        {mealMode ? 'No food pins yet — add some restaurants to your map first.' : 'No pins found'}
                      </p>
                    )}
                    {filteredPins.map(pin => (
                      <button key={pin.id}
                        onClick={() => { setSelectedPinId(pin.id); setName(pin.name); setEmoji(pin.emoji || '📌'); }}
                        className={`w-full text-left px-2 py-1.5 rounded text-sm flex items-center gap-2 hover:bg-gray-100 dark:hover:bg-slate-700 ${selectedPinId === pin.id ? 'bg-blue-50 dark:bg-blue-900/30 ring-1 ring-blue-400' : ''}`}>
                        <span>{pin.emoji || '📌'}</span>
                        <span className="truncate dark:text-white flex-1 min-w-0">{pin.name}</span>
                        {pin.__dist != null && pin.__dist !== Infinity && (
                          <span className="text-[10px] text-gray-400 flex-shrink-0">{pin.__dist < 1 ? `${Math.round(pin.__dist * 1000)}m` : `${pin.__dist.toFixed(1)}km`}</span>
                        )}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Meal emoji picker */}
              {type === 'meal' && (
                <div className="space-y-2">
                  <label className="text-xs font-medium text-gray-500 dark:text-gray-400">Meal type</label>
                  <div className="flex gap-1 flex-wrap">
                    {mealEmojis.map(e => (
                      <button key={e} onClick={() => setEmoji(e)}
                        className={`text-xl p-1.5 rounded-lg transition ${emoji === e ? 'bg-blue-100 dark:bg-blue-900/40 ring-1 ring-blue-400' : 'hover:bg-gray-100 dark:hover:bg-slate-700'}`}>
                        {e}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Name */}
              <div>
                <label className="text-xs font-medium text-gray-500 dark:text-gray-400">Name</label>
                <input type="text" value={name} onChange={e => setName(e.target.value)}
                  placeholder={type === 'meal' ? 'e.g. Lunch at Tsukiji' : 'Item name'}
                  className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white" />
              </div>

              {/* Time + Duration */}
              <div className="flex gap-3">
                <div className="flex-1">
                  <label className="text-xs font-medium text-gray-500 dark:text-gray-400">Time</label>
                  <input type="time" value={scheduledTime} onChange={e => setScheduledTime(e.target.value)}
                    className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white" />
                </div>
                <div className="w-28">
                  <label className="text-xs font-medium text-gray-500 dark:text-gray-400">Duration (min)</label>
                  <input type="number" value={duration} onChange={e => setDuration(e.target.value)} min="0" step="5"
                    placeholder="—"
                    className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white" />
                  <p className="text-[10px] text-gray-400 mt-0.5">Leave blank for marker</p>
                </div>
              </div>

              {/* Notes */}
              <div>
                <label className="text-xs font-medium text-gray-500 dark:text-gray-400">Notes</label>
                <textarea value={description} onChange={e => setDescription(e.target.value)} rows={2}
                  className="w-full px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white resize-none" />
              </div>

              <button onClick={handleSave}
                className="w-full py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                {item?.id ? 'Save Changes' : 'Add Item'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ---- Single Itinerary Item Row ----
    const ItineraryItemRow = ({ item, index, isDarkMode, onEdit, onDelete, onDragStart, onDragOver, onDrop, isDragTarget, transitInfo, onFlyTo, autoTime }) => {
      const [confirmDelete, setConfirmDelete] = useState(false);

      // If item has its own scheduled_time, prefer that. Otherwise fall back to auto-computed time from day start.
      const timeStr = item.scheduled_time || autoTime || '';
      const isAutoTime = !item.scheduled_time && !!autoTime;
      const formatTime = (t) => {
        if (!t) return '';
        const [h, m] = t.split(':');
        const hr = parseInt(h);
        const ampm = hr >= 12 ? 'PM' : 'AM';
        return `${hr % 12 || 12}:${m} ${ampm}`;
      };

      return (
        <React.Fragment>
          {/* Transit info between items */}
          {transitInfo && transitInfo.estimated_time_minutes != null && (
            <div className="flex items-center gap-1.5 py-1 px-3 text-xs text-gray-400 dark:text-gray-500">
              <div className="flex-1 border-t dark:border-slate-700 border-dashed"></div>
              {transitInfo.all_modes && Object.keys(transitInfo.all_modes).length > 1 ? (
                // Show all available modes as small pills
                Object.entries(transitInfo.all_modes).map(([mode, data]) => (
                  <span key={mode} className={`inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full ${mode === transitInfo.mode ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : ''}`}>
                    {mode === 'walking' ? '🚶' : mode === 'transit' ? '🚃' : '🚗'}
                    <span>{data.minutes}m</span>
                  </span>
                ))
              ) : (
                <>
                  <span>{transitInfo.mode === 'walking' ? '🚶' : transitInfo.mode === 'transit' ? '🚃' : '🚗'}</span>
                  <span>{transitInfo.estimated_time_minutes} min</span>
                </>
              )}
              {transitInfo.maps_url && (
                <a href={transitInfo.maps_url} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline ml-0.5">↗</a>
              )}
              <div className="flex-1 border-t dark:border-slate-700 border-dashed"></div>
            </div>
          )}

          {/* Item row */}
          <div
            draggable
            onDragStart={(e) => { e.dataTransfer.effectAllowed = 'move'; onDragStart(item.id); }}
            onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; onDragOver(index); }}
            onDrop={(e) => { e.preventDefault(); onDrop(index); }}
            className={`group flex items-center gap-2 px-2 py-2 rounded-lg cursor-grab active:cursor-grabbing transition ${
              isDragTarget ? 'bg-blue-50 dark:bg-blue-900/20 ring-1 ring-blue-400 ring-dashed' : 'hover:bg-gray-50 dark:hover:bg-slate-700/50'
            }`}
          >
            {/* Drag handle */}
            <div className="flex flex-col gap-0.5 opacity-30 group-hover:opacity-60 px-0.5 flex-shrink-0 touch-none" style={{ cursor: 'grab' }}>
              <div className="w-3 h-0.5 bg-gray-400 rounded"></div>
              <div className="w-3 h-0.5 bg-gray-400 rounded"></div>
              <div className="w-3 h-0.5 bg-gray-400 rounded"></div>
            </div>

            {/* Emoji */}
            <span className="text-lg flex-shrink-0 cursor-pointer hover:scale-110 transition-transform" onClick={() => item.lat && onFlyTo?.(item.lat, item.lng)}>{item.emoji || '📌'}</span>

            {/* Content */}
            <div className="flex-1 min-w-0 cursor-pointer" onClick={() => item.lat && onFlyTo?.(item.lat, item.lng)}>
              <div className="flex items-center gap-2">
                {timeStr && <span className={`text-xs font-mono flex-shrink-0 ${isAutoTime ? 'text-gray-400 dark:text-gray-500 italic' : 'text-blue-600 dark:text-blue-400'}`} title={isAutoTime ? 'Auto-scheduled from day start' : 'Scheduled time'}>{formatTime(timeStr)}</span>}
                <span className="text-sm font-medium truncate dark:text-white">{item.name || 'Untitled'}</span>
              </div>
              {item.estimated_duration_minutes > 0 && (
                <span className="text-xs text-gray-400">{item.estimated_duration_minutes} min</span>
              )}
            </div>

            {/* Actions */}
            <div className="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition flex-shrink-0">
              <button onClick={() => onEdit(item)} className="p-1 hover:bg-gray-200 dark:hover:bg-slate-600 rounded text-gray-500">
                <PencilIcon />
              </button>
              {!confirmDelete ? (
                <button onClick={() => setConfirmDelete(true)} className="p-1 hover:bg-red-100 dark:hover:bg-red-900/30 rounded text-gray-500 hover:text-red-500">
                  <TrashIcon />
                </button>
              ) : (
                <div className="flex items-center gap-0.5">
                  <button onClick={() => setConfirmDelete(false)} className="p-1 hover:bg-gray-200 dark:hover:bg-slate-600 rounded text-xs">✕</button>
                  <button onClick={() => onDelete(item.id)} className="p-1 hover:bg-red-100 dark:hover:bg-red-900/30 rounded text-xs text-red-500 font-bold">✓</button>
                </div>
              )}
            </div>
          </div>
        </React.Fragment>
      );
    };

    // ---- DayView (single day card) ----
    const DayView = ({ day, items, pins, isDarkMode, onUpdateItems, onDeleteItem, onAddItem, onEditItem, onSetStartingPoint, onSetStartTime, onDeleteDay, isExpanded, onToggle, onFlyTo, transitError, onRecalcTransit }) => {
      const [dragItemId, setDragItemId] = useState(null);
      const [dragOverIndex, setDragOverIndex] = useState(null);
      const [showStartPicker, setShowStartPicker] = useState(false);
      const [confirmDeleteDay, setConfirmDeleteDay] = useState(false);
      const [editingStartTime, setEditingStartTime] = useState(false);
      const [startTimeDraft, setStartTimeDraft] = useState(day.start_time || '');

      // Separate ordered items (have scheduled_time) and unordered.
      // If the day has a start_time and items are in order_in_day order without explicit times,
      // auto-compute scheduled times for display: start_time + cumulative (transit + duration).
      const itemsByOrder = [...items].sort((a, b) => (a.order_in_day || 0) - (b.order_in_day || 0));
      const orderedItems = items.filter(i => i.scheduled_time).sort((a, b) => a.scheduled_time.localeCompare(b.scheduled_time));
      const unorderedItems = items.filter(i => !i.scheduled_time);
      const allSorted = orderedItems.length > 0 ? [...orderedItems, ...unorderedItems] : itemsByOrder;

      // Compute auto-scheduled times when day has a start_time
      const autoTimes = {};
      if (day.start_time && itemsByOrder.length > 0) {
        const [sh, sm] = day.start_time.split(':').map(Number);
        let cursor = sh * 60 + sm;
        for (const it of itemsByOrder) {
          // Add transit BEFORE this item (transit_info travel time to reach this item)
          const transitMin = it.transit_info?.estimated_time_minutes || 0;
          cursor += transitMin;
          const hh = Math.floor(cursor / 60) % 24;
          const mm = cursor % 60;
          autoTimes[it.id] = `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
          cursor += (it.estimated_duration_minutes || 0);
        }
      }

      const totalActivityMin = items.reduce((sum, i) => sum + (i.estimated_duration_minutes || 0), 0);
      const totalTransitMin = items.reduce((sum, i) => sum + (i.transit_info?.estimated_time_minutes || 0), 0);
      const totalMinutes = totalActivityMin + totalTransitMin;
      const totalHrs = Math.floor(totalMinutes / 60);
      const totalMins = totalMinutes % 60;

      const handleDrop = (targetIndex) => {
        if (dragItemId == null) return;
        const draggedIdx = allSorted.findIndex(i => i.id === dragItemId);
        if (draggedIdx === -1 || draggedIdx === targetIndex) { setDragItemId(null); setDragOverIndex(null); return; }

        const reordered = [...allSorted];
        const [removed] = reordered.splice(draggedIdx, 1);
        reordered.splice(targetIndex, 0, removed);

        // Reassign times based on order for those that had times, leave unscheduled ones alone
        onUpdateItems(reordered.map((item, i) => ({
          ...item,
          order_in_day: i,
        })));
        setDragItemId(null);
        setDragOverIndex(null);
      };

      // Drop from external (pin detail sheet adds items via this)
      const handleExternalDrop = (e) => {
        e.preventDefault();
        const pinId = e.dataTransfer.getData('text/pin-id');
        if (pinId) {
          const pin = pins.find(p => p.id === pinId);
          if (pin) {
            onAddItem({
              id: generateId(),
              type: 'pin', pin_id: pin.id,
              name: pin.name, emoji: pin.emoji || '📌',
              lat: pin.lat, lng: pin.lng,
              estimated_duration_minutes: 0,
              order_in_day: items.length,
              scheduled_time: '', description: '',
            });
          }
        }
      };

      return (
        <div
          className={`border rounded-xl dark:border-slate-700 overflow-hidden transition-all ${isExpanded ? '' : ''}`}
          onDragOver={(e) => { if (e.dataTransfer.types.includes('text/pin-id')) e.preventDefault(); }}
          onDrop={handleExternalDrop}
        >
          {/* Day header */}
          <button
            onClick={onToggle}
            className="w-full flex items-center justify-between px-3 py-2.5 bg-gray-50 dark:bg-slate-800/80 hover:bg-gray-100 dark:hover:bg-slate-700/80 transition text-left"
          >
            <div className="flex items-center gap-2 min-w-0">
              <span className="text-xs font-bold text-gray-400 dark:text-gray-500 flex-shrink-0">D{day.day_number}</span>
              <span className="text-sm font-semibold dark:text-white flex-shrink-0">{formatDayDate(day.date)}</span>
            </div>
            <div className="flex items-center gap-2">
              <span className="text-xs text-gray-400">{items.length} item{items.length !== 1 ? 's' : ''}{totalMinutes > 0 ? ` · ${totalHrs > 0 ? totalHrs + 'h ' : ''}${totalMins > 0 ? totalMins + 'm' : ''}` : ''}{totalTransitMin > 0 ? ` (${totalTransitMin}m travel)` : ''}</span>
              <span className={`text-gray-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`}>▾</span>
            </div>
          </button>

          {/* Expanded content */}
          {isExpanded && (
            <div className="p-2 space-y-1">
              {/* Starting point + start time */}
              <div className="flex items-center gap-1">
                <button
                  onClick={() => setShowStartPicker(true)}
                  className="flex-1 text-left px-2 py-1.5 rounded-lg text-xs text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-700/50 border border-dashed dark:border-slate-700 flex items-center gap-2"
                >
                  {day.starting_point?.label ? (
                    <><span>{day.starting_point.emoji || '🏨'}</span> Start: {day.starting_point.label}</>
                  ) : (
                    <><span>📍</span> Set starting point...</>
                  )}
                </button>
                {/* Start time chip */}
                {!editingStartTime ? (
                  <button
                    onClick={() => { setStartTimeDraft(day.start_time || ''); setEditingStartTime(true); }}
                    className="px-2 py-1.5 rounded-lg text-xs border border-dashed dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700/50 text-gray-500 dark:text-gray-400 flex items-center gap-1 flex-shrink-0"
                    title="Set start time for this day (auto-schedules items)"
                  >
                    🕐 {day.start_time ? day.start_time : 'Time'}
                  </button>
                ) : (
                  <div className="flex items-center gap-0.5 flex-shrink-0">
                    <input
                      type="time"
                      value={startTimeDraft}
                      onChange={e => setStartTimeDraft(e.target.value)}
                      autoFocus
                      className="px-1 py-1 text-xs border rounded dark:bg-slate-800 dark:border-slate-700 dark:text-white"
                    />
                    <button
                      onClick={() => { onSetStartTime(day.id, startTimeDraft); setEditingStartTime(false); }}
                      className="px-1.5 py-1 text-xs text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded"
                    >✓</button>
                    <button
                      onClick={() => { onSetStartTime(day.id, ''); setEditingStartTime(false); }}
                      className="px-1.5 py-1 text-xs text-gray-400 hover:text-gray-600 hover:bg-gray-100 dark:hover:bg-slate-700 rounded"
                      title="Clear"
                    >✕</button>
                  </div>
                )}
              </div>

              {/* Transit-fetch error notice (shown once if any segment failed) */}
              {transitError && (
                <div className="text-xs text-amber-600 dark:text-amber-400 px-2 py-1 bg-amber-50 dark:bg-amber-900/20 rounded">
                  ⚠️ Travel times unavailable — {transitError}
                </div>
              )}

              {/* Quick-add meal slots — clicking opens the form with nearby food pins sorted by distance */}
              <div className="flex gap-1 flex-wrap pb-0.5">
                {[
                  // target: middle of the eating window; used to find the day's item closest to meal time
                  { name: 'Breakfast', emoji: '🥐', time: '09:30', targetMin: 9 * 60 + 30 },
                  { name: 'Lunch',     emoji: '🍱', time: '12:30', targetMin: 12 * 60 + 30 },
                  { name: 'Dinner',    emoji: '🍽️', time: '18:00', targetMin: 18 * 60 },
                ].map(meal => (
                  <button
                    key={meal.name}
                    onClick={() => {
                      // Pick an anchor: the item whose (auto-)scheduled time is closest to the meal's target.
                      // Fallback to day starting_point, then last item with coordinates.
                      let anchor = null;
                      const timedItems = itemsByOrder
                        .map(it => {
                          const t = it.scheduled_time || autoTimes[it.id];
                          if (!t || !/^\d{2}:\d{2}$/.test(t)) return null;
                          const [h, m] = t.split(':').map(Number);
                          return { item: it, mins: h * 60 + m };
                        })
                        .filter(Boolean);
                      if (timedItems.length > 0) {
                        timedItems.sort((a, b) => Math.abs(a.mins - meal.targetMin) - Math.abs(b.mins - meal.targetMin));
                        const best = timedItems[0].item;
                        if (best.lat && best.lng) anchor = { lat: best.lat, lng: best.lng };
                      }
                      if (!anchor && day.starting_point?.lat) {
                        anchor = { lat: day.starting_point.lat, lng: day.starting_point.lng };
                      }
                      if (!anchor) {
                        const last = [...itemsByOrder].reverse().find(i => i.lat && i.lng);
                        if (last) anchor = { lat: last.lat, lng: last.lng };
                      }
                      onAddItem({
                        __mealPreset: true,
                        __mealCategories: ['restaurant', 'coffee', 'treats', 'bar', 'food_market'],
                        __anchorLat: anchor?.lat,
                        __anchorLng: anchor?.lng,
                        type: 'pin',
                        name: meal.name,
                        emoji: meal.emoji,
                        scheduled_time: day.start_time ? '' : meal.time,
                        description: '',
                      });
                    }}
                    className="flex-1 min-w-[80px] text-xs px-2 py-1.5 rounded-lg border border-dashed dark:border-slate-700 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-700/50 hover:text-gray-700 hover:border-gray-400 transition flex items-center justify-center gap-1"
                    title={`Add ${meal.name.toLowerCase()} — suggests food pins near your other stops at this time`}
                  >
                    <span>{meal.emoji}</span>
                    <span>+ {meal.name}</span>
                  </button>
                ))}
              </div>

              {/* Ordered items */}
              {allSorted.map((item, idx) => (
                <ItineraryItemRow
                  key={item.id}
                  item={item}
                  index={idx}
                  isDarkMode={isDarkMode}
                  onEdit={onEditItem}
                  onDelete={onDeleteItem}
                  onDragStart={setDragItemId}
                  onDragOver={setDragOverIndex}
                  onDrop={handleDrop}
                  isDragTarget={dragOverIndex === idx && dragItemId !== item.id}
                  transitInfo={item.transit_info || null}
                  onFlyTo={onFlyTo}
                  autoTime={autoTimes[item.id]}
                />
              ))}

              {/* Unordered bucket label */}
              {unorderedItems.length > 0 && orderedItems.length > 0 && (
                <div className="text-xs text-gray-400 dark:text-gray-500 px-2 pt-1 border-t dark:border-slate-700 mt-1">
                  ↓ Unscheduled — drag up to set order, or set a time
                </div>
              )}

              {/* Add item button */}
              <button
                onClick={() => onAddItem(null)}
                className="w-full text-left px-2 py-1.5 rounded-lg text-xs text-gray-400 dark:text-gray-500 hover:bg-gray-50 dark:hover:bg-slate-700/50 border border-dashed dark:border-slate-700 flex items-center gap-1 mt-1"
              >
                <span>+</span> Add item
              </button>

              {/* Day footer actions */}
              <div className="flex items-center justify-between pt-1 border-t dark:border-slate-700 mt-1 gap-2 flex-wrap">
                <div className="flex items-center gap-2">
                  {totalTransitMin > 0 && (
                    <span className="text-xs text-gray-400 px-2 py-1">
                      📊 {items.length} stops · {Math.floor(totalActivityMin / 60) > 0 ? Math.floor(totalActivityMin / 60) + 'h ' : ''}{totalActivityMin % 60}m activities + {totalTransitMin}m travel
                    </span>
                  )}
                  {items.length >= 1 && onRecalcTransit && (
                    <button
                      onClick={() => onRecalcTransit(day.id)}
                      className="text-xs text-blue-500 hover:text-blue-600 px-2 py-1"
                      title="Recalculate walking / transit times via Google"
                    >🔄 Travel times</button>
                  )}
                </div>
                {!confirmDeleteDay ? (
                  <button onClick={() => setConfirmDeleteDay(true)} className="text-xs text-red-400 hover:text-red-500 px-2 py-1">Delete day</button>
                ) : (
                  <div className="flex items-center gap-1">
                    <button onClick={() => setConfirmDeleteDay(false)} className="text-xs px-2 py-1 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">Cancel</button>
                    <button onClick={() => onDeleteDay(day.id)} className="text-xs px-2 py-1 text-red-600 font-bold hover:text-red-700">Confirm</button>
                  </div>
                )}
              </div>
            </div>
          )}

          {showStartPicker && (
            <StartingPointPicker
              pins={pins}
              currentPoint={day.starting_point}
              onSelect={(pt) => onSetStartingPoint(day.id, pt)}
              onClose={() => setShowStartPicker(false)}
              isDarkMode={isDarkMode}
            />
          )}
        </div>
      );
    };

    // ---- Main ItineraryPlanner ----
    const ItineraryPlanner = ({ pins, collections, activeCollection, isDarkMode, isMobile, onFlyTo, onClose, pendingAddPin, onClearPendingAdd }) => {
      const [itineraries, setItineraries] = useState([]);
      const [activeItinerary, setActiveItinerary] = useState(null);
      const [days, setDays] = useState([]);
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [expandedDays, setExpandedDays] = useState({});
      const [editingItem, setEditingItem] = useState(null);  // null = closed, {} = new item for a day
      const [addingToDay, setAddingToDay] = useState(null);  // day_id we're adding to
      const [showNewItinerary, setShowNewItinerary] = useState(false);
      const collectionName = collections.find(c => c.id === activeCollection)?.name || '';
      const [newName, setNewName] = useState(collectionName);
      const [newStartDate, setNewStartDate] = useState('');
      const [newEndDate, setNewEndDate] = useState('');
      const [showDayPicker, setShowDayPicker] = useState(null); // pin object to add via day picker

      const collectionPins = pins.filter(p => p.collection_id === activeCollection);

      // Load itineraries for this collection
      useEffect(() => {
        setLoading(true);
        MockFirebase.loadItineraries(activeCollection).then(itins => {
          setItineraries(itins);
          if (itins.length > 0) {
            setActiveItinerary(itins[0]);
          }
          setLoading(false);
        });
      }, [activeCollection]);

      // Load days + items when active itinerary changes
      useEffect(() => {
        if (!activeItinerary) { setDays([]); setItems([]); return; }
        Promise.all([
          MockFirebase.loadDays(activeItinerary.id),
          MockFirebase.loadItems(activeItinerary.id),
        ]).then(([loadedDays, loadedItems]) => {
          setDays(loadedDays);
          setItems(loadedItems);
          // Auto-expand first day
          if (loadedDays.length > 0) {
            setExpandedDays({ [loadedDays[0].id]: true });
          }
        });
      }, [activeItinerary?.id]);

      const [createError, setCreateError] = useState('');
      // Create new itinerary
      const handleCreateItinerary = async () => {
        setCreateError('');
        console.log('[Itinerary] Create clicked', { newName, newStartDate, newEndDate, activeCollection });
        if (!newName || !newStartDate || !newEndDate) {
          setCreateError('Please fill in all fields.');
          return;
        }
        // Guard: activeCollection can be 'all' or undefined — fall back to first available collection
        let targetCollection = activeCollection;
        if (!targetCollection || targetCollection === 'all') {
          targetCollection = collections?.[0]?.id;
        }
        if (!targetCollection) {
          setCreateError('Create a map first, then add itineraries to it.');
          return;
        }
        try {
          const id = generateId();
          const dates = generateDateRange(newStartDate, newEndDate);
          if (!dates.length) {
            setCreateError('End date must be after start date.');
            return;
          }
          const itin = {
            id, collection_id: targetCollection,
            trip_name: newName, start_date: newStartDate, end_date: newEndDate,
            timezone: 'Asia/Tokyo', buffer_minutes: 15,
          };
          const newDays = dates.map((date, i) => ({
            id: generateId(),
            itinerary_id: id,
            day_number: i + 1,
            date,
            starting_point: null,
            item_ids: [],
          }));
          await MockFirebase.saveItinerary(itin);
          await MockFirebase.saveDays(newDays);
          setItineraries(prev => [...prev, itin]);
          setActiveItinerary(itin);
          setDays(newDays);
          setItems([]);
          setExpandedDays({ [newDays[0]?.id]: true });
          setShowNewItinerary(false);
          setNewName(collectionName); setNewStartDate(''); setNewEndDate('');
        } catch (e) {
          console.error('[Itinerary] Create failed:', e);
          setCreateError(`Couldn't save itinerary: ${e.message || 'unknown error'}. Check the console for details.`);
        }
      };

      // Delete itinerary
      const handleDeleteItinerary = async (itinId) => {
        await MockFirebase.deleteItinerary(itinId);
        setItineraries(prev => prev.filter(i => i.id !== itinId));
        if (activeItinerary?.id === itinId) {
          setActiveItinerary(null);
          setDays([]);
          setItems([]);
        }
      };

      // Add item to a day
      const handleAddItem = (dayId, newItem) => {
        if (!newItem) {
          // Open the form for this day
          setAddingToDay(dayId);
          setEditingItem({});
          return;
        }
        // Meal preset chip — open form pre-filled with meal type + suggested time/emoji.
        // Keep __mealCategories / __anchorLat / __anchorLng so the form can sort pins by distance.
        if (newItem.__mealPreset) {
          const { __mealPreset, ...preset } = newItem;
          setAddingToDay(dayId);
          setEditingItem(preset);
          return;
        }
        const item = {
          ...newItem,
          itinerary_id: activeItinerary.id,
          day_id: dayId,
          order_in_day: items.filter(i => i.day_id === dayId).length,
        };
        setItems(prev => [...prev, item]);
        MockFirebase.saveItems([item]);
      };

      // Update items for a day (after reorder)
      const handleUpdateItems = (dayId, reorderedDayItems) => {
        setItems(prev => {
          const otherItems = prev.filter(i => i.day_id !== dayId);
          return [...otherItems, ...reorderedDayItems];
        });
        MockFirebase.saveItems(reorderedDayItems);
      };

      // Delete item
