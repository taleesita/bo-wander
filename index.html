  <style>
    html, body, #root {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .dark-mode html, .dark-mode body, .dark-mode #root,
    html.dark, html.dark body, html.dark #root {
      background: #0f172a;
    }

    input[type="search"]::-webkit-search-cancel-button,
    input[type="search"]::-webkit-search-decoration {
      -webkit-appearance: none;
      appearance: none;
      display: none;
    }

    .leaflet-container {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 100% !important;
      height: 100% !important;
    }

    .emoji-pin {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    .emoji-pin-selected {
      font-size: 36px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4))
              drop-shadow(0 0 0 3px rgba(37, 99, 235, 0.5));
    }

    .category-pin {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border: 2.5px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    .category-pin-selected {
      width: 44px;
      height: 44px;
      font-size: 22px;
      border: 3px solid white;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    }

    select {
      padding-right: 2rem !important;
      appearance: auto;
    }

    /* Blue dot pulse for user location */
    @keyframes location-pulse {
      0% { transform: scale(1); opacity: 0.6; }
      70% { transform: scale(3); opacity: 0; }
      100% { transform: scale(3); opacity: 0; }
    }
    .user-location-pulse {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4285F4;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .user-location-pulse::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #4285F4;
      animation: location-pulse 2s ease-out infinite;
    }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-radius: 24px 24px 0 0;
      max-height: 85vh;
      overflow-y: auto;
      z-index: 1100;
      box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.18);
      animation: bw-slide-up 280ms cubic-bezier(0.32, 0.72, 0, 1);
      transform-origin: bottom center;
    }

    @keyframes bw-toast-in {
      from { transform: translate(-50%, 20px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    @keyframes bw-slide-up {
      from { transform: translateY(100%); opacity: 0.4; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .bottom-sheet-handle {
      width: 40px;
      height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 10px auto 6px;

        const [header, b64] = dataUrl.split(',');
        const mime = header.match(/:(.*?);/)?.[1] || 'application/octet-stream';
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const blob = new Blob([bytes], { type: mime });
        const blobUrl = URL.createObjectURL(blob);
        window.open(blobUrl, '_blank');
        // Revoke after a delay to allow the new tab to load

    // ==================== UTILITY FUNCTIONS ====================

    const normalizePins = (pins) => {
      return pins.map(pin => {
        if (!pin.category) {
          const result = guessEmojiAndCategory(pin.name, '');
          return { ...pin, category: result.category };
        }
        return pin;
      });

    // Load saved pins from localStorage, falling back to sample data
    try {
      const savedPins = JSON.parse(localStorage.getItem('boWanderPins'));
      if (savedPins && savedPins.length > 0) {
        SAMPLE_PINS.length = 0;
        savedPins.forEach(p => SAMPLE_PINS.push(p));
      }
    } catch {}

    // Normalize pins on load
    SAMPLE_PINS.forEach((pin, idx) => {
      if (!pin.category) {
        const result = guessEmojiAndCategory(pin.name, '');
        SAMPLE_PINS[idx].category = result.category;
      }
    });

    // Safe localStorage helper вҖ” silently handles QuotaExceededError
    const safeSetItem = (key, value) => {
      try {
        localStorage.setItem(key, value);
      } catch (e) {
        console.warn(`[BoWander] localStorage quota exceeded for "${key}" вҖ” clearing cache`);
        // Try to free space by clearing the largest items first
        try {
          localStorage.removeItem('boWanderPins'); // pins are the biggest item
          localStorage.setItem(key, value); // retry
        } catch (e2) {
          console.warn('[BoWander] Still over quota after clearing pins cache:', e2.message);
        }
      }
    };

    // Strip large data (photos, attachments, base64) before caching pins to localStorage
    const stripLargeData = (pins) => {
      return pins.map(p => {
        const slim = { ...p };
        // Remove base64 photo data вҖ” keep photo metadata but not the actual data URLs
        if (slim.photos && Array.isArray(slim.photos)) {
          slim.photos = slim.photos.map(ph => {
            if (typeof ph === 'string' && ph.startsWith('data:')) return '[photo]';
            if (ph && typeof ph === 'object' && ph.url && ph.url.startsWith('data:')) return { ...ph, url: '[photo]' };
            return ph;
          });
        }
        // Remove attachment file data
        if (slim.attachment && slim.attachment.dataUrl) {
          slim.attachment = { ...slim.attachment, dataUrl: '[stripped]' };
        }
        // Remove info_photos data URLs
        if (slim.info_photos && Array.isArray(slim.info_photos)) {
          slim.info_photos = slim.info_photos.map(ip => {
            if (ip && ip.dataUrl) return { ...ip, dataUrl: '[stripped]' };
            return ip;
          });
        }
        return slim;
      });
    };

    // Save initial pins to localStorage if not already saved
    if (!localStorage.getItem('boWanderPins')) {
      safeSetItem('boWanderPins', JSON.stringify(SAMPLE_PINS));
    }

    // ==================== FIREBASE SERVICE ====================
    // Initialize Firebase
    const firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
    const firebaseAuth = firebase.auth();
    const db = firebase.firestore();

    // Enable offline persistence (Firestore caches data locally)
    db.enablePersistence({ synchronizeTabs: true }).catch(err => {
      console.warn('Firestore persistence error:', err.code);
    });

    const MockFirebase = {
      currentUser: null,

      init() {
        // Return a promise that resolves when Firebase Auth determines login state
        return new Promise((resolve) => {
          const unsubscribe = firebaseAuth.onAuthStateChanged(user => {
            unsubscribe();
            if (user) {
              this.currentUser = {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName,
                photoURL: user.photoURL
              };
            }
            resolve();
          });
        });
      },

      async signInWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        const result = await firebaseAuth.signInWithPopup(provider);
        const user = result.user;
        this.currentUser = {
          uid: user.uid,
          email: user.email,
          displayName: user.displayName,
          photoURL: user.photoURL
        };
        return this.currentUser;
      },

      async signOut() {
        await firebaseAuth.signOut();
        this.currentUser = null;
      },

      // Save a pin to Firestore
      async savePin(pin) {
        const pinData = { ...pin, updated_at: new Date().toISOString() };
        if (!pinData.created_at) pinData.created_at = new Date().toISOString();
        // Use pin.id as the document ID
        await db.collection('pins').doc(pin.id).set(pinData, { merge: true });
        // Also keep localStorage in sync for fast loads
        try {
          const cached = JSON.parse(localStorage.getItem('boWanderPins') || '[]');
          const idx = cached.findIndex(p => p.id === pin.id);
          if (idx > -1) cached[idx] = pinData;
          else cached.push(pinData);
          safeSetItem('boWanderPins', JSON.stringify(stripLargeData(cached)));
        } catch {}
        return Promise.resolve();
      },

      // Delete a pin from Firestore
      async deletePin(pinId, collectionId) {
        await db.collection('pins').doc(pinId).delete();
        try {
          const cached = JSON.parse(localStorage.getItem('boWanderPins') || '[]');
          safeSetItem('boWanderPins', JSON.stringify(stripLargeData(cached.filter(p => p.id !== pinId))));
        } catch {}
        return Promise.resolve();
      },

      // Save a collection to Firestore
      async saveCollection(col) {
        await db.collection('collections').doc(col.id).set(col, { merge: true });
        return Promise.resolve();
      },

      // Delete a collection from Firestore
      async deleteCollection(collectionId) {
        await db.collection('collections').doc(collectionId).delete();
        // Also delete all pins in this collection
        const snap = await db.collection('pins').where('collection_id', '==', collectionId).get();
        const batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        return Promise.resolve();
      },

      // Load all pins from Firestore (with localStorage fallback for offline)
      async loadPins() {
        try {
          const snap = await db.collection('pins').get();
          const pins = [];
          snap.forEach(doc => pins.push({ id: doc.id, ...doc.data() }));
          safeSetItem('boWanderPins', JSON.stringify(stripLargeData(pins)));
          return pins;
        } catch (e) {
          console.warn('Firestore load failed, using localStorage:', e);
          try {
            return JSON.parse(localStorage.getItem('boWanderPins') || '[]');
          } catch { return []; }
        }
      },

      // Load all collections from Firestore
      async loadCollections() {
        try {
          const snap = await db.collection('collections').get();
          const cols = [];
          snap.forEach(doc => cols.push({ id: doc.id, ...doc.data() }));
          if (cols.length > 0) {
            safeSetItem('boWanderCollections', JSON.stringify(cols));
            return cols;
          }
        } catch (e) {
          console.warn('Firestore collections load failed:', e);
        }
        // Fallback: localStorage or sample data
        try {
          const saved = JSON.parse(localStorage.getItem('boWanderCollections'));
          if (saved && saved.length > 0) return saved;
        } catch {}
        return SAMPLE_COLLECTIONS;
      },

      // Subscribe to real-time pin changes
      onPinsSnapshot(callback) {
        return db.collection('pins').onSnapshot(snap => {
          const pins = [];
          snap.forEach(doc => pins.push({ id: doc.id, ...doc.data() }));
          safeSetItem('boWanderPins', JSON.stringify(stripLargeData(pins)));
          callback(pins);
        }, err => {
          console.warn('Pins snapshot error:', err);
        });
      },

      // Subscribe to real-time collection changes
      onCollectionsSnapshot(callback) {
        return db.collection('collections').onSnapshot(snap => {
          const cols = [];
          snap.forEach(doc => cols.push({ id: doc.id, ...doc.data() }));
          if (cols.length > 0) {
            safeSetItem('boWanderCollections', JSON.stringify(cols));
            callback(cols);
          }
        }, err => {
          console.warn('Collections snapshot error:', err);
        });
      },

      // ===== ITINERARY CRUD (with localStorage fallback for offline / missing-permissions) =====
      _itinLocalKey: 'boWanderItineraries',
      _daysLocalKey: 'boWanderItineraryDays',
      _itemsLocalKey: 'boWanderItineraryItems',
      _loadLocal(key) { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; } },
      _saveLocal(key, arr) { try { localStorage.setItem(key, JSON.stringify(arr)); } catch {} },
      _mergeLocal(key, item) {
        const arr = this._loadLocal(key);
        const idx = arr.findIndex(x => x.id === item.id);
        if (idx > -1) arr[idx] = item; else arr.push(item);
        this._saveLocal(key, arr);
      },
      _removeLocal(key, id) {
        const arr = this._loadLocal(key).filter(x => x.id !== id);
        this._saveLocal(key, arr);
      },

      async saveItinerary(itin) {
        const data = { ...itin, updated_at: new Date().toISOString() };
        if (!data.created_at) data.created_at = data.updated_at;
        // Always save locally so it works even without Firestore rules
        this._mergeLocal(this._itinLocalKey, data);
        try {
          await db.collection('itineraries').doc(itin.id).set(data, { merge: true });
        } catch (e) {
          console.warn('[Itinerary] Firestore save failed, using localStorage only:', e.message);
        }
        return data;
      },

      async loadItineraries(collectionId) {
        const local = this._loadLocal(this._itinLocalKey).filter(i => i.collection_id === collectionId);
        try {
          const snap = await db.collection('itineraries').where('collection_id', '==', collectionId).get();
          const items = [];
          snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          // Merge remote + local (remote wins on conflict)
          const byId = {};
          [...local, ...items].forEach(it => { byId[it.id] = it; });
          return Object.values(byId);
        } catch (e) {
          console.warn('Failed to load itineraries from Firestore, using localStorage:', e.message);
          return local;
        }
      },

      async deleteItinerary(itinId) {
        // Delete all days and items for this itinerary, then the itinerary itself
        const daySnap = await db.collection('itinerary_days').where('itinerary_id', '==', itinId).get();
        const itemSnap = await db.collection('itinerary_items').where('itinerary_id', '==', itinId).get();
        const batch = db.batch();
        daySnap.forEach(doc => batch.delete(doc.ref));
        itemSnap.forEach(doc => batch.delete(doc.ref));
        batch.delete(db.collection('itineraries').doc(itinId));
        await batch.commit();
      },

      async saveDays(days) {
        // Save locally first so it works regardless of Firestore status
        days.forEach(day => {
          const data = { ...day, updated_at: new Date().toISOString() };
          if (!data.created_at) data.created_at = data.updated_at;
          this._mergeLocal(this._daysLocalKey, data);
        });
        try {
          const batch = db.batch();
          days.forEach(day => {
            const data = { ...day, updated_at: new Date().toISOString() };
            if (!data.created_at) data.created_at = data.updated_at;
            batch.set(db.collection('itinerary_days').doc(day.id), data, { merge: true });
          });
          await batch.commit();
        } catch (e) {
          console.warn('[Itinerary Days] Firestore save failed, using localStorage only:', e.message);
        }
      },

      async loadDays(itinId) {
        const local = this._loadLocal(this._daysLocalKey).filter(d => d.itinerary_id === itinId).sort((a, b) => a.day_number - b.day_number);
        try {
          const snap = await db.collection('itinerary_days').where('itinerary_id', '==', itinId).orderBy('day_number').get();
          const items = [];
          snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          const byId = {};
          [...local, ...items].forEach(it => { byId[it.id] = it; });
          return Object.values(byId).sort((a, b) => a.day_number - b.day_number);
        } catch (e) {
          console.warn('Failed to load days from Firestore, using localStorage:', e.message);
          return local;
        }
      },

      async saveItems(items) {
        items.forEach(item => {
          const data = { ...item, updated_at: new Date().toISOString() };
          if (!data.created_at) data.created_at = data.updated_at;
          this._mergeLocal(this._itemsLocalKey, data);
        });
        try {
          const batch = db.batch();
          items.forEach(item => {
            const data = { ...item, updated_at: new Date().toISOString() };
            if (!data.created_at) data.created_at = data.updated_at;
            batch.set(db.collection('itinerary_items').doc(item.id), data, { merge: true });
          });
          await batch.commit();
        } catch (e) {
          console.warn('[Itinerary Items] Firestore save failed, using localStorage only:', e.message);
        }
      },

      async loadItems(itinId) {
        const local = this._loadLocal(this._itemsLocalKey).filter(i => i.itinerary_id === itinId);
        try {
          const snap = await db.collection('itinerary_items').where('itinerary_id', '==', itinId).get();
          const items = [];
          snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          const byId = {};
          [...local, ...items].forEach(it => { byId[it.id] = it; });
          return Object.values(byId);
        } catch (e) {
          console.warn('Failed to load itinerary items from Firestore, using localStorage:', e.message);
          return local;
        }
      },

      async deleteItem(itemId) {
        // Remove from localStorage first so it can't resurrect from cache
        this._removeLocal(this._itemsLocalKey, itemId);
        try {
          await db.collection('itinerary_items').doc(itemId).delete();
        } catch (e) {
          console.warn('[Itinerary Items] Firestore delete failed (kept local removal):', e.message);
        }
      },

      async deleteDay(dayId) {
        // Remove the day + its items from localStorage first
        const items = this._loadLocal(this._itemsLocalKey).filter(i => i.day_id === dayId);
        items.forEach(i => this._removeLocal(this._itemsLocalKey, i.id));
        this._removeLocal(this._daysLocalKey, dayId);
        try {
          // Delete items for this day first
          const snap = await db.collection('itinerary_items').where('day_id', '==', dayId).get();
          const batch = db.batch();
          snap.forEach(doc => batch.delete(doc.ref));
          batch.delete(db.collection('itinerary_days').doc(dayId));
          await batch.commit();
        } catch (e) {
          console.warn('[Itinerary Day] Firestore delete failed (kept local removal):', e.message);
        }
      },

      // ---- Sharing ----
      async shareCollection(collectionId, collectionData, pins) {
        // Create/update a shared snapshot вҖ” strip large data (photos, base64) for size
        // Strip undefined values вҖ” Firestore rejects them
        const clean = (obj) => JSON.parse(JSON.stringify(obj));
        const sharedPins = pins.map(p => clean({
          id: p.id || '', name: p.name || '', description: p.description || '', address: p.address || '',
          lat: p.lat || 0, lng: p.lng || 0, emoji: p.emoji || 'рҹ“Қ', category: p.category || 'other',
          google_rating: p.google_rating || null, google_reviews_count: p.google_reviews_count || null,
          tabelog_rating: p.tabelog_rating || null, tabelog_url: p.tabelog_url || null,
          personal_rating: p.personal_rating || null, personal_notes: p.personal_notes || '',
          opening_hours: p.opening_hours || {},
          mealTags: p.mealTags || [],
          sources: p.sources || [],
          source_name: p.source_name || '',
          source_url: p.source_url || '',
          website: p.website || p.googleMapsUri || '',
        }));
        const shareDoc = {
          collection_id: collectionId,
          collection_name: collectionData.name || 'Untitled Map',
          collection_emoji: collectionData.emoji || 'рҹ—әпёҸ',
          owner_name: this.currentUser?.displayName || 'Someone',
          pins: sharedPins,
          updated_at: new Date().toISOString(),
          created_at: new Date().toISOString(),
        };
        // Use collection ID as the share doc ID for simplicity
        await db.collection('shared_maps').doc(collectionId).set(shareDoc, { merge: true });
        return collectionId;
      },

      async unshareCollection(collectionId) {
        try {
          await db.collection('shared_maps').doc(collectionId).delete();
        } catch (e) {
          console.warn('Unshare failed:', e);
        }
      },

      async loadSharedMap(shareId) {
        try {
          const doc = await db.collection('shared_maps').doc(shareId).get();
          if (doc.exists) return { id: doc.id, ...doc.data() };
        } catch (e) {
          console.warn('Shared map load failed:', e);
        }
        return null;
      },

      // ===== TRAVEL DOCS CRUD =====
      _travelDocsLocalKey: 'boWanderTravelDocs',

      async saveTravelDoc(doc) {
        const data = { ...doc, updated_at: new Date().toISOString() };
        if (!data.created_at) data.created_at = data.updated_at;
        if (!data.id) data.id = Date.now().toString();
        this._mergeLocal(this._travelDocsLocalKey, data);
        try {
          await db.collection('travel_docs').doc(data.id).set(data, { merge: true });
        } catch (e) {
          console.warn('[TravelDocs] Firestore save failed, using localStorage only:', e.message);
        }
        return data;
      },

      async loadTravelDocs(collectionId) {
        const local = this._loadLocal(this._travelDocsLocalKey).filter(d => d.collection_id === collectionId);
        try {
          const snap = await db.collection('travel_docs').where('collection_id', '==', collectionId).get();
          const items = [];
          snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          const byId = {};
          [...local, ...items].forEach(it => { byId[it.id] = it; });
          return Object.values(byId).sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.departure_time || '').localeCompare(b.departure_time || ''));
        } catch (e) {
          console.warn('Failed to load travel docs from Firestore, using localStorage:', e.message);
          return local.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
        }
      },

      async deleteTravelDoc(docId) {
        this._removeLocal(this._travelDocsLocalKey, docId);
        try {
          await db.collection('travel_docs').doc(docId).delete();
        } catch (e) {
          console.warn('[TravelDocs] Firestore delete failed:', e.message);
        }
      },

      onTravelDocsSnapshot(collectionId, callback) {
        try {
          return db.collection('travel_docs')
            .where('collection_id', '==', collectionId)
            .onSnapshot(snap => {
              const items = [];
              snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
              items.sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.departure_time || '').localeCompare(b.departure_time || ''));
              callback(items);
            }, err => {
              console.warn('TravelDocs snapshot error:', err);
              callback(this._loadLocal(this._travelDocsLocalKey).filter(d => d.collection_id === collectionId));
            });
        } catch (e) {
          callback(this._loadLocal(this._travelDocsLocalKey).filter(d => d.collection_id === collectionId));
          return () => {};
        }
      }

    // Global Sources manager вҖ” shown in home Settings panel
    const GlobalSourcesPanel = ({ allPins }) => {
      const defaultSources = ['Lonely Planet', 'Eater', 'Google Maps', 'Yelp', 'Friend recommendation'];
      const [hiddenSources, setHiddenSources] = useState(() => {
        try { return JSON.parse(localStorage.getItem('boWanderHiddenSources') || '[]'); } catch { return []; }
      });
      const [deletedSources, setDeletedSources] = useState(() => {
        try { return JSON.parse(localStorage.getItem('boWanderDeletedSources') || '[]'); } catch { return []; }
      });
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [customAdd, setCustomAdd] = useState('');
      const [customSources, setCustomSources] = useState(() => {
        try { return JSON.parse(localStorage.getItem('boWanderCustomSources') || '[]'); } catch { return []; }
      });

      // Sources actually used by pins (extracted from sources[] array OR legacy source_name)
      const usedSources = [...new Set(
        allPins.flatMap(p => {
          const fromArr = Array.isArray(p.sources) ? p.sources.map(s => s.label || s.name).filter(Boolean) : [];
          return fromArr.length ? fromArr : (p.source_name ? [p.source_name] : []);
        })
      )];
      const allKnown = [...new Set([...defaultSources, ...customSources, ...usedSources])].sort();

      const persistHidden = (next) => { setHiddenSources(next); localStorage.setItem('boWanderHiddenSources', JSON.stringify(next)); };
      const persistDeleted = (next) => { setDeletedSources(next); localStorage.setItem('boWanderDeletedSources', JSON.stringify(next)); };
      const persistCustom = (next) => { setCustomSources(next); localStorage.setItem('boWanderCustomSources', JSON.stringify(next)); };

      return (
        <div className="pt-1">
          <p className="text-xs text-gray-400 mb-2">Global вҖ” applies to all maps.</p>
          <div className="space-y-1 max-h-48 overflow-y-auto">
            {allKnown.map(src => {
              const isHidden = hiddenSources.includes(src);
              const isDeleted = deletedSources.includes(src);
              if (isDeleted) return null;
              const usageCount = usedSources.includes(src) ? allPins.filter(p => {
                const fromArr = Array.isArray(p.sources) ? p.sources.map(s => s.label || s.name).filter(Boolean) : [];
                return (fromArr.length ? fromArr : [p.source_name]).includes(src);
              }).length : 0;
              return (
                <div key={src} className="flex items-center justify-between gap-2 py-1 px-2 rounded text-xs bg-gray-50 dark:bg-slate-700/50">
                  <span className={`flex-1 truncate ${isHidden ? 'line-through text-gray-400' : 'text-gray-700 dark:text-gray-200'}`}>
                    {src} {usageCount > 0 && <span className="text-gray-400">({usageCount})</span>}
                  </span>
                  <button
                    onClick={() => persistHidden(isHidden ? hiddenSources.filter(s => s !== src) : [...hiddenSources, src])}
                    className="text-blue-500 hover:underline"
                    title={isHidden ? 'Show in dropdown' : 'Hide from dropdown'}
                  >
                    {isHidden ? 'Show' : 'Hide'}
                  </button>
                  {confirmDelete === src ? (
                    <button onClick={() => { persistDeleted([...deletedSources, src]); persistCustom(customSources.filter(s => s !== src)); setConfirmDelete(null); }} className="text-red-500 hover:underline">Confirm</button>
                  ) : (
                    <button onClick={() => setConfirmDelete(src)} className="text-red-500 hover:underline" title="Delete permanently">Delete</button>
                  )}
                </div>
              );
            })}
          </div>
          {/* Add custom */}
          <div className="flex gap-1 mt-2">
            <input
              value={customAdd}
              onChange={e => setCustomAdd(e.target.value)}
              placeholder="Add custom source name..."
              className="flex-1 px-2 py-1 text-xs border rounded dark:bg-slate-800 dark:border-slate-600 dark:text-white"
              onKeyDown={e => {
                if (e.key === 'Enter' && customAdd.trim()) {
                  if (!customSources.includes(customAdd.trim())) persistCustom([...customSources, customAdd.trim()]);
                  setCustomAdd('');
                }
              }}
            />
            <button
              onClick={() => {
                if (customAdd.trim() && !customSources.includes(customAdd.trim())) persistCustom([...customSources, customAdd.trim()]);
                setCustomAdd('');
              }}
              className="px-2 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700"
            >+</button>
          </div>
          {/* Restore deleted */}
          {deletedSources.length > 0 && (
            <details className="mt-2">
              <summary className="text-xs text-gray-400 cursor-pointer">Deleted ({deletedSources.length}) вҖ” click to restore</summary>
              <div className="mt-1 space-y-1">
                {deletedSources.map(src => (
                  <div key={src} className="flex items-center justify-between text-xs px-2 py-1 bg-red-50 dark:bg-red-900/10 rounded">
                    <span className="line-through text-gray-500">{src}</span>
                    <button onClick={() => persistDeleted(deletedSources.filter(s => s !== src))} className="text-blue-500 hover:underline">Restore</button>
                  </div>
                ))}
              </div>
            </details>
          )}
        </div>
      );

    const getOpenStatus = (openingHours, customDate) => {
      const now = customDate || new Date();
      const dayOfWeek = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][now.getDay()];
      const currentHours = openingHours[dayOfWeek];

      if (!currentHours || /^(closed|close)$/i.test(String(currentHours).trim())) {
        return { status: 'closed', label: 'Closed', hoursText: currentHours || 'Closed' };
      }

      const hoursStr = String(currentHours);

      // "Open 24 hours", "24 hours", "24/7", "Open 24/7"
      if (/\b(24\s*hours?|24\s*\/\s*7|open\s*24)/i.test(hoursStr)) {
        return { status: 'open', label: 'Open 24 hours', hoursText: hoursStr };
      }

      // Normalize various dash characters to '-' for easier matching
      const normalized = hoursStr.replace(/[\u2010-\u2015\u2212\u007E~]/g, '-');
      // Split on comma to support multiple ranges per day (e.g. "11am-2pm, 5pm-10pm")
      const ranges = normalized.split(/,|;/).map(s => s.trim()).filter(Boolean);

      const checkTime = now.getHours() * 60 + now.getMinutes();
      let anyParsed = false;
      let isOpen = false;

      // Matches "12:00 PM", "12pm", "12", "12:30pm", etc.
      const rangeRe = /(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\s*-\s*(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i;

      for (const range of ranges) {
        const m = range.match(rangeRe);
        if (!m) continue;
        anyParsed = true;
        let openH = parseInt(m[1]);
        const openM = parseInt(m[2] || '0');
        let openAmPm = (m[3] || '').toLowerCase();
        let closeH = parseInt(m[4]);
        const closeM = parseInt(m[5] || '0');
        const closeAmPm = (m[6] || '').toLowerCase();

        // If only the close side has am/pm, assume open side shares it
        // (common Google format: "12:00 вҖ“ 7:00 PM" -> both noon and 7pm)
        if (!openAmPm && closeAmPm) openAmPm = closeAmPm;

        if (openAmPm === 'pm' && openH < 12) openH += 12;
        if (openAmPm === 'am' && openH === 12) openH = 0;
        if (closeAmPm === 'pm' && closeH < 12) closeH += 12;
        if (closeAmPm === 'am' && closeH === 12) closeH = 0;

        const openTime = openH * 60 + openM;
        const closeTime = closeH * 60 + closeM;

        if (closeTime > openTime) {
          if (checkTime >= openTime && checkTime < closeTime) isOpen = true;
        } else {
          // Wraps past midnight
          if (checkTime >= openTime || checkTime < closeTime) isOpen = true;
        }
      }

      if (anyParsed) {
        return isOpen
          ? { status: 'open', label: 'Open', hoursText: hoursStr }
          : { status: 'closed', label: 'Closed', hoursText: hoursStr };
      }

      // Could not parse вҖ” don't falsely claim open
      return { status: 'unknown', label: 'Hours unknown', hoursText: hoursStr };
    };

    const isAscii = (str) => /^[\x00-\x7F]*$/.test(str);

    const getPinSources = (pin) => {

      const dateStr = rd?.check_in || rd?.date || '';
      if (!dateStr) return null;
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return null;

    // Pick the most relevant pin from a co-located group based on today's date
    // Priority: current stay (today within check-in..check-out) > nearest upcoming > nearest past
    const pickRelevantPin = (group) => {
      if (!group || group.length <= 1) return group?.[0] || null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      let bestCurrent = null;
      let bestUpcoming = null, upcomingDiff = Infinity;
      let bestPast = null, pastDiff = Infinity;
      for (const p of group) {
        const rd = p.reservation_details;
        if (!rd) continue;
        const ci = rd.check_in ? new Date(rd.check_in) : null;
        const co = rd.check_out ? new Date(rd.check_out) : null;
        if (ci && !isNaN(ci.getTime())) {
          ci.setHours(0, 0, 0, 0);
          if (co && !isNaN(co.getTime())) {
            co.setHours(0, 0, 0, 0);
            if (today >= ci && today <= co) { bestCurrent = p; break; }
          }
          const diff = ci.getTime() - today.getTime();
          if (diff > 0 && diff < upcomingDiff) { upcomingDiff = diff; bestUpcoming = p; }
          if (diff <= 0 && Math.abs(diff) < pastDiff) { pastDiff = Math.abs(diff); bestPast = p; }
        }
      }
      return bestCurrent || bestUpcoming || bestPast || group[0];

            // Fallback: category name match

                    </div>
                  </div>
                )) : (
                  <div className="text-center py-8 text-gray-500 dark:text-gray-400">
                    <p className="text-lg mb-1">No emojis match "{search}"</p>
                    <p className="text-sm">Try a different keyword or switch to "Travel" for tagged emojis</p>
                  </div>
                )
              )}
            </div>
            <div className="p-4 pt-2 border-t dark:border-slate-700 flex-shrink-0">
              <input type="file" ref={fileInputRef} accept="image/*" onChange={handleImageUpload} className="hidden" />
              <button
                onClick={() => fileInputRef.current?.click()}
                className="w-full px-4 py-2 text-sm font-medium text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-slate-800 rounded-lg transition flex items-center justify-center gap-2"
              >
                <span>рҹ“·</span> Upload custom image
              </button>
            </div>
          </div>
        </div>
      );
    };

    // Lightweight markdown renderer вҖ” handles ##, **bold**, *italic*, - lists, [links](url)
    const SimpleMarkdown = ({ text, className }) => {
      if (!text) return null;
      const html = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') // escape HTML
        .replace(/^### (.+)$/gm, '<strong class="text-sm block mt-2 mb-0.5">$1</strong>')
        .replace(/^## (.+)$/gm, '<strong class="text-base block mt-2 mb-0.5">$1</strong>')
        .replace(/^# (.+)$/gm, '<strong class="text-lg block mt-2 mb-0.5">$1</strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" class="text-blue-600 dark:text-blue-400 hover:underline">$1</a>')
        .replace(/^[-вҖ“вҖў] (.+)$/gm, '<span class="block pl-3 relative"><span class="absolute left-0">вҖў</span>$1</span>')
        .replace(/\n/g, '<br/>');
      return React.createElement('div', {
        className: className || '',
        dangerouslySetInnerHTML: { __html: html }
      });
    };

    const InlineEditableText = ({ label, value, onSave, placeholder, emptyText, showBorder = true, headerAction = null }) => {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(value);
      const textareaRef = useRef(null);

      // Auto-grow textarea helper (declared here so hook below can reference)
      const autoGrow = (el) => {
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.min(Math.max(el.scrollHeight, 140), 480) + 'px';
      };

      useEffect(() => { setDraft(value); }, [value]);
      useEffect(() => {
        if (editing && textareaRef.current) {
          textareaRef.current.focus();
          textareaRef.current.selectionStart = textareaRef.current.value.length;
          autoGrow(textareaRef.current);
        }
      }, [editing]);
      // Re-grow whenever draft changes while editing (must be declared before any conditional return)
      useEffect(() => { if (editing) autoGrow(textareaRef.current); }, [draft, editing]);

      const handleSave = () => {
        onSave(draft);
        setEditing(false);
      };

      if (!editing) {
        return (
          <div className={`space-y-1 ${showBorder ? 'border-t dark:border-slate-700 pt-2' : ''}`}>
            <div className="flex items-center justify-between gap-2">
              <label className="text-xs font-semibold text-gray-600 dark:text-gray-400">{label}</label>
              {headerAction}
            </div>
            {value ? (
              <div className="text-sm text-gray-700 dark:text-gray-300 cursor-pointer hover:bg-gray-50 dark:hover:bg-slate-800 rounded p-1 -m-1 transition" onClick={() => setEditing(true)} title="Click to edit">
                <SimpleMarkdown text={value} />
              </div>
            ) : (
              <p className="text-sm text-gray-400 italic cursor-pointer hover:text-blue-500 transition" onClick={() => setEditing(true)}>{emptyText || `Tap to add ${label.toLowerCase()}`}</p>
            )}
          </div>
        );
      }

      return (
        <div className={`space-y-2 ${showBorder ? 'border-t dark:border-slate-700 pt-2' : ''}`}>
          <div className="flex items-center justify-between gap-2">
            <label className="text-xs font-semibold text-gray-600 dark:text-gray-400">{label}</label>
            {headerAction}
          </div>
          <textarea
            ref={textareaRef}
            value={draft}
            onChange={e => { setDraft(e.target.value); autoGrow(e.target); }}
            className="w-full px-3 py-2 border rounded dark:bg-slate-800 dark:border-slate-700 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 resize-y overflow-auto"
            placeholder={placeholder || `Add ${label.toLowerCase()}...`}
            style={{ minHeight: 140, maxHeight: 480 }}
          />
          <div className="flex gap-2">
            <button
              onClick={() => { setDraft(value); setEditing(false); }}
              className="px-3 py-1 text-xs border rounded dark:border-slate-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700"
            >
              Cancel
            </button>
            <button
              onClick={handleSave}
              className="px-3 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700 font-medium"
            >
              Save
            </button>
          </div>
        </div>
      );
    };

    // Live USD conversion component for reservation detail cards
    const ReservationDetailsCard = ({ rd, category, isDarkMode }) => {
      const [liveUsd, setLiveUsd] = useState(rd.price_usd || '');
      const [liveRate, setLiveRate] = useState(rd.exchange_rate || null);
      const [liveRateDate, setLiveRateDate] = useState(rd.exchange_rate_date || '');
      const [fetchingRate, setFetchingRate] = useState(false);

      useEffect(() => {
        if (liveUsd || !rd.price) return; // already have USD or no price
        // Detect currency from the price string
        const SYMS = { '$': 'USD', 'вӮ¬': 'EUR', 'ВЈ': 'GBP', 'ВҘ': 'JPY', 'вӮ№': 'INR', 'вӮ©': 'KRW' };
        let currency = null;
        for (const [sym, code] of Object.entries(SYMS)) {
          if (rd.price.includes(sym)) { currency = code; break; }
        }
        if (!currency) {
          const m = rd.price.match(/([A-Z]{3})/);
          if (m && ['EUR','GBP','JPY','INR','KRW','THB','VND','AUD','CAD','CHF','CNY','SGD','HKD','TWD','MXN','SEK','NOK','DKK','CZK','PLN'].includes(m[1])) currency = m[1];
        }
        if (!currency || currency === 'USD') return;

        setFetchingRate(true);
        const numPrice = parseFloat(rd.price.replace(/[^0-9.,]/g, '').replace(/,/g, ''));
        if (!numPrice || isNaN(numPrice)) { setFetchingRate(false); return; }

        fetch(`https://api.frankfurter.app/latest?from=${currency}&to=USD`)
          .then(r => r.json())
          .then(data => {
            if (data.rates?.USD) {
              const usd = '$' + (numPrice * data.rates.USD).toFixed(2);
              setLiveUsd(usd);
              setLiveRate(data.rates.USD);
              setLiveRateDate(data.date || 'latest');
            }
          })
          .catch(() => {})
          .finally(() => setFetchingRate(false));
      }, [rd.price, rd.price_usd, liveUsd]);

      const isActivity = rd.type === 'activity' || category === 'activity';
      const priceDisplay = rd.price ? (
        <span>
          {rd.price}
          {(liveUsd || fetchingRate) && (
            <span className="text-xs ml-1">
              {fetchingRate ? (
                <span className="text-gray-400 animate-pulse">converting...</span>
              ) : (
                <span className="text-green-600 dark:text-green-400">вүҲ {liveUsd}</span>
              )}
              {liveRateDate && !fetchingRate && (
                <span className="text-gray-400 dark:text-gray-500 ml-1">({liveRateDate})</span>
              )}
            </span>
          )}
        </span>
      ) : null;

      const details = isActivity ? [
        rd.tour_operator && { label: 'Operator', value: rd.tour_operator },
        rd.date && { label: 'Date', value: `${rd.date}${rd.time ? ' at ' + rd.time : ''}` },
        rd.duration && { label: 'Duration', value: rd.duration },
        rd.confirmation_number && { label: 'Confirmation #', value: rd.confirmation_number },
        rd.price && { label: 'Price', value: priceDisplay },
        rd.contact_info && { label: 'Contact', value: rd.contact_info },
        rd.address && { label: 'Meeting Point', value: rd.address },
        rd.booking_source && { label: 'Booked via', value: rd.booking_source },
      ].filter(Boolean) : [
        rd.room_type && { label: 'Room', value: rd.room_type },
        rd.check_in && { label: 'Check-in', value: `${rd.check_in}${rd.check_in_time ? ' at ' + rd.check_in_time : ''}` },
        rd.check_out && { label: 'Check-out', value: `${rd.check_out}${rd.check_out_time ? ' at ' + rd.check_out_time : ''}` },
        rd.confirmation_number && { label: 'Confirmation #', value: rd.confirmation_number },
        rd.pin && { label: 'PIN', value: rd.pin },
        rd.price && { label: 'Price', value: priceDisplay },
        rd.includes_breakfast && rd.includes_breakfast !== 'unknown' && { label: 'Breakfast', value: rd.includes_breakfast === 'yes' ? 'Included' : 'Not included' },
        rd.booking_source && { label: 'Source', value: rd.booking_source },
      ].filter(Boolean);

      if (details.length === 0) return null;
      return (
        <div className="bg-blue-50 dark:bg-slate-800 rounded-lg p-3 space-y-1.5">
          <p className="text-xs font-semibold text-blue-700 dark:text-blue-400 uppercase tracking-wide">{isActivity ? 'Activity Details' : 'Reservation Details'}</p>
          {details.map((d, i) => (
            <div key={i} className="flex justify-between text-sm">
              <span className="text-gray-500 dark:text-gray-400">{d.label}</span>
              <span className="font-medium text-gray-800 dark:text-gray-200 text-right max-w-[65%]">{d.value}</span>
            </div>
          ))}
        </div>
      );
    };

    // ---- Info Photo Section (upload guidebook pages, OCR, append to description) ----
    // mode: "full" (default вҖ” button + thumbnails) | "button" (just the upload button, compact) | "thumbnails" (just thumbnails + viewer)
    const InfoPhotoSection = ({ pin, onUpdate, isDarkMode, mode = 'full' }) => {
      const [processing, setProcessing] = useState(false);
      const [expanded, setExpanded] = useState(false);
      const [viewingPhoto, setViewingPhoto] = useState(null);
      const [confirmRemove, setConfirmRemove] = useState(null);
      const [cropPending, setCropPending] = useState(null); // { imageSrc, fileName }
      const fileInputRef = useRef(null);

      const infoPhotos = pin.info_photos || [];

      const handleFileSelect = async (e) => {
        const original = e.target.files?.[0];
        if (fileInputRef.current) fileInputRef.current.value = '';
        if (!original) return;

        try {
          // Auto-convert HEIC/HEIF so canvas + Tesseract can decode it properly
          let file = original;
          const lowerName = (original.name || '').toLowerCase();
          const isHeic = /\.(heic|heif)$/.test(lowerName) || /^image\/heic/.test(original.type) || /^image\/heif/.test(original.type);
          if (isHeic) {
            if (typeof heic2any === 'undefined') {
              alert('HEIC converter not loaded. Refresh the page and try again.');
              return;
            }
            try {
              const converted = await heic2any({ blob: original, toType: 'image/jpeg', quality: 0.92 });
              file = new File([converted], (original.name || 'photo').replace(/\.(heic|heif)$/i, '.jpg'), { type: 'image/jpeg' });
            } catch (err) {
              console.warn('HEIC conversion failed:', err);
              alert('Could not convert this HEIC photo. Try taking a fresh shot.');
              return;
            }
          }

          // Read file as data URL
          const dataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(new Error('Could not read file'));
            reader.readAsDataURL(file);
          });

          // Show crop modal instead of OCR-ing immediately
          setCropPending({ imageSrc: dataUrl, fileName: file.name });
        } catch (err) {
          console.error('Info photo processing failed:', err);
          alert(`Could not process photo: ${err?.message || 'unknown error'}`);
        }
      };

      const handleRemovePhoto = (photoId) => {
        const photo = infoPhotos.find(p => p.id === photoId);
        const updatedPhotos = infoPhotos.filter(p => p.id !== photoId);
        // Also remove the OCR text this photo added to description
        let newDescription = pin.description || '';
        if (photo?.ocr_text) {
          // Try to remove the block that was added
          const label = `рҹ“· From ${photo.name}:`;
          const block = `\n\n---\n${label}\n${photo.ocr_text}`;
          newDescription = newDescription.replace(block, '');
          // Also try without leading divider (if it was the first block)
          const blockAlt = `${label}\n${photo.ocr_text}`;
          newDescription = newDescription.replace(blockAlt, '');
        }
        onUpdate({ ...pin, description: newDescription.trim(), info_photos: updatedPhotos });
        setConfirmRemove(null);
      };

      // Handler for after user crops
      const handleCroppedCanvas = async (croppedCanvas) => {
        setCropPending(null);
        setProcessing(true);
        try {
          const fileName = cropPending?.fileName || 'photo.jpg';

          // Full-size data URL from cropped canvas
          const dataUrl = croppedCanvas.toDataURL('image/jpeg', 0.92);

          // Thumbnail (max 300px)
          const thumb = (() => {
            const maxDim = 300;
            const scale = Math.min(maxDim / croppedCanvas.width, maxDim / croppedCanvas.height, 1);
            const c = document.createElement('canvas');
            c.width = Math.round(croppedCanvas.width * scale);
            c.height = Math.round(croppedCanvas.height * scale);
            c.getContext('2d').drawImage(croppedCanvas, 0, 0, c.width, c.height);
            return c.toDataURL('image/jpeg', 0.7);
          })();

          // OCR canvas: upscale small crops
          const ocrCanvas = (() => {
            const longSide = Math.max(croppedCanvas.width, croppedCanvas.height) || 1;
            const scale = longSide < 1600 ? 1600 / longSide : 1;
            const c = document.createElement('canvas');
            c.width = Math.round(croppedCanvas.width * scale);
            c.height = Math.round(croppedCanvas.height * scale);
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, c.width, c.height);
            ctx.drawImage(croppedCanvas, 0, 0, c.width, c.height);
            return c;
          })();

          let rawOcr = '';
          let ocrConfidence = 0;
          try {
            const result = await Tesseract.recognize(ocrCanvas, 'eng+jpn', { logger: () => {} });
            rawOcr = (result.data?.text || '').trim();
            ocrConfidence = result.data?.confidence || 0;
          } catch (err) { console.warn('OCR failed:', err); }

          const ocrLines = rawOcr
            .split('\n').map(l => l.trim())
            .filter(l => {
              if (!l) return false;
              const wordish = (l.match(/[A-Za-z\u3040-\u30ff\u4e00-\u9fff]/g) || []).length;
              if (l.length >= 3 && wordish / l.length < 0.4) return false;
              if (l.length <= 2 && !/[.!?]/.test(l)) return false;
              return true;
            })
            .map(l => l.replace(/\s*\|\s*/g, ' '));
          // Join lines into paragraphs: single newlines become spaces, blank lines become paragraph breaks
          const ocrText = ocrLines.reduce((acc, line, i) => {
            if (!acc) return line;
            // If previous line ended with sentence-ending punctuation or this line starts with a capital, start new paragraph
            const prevEndsSection = /[.!?:]\s*$/.test(ocrLines[i - 1] || '');
            const startsWithCap = /^[A-Z\u3040-\u30ff\u4e00-\u9fff]/.test(line);
            if (prevEndsSection && startsWithCap) return acc + '\n\n' + line;
            // Otherwise join with space (the line break was just word-wrap in the image)
            return acc + ' ' + line;
          }, '').replace(/\n{3,}/g, '\n\n').trim();

          const wordChars = (ocrText.match(/[A-Za-z\u3040-\u30ff\u4e00-\u9fff]{2,}/g) || []).length;
          const isGoodOcr = ocrText && ocrConfidence >= 40 && wordChars >= 3;

          const newPhoto = {
            id: Math.random().toString(36).substr(2, 9),
            thumbnail: thumb, full: dataUrl, name: fileName,
            ocr_text: isGoodOcr ? ocrText : '',
            added_at: new Date().toISOString(),
          };

          let newDescription = pin.description || '';
          if (isGoodOcr) {
            const divider = newDescription ? '\n\n---\n' : '';
            const label = `рҹ“· From ${fileName}:`;
            newDescription = `${newDescription}${divider}${label}\n${ocrText}`;
          }

          onUpdate({ ...pin, description: newDescription, info_photos: [...infoPhotos, newPhoto] });

          if (!isGoodOcr) {
            setTimeout(() => alert(`Photo saved, but couldn't reliably read text from it (confidence ${Math.round(ocrConfidence)}%). Try a clearer, straight-on shot with good lighting.`), 0);
          }
        } catch (err) {
          console.error('OCR after crop failed:', err);
          alert('Something went wrong processing the photo.');
        }
        setProcessing(false);
      };

      // Crop modal portal вҖ” renders regardless of mode so it shows even for button mode
      const cropModal = cropPending ? ReactDOM.createPortal(
        <PhotoCropModal
          imageSrc={cropPending.imageSrc}
          onCancel={() => setCropPending(null)}
          onApply={handleCroppedCanvas}
          isDarkMode={isDarkMode}
        />,
        document.body
      ) : null;

      // Compact button-only render вҖ” used inline next to the Description label
      if (mode === 'button') {
        return (
          <>
            <input
              ref={fileInputRef}
              type="file"
              accept="image/*"
              capture="environment"
              onChange={handleFileSelect}
              className="hidden"
            />
            <button
              onClick={() => fileInputRef.current?.click()}
              disabled={processing}
              title={processing ? 'OCR processingвҖҰ' : 'Add info from photo (OCR)'}
              className="relative flex items-center justify-center w-6 h-6 text-sm text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition disabled:opacity-50"
            >
              {processing ? <span className="animate-spin text-xs">вҸі</span> : <span>рҹ“·</span>}
              {infoPhotos.length > 0 && (
                <span className="absolute -top-1 -right-1 bg-blue-500 text-white rounded-full text-[9px] leading-none px-1 py-0.5 min-w-[14px] text-center">
                  {infoPhotos.length}
                </span>
              )}
            </button>
            {cropModal}
          </>
        );
      }

      return (
        <div className="space-y-2">
          {/* Upload button (hidden in "thumbnails" mode since the compact button is rendered elsewhere) */}
          {mode !== 'thumbnails' && (
            <div className="flex items-center gap-2">
              <input
                ref={fileInputRef}
                type="file"
                accept="image/*"
                capture="environment"
                onChange={handleFileSelect}
                className="hidden"
              />
              <button
                onClick={() => fileInputRef.current?.click()}
                disabled={processing}
                title="Add info from photo (OCR)"
                className="flex items-center gap-1 px-2 py-1 text-[11px] text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition disabled:opacity-50"
              >
                {processing ? (
                  <><span className="animate-spin">вҸі</span> OCR processing...</>
                ) : (
                  <><span>рҹ“·</span> Add info from photo</>
                )}
              </button>
              {infoPhotos.length > 0 && (
                <span className="text-xs text-gray-400">{infoPhotos.length} photo{infoPhotos.length !== 1 ? 's' : ''}</span>
              )}
            </div>
          )}

          {/* Photo thumbnails */}
          {infoPhotos.length > 0 && (
            <div className="flex gap-2 flex-wrap">
              {(expanded ? infoPhotos : infoPhotos.slice(0, 3)).map(photo => (
                <div key={photo.id} className="relative group">
                  <img
                    src={photo.thumbnail}
                    alt={photo.name}
                    className="w-16 h-16 rounded-lg object-cover cursor-pointer border dark:border-slate-700 hover:opacity-80 transition"
                    onClick={() => setViewingPhoto(photo)}
                  />
                  {/* Remove button */}
                  {confirmRemove === photo.id ? (
                    <div className="absolute -top-1 -right-1 flex gap-0.5">
                      <button onClick={() => setConfirmRemove(null)} className="w-5 h-5 bg-gray-600 text-white rounded-full text-xs flex items-center justify-center">вң•</button>
                      <button onClick={() => handleRemovePhoto(photo.id)} className="w-5 h-5 bg-red-600 text-white rounded-full text-xs flex items-center justify-center">вң“</button>
                    </div>
                  ) : (
                    <button
                      onClick={() => setConfirmRemove(photo.id)}
                      className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs opacity-0 group-hover:opacity-100 transition flex items-center justify-center"
                    >Г—</button>
                  )}
                </div>
              ))}
              {!expanded && infoPhotos.length > 3 && (
                <button
                  onClick={() => setExpanded(true)}
                  className="w-16 h-16 rounded-lg border dark:border-slate-700 flex items-center justify-center text-xs text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-700"
                >
                  +{infoPhotos.length - 3}
                </button>
              )}
            </div>
          )}

          {/* Full-size photo viewer */}
          {viewingPhoto && (
            <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4" style={{ zIndex: 10005 }} onClick={() => setViewingPhoto(null)}>
              <div className="relative max-w-2xl max-h-[90vh]" onClick={e => e.stopPropagation()}>
                <img src={viewingPhoto.full} alt={viewingPhoto.name} className="max-w-full max-h-[85vh] rounded-lg object-contain" />
                <button
                  onClick={() => setViewingPhoto(null)}
                  className="absolute top-2 right-2 w-8 h-8 bg-black bg-opacity-60 text-white rounded-full flex items-center justify-center hover:bg-opacity-80"
                >вң•</button>
                <div className="absolute bottom-0 left-0 right-0 bg-black bg-opacity-60 text-white text-xs p-2 rounded-b-lg">
                  {viewingPhoto.name} В· {viewingPhoto.added_at?.split('T')[0]}
                  {viewingPhoto.ocr_text && <span className="ml-2 text-gray-300">В· {viewingPhoto.ocr_text.length} chars extracted</span>}
                </div>
              </div>
            </div>
          )}
          {cropModal}
        </div>
      );
    };

    const PinDetailSheet = ({ pin, onClose, onEdit, onInlineUpdate, isDarkMode, isDesktop, onDelete, onNavigate, collections, allPins, fetchingRatings, onRetryRatings, ratingFetchStatus, customIcons, onUploadIcon, onDeleteIcon, onAddToItinerary, coLocatedPins = [], onSwitchPin }) => {
      const [translated, setTranslated] = useState(null);
      const [translating, setTranslating] = useState(false);
      const [editing, setEditing] = useState(false);
      const [editData, setEditData] = useState({});
      const [showEmojiPicker, setShowEmojiPicker] = useState(false);
      const [confirmingDelete, setConfirmingDelete] = useState(false);
      const [showHours, setShowHours] = useState(false);
      const [tabelogEditing, setTabelogEditing] = useState(false);
      const [tabelogInput, setTabelogInput] = useState('');

      const hasGroup = coLocatedPins.length > 1;

      // Reset editing state when pin changes
      useEffect(() => { setEditing(false); setConfirmingDelete(false); setTabelogEditing(false); }, [pin?.id]);

      const startEditing = () => {
        // Extract legacy "Source: [label](url)" markdown from description into sources[]
        let desc = pin.description || '';
        const extractedLinks = [];
        // Match patterns like "Source: [Bon Traveler](https://...)" or "Source: [label](url)" on a line
        const sourcePattern = /(?:^|\n)\s*Source:\s*\[([^\]]*)\]\(([^)]+)\)\s*/gi;
        desc = desc.replace(sourcePattern, (match, label, url) => {
          extractedLinks.push({ label: label.trim(), url: url.trim() });
          return '';
        }).replace(/\n{3,}/g, '\n\n').trim();

        const existingSources = Array.isArray(pin.sources) && pin.sources.length
          ? pin.sources

            {/* Reservation Details Card вҖ” for hotel and activity pins */}
            {!editing && pin.reservation_details && (pin.category === 'hotel' || pin.category === 'activity') && (
              <ReservationDetailsCard rd={pin.reservation_details} category={pin.category} isDarkMode={isDarkMode} />
            )}

            {/* Add to Calendar вҖ” for hotel pins with reservation details */}
            {!editing && pin.reservation_details?.check_in && pin.category === 'hotel' && (() => {
              // Helper to parse a date string into a Date object
              const parseDate = (str) => {
                if (!str) return null;
                const d = new Date(str);
                if (!isNaN(d.getTime())) return d;
                const m = str.match(/(\d{1,2})\s*(\w{3,9})\s*(\d{4})/);
                if (m) return new Date(`${m[2]} ${m[1]}, ${m[3]}`);
                return null;
              };
              // Helper to parse time string like "4:00 PM" or "16:00" into [hours, minutes]
              const parseTime = (str, defaultHour = 12) => {
                if (!str) return [defaultHour, 0];
                const m12 = str.match(/(\d{1,2}):?(\d{2})?\s*(AM|PM)/i);
                if (m12) {
                  let h = parseInt(m12[1]);
                  const min = parseInt(m12[2] || '0');
                  if (m12[3].toUpperCase() === 'PM' && h !== 12) h += 12;
                  if (m12[3].toUpperCase() === 'AM' && h === 12) h = 0;
                  return [h, min];
                }
                const m24 = str.match(/(\d{1,2}):(\d{2})/);
                if (m24) return [parseInt(m24[1]), parseInt(m24[2])];
                return [defaultHour, 0];
              };
              const rd = pin.reservation_details;
              const checkInDate = parseDate(rd.check_in);
              const checkOutDate = parseDate(rd.check_out);
              if (!checkInDate) return null;
              const hotelName = pin.name;
              const confNum = rd.confirmation_number || '';
              const pinCode = rd.pin || '';

              // Format date as YYYYMMDD for .ics
              const fmtDate = (d) => {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${y}${m}${dd}`;
              };
              // Format datetime as YYYYMMDDTHHMMSS (no Z вҖ” timezone handled via TZID)
              const fmtDateTime = (d, h, mn) => {
                const y = d.getFullYear();
                const mo = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(h).padStart(2, '0');
                const mm = String(mn).padStart(2, '0');
                return `${y}${mo}${dd}T${hh}${mm}00`;
              };

              const [ciH, ciM] = parseTime(rd.check_in_time, 16);
              const [coH, coM] = parseTime(rd.check_out_time, 12);

              // Timezone support
              const TZ_OPTIONS = [
                { id: 'America/New_York', label: 'Eastern (ET)' },
                { id: '_local', label: 'Local time (no TZ)' },
                { id: 'America/Chicago', label: 'Central (CT)' },
                { id: 'America/Los_Angeles', label: 'Pacific (PT)' },
                { id: 'Europe/London', label: 'London (GMT/BST)' },
                { id: 'Asia/Tokyo', label: 'Tokyo (JST)' },
              ];

              // VTIMEZONE block for common timezones (needed for strict ICS clients)
              const vtimezone = (tzid) => {
                if (tzid === '_local') return '';
                // Simplified вҖ” most calendar apps recognize TZID without full VTIMEZONE
                return '';
              };

              // Generate .ics content with timezone
              const makeICS = (events, tzid) => {
                let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//BoWander//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n';
                ics += vtimezone(tzid);
                for (const ev of events) {
                  ics += 'BEGIN:VEVENT\r\n';
                  if (ev.allDay) {
                    ics += `DTSTART;VALUE=DATE:${ev.start}\r\n`;
                    ics += `DTEND;VALUE=DATE:${ev.end}\r\n`;
                  } else if (tzid && tzid !== '_local') {
                    ics += `DTSTART;TZID=${tzid}:${ev.start}\r\n`;
                    ics += `DTEND;TZID=${tzid}:${ev.end}\r\n`;
                  } else {
                    // Floating time вҖ” no timezone, calendar interprets as user's local
                    ics += `DTSTART:${ev.start}\r\n`;
                    ics += `DTEND:${ev.end}\r\n`;
                  }
                  ics += `SUMMARY:${ev.title}\r\n`;
                  if (ev.description) ics += `DESCRIPTION:${ev.description}\r\n`;
                  if (ev.location) ics += `LOCATION:${ev.location}\r\n`;
                  ics += `UID:${Date.now()}-${Math.random().toString(36).slice(2)}@bowander\r\n`;
                  ics += 'END:VEVENT\r\n';
                }
                ics += 'END:VCALENDAR';
                return ics;
              };

              const downloadICS = (icsContent, filename) => {
                const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
              };

              // Build description strings with ICS line-break escaping
              const stayDesc = [
                confNum ? `Confirmation number: ${confNum}` : null,
                pinCode ? `PIN: ${pinCode}` : null,
              ].filter(Boolean).join('\\n');

              const checkInDesc = [
                confNum ? `Confirmation number: ${confNum}` : null,
              ].filter(Boolean).join('\\n');

              const checkOutDesc = [
                confNum ? `Confirmation number: ${confNum}` : null,
                pinCode ? `PIN: ${pinCode}` : null,
              ].filter(Boolean).join('\\n');

              // Event 1: All-day span
              const allDayEnd = checkOutDate ? new Date(checkOutDate) : new Date(checkInDate);
              if (checkOutDate) allDayEnd.setDate(allDayEnd.getDate() + 1); // ICS all-day DTEND is exclusive
              else allDayEnd.setDate(allDayEnd.getDate() + 2);
              const stayEvent = {
                allDay: true,
                start: fmtDate(checkInDate),
                end: fmtDate(allDayEnd),
                title: `Hotel: ${hotelName}`,
                description: stayDesc,
                location: pin.address || '',
              };

              // Event 2: Check-in
              const checkInEvent = {
                allDay: false,
                start: fmtDateTime(checkInDate, ciH, ciM),
                end: fmtDateTime(checkInDate, ciH, ciM),
                title: `Check In: ${hotelName}`,
                description: checkInDesc,
                location: pin.address || '',
              };

              // Event 3: Check-out
              const checkOutTarget = checkOutDate || checkInDate;
              const checkOutEvent = {
                allDay: false,
                start: fmtDateTime(checkOutTarget, coH, coM),
                end: fmtDateTime(checkOutTarget, coH, coM),
                title: `Check Out: ${hotelName}`,
                description: checkOutDesc,
                location: pin.address || '',
              };

              // Saved preference
              const savedTz = localStorage.getItem('bo_cal_timezone') || 'America/New_York';

              const CalendarSection = () => {
                const [calTz, setCalTz] = useState(savedTz);
                const [showTzPicker, setShowTzPicker] = useState(false);
                const [expanded, setExpanded] = useState(false);

                const handleTzChange = (tz) => {
                  setCalTz(tz);
                  localStorage.setItem('bo_cal_timezone', tz);
                  setShowTzPicker(false);

            {!editing && !pin.google_rating && !pin.yelp_rating && !pin.tabelog_rating && (

                {fetchingRatings ? (

            {/* Personal Rating вҖ” compact inline */}

            {/* Action Buttons */}

              {editing ? (

                  <button

      );
    };

    // Unified search bar вҖ” searches existing pins + Photon (Komoot) for places/businesses
    const UnifiedSearchBar = ({ pins, onSelectPin, onAddPlace, onUploadConfirmation, onAddFromLink, onPasteText, onFromPhoto, onShareMap, onFetchTabelog, isDarkMode, isMobile, activeCollection, collections, mapCenter }) => {
      const [query, setQuery] = useState('');
      const [placeResults, setPlaceResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [isFocused, setIsFocused] = useState(false);
      const timerRef = useRef(null);
      const searchIdRef = useRef(0); // track search requests to avoid stale results
      const containerRef = useRef(null);
      const inputWrapRef = useRef(null);
      const dropdownRef = useRef(null);
      const [dropdownPos, setDropdownPos] = useState(null);

      // Search using Photon API + Google Places API for businesses
      const doPlaceSearch = useCallback(async (q) => {
        if (q.length < 2) { setPlaceResults([]); return; }
        setSearching(true);
        const searchId = ++searchIdRef.current;

        try {
          // Build Photon URL with location bias
          let photonUrl = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5`;
          if (mapCenter && mapCenter.lat && mapCenter.lng) {
            photonUrl += `&lat=${mapCenter.lat}&lon=${mapCenter.lng}`;
          }

          // Search Photon and Google in parallel
          const [photonResp, googleResults] = await Promise.all([
            fetch(photonUrl).then(r => r.json()).catch(() => ({ features: [] })),
            (async () => {
              const apiKey = getGoogleApiKey();
              console.log('[BoWander Search] Google API key:', apiKey ? `${apiKey.substring(0,10)}...` : 'NONE');
              if (!apiKey) return [];
              try {
                const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'X-Goog-Api-Key': apiKey,
                    'X-Goog-FieldMask': 'places.displayName,places.formattedAddress,places.location,places.types'
                  },
                  body: JSON.stringify({
                    textQuery: q,
                    maxResultCount: 5,
                    ...(mapCenter?.lat ? { locationBias: { circle: { center: { latitude: mapCenter.lat, longitude: mapCenter.lng }, radius: 50000.0 }}} : {})
                  })
                });
                console.log('[BoWander Search] Google Places response:', resp.status);
                if (!resp.ok) {
                  const errText = await resp.text();
                  console.error('[BoWander Search] Google Places error:', errText);
                  return [];
                }
                const data = await resp.json();
                console.log('[BoWander Search] Google Places results:', data.places?.length || 0, data);
                return (data.places || []).map(p => ({
                  name: p.displayName?.text || '',
                  address: p.formattedAddress || '',
                  lat: p.location?.latitude,
                  lng: p.location?.longitude,
                  type: p.types?.[0] || '',
                  source: 'google',
                })).filter(r => r.name && r.lat && r.lng);
              } catch (e) { console.error('[BoWander Search] Google fetch error:', e); return []; }
            })()
          ]);

          if (searchId !== searchIdRef.current) return;

          console.log('[BoWander Search] Photon results:', photonResp.features?.length || 0, 'Google results:', googleResults.length);

          // Parse Photon results
          const photonResults = (photonResp.features || []).map(f => {
            const p = f.properties || {};
            const geo = f.geometry?.coordinates || [];
            const name = p.name || p.street || '';
            const parts = [p.street, p.housenumber].filter(Boolean).join(' ');
            const locality = [p.city || p.town || p.village, p.state, p.country].filter(Boolean).join(', ');
            return {
              name, address: [parts || name, locality].filter(Boolean).join(', '),
              lat: geo[1], lng: geo[0],
              type: p.osm_value || p.osm_key || '', osmType: p.osm_type || '',
              source: 'osm',
            };
          }).filter(r => r.name && r.lat && r.lng);

          // Merge: Google first (better for businesses), then Photon, deduplicate by name+address
          const seen = new Set();
          const merged = [];
          for (const r of [...googleResults, ...photonResults]) {
            const key = `${r.name.toLowerCase().trim()}|${(r.address || '').toLowerCase().trim()}`;
            if (!seen.has(key)) {
              seen.add(key);
              merged.push(r);
            }
          }

          setPlaceResults(merged.slice(0, 8));
        } catch {}
        if (searchId === searchIdRef.current) setSearching(false);
      }, [mapCenter]);

      const handleInput = (val) => {
        setQuery(val);
        // Clear stale results immediately when query changes
        if (val.length < 2) {
          setPlaceResults([]);
          setSearching(false);
        }
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => doPlaceSearch(val), 300);
      };

      // Filter and sort existing pins вҖ” current collection first, then others
      const matchingPins = useMemo(() => {
        if (!query || query.length < 2) return [];
        const q = query.toLowerCase();
        // Only show saved places from the active collection
        const collectionPins = activeCollection && activeCollection !== 'all'
          ? pins.filter(p => p.collection_id === activeCollection)
          : pins;
        const matches = collectionPins.filter(p =>
          p.name.toLowerCase().includes(q) ||
          p.address?.toLowerCase().includes(q) ||
          p.source_name?.toLowerCase().includes(q)
        );
        matches.sort((a, b) => {
          const aNameMatch = a.name.toLowerCase().includes(q) ? 0 : 1;
          const bNameMatch = b.name.toLowerCase().includes(q) ? 0 : 1;
          if (aNameMatch !== bNameMatch) return aNameMatch - bNameMatch;
          return a.name.localeCompare(b.name);
        });
        return matches.slice(0, 8);
      }, [query, pins, activeCollection]);

      const showDropdown = isFocused && query.length >= 2 && (matchingPins.length > 0 || placeResults.length > 0 || searching);

      // Update dropdown position when it should show
      useEffect(() => {
        if (inputWrapRef.current && showDropdown) {
          const rect = inputWrapRef.current.getBoundingClientRect();
          setDropdownPos({ top: rect.bottom, left: rect.left, width: rect.width });
        }
      }, [showDropdown]);

      // Close on outside click (check both container and portaled dropdown)
      useEffect(() => {
        const handler = (e) => {
          const inContainer = containerRef.current && containerRef.current.contains(e.target);
          const inDropdown = dropdownRef.current && dropdownRef.current.contains(e.target);
          if (!inContainer && !inDropdown) {
            setIsFocused(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const dropdownContent = showDropdown && dropdownPos ? ReactDOM.createPortal(
        <div
          ref={dropdownRef}
          className={`bg-white dark:bg-slate-800 border border-t-0 dark:border-slate-600 rounded-b-lg shadow-xl overflow-hidden`}
          style={{ position: 'fixed', top: dropdownPos.top, left: dropdownPos.left, width: dropdownPos.width, zIndex: 10002 }}
        >
          <div className="max-h-72 overflow-y-auto">
            {/* Matching existing pins */}
            {matchingPins.length > 0 && (
              <div className="px-3 py-1.5 text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide bg-gray-50 dark:bg-slate-750">Your places</div>
            )}
            {matchingPins.map(pin => {
              const catData = PIN_CATEGORIES[pin.category] || PIN_CATEGORIES.other;
              return (
                <button
                  key={pin.id}
                  className="w-full text-left px-2.5 py-1.5 hover:bg-blue-50 dark:hover:bg-slate-700 transition flex items-center gap-2 border-b dark:border-slate-700"
                  onClick={() => {
                    onSelectPin(pin);
                    setQuery('');
                    setIsFocused(false);
                    setPlaceResults([]);
                  }}
                >
                  {isCustomIcon(pin.emoji) ? (
                    <img src={pin.emoji} alt="" className="w-5 h-5 rounded-full object-cover flex-shrink-0" />
