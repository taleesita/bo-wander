      const handleDeleteItem = async (itemId) => {
        setItems(prev => prev.filter(i => i.id !== itemId));
        await MockFirebase.deleteItem(itemId);
      };

      // Save edited item
      const handleSaveItem = (savedItem) => {
        if (addingToDay) {
          // New item
          handleAddItem(addingToDay, savedItem);
        } else {
          // Edit existing
          setItems(prev => prev.map(i => i.id === savedItem.id ? { ...i, ...savedItem } : i));
          MockFirebase.saveItems([savedItem]);
        }
        setEditingItem(null);
        setAddingToDay(null);
      };

      // Set starting point for a day
      const handleSetStartingPoint = async (dayId, point) => {
        setDays(prev => prev.map(d => d.id === dayId ? { ...d, starting_point: point } : d));
        const day = days.find(d => d.id === dayId);
        if (day) {
          MockFirebase.saveDays([{ ...day, starting_point: point }]);
        }
      };

      // Set start time for a day (e.g. arrival time at airport)
      const handleSetStartTime = async (dayId, startTime) => {
        setDays(prev => prev.map(d => d.id === dayId ? { ...d, start_time: startTime } : d));
        const day = days.find(d => d.id === dayId);
        if (day) {
          MockFirebase.saveDays([{ ...day, start_time: startTime }]);
        }
      };

      // Per-day transit fetch errors (so we can surface API-key / Routes-API issues)
      const [transitErrors, setTransitErrors] = useState({});

      // Delete a day
      const handleDeleteDay = async (dayId) => {
        setDays(prev => prev.filter(d => d.id !== dayId));
        setItems(prev => prev.filter(i => i.day_id !== dayId));
        await MockFirebase.deleteDay(dayId);
      };

      // Add a day at the end
      const handleAddDay = async () => {
        if (!activeItinerary) return;
        const lastDay = days[days.length - 1];
        let newDate = '';
        if (lastDay?.date) {
          const d = new Date(lastDay.date + 'T12:00:00');
          d.setDate(d.getDate() + 1);
          newDate = d.toISOString().split('T')[0];
        }
        const newDay = {
          id: generateId(),
          itinerary_id: activeItinerary.id,
          day_number: days.length + 1,
          date: newDate,
          starting_point: lastDay?.starting_point || null,
          item_ids: [],
        };
        setDays(prev => [...prev, newDay]);
        setExpandedDays(prev => ({ ...prev, [newDay.id]: true }));
        await MockFirebase.saveDays([newDay]);
      };

      const toggleDay = (dayId) => {
        setExpandedDays(prev => ({ ...prev, [dayId]: !prev[dayId] }));
      };

      // ---- Transit calculation (Google Directions API) ----
      const transitCacheRef = useRef({});
      const transitDebounceRef = useRef(null);

      const fetchTransitForPair = async (origin, destination, departureISO) => {
        if (!origin?.lat || !destination?.lat) return { result: null, error: null };
        // Include departure time in cache key so different day start-times don't return stale results
        const depKey = departureISO ? departureISO.substring(0, 13) : 'now'; // hour-level cache bucket
        const cacheKey = `${origin.lat.toFixed(5)},${origin.lng.toFixed(5)}->${destination.lat.toFixed(5)},${destination.lng.toFixed(5)}@${depKey}`;
        if (transitCacheRef.current[cacheKey]) return { result: transitCacheRef.current[cacheKey], error: null };

        const apiKey = getGoogleApiKey();
        if (!apiKey) return { result: null, error: 'Add your Google Places API key in Settings.' };

        let firstError = null;
        try {
          // Fetch driving and transit in parallel via Routes API (v2) — supports CORS
          const modes = ['driving', 'transit', 'walking'];
          const results = await Promise.all(modes.map(async (mode) => {
            try {
              const travelMode = mode === 'driving' ? 'DRIVE' : mode === 'transit' ? 'TRANSIT' : 'WALK';
              // Routes API TRANSIT mode requires departureTime (RFC3339). Use 1 hour from now so schedules line up.
              const body = {
                origin: { location: { latLng: { latitude: origin.lat, longitude: origin.lng } } },
                destination: { location: { latLng: { latitude: destination.lat, longitude: destination.lng } } },
                travelMode,
              };
              if (travelMode === 'TRANSIT') {
                // Prefer caller-supplied departure (day start time) so timing reflects their plan.
                // Routes API requires it to be in the future — so if the supplied time is in the past, bump it forward.
                let dep = departureISO ? new Date(departureISO) : new Date(Date.now() + 60 * 60 * 1000);
                if (isNaN(dep.getTime()) || dep.getTime() < Date.now() + 60 * 1000) {
                  dep = new Date(Date.now() + 60 * 60 * 1000);
                }
                body.departureTime = dep.toISOString();
              }
              const resp = await fetch('https://routes.googleapis.com/directions/v2:computeRoutes', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'X-Goog-Api-Key': apiKey,
                  'X-Goog-FieldMask': 'routes.duration,routes.distanceMeters,routes.legs.steps.transitDetails',
                },
                body: JSON.stringify(body),
              });
              if (!resp.ok) {
                const errText = await resp.text();
                if (mode === 'transit') console.warn('[Transit] TRANSIT fetch failed:', resp.status, errText);
                if (!firstError) {
                  if (resp.status === 403 && /API_KEY|not authorized|disabled/i.test(errText)) {
                    firstError = 'Enable "Routes API" in your Google Cloud project (Console → APIs & Services).';
                  } else if (resp.status === 403) {
                    firstError = 'API key denied. Check key restrictions & billing in Google Cloud.';
                  } else {
                    firstError = `Routes API error ${resp.status}.`;
                  }
                }
                return { mode, minutes: null };
              }
              const data = await resp.json();
              if (mode === 'transit' && !data.routes?.length) {
                console.log('[Transit] TRANSIT returned no route (may be too short / no transit data in area)', data);
              }
              const route = data.routes?.[0];
              if (!route) return { mode, minutes: null };
              const seconds = parseInt(route.duration?.replace('s', '') || '0');
              return { mode, minutes: Math.round(seconds / 60), meters: route.distanceMeters };
            } catch (e) {
              if (!firstError) firstError = e?.message || 'Network error';
              return { mode, minutes: null };
            }
          }));

          const transit = {};
          results.forEach(r => {
            if (r.minutes != null) transit[r.mode] = { minutes: r.minutes, meters: r.meters };
          });

          // Pick best mode: prefer transit, then driving, then walking
          const best = transit.transit || transit.driving || transit.walking;
          const bestMode = transit.transit ? 'transit' : transit.driving ? 'driving' : 'walking';

          const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin.lat},${origin.lng}&destination=${destination.lat},${destination.lng}&travelmode=${bestMode === 'driving' ? 'driving' : bestMode === 'transit' ? 'transit' : 'walking'}`;

          const result = {
            mode: bestMode,
            estimated_time_minutes: best?.minutes || null,
            all_modes: transit,
            maps_url: mapsUrl,
          };

          transitCacheRef.current[cacheKey] = result;
          return { result, error: firstError && Object.keys(transit).length === 0 ? firstError : null };
        } catch (err) {
          console.warn('Transit calc failed:', err);
          return { result: null, error: err?.message || 'Unknown error' };
        }
      };

      const calculateTransitForDay = useCallback(async (dayId) => {
        const dayObj = days.find(d => d.id === dayId);
        if (!dayObj) return;
        const dayItems = items.filter(i => i.day_id === dayId).sort((a, b) => (a.order_in_day || 0) - (b.order_in_day || 0));
        if (dayItems.length === 0) return;
        // Quick API-key check so user gets a clear warning even when no segments succeed
        if (!getGoogleApiKey()) {
          setTransitErrors(prev => ({ ...prev, [dayId]: 'Add your Google Places API key in Settings (also enable Routes API).' }));
          return;
        }
        console.log('[Transit] calculating for day', dayId, 'with', dayItems.length, 'items');

        // Build sequence: starting_point -> item1 -> item2 -> ...
        const points = [];
        if (dayObj.starting_point?.lat) {
          points.push({ lat: dayObj.starting_point.lat, lng: dayObj.starting_point.lng, id: '__start__' });
        }
        dayItems.forEach(item => {
          if (item.lat && item.lng) points.push({ lat: item.lat, lng: item.lng, id: item.id });
        });

        if (points.length < 2) {
          // Clear any prior error since we have nothing to compute
          setTransitErrors(prev => { const n = { ...prev }; delete n[dayId]; return n; });
          return;
        }

        // Build per-segment departure times from day.start_time so TRANSIT routing uses the user's plan.
        // cursor starts at day.start_time; after each item, advance by (transit + item duration) so later segments
        // query departure = "when we'd realistically leave the previous stop".
        const todayISO = new Date().toISOString().substring(0, 10);
        const baseDate = dayObj.date || todayISO;
        let cursorMs = null;
        if (dayObj.start_time && /^\d{2}:\d{2}$/.test(dayObj.start_time)) {
          const [hh, mm] = dayObj.start_time.split(':').map(Number);
          const d = new Date(`${baseDate}T00:00:00`);
          d.setHours(hh, mm, 0, 0);
          cursorMs = d.getTime();
          // Routes API requires future time — if this day is in the past, push to next weekday same time
          if (cursorMs < Date.now()) {
            const soon = new Date(Date.now() + 24 * 60 * 60 * 1000);
            soon.setHours(hh, mm, 0, 0);
            cursorMs = soon.getTime();
          }
        }

        const updates = [];
        let dayError = null;
        for (let i = 1; i < points.length; i++) {
          const depISO = cursorMs ? new Date(cursorMs).toISOString() : null;
          const { result, error } = await fetchTransitForPair(points[i - 1], points[i], depISO);
          if (error && !dayError) dayError = error;
          if (result && points[i].id !== '__start__') {
            updates.push({ id: points[i].id, transit_info: result });
          }
          // Advance cursor for next segment: add this segment's travel time + the item's duration
          if (cursorMs) {
            const segMin = result?.estimated_time_minutes || 0;
            const item = dayItems.find(it => it.id === points[i].id);
            const itemDur = item?.estimated_duration_minutes || 0;
            cursorMs += (segMin + itemDur) * 60 * 1000;
          }
        }
        setTransitErrors(prev => {
          const n = { ...prev };
          if (dayError && updates.length === 0) n[dayId] = dayError;
          else delete n[dayId];
          return n;
        });

        if (updates.length > 0) {
          setItems(prev => prev.map(item => {
            const update = updates.find(u => u.id === item.id);
            return update ? { ...item, transit_info: update.transit_info } : item;
          }));
          // Persist transit info
          const toSave = updates.map(u => {
            const item = items.find(i => i.id === u.id);
            return item ? { ...item, transit_info: u.transit_info } : null;
          }).filter(Boolean);
          if (toSave.length > 0) MockFirebase.saveItems(toSave);
        }
      }, [days, items]);

      // Debounced transit recalculation when items change.
      // Use a stable signature of items (id + lat/lng + order) so reorders, lat updates, and adds all trigger.
      const itemsSig = items.map(i => `${i.id}:${i.day_id}:${i.lat || 0},${i.lng || 0}:${i.order_in_day || 0}`).join('|');
      const daysSig = days.map(d => `${d.id}:${d.starting_point?.lat || 0},${d.starting_point?.lng || 0}`).join('|');
      useEffect(() => {
        if (!activeItinerary) return;
        if (transitDebounceRef.current) clearTimeout(transitDebounceRef.current);
        transitDebounceRef.current = setTimeout(() => {
          // Calculate for all expanded days
          Object.keys(expandedDays).forEach(dayId => {
            if (expandedDays[dayId]) calculateTransitForDay(dayId);
          });
        }, 1500); // 1.5s debounce
        return () => { if (transitDebounceRef.current) clearTimeout(transitDebounceRef.current); };
      }, [itemsSig, daysSig, expandedDays, activeItinerary?.id]);

      // Handle pending add from PinDetailSheet
      useEffect(() => {
        if (!pendingAddPin || loading) return;
        if (!activeItinerary) {
          // No itinerary — auto-create one, then show day picker
          setShowNewItinerary(true);
          return;
        }
        setShowDayPicker(pendingAddPin);
        onClearPendingAdd?.();
      }, [pendingAddPin, loading, activeItinerary]);

      // Quick-add pin to a specific day
      const handleQuickAddToDay = (dayId, pin) => {
        const item = {
          id: generateId(),
          itinerary_id: activeItinerary.id,
          day_id: dayId,
          type: 'pin',
          pin_id: pin.id,
          name: pin.name,
          emoji: pin.emoji || '📌',
          lat: pin.lat,
          lng: pin.lng,
          scheduled_time: '',
          estimated_duration_minutes: 60,
          description: '',
          order_in_day: items.filter(i => i.day_id === dayId).length,
        };
        setItems(prev => [...prev, item]);
        MockFirebase.saveItems([item]);
        setExpandedDays(prev => ({ ...prev, [dayId]: true }));
        setShowDayPicker(null);
      };

      // After creating itinerary, if we had a pending pin, show day picker
      const handleCreateItineraryWithPending = async () => {
        await handleCreateItinerary();
        if (pendingAddPin) {
          // Days are set by handleCreateItinerary — show day picker on next tick
          setTimeout(() => {
            setShowDayPicker(pendingAddPin);
            onClearPendingAdd?.();
          }, 100);
        }
      };

      // Panel content
      const panelContent = (
        <div className="h-full flex flex-col bg-white dark:bg-slate-900">
          {/* Header */}
          <div className="px-4 py-3 border-b dark:border-slate-700 flex items-center justify-between flex-shrink-0">
            <div className="flex items-center gap-2">
              <span className="text-lg">🗓️</span>
              <h2 className="font-bold dark:text-white text-base">Itinerary</h2>
            </div>
            <div className="flex items-center gap-1">
              {itineraries.length > 0 && !showNewItinerary && (
                <button
                  onClick={() => setShowNewItinerary(true)}
                  className="text-xs px-2 py-1 text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded"
                >
                  + New
                </button>
              )}
              <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded">
                <CloseIcon />
              </button>
            </div>
          </div>

          {/* Loading */}
          {loading && (
            <div className="flex-1 flex items-center justify-center">
              <span className="text-sm text-gray-400 animate-pulse">Loading...</span>
            </div>
          )}

          {/* No itinerary yet */}
          {!loading && itineraries.length === 0 && !showNewItinerary && (
            <div className="flex-1 flex flex-col items-center justify-center p-6 text-center">
              <span className="text-4xl mb-3">🗓️</span>
              <h3 className="font-semibold dark:text-white mb-1">Plan Your Days</h3>
              <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">Create an itinerary to organize your pins into a day-by-day plan.</p>
              <button
                onClick={() => setShowNewItinerary(true)}
                className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition"
              >
                Create Itinerary
              </button>
            </div>
          )}

          {/* New itinerary form */}
          {showNewItinerary && (
            <div className="p-4 border-b dark:border-slate-700 space-y-3 bg-blue-50/50 dark:bg-blue-900/10 min-w-0">
              <input type="text" value={newName} onChange={e => setNewName(e.target.value)}
                placeholder="Trip name (e.g. Japan 2026)"
                className="w-full min-w-0 px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white box-border" />
              <div className="flex flex-col gap-2 min-w-0">
                <div className="min-w-0">
                  <label className="text-xs text-gray-500 dark:text-gray-400 block mb-0.5">Start date</label>
                  <input type="date" value={newStartDate} onChange={e => {
                      setNewStartDate(e.target.value);
                      if (newEndDate && e.target.value > newEndDate) setNewEndDate('');
                    }}
                    className="w-full min-w-0 px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white box-border" />
                </div>
                <div className="min-w-0">
                  <label className="text-xs text-gray-500 dark:text-gray-400 block mb-0.5">End date</label>
                  <input type="date" value={newEndDate} min={newStartDate || undefined} disabled={!newStartDate}
                    onChange={e => {
                      if (newStartDate && e.target.value < newStartDate) { setNewEndDate(newStartDate); return; }
                      setNewEndDate(e.target.value);
                    }}
                    className="w-full min-w-0 px-3 py-2 border rounded-lg text-sm dark:bg-slate-800 dark:border-slate-700 dark:text-white disabled:opacity-50 disabled:cursor-not-allowed box-border" />
                  {!newStartDate && <p className="text-[11px] text-gray-400 mt-0.5">Pick start date first</p>}
                </div>
              </div>
              {createError && (
                <p className="text-xs text-red-500 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded p-2">{createError}</p>
              )}
              <div className="flex gap-2">
                <button onClick={() => { setShowNewItinerary(false); setCreateError(''); }}
                  className="flex-1 px-3 py-2 border dark:border-slate-600 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700">Cancel</button>
                <button onClick={pendingAddPin ? handleCreateItineraryWithPending : handleCreateItinerary} disabled={!newName || !newStartDate || !newEndDate}
                  className="flex-1 px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition">
                  {!newName ? 'Enter trip name' : !newStartDate ? 'Pick start date' : !newEndDate ? 'Pick end date' : 'Create'}
                </button>
              </div>
            </div>
          )}

          {/* Itinerary selector (if multiple) */}
          {itineraries.length > 1 && (
            <div className="px-4 py-2 border-b dark:border-slate-700 flex items-center gap-2 flex-shrink-0">
              <select
                value={activeItinerary?.id || ''}
                onChange={e => setActiveItinerary(itineraries.find(i => i.id === e.target.value))}
                className="flex-1 text-sm px-2 py-1 border rounded dark:bg-slate-800 dark:border-slate-700 dark:text-white"
              >
                {itineraries.map(itin => (
                  <option key={itin.id} value={itin.id}>{itin.trip_name}</option>
                ))}
              </select>
            </div>
          )}

          {/* Itinerary summary bar */}
          {activeItinerary && days.length > 0 && (
            <div className="px-4 py-2 border-b dark:border-slate-700 flex-shrink-0">
              <div className="flex items-center justify-between">
                <div>
                  <span className="text-sm font-semibold dark:text-white">{activeItinerary.trip_name}</span>
                  <span className="text-xs text-gray-400 ml-2">{days.length} days · {items.length} items</span>
                </div>
                <span className="text-xs text-gray-400">{formatDayDate(activeItinerary.start_date)} – {formatDayDate(activeItinerary.end_date)}</span>
              </div>
            </div>
          )}

          {/* Days list */}
          {activeItinerary && (
            <div className="flex-1 overflow-y-auto p-3 space-y-2">
              {/* Expand/collapse all */}
              {days.length > 1 && (
                <div className="flex justify-end gap-2 pb-1">
                  <button
                    onClick={() => { const all = {}; days.forEach(d => all[d.id] = true); setExpandedDays(all); }}
                    className="text-xs text-blue-500 hover:text-blue-600 dark:text-blue-400"
                  >Expand all</button>
                  <button
                    onClick={() => setExpandedDays({})}
                    className="text-xs text-blue-500 hover:text-blue-600 dark:text-blue-400"
                  >Collapse all</button>
                </div>
              )}
              {days.map(day => (
                <DayView
                  key={day.id}
                  day={day}
                  items={items.filter(i => i.day_id === day.id).sort((a, b) => (a.order_in_day || 0) - (b.order_in_day || 0))}
                  pins={collectionPins}
                  isDarkMode={isDarkMode}
                  onUpdateItems={(reordered) => handleUpdateItems(day.id, reordered)}
                  onDeleteItem={handleDeleteItem}
                  onAddItem={(newItem) => handleAddItem(day.id, newItem)}
                  onEditItem={(item) => { setEditingItem(item); setAddingToDay(null); }}
                  onSetStartingPoint={handleSetStartingPoint}
                  onSetStartTime={handleSetStartTime}
                  onDeleteDay={handleDeleteDay}
                  isExpanded={!!expandedDays[day.id]}
                  onToggle={() => toggleDay(day.id)}
                  onFlyTo={onFlyTo}
                  transitError={transitErrors[day.id]}
                  onRecalcTransit={(dayId) => { transitCacheRef.current = {}; calculateTransitForDay(dayId); }}
                />
              ))}

              {/* Add day button */}
              <button
                onClick={handleAddDay}
                className="w-full py-2 border-2 border-dashed rounded-xl text-sm text-gray-400 dark:text-gray-500 dark:border-slate-700 hover:border-blue-400 hover:text-blue-500 transition"
              >
                + Add Day
              </button>
            </div>
          )}

          {/* Item form modal */}
          {editingItem && (
            <ItineraryItemForm
              item={editingItem.id ? editingItem : null}
              pins={collectionPins}
              onSave={handleSaveItem}
              onClose={() => { setEditingItem(null); setAddingToDay(null); }}
              isDarkMode={isDarkMode}
            />
          )}

          {/* Day picker for quick-add from pin detail */}
          {showDayPicker && days.length > 0 && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4" style={{ zIndex: 10002 }} onClick={() => setShowDayPicker(null)}>
              <div className={`${isDarkMode ? 'dark' : ''} bg-white dark:bg-slate-900 rounded-xl w-full max-w-sm shadow-2xl`} onClick={e => e.stopPropagation()}>
                <div className="p-4 space-y-3">
                  <div className="flex items-center justify-between">
                    <h3 className="font-bold dark:text-white">Add to Day</h3>
                    <button onClick={() => setShowDayPicker(null)} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded"><CloseIcon /></button>
                  </div>
                  <p className="text-sm text-gray-500 dark:text-gray-400">
                    Adding <span className="font-medium dark:text-white">{showDayPicker.emoji} {showDayPicker.name}</span> — pick a day:
                  </p>
                  <div className="max-h-60 overflow-y-auto space-y-1">
                    {days.map(day => {
                      const dayItems = items.filter(i => i.day_id === day.id);
                      return (
                        <button
                          key={day.id}
                          onClick={() => handleQuickAddToDay(day.id, showDayPicker)}
                          className="w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center justify-between hover:bg-gray-100 dark:hover:bg-slate-700 transition"
                        >
                          <div className="flex items-center gap-2">
                            <span className="text-xs font-bold text-gray-400 w-6">D{day.day_number}</span>
                            <span className="dark:text-white">{formatDayDate(day.date)}</span>
                          </div>
                          <span className="text-xs text-gray-400">{dayItems.length} item{dayItems.length !== 1 ? 's' : ''}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );

      // Desktop: side panel. Mobile: bottom sheet.
      if (isMobile) {
        return (
          <div className="fixed inset-0" style={{ zIndex: 9500 }}>
            <div className="absolute inset-0 bg-black bg-opacity-30" onClick={onClose}></div>
            <div className="absolute bottom-0 left-0 right-0 bg-white dark:bg-slate-900 rounded-t-2xl shadow-2xl" style={{ maxHeight: '85vh' }}>
              {/* Drag handle */}
              <div className="flex justify-center py-2">
                <div className="w-10 h-1 bg-gray-300 dark:bg-slate-600 rounded-full"></div>
              </div>
              <div style={{ height: 'calc(85vh - 24px)' }}>
                {panelContent}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="fixed top-16 right-0 bg-white dark:bg-slate-900 border-l dark:border-slate-700 shadow-xl" style={{ width: '380px', zIndex: 9000, height: 'calc(100vh - 4rem)' }}>
          {panelContent}
        </div>
      );
    };

    function BoWanderApp() {
      const [user, setUser] = useState(MockFirebase.currentUser);
      const [authorized, setAuthorized] = useState(
        user ? ALLOWED_EMAILS.includes(user.email) : false
      );
      const [loading, setLoading] = useState(!user);
      const [darkMode, setDarkMode] = useState(
        window.matchMedia('(prefers-color-scheme: dark)').matches
      );

      // Restore view state from URL hash on load (e.g. #collection/nyc)
      const initialHash = window.location.hash.replace('#', '');
      const [hashView, hashCollection] = initialHash.includes('/') ? initialHash.split('/') : [initialHash || 'home', ''];

      const [view, setView] = useState(hashView === 'collection' && hashCollection ? 'collection' : 'home');
      const [showList, setShowList] = useState(window.innerWidth >= 768); // show sidebar on desktop, map on mobile
      const [selectedPin, setSelectedPin] = useState(null);
      const [pins, setPins] = useState(() => {
        // Start with localStorage cache for instant load, Firestore will overwrite
        try {
          const cached = JSON.parse(localStorage.getItem('boWanderPins'));
          if (cached && cached.length > 0) return cached;
        } catch {}
        return [];
      });
      const [collections, setCollections] = useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem('boWanderCollections'));
          if (saved && saved.length > 0) return saved;
        } catch {}
        return SAMPLE_COLLECTIONS;
      });
      const [activeCollection, setActiveCollection] = useState(
        hashView === 'collection' && hashCollection ? hashCollection : 'tokyo'
      );
      const [searchQuery, setSearchQuery] = useState('');
      // Filters lifted up from ListView so they also apply to map pins
      const [listFilters, setListFilters] = useState({
        openNow: false,
        openAt: null,
        category: null,
        source: null,
        myRating: null,
        googleRating: null,
        vegetarian: false,
      });
      const [editingPin, setEditingPin] = useState(null);
      const [showAddMenu, setShowAddMenu] = useState(false);
      const pendingDeletesRef = useRef(new Set()); // Guard against snapshot re-adding deleted pins
      const [navigationPin, setNavigationPin] = useState(null);
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      const [showAddFromLink, setShowAddFromLink] = useState(false);
      const [toast, setToast] = useState(null); // { message, type }
      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };
      // Custom uploaded icons stored in localStorage
      const [customIcons, setCustomIcons] = useState(() => {
        try { return JSON.parse(localStorage.getItem('bo_custom_icons') || '[]'); } catch { return []; }
      });
      const handleUploadIcon = (dataUrl) => {
        setCustomIcons(prev => {
          const updated = prev.includes(dataUrl) ? prev : [...prev, dataUrl];
          localStorage.setItem('bo_custom_icons', JSON.stringify(updated));
          return updated;
        });
      };
      const handleDeleteIcon = (iconUrl) => {
        setCustomIcons(prev => {
          const updated = prev.filter(u => u !== iconUrl);
          localStorage.setItem('bo_custom_icons', JSON.stringify(updated));
          return updated;
        });
      };
      const [showUploadConfirmation, setShowUploadConfirmation] = useState(false);
      const [showDocCenter, setShowDocCenter] = useState(false);
      const [showItinerary, setShowItinerary] = useState(false);

      // Auto-replace side panels: only one right-side panel visible at a time.
      // When a pin is selected, close itinerary + doc center. When itinerary
      // opens, close selected pin + doc center, etc.
      useEffect(() => {
        if (selectedPin) {
          if (showItinerary) setShowItinerary(false);
          if (showDocCenter) setShowDocCenter(false);
        }
      }, [selectedPin]);
      useEffect(() => {
        if (showItinerary) {
          if (selectedPin) setSelectedPin(null);
          if (showDocCenter) setShowDocCenter(false);
        }
      }, [showItinerary]);
      useEffect(() => {
        if (showDocCenter) {
          if (selectedPin) setSelectedPin(null);
          if (showItinerary) setShowItinerary(false);
        }
      }, [showDocCenter]);
      const [pendingItineraryPin, setPendingItineraryPin] = useState(null);
      const [coLocatedPins, setCoLocatedPins] = useState([]);
      const [mapCenter, setMapCenter] = useState(null); // passive: where the map currently is (for search biasing)
      const [mapPanTarget, setMapPanTarget] = useState(null); // active: where to fly the map to
      const [previewPin, setPreviewPin] = useState(null); // temporary pin shown while adding a place
      const [fetchingRatingsFor, setFetchingRatingsFor] = useState(null); // pin id currently fetching ratings for
      const [ratingFetchStatus, setRatingFetchStatus] = useState(''); // status message for rating fetch

      useEffect(() => {
        let unsubPins = null;
        let unsubCollections = null;

        MockFirebase.init().then(() => {
          const currentUser = MockFirebase.currentUser;
          setUser(currentUser);
          if (currentUser && ALLOWED_EMAILS.includes(currentUser.email)) {
            setAuthorized(true);
            // Subscribe to real-time Firestore updates (pins sync between devices)
            unsubPins = MockFirebase.onPinsSnapshot(firestorePins => {
              // Filter out any pins that are pending deletion (prevents re-add flicker)
              const filtered = firestorePins.filter(p => !pendingDeletesRef.current.has(p.id));
              // Auto-register any categories from pins that aren't in the dropdown yet
              registerMissingCategories(filtered);
              setPins(filtered);
            });
            unsubCollections = MockFirebase.onCollectionsSnapshot(firestoreCols => {
              setCollections(firestoreCols);
            });
            // First-run seed: if Firestore has no collections, push the samples
            MockFirebase.loadCollections().then(cols => {
              if (cols === SAMPLE_COLLECTIONS || cols.length === 0) {
                SAMPLE_COLLECTIONS.forEach(c => MockFirebase.saveCollection(c));
              }
            });
          }
          setLoading(false);
        });

        const darkMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        const handleChange = (e) => setDarkMode(e.matches);
        darkMediaQuery.addEventListener('change', handleChange);

        const handleResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', handleResize);

        return () => {
          darkMediaQuery.removeEventListener('change', handleChange);
          window.removeEventListener('resize', handleResize);
          if (unsubPins) unsubPins();
          if (unsubCollections) unsubCollections();
        };
      }, []);

      // Auto-repair pins with missing coordinates (lat=0, lng=0)
      useEffect(() => {
        const missingCoords = pins.filter(p => p.name && (!p.lat && !p.lng));
        if (missingCoords.length === 0) return;
        console.log('[BoWander] Auto-repairing', missingCoords.length, 'pins with missing coordinates:', missingCoords.map(p => p.name));
        let repaired = 0;
        const repair = async (pin) => {
          try {
            const resp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(pin.name)}&limit=1`);
            const data = await resp.json();
            const f = data.features?.[0];
            if (f?.geometry?.coordinates) {
              const lng = f.geometry.coordinates[0];
              const lat = f.geometry.coordinates[1];
              const addr = !pin.address ? [f.properties?.street, f.properties?.city, f.properties?.country].filter(Boolean).join(', ') : pin.address;
              const updated = { ...pin, lat, lng, address: addr || pin.address };
              MockFirebase.savePin(updated);
              setPins(prev => prev.map(p => p.id === pin.id ? updated : p));
              repaired++;
              console.log('[BoWander] Repaired:', pin.name, '->', lat, lng);
            }
          } catch (err) {
            console.warn('[BoWander] Failed to repair:', pin.name, err);
          }
        };
        // Stagger requests to avoid rate limiting
        missingCoords.forEach((pin, i) => setTimeout(() => repair(pin), i * 500));
      }, [pins.length]); // Only re-run when total pin count changes

      // Sync URL hash with current view state
      useEffect(() => {
        if (view === 'collection' && activeCollection) {
          window.location.hash = `collection/${activeCollection}`;
        } else {
          window.location.hash = 'home';
        }
      }, [view, activeCollection]);

      // Listen for browser back/forward
      useEffect(() => {
        const onHashChange = () => {
          const hash = window.location.hash.replace('#', '');
          const [hView, hCol] = hash.includes('/') ? hash.split('/') : [hash || 'home', ''];
          if (hView === 'collection' && hCol) {
            setView('collection');
            setActiveCollection(hCol);
          } else {
            setView('home');
          }
        };
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      const filteredPins = useMemo(() => {
        let result = activeCollection === 'all'
          ? pins
          : pins.filter(p => p.collection_id === activeCollection);

        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          result = result.filter(p =>
            p.name.toLowerCase().includes(q) ||
            p.address.toLowerCase().includes(q) ||
            p.source_name?.toLowerCase().includes(q)
          );
        }

        // Apply list-filter bar filters to the map pins too
        if (listFilters.openNow) {
          result = result.filter(p => {
            const status = getOpenStatus(p.opening_hours || {});
            return status.status === 'open';
          });
        }
        if (listFilters.openAt) {
          result = result.filter(p => {
            const day = listFilters.openAt.day;
            const hours = (p.opening_hours || {})[day];
            if (!listFilters.openAt.time) {
              if (!hours) return false;
              return !/^(closed|close)$/i.test(String(hours).trim());
            }
            const dayIndex = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'].indexOf(day);
            const [h, m] = listFilters.openAt.time.split(':').map(Number);
            const targetDate = new Date();
            const currentDay = targetDate.getDay();
            targetDate.setDate(targetDate.getDate() + (dayIndex - currentDay));
            targetDate.setHours(h, m, 0, 0);
            const status = getOpenStatus(p.opening_hours || {}, targetDate);
            return status.status === 'open';
          });
        }
        if (listFilters.category) result = result.filter(p => p.category === listFilters.category);
        if (listFilters.vegetarian) result = result.filter(p => !!p.is_vegetarian);
        if (listFilters.source) result = result.filter(p => p.source_name === listFilters.source);
        if (listFilters.myRating) result = result.filter(p => (p.personal_rating || 0) >= listFilters.myRating);
        if (listFilters.googleRating) result = result.filter(p => (p.google_rating || 0) >= listFilters.googleRating);

        return result;
      }, [pins, activeCollection, searchQuery, listFilters]);

      // Auto-fetch ratings from Google and Yelp for a pin
      const fetchRatingsForPin = async (pinData) => {
        const apiKey = getGoogleApiKey();
        if (!apiKey) {
          setRatingFetchStatus('No Google API key set. Add one in Settings (gear icon on home page) to auto-fetch ratings.');
          return;
        }
        setFetchingRatingsFor(pinData.id);
        setRatingFetchStatus('Searching Google Places...');
        const searchQuery = `${pinData.name} ${pinData.address || ''}`.trim();
        const updates = {};

        try {
          // Use Google Places API (New) — Text Search
          const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Goog-Api-Key': apiKey,
              'X-Goog-FieldMask': 'places.displayName,places.rating,places.userRatingCount,places.priceLevel,places.websiteUri,places.googleMapsUri,places.formattedAddress,places.types,places.regularOpeningHours'
            },
            body: JSON.stringify({
              textQuery: searchQuery,
              maxResultCount: 1
            })
          });

          if (!resp.ok) {
            const errText = await resp.text();
            console.error('Places API error:', resp.status, errText);
            if (resp.status === 403 || resp.status === 401) {
              setRatingFetchStatus('API key invalid or Places API not enabled. Check your Google Cloud Console.');
            } else {
              setRatingFetchStatus(`Places API error (${resp.status}). Check console for details.`);
            }
            setFetchingRatingsFor(null);
            return;
          }

          const data = await resp.json();
          const place = data.places?.[0];

          if (place) {
            if (place.rating) {
              updates.google_rating = place.rating;
            }
            if (place.userRatingCount) {
              updates.google_reviews_count = place.userRatingCount;
            }
            if (place.priceLevel) {
              // Convert PRICE_LEVEL_FREE, PRICE_LEVEL_INEXPENSIVE, etc. to $, $$, $$$
              const priceLevels = { 'PRICE_LEVEL_FREE': 'Free', 'PRICE_LEVEL_INEXPENSIVE': '$', 'PRICE_LEVEL_MODERATE': '$$', 'PRICE_LEVEL_EXPENSIVE': '$$$', 'PRICE_LEVEL_VERY_EXPENSIVE': '$$$$' };
              updates.price_level = priceLevels[place.priceLevel] || place.priceLevel;
            }
            if (place.websiteUri) {
              updates.website = place.websiteUri;
            }
            if (place.googleMapsUri) {
              updates.google_maps_url = place.googleMapsUri;
            }
            // Use the Google-provided address if we don't have one or ours is messy
            if (place.formattedAddress && (!pinData.address || pinData.address.length > 100)) {
              updates.address = place.formattedAddress;
            }
            // Parse opening hours if we don't already have them
            if (place.regularOpeningHours?.weekdayDescriptions && (!pinData.opening_hours || Object.keys(pinData.opening_hours).length === 0)) {
              const hours = {};
              const dayAbbrev = { monday: 'mon', tuesday: 'tue', wednesday: 'wed', thursday: 'thu', friday: 'fri', saturday: 'sat', sunday: 'sun' };
              place.regularOpeningHours.weekdayDescriptions.forEach(desc => {
                const m = desc.match(/^(\w+):\s*(.+)/);
                if (m) {
                  const key = dayAbbrev[m[1].toLowerCase()] || m[1].toLowerCase().substring(0, 3);
                  hours[key] = m[2].trim();
                }
              });
              if (Object.keys(hours).length > 0) updates.opening_hours = hours;
            }
          }
        } catch (e) {
          console.error('Places API fetch error:', e);
          setRatingFetchStatus(`Network error fetching ratings: ${e.message}`);
          setFetchingRatingsFor(null);
          return;
        }

        // If we found any data, update the pin
        if (Object.keys(updates).length > 0) {
          setPins(prev => prev.map(p => {
            if (p.id === pinData.id) {
              const updated = { ...p, ...updates };
              MockFirebase.savePin(updated);
              setSelectedPin(sel => sel?.id === pinData.id ? updated : sel);
              return updated;
            }
            return p;
          }));
          setRatingFetchStatus('');
        } else {
          setRatingFetchStatus('Place found but no rating data available.');
        }
        setFetchingRatingsFor(null);
      };

      const handleSavePin = (pin) => {
        // Handle delete via _delete flag from edit form
        if (pin._delete) {
          handleDeletePin(pin.id, pin.collection_id);
          return;
        }
        // Ensure lat/lng are valid numbers
        const lat = parseFloat(pin.lat);
        const lng = parseFloat(pin.lng);
        const cleanPin = { ...pin, lat: isNaN(lat) ? 0 : lat, lng: isNaN(lng) ? 0 : lng };
        const isExisting = !!cleanPin.id;
        const savedPin = isExisting ? cleanPin : { ...cleanPin, id: Date.now().toString(), created_at: new Date().toISOString() };
        MockFirebase.savePin(savedPin);
        setPins(prev => {
          const idx = prev.findIndex(p => p.id === savedPin.id);
          if (idx > -1) {
            return [...prev.slice(0, idx), savedPin, ...prev.slice(idx + 1)];
          } else {
            return [...prev, savedPin];
          }
        });
        setEditingPin(null);
        setSelectedPin(savedPin);
        if (!isExisting) {
          // Auto-fetch ratings for new pins in the background
          setTimeout(() => fetchRatingsForPin(savedPin), 200);
        }
      };

      // Inline update: save pin data directly without opening edit form (for ratings, notes)
      const handleInlineUpdate = (updatedPin) => {
        // Ensure lat/lng stay as valid numbers
        const lat = parseFloat(updatedPin.lat);
        const lng = parseFloat(updatedPin.lng);
        updatedPin = { ...updatedPin, lat: isNaN(lat) ? 0 : lat, lng: isNaN(lng) ? 0 : lng };
        MockFirebase.savePin(updatedPin);
        setPins(prev => {
          const idx = prev.findIndex(p => p.id === updatedPin.id);
          if (idx > -1) return [...prev.slice(0, idx), updatedPin, ...prev.slice(idx + 1)];
          return prev;
        });
        setSelectedPin(updatedPin);
      };

      const handleDeletePin = async (pinId, collectionId) => {
        console.log('[BoWander] handleDeletePin called:', pinId, collectionId);
        if (!pinId) { alert('Cannot delete: no pin ID'); return; }
        // Mark as pending delete so snapshot listener won't re-add it
        pendingDeletesRef.current.add(pinId);
        // Optimistically update UI
        setPins(prev => prev.filter(p => p.id !== pinId));
        setSelectedPin(null);
        setEditingPin(null);
        try {
          await MockFirebase.deletePin(pinId, collectionId);
          console.log('[BoWander] Pin deleted:', pinId);
          // Keep in pending set for a bit to handle any in-flight snapshots
          setTimeout(() => pendingDeletesRef.current.delete(pinId), 5000);
        } catch (err) {
          console.error('[BoWander] Delete failed:', err);
          pendingDeletesRef.current.delete(pinId);
          alert('Failed to delete: ' + (err.message || 'Unknown error. Check if you are logged in.'));
          // Re-fetch pins since optimistic update may be wrong
          try {
            const fresh = await MockFirebase.loadPins();
            setPins(fresh);
          } catch {}
        }
      };

      const handleAddToItinerary = (pin) => {
        setPendingItineraryPin(pin);
        setShowItinerary(true);
      };

      const handleAddCollection = (newCol) => {
        const { _update, ...colData } = newCol;
        setCollections(prev => {
          let updated;
          if (_update) {
            updated = prev.map(c => c.id === colData.id ? { ...c, ...colData } : c);
          } else {
            updated = [...prev, colData];
          }
          localStorage.setItem('boWanderCollections', JSON.stringify(updated));
          return updated;
        });
        // Save to Firestore — find the full collection object to persist
        if (_update) {
          // Merge update into existing
          const existing = collections.find(c => c.id === colData.id);
          MockFirebase.saveCollection({ ...existing, ...colData });
        } else {
          MockFirebase.saveCollection(colData);
        }
      };

      const handleDeleteCollection = (collectionId) => {
        setCollections(prev => {
          const updated = prev.filter(c => c.id !== collectionId);
          localStorage.setItem('boWanderCollections', JSON.stringify(updated));
          return updated;
        });
        setPins(prev => prev.filter(p => p.collection_id !== collectionId));
        // Delete from Firestore (also deletes child pins)
        MockFirebase.deleteCollection(collectionId);
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center h-screen w-screen bg-white dark:bg-slate-900">
            <div className="loading-spinner" />
          </div>
        );
      }

      if (!user || !authorized) {
        return <LoginScreen isDarkMode={darkMode} />;
      }

      // Home view
      if (view === 'home') {
        return (
          <div className={`${darkMode ? 'dark' : ''} h-screen w-screen bg-white dark:bg-slate-900 text-gray-900 dark:text-white overflow-hidden`}>
            <HomePage
              collections={collections}
              pins={pins}
              onSelectCollection={(collectionId) => {
                setActiveCollection(collectionId);
                setView('collection');
                setSearchQuery('');

              onCreateCollection={handleAddCollection}
              onDeleteCollection={handleDeleteCollection}
              isDarkMode={darkMode}
              isMobile={isMobile}
            />
          </div>
        );

      // Collection view (map + list)
      return (
        <div className={`${darkMode ? 'dark' : ''} h-screen w-screen bg-white dark:bg-slate-900 text-gray-900 dark:text-white overflow-hidden`}>
          {/* (Floating map-name chip removed — collection name is shown in back-arrow tooltip and elsewhere) */}

          {/* Floating top controls (Google Maps style) — overlay on map, no fixed bar */}
          <div className="absolute top-0 left-0 right-0 pointer-events-none" style={{ zIndex: 9001 }}>
            <div className="flex items-start gap-2 p-3 sm:p-4">
              {/* Back arrow (left) — title is shown as small overlay chip on desktop only */}
              <button
                onClick={() => setView('home')}
                className="pointer-events-auto w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-800 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-full shadow-lg text-lg flex-shrink-0"
                title={`Back — ${collections.find(c => c.id === activeCollection)?.name || 'Maps'}`}
              >
                ←
              </button>

              {/* Search (center, takes remaining space) */}
              <div className="pointer-events-auto flex-1 min-w-0">
                <UnifiedSearchBar
              pins={pins}
              isDarkMode={darkMode}
              isMobile={isMobile}
              activeCollection={activeCollection}
              collections={collections}
              mapCenter={mapCenter}
              onSelectPin={(pin) => {
                setSelectedPin(pin);
              }}
              onAddPlace={(place) => {
                const result = guessEmojiAndCategory(place.name, place.type);
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                // Pan map and show preview pin
                if (place.lat && place.lng) {
                  setMapPanTarget({ lat: place.lat, lng: place.lng, _t: Date.now() });
                  setPreviewPin({ lat: place.lat, lng: place.lng, name: place.name, emoji: result.emoji });
                }
                setEditingPin({
                  name: place.name,
                  address: place.address,
                  lat: place.lat,
                  lng: place.lng,
                  emoji: result.emoji,
                  category: result.category,
                  description: '',
                  source_name: '',
                  collection_id: defaultCollection,
                  photos: [],
                  opening_hours: {}
                });
              }}
              onAddFromLink={() => setShowAddFromLink(true)}
              onUploadConfirmation={() => setShowUploadConfirmation(true)}
                />
              </div>
            </div>

            {/* Floating action icons (right side, vertical column) —
                hide whenever a right-side panel (pin, itinerary, doc center) is open or list view is open on mobile */}
            <div className={`absolute right-3 sm:right-4 top-16 sm:top-20 flex flex-col items-end gap-2 pointer-events-auto ${
              (selectedPin || showItinerary || showDocCenter || (isMobile && showList)) ? 'hidden' : ''

              {!isMobile && (
                <div className="flex bg-white dark:bg-slate-800 rounded-full shadow-lg p-1">
                  <button
                    onClick={() => setShowList(false)}

                  >
                    🗺️ Map
                  </button>
                  <button
                    onClick={() => setShowList(true)}
                    className={`flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium transition ${
                      showList ? 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700'

                  >
                    📋 List

                </div>

              <button
                onClick={() => setShowAddFromLink(true)}
                className="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-800 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-full shadow-lg text-base transition"
                title="Add from URL"
              >
                🔗
              </button>
              <button
                onClick={() => setShowUploadConfirmation(true)}
                className="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-800 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-full shadow-lg text-base transition"

              <button

              >
                📄
              </button>
              <button

                title="Itinerary Planner"

              onEdit={(pin) => setEditingPin(pin)}

              isDarkMode={darkMode}
              isDesktop={!isMobile}
              onDelete={handleDeletePin}
              onNavigate={setNavigationPin}

              customIcons={customIcons}
              onUploadIcon={handleUploadIcon}
              onDeleteIcon={handleDeleteIcon}
              onAddToItinerary={handleAddToItinerary}
            />
          )}

          {selectedPin && isMobile && (
            <PinDetailSheet
              pin={selectedPin}
              coLocatedPins={coLocatedPins}
              onSwitchPin={(pin) => { setSelectedPin(pin); }}
              onClose={() => { setSelectedPin(null); setCoLocatedPins([]); }}
              onEdit={(pin) => setEditingPin(pin)}
              onInlineUpdate={handleInlineUpdate}
              isDarkMode={darkMode}
              isDesktop={false}
              onDelete={handleDeletePin}
              onNavigate={setNavigationPin}
              collections={collections}
              allPins={pins}
              fetchingRatings={fetchingRatingsFor === selectedPin?.id}
              ratingFetchStatus={ratingFetchStatus}
              onRetryRatings={() => fetchRatingsForPin(selectedPin)}
              customIcons={customIcons}
              onUploadIcon={handleUploadIcon}
              onDeleteIcon={handleDeleteIcon}
              onAddToItinerary={handleAddToItinerary}
            />
          )}


          {/* Edit Form */}
          {editingPin && (
            <PinEditForm
              key={editingPin ? `${editingPin.name}-${editingPin.lat}-${editingPin.lng}` : 'new'}
              pin={editingPin}
              collections={collections}
              onSave={(pin) => { setPreviewPin(null); handleSavePin(pin); }}
              onCancel={() => { setPreviewPin(null); setEditingPin(null); }}
              isDarkMode={darkMode}
              onAddCollection={handleAddCollection}
              allPins={pins}
              customIcons={customIcons}
              onUploadIcon={handleUploadIcon}
              onDeleteIcon={handleDeleteIcon}
              onMapCenter={setMapPanTarget}
              onPreviewPin={setPreviewPin}
            />
          )}

          {/* Navigation View */}
          {navigationPin && (
            <NavigationView
              pin={navigationPin}
              onClose={() => setNavigationPin(null)}
              isDarkMode={darkMode}
            />
          )}

          {/* Add from Link Modal */}
          {showAddFromLink && (
            <AddFromLinkModal
              onSelect={(data) => {
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                const lat = data.lat || 0;
                const lng = data.lng || 0;
                // Build description: scraped text + source link
                let desc = data.description || '';
                // Source now stored in pin.sources[] — no longer appended to description
                const newPin = {
                  name: data.name,
                  address: data.address || '',
                  description: desc,
                  emoji: data.emoji,
                  category: guessEmojiAndCategory(data.name, '').category,
                  source_name: data.source_name,
                  source_url: data.source_url,
                  sources: data.source_url || data.source_name ? [{ label: data.source_name || '', url: data.source_url || '' }] : [],
                  collection_id: defaultCollection,
                  photos: [],
                  opening_hours: data.opening_hours || {},
                  lat, lng,
                  rating: data.rating || null,
                };
                // Pan map and preview if we have coords
                if (lat && lng) {
                  setMapPanTarget({ lat, lng, _t: Date.now() });
                  setPreviewPin({ lat, lng, name: data.name, emoji: data.emoji });
                }
                setEditingPin(newPin);
                setShowAddFromLink(false);
              }}
              onBulkSelect={(places) => {
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                let addedCount = 0;
                let mergedCount = 0;
                // Build a working copy of pins so we can detect duplicates against
                // pins added earlier in this same bulk (not just existing state).
                let workingPins = [...pins];
                const findDuplicate = (data) => {
                  const nameKey = (data.name || '').trim().toLowerCase();
                  const lat = parseFloat(data.lat);
                  const lng = parseFloat(data.lng);
                  const hasCoords = !isNaN(lat) && !isNaN(lng) && (lat !== 0 || lng !== 0);
                  const latKey = hasCoords ? lat.toFixed(4) : null;
                  const lngKey = hasCoords ? lng.toFixed(4) : null;
                  return workingPins.find(p => {
                    if (nameKey && p.name && p.name.trim().toLowerCase() === nameKey) return true;
                    if (hasCoords && p.lat != null && p.lng != null) {
                      if (parseFloat(p.lat).toFixed(4) === latKey && parseFloat(p.lng).toFixed(4) === lngKey) return true;
                    }
                    return false;
                  });
                };
                const updates = []; // pins to update (merged)
                const additions = []; // new pins
                places.forEach((data, idx) => {
                  const lat = data.lat || 0;
                  const lng = data.lng || 0;
                  let desc = data.description || '';
                  if (data.source_url && data.source_name) {
                    const sourceLink = `[${data.source_name}](${data.source_url})`;
                    desc = desc ? `${desc}\n\nSource: ${sourceLink}` : `Source: ${sourceLink}`;
                  }
                  const dup = findDuplicate(data);
                  if (dup) {
                    // Merge: avoid adding same source_url twice
                    const existingDesc = dup.description || '';
                    const alreadyHasSource = data.source_url && existingDesc.includes(data.source_url);
                    const mergedDesc = alreadyHasSource
                      ? existingDesc
                      : (existingDesc && desc ? `${existingDesc}\n\n---\n\n${desc}` : (existingDesc || desc));
                    const merged = {
                      ...dup,
                      description: mergedDesc,
                      // Keep original address/coords; fill in if missing
                      address: dup.address || data.address || '',
                      lat: dup.lat || lat,
                      lng: dup.lng || lng,
                      opening_hours: (dup.opening_hours && Object.keys(dup.opening_hours).length) ? dup.opening_hours : (data.opening_hours || {}),
                      google_rating: dup.google_rating || data.rating || null,
                      // If either side flagged veg, keep it flagged
                      is_vegetarian: !!(dup.is_vegetarian || data.is_vegetarian),
                    };
                    MockFirebase.savePin(merged);
                    updates.push(merged);
                    workingPins = workingPins.map(p => p.id === merged.id ? merged : p);
                    mergedCount++;
                  } else {
                    const cat = guessEmojiAndCategory(data.name, '');
                    const newPin = {
                      id: (Date.now() + idx).toString(),
                      name: data.name,
                      address: data.address || '',
                      description: desc,
                      emoji: data.emoji || cat.emoji,
                      category: data.category || cat.category,
                      source_name: data.source_name,
                      source_url: data.source_url,
                      collection_id: defaultCollection,
                      photos: [],
                      opening_hours: data.opening_hours || {},
                      lat, lng,
                      google_rating: data.rating || null,
                      is_vegetarian: !!data.is_vegetarian,
                      created_at: new Date().toISOString(),
                    };
                    MockFirebase.savePin(newPin);
                    additions.push(newPin);
                    workingPins.push(newPin);
                    addedCount++;
                    // Fetch ratings in background
                    setTimeout(() => fetchRatingsForPin(newPin), 500 + idx * 300);
                  }
                });
                // Apply all state changes at once
                setPins(prev => {
                  const updMap = {};
                  updates.forEach(u => { updMap[u.id] = u; });
                  const next = prev.map(p => updMap[p.id] || p);
                  return [...next, ...additions];
                });
                setShowAddFromLink(false);
                if (addedCount > 0 || mergedCount > 0) {
                  setSelectedPin(null);
                  const parts = [];
                  if (addedCount > 0) parts.push(`Added ${addedCount} place${addedCount === 1 ? '' : 's'}`);
                  if (mergedCount > 0) parts.push(`merged ${mergedCount} duplicate${mergedCount === 1 ? '' : 's'}`);
                  showToast(parts.join(', '));
                }
              }}
              onClose={() => setShowAddFromLink(false)}
              isDarkMode={darkMode}
            />
          )}

          {/* Toast Notification */}
          {toast && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[10000] animate-bounce-in">
              <div className={`px-4 py-2.5 rounded-xl shadow-lg font-medium text-sm flex items-center gap-2 ${
                toast.type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'
              }`}>
                <span>{toast.type === 'success' ? '✓' : '✗'}</span>
                {toast.message}
              </div>
            </div>
          )}

          {/* Upload Confirmation Modal */}
          {showUploadConfirmation && (
            <UploadConfirmationModal
              onSelect={async (data) => {
                const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                // Use coordinates from the modal if available, otherwise fallback geocode
                let lat = data.lat || 0, lng = data.lng || 0;
                if (!lat && data.name) {
                  try {
                    const geoResp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(data.name)}&limit=1`);
                    const geoData = await geoResp.json();
                    const f = geoData.features?.[0];
                    if (f?.geometry?.coordinates) {
                      lng = f.geometry.coordinates[0];
                      lat = f.geometry.coordinates[1];
                      if (!data.address) data.address = [f.properties?.street, f.properties?.city, f.properties?.country].filter(Boolean).join(', ');
                    }
                  } catch {}
                }
                const newPin = {
                  name: data.name,
                  address: data.address,
                  description: data.description,
                  emoji: data.emoji || '🏨',
                  category: data.category || 'hotel',
                  source_name: data.source_name,
                  collection_id: defaultCollection,
                  photos: [],
                  opening_hours: {},
                  lat, lng,
                  reservation_details: data.reservation_details,
                  attachment: data.attachment,
                };
                // Save directly — no need to open edit form
                handleSavePin(newPin);
                setPreviewPin(null);
                setShowUploadConfirmation(false);
              }}
              onClose={() => { setPreviewPin(null); setShowUploadConfirmation(false); }}
              isDarkMode={darkMode}
              onMapCenter={(coords, zoom) => setMapPanTarget({ lat: coords[0], lng: coords[1], _t: Date.now() })}
              onPreviewPin={(pin) => setPreviewPin({ lat: pin.lat, lng: pin.lng, name: pin.name, emoji: '🏨' })}
            />
          )}

          {/* Document Center */}
          {showDocCenter && (
            <DocumentCenter
              pins={pins}
              onClose={() => setShowDocCenter(false)}
              isDarkMode={darkMode}
              onSelectPin={(pin) => { setSelectedPin(pin); setShowDocCenter(false); }}
            />
          )}

          {/* Itinerary Planner */}
          {showItinerary && (
            <ItineraryPlanner
              pins={pins}
              collections={collections}
              activeCollection={activeCollection}
              isDarkMode={darkMode}
              isMobile={isMobile}
              onFlyTo={(lat, lng) => setMapPanTarget({ lat, lng, _t: Date.now() })}
              onClose={() => setShowItinerary(false)}
              pendingAddPin={pendingItineraryPin}
              onClearPendingAdd={() => setPendingItineraryPin(null)}
            />
          )}

          {/* Floating bottom buttons (Mobile) */}
          {isMobile && view === 'collection' && !selectedPin && !editingPin && (
            <div className="fixed bottom-4 left-0 right-0 flex justify-center gap-3" style={{ zIndex: 500 }}>
              <button
                onClick={() => setShowList(!showList)}
                className={`flex items-center gap-2 px-4 py-2.5 rounded-full shadow-lg text-sm font-medium transition ${
                  showList
                    ? 'bg-blue-600 text-white'
                    : 'bg-white dark:bg-slate-800 text-gray-700 dark:text-gray-200 border dark:border-slate-600'
                }`}
              >
                {showList ? <><span className="text-base">🗺️</span> Map</> : <><span className="text-base">📋</span> List</>}
              </button>
              {/* Home button removed — same action as top-left back arrow */}
            </div>
          )}

          {/* Add Menu (Floating) */}
          {showAddMenu && isMobile && (
            <div className="floating-action-menu">
              <div
                className="fam-item"
                onClick={() => {
                  const defaultCollection = activeCollection === 'all' ? collections[0]?.id : activeCollection;
                  setEditingPin({ name: '', address: '', description: '', emoji: '📌', category: 'other', source_name: '', collection_id: defaultCollection, photos: [], opening_hours: {} });
                  setShowAddMenu(false);
                }}
              >
                <span>✏️</span>
                <span>Manual</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowAddFromLink(true);
                  setShowAddMenu(false);
                }}
              >
                <span>🔗</span>
                <span>From URL</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  alert('Add from Photo feature coming soon');
                }}
              >
                <span>📸</span>
                <span>From Photo</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowUploadConfirmation(true);
                  setShowAddMenu(false);
                }}
              >
                <span>🎫</span>
                <span>Upload Confirmation</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowDocCenter(true);
                  setShowAddMenu(false);
                }}
              >
                <span>📄</span>
                <span>Documents</span>
              </div>
              <div
                className="fam-item"
                onClick={() => {
                  setShowItinerary(true);
                  setShowAddMenu(false);
                }}
              >
                <span>🗓️</span>
                <span>Itinerary</span>
              </div>
            </div>
          )}


          {/* Service Worker Registration */}
          {typeof navigator !== 'undefined' && 'serviceWorker' in navigator && (
            <script dangerouslySetInnerHTML={{
              __html: `
                if ('serviceWorker' in navigator) {
                  const swCode = \`
const CACHE_NAME = 'bo-wander-v1';
const urlsToCache = [
  '/',
  '/index.html'
];

self.addEventListener('install', event => {
  event.waitUntil(
    caches.open(CACHE_NAME)
      .then(cache => cache.addAll(urlsToCache).catch(() => {}))
  );
  self.skipWaiting();
});

self.addEventListener('activate', event => {
  self.clients.matchAll().then(clients => {
    clients.forEach(client => client.postMessage({ type: 'SKIP_WAITING' }));
  });
  event.waitUntil(caches.keys().then(cacheNames => {
    return Promise.all(
      cacheNames.map(cacheName => {
        if (cacheName !== CACHE_NAME) {
          return caches.delete(cacheName);
        }
      })
    );
  }));
});

self.addEventListener('fetch', event => {
  if (event.request.method === 'GET') {
    event.respondWith(
      caches.match(event.request)
        .then(response => response || fetch(event.request))
        .catch(() => caches.match(event.request))
    );
  }
});
  \`;
                  const blob = new Blob([swCode], { type: 'application/javascript' });
                  const swUrl = URL.createObjectURL(blob);
                  navigator.serviceWorker.register(swUrl).catch(() => {});
                }
              `
            }} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><BoWanderApp /></ErrorBoundary>);
  </script>
</body>
